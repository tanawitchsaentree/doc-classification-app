/* ══════════════════════════════════════════════════════
   Theme v4 · Spotify Light × Allianz Blue
   ══════════════════════════════════════════════════════ */

/* ── Design tokens ── */
:root{
  /* ── NDBX Core ── */
  --a:     #003781; --a-h:#002d6b; --a-act:#001f52;
  --a-lt:  #eef2fb; --a-mid:#c4d3ee; --a-d4:#d4e0f5;
  --a-glow:rgba(0,55,129,.12);
  --bg:    #f5f5f5; --srf:#fff; --srf2:#f2f2f2;
  --bdr:   #e4e4e4; --bdr-f:#7a9cc8;
  --tx1:   #121212; --tx2:#535353; --tx3:#a7a7a7;
  --r-sm:4px; --r:4px; --r-md:6px; --r-lg:8px; --r-p:999px;
  /* ── NDBX Button tokens ── */
  --btn-primary:       #003781; --btn-primary-h:    #00266D; --btn-primary-dis:   #8faad4;
  --btn-secondary:     #003781; --btn-secondary-h:  #eef2fb; --btn-secondary-dis: #8faad4;
  --btn-r: 8px;
  --btn-emphasis:      #c25400; --btn-emphasis-h:   #9e4500; --btn-emphasis-dis:  #e8c4a8;
  --btn-attention:     #8f1857; --btn-attention-h:  #6f1243; --btn-attention-dis: #d4a0ba;
  --btn-cta:           #197a00; --btn-cta-h:        #125c00; --btn-cta-dis:       #9dc496;
  --btn-danger:        #cc0000; --btn-danger-h:     #aa0000; --btn-danger-dis:    #f5b3b3;
  /* ── NDBX Button typography ── */
  --btn-font-weight: 700;
  --btn-letter-spacing: 0.06em;
  --btn-text-transform: uppercase;
  /* ── NDBX Button sizes ── */
  --btn-h-sm:  36px; --btn-px-sm:  16px; --btn-fz-sm: 12px;
  --btn-h-md:  48px; --btn-px-md:  24px; --btn-fz-md: 14px;
  --btn-h-lg:  56px; --btn-px-lg:  32px; --btn-fz-lg: 16px;
  /* ── NDBX Input / FormField tokens ── */
  --inp-border:         #333333;   /* default underline / box border */
  --inp-border-focus:   #003781;   /* focus — blue underline */
  --inp-border-error:   #cc0000;   /* error state */
  --inp-border-dis:     #d4d4d4;   /* disabled */
  --inp-label:          #767676;   /* floating label default */
  --inp-label-focus:    #003781;   /* label when focused */
  --inp-label-error:    #cc0000;   /* label in error */
  --inp-label-dis:      #a0a0a0;   /* label disabled */
  --inp-text:           #333333;   /* input value text */
  --inp-text-dis:       #a0a0a0;   /* disabled text */
  --inp-placeholder:    #a0a0a0;   /* placeholder */
  --inp-bg:             #ffffff;   /* default bg */
  --inp-bg-readonly:    #f5f5f5;   /* readonly bg */
  --inp-fz:             16px;      /* input font size */
  --inp-label-fz:       12px;      /* label font size */
  --inp-hint-fz:        12px;      /* hint / char-count font size */
  --inp-height:         40px;      /* single-line height */
  --sh-sm: 0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md: 0 4px 16px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --sh-lg: 0 20px 48px rgba(0,0,0,.13),0 4px 12px rgba(0,0,0,.06);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --smooth:cubic-bezier(.4,0,.2,1);
  --eout:  cubic-bezier(0,0,.2,1);
  --tf:120ms; --t:200ms; --ts:300ms;
}

/* ── Base ── */
body{font-family:'Allianz Neo','Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg)}

/* ── Keyframes ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes dropIn{from{opacity:0;transform:translateY(-5px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(110%)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 var(--a-glow)}70%{box-shadow:0 0 0 8px transparent}100%{box-shadow:0 0 0 0 transparent}}

/* ── Toasts ── */
.toast{border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.1)}

/* ── Inputs & forms ── */
.add-modal-input{width:100%;padding:8px 12px;border:1.5px solid #cccccc;border-radius:4px;font-size:13px;outline:none;font-family:inherit;color:#333333;transition:border-color .15s,box-shadow .15s}
.add-modal-input:focus{border-color:#003781;box-shadow:0 0 0 3px rgba(0,55,129,.08)}
.add-modal-label{font-size:12px;font-weight:600;color:#444444;display:block;margin-bottom:6px}
.add-modal-hint{font-size:11px;color:#a0a0a0;margin-top:4px}

/* ── Detail Scroll Layout (L1 only mode) ── */
.detail-scroll{flex:1;display:flex;overflow:hidden;min-height:0}
.detail-scroll__main{flex:1;overflow-y:auto;padding:16px 20px;background:#f5f5f5}
.detail-scroll__main::-webkit-scrollbar{width:5px}.detail-scroll__main::-webkit-scrollbar-thumb{background:#cccccc;border-radius:3px}
.detail-scroll__toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-shrink:0}
.detail-scroll__count{font-size:12px;color:#767676}
.detail-scroll__actions{display:flex;gap:6px}
.detail-scroll__action-btn{background:#fff;border:1px solid #d4d4d4;border-radius:4px;padding:4px 10px;font-size:11px;color:#767676;cursor:pointer;font-family:inherit;transition:all .12s}
.detail-scroll__action-btn:hover{border-color:#a0a0a0;color:#444444}
/* Category accordion */
.cat-sec{background:#fff;border:1px solid #d4d4d4;border-radius:4px;margin-bottom:12px;overflow:hidden;transition:box-shadow .15s}
.cat-sec:hover{box-shadow:0 2px 10px rgba(0,0,0,.07)}
.cat-sec__hdr{display:flex;align-items:center;gap:8px;padding:11px 16px;cursor:pointer;user-select:none;background:#fafafa;transition:background .12s}
.cat-sec__hdr:hover{background:#f5f5f5}
.cat-sec--open .cat-sec__hdr{border-bottom:1px solid #d4d4d4}
.cat-sec__chevron{color:#a0a0a0;display:flex;flex-shrink:0;transition:transform .2s}
.cat-sec--closed .cat-sec__chevron{transform:rotate(-90deg)}
.cat-sec__name{font-size:13px;font-weight:600;color:#333333;flex:1}
.cat-sec__meta{display:flex;align-items:center;gap:5px}
.cat-sec__tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;background:#f5f5f5;color:#767676;white-space:nowrap}
.cat-sec__tag--deployed{background:#e6f4e6;color:#008a00}.cat-sec__tag--failed{background:#fce8e8;color:#cc0000}.cat-sec__tag--draft{background:#f5f5f5;color:#767676}
.cat-sec__body{overflow:hidden}
.cat-sec__prompt{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
/* ── Test action zone (section footer bar) ── */
.test-action-zone{display:flex;flex-direction:column;gap:8px;padding:12px 14px;background:#f8faff;border:1px solid #dbeafe;border-radius:4px;margin-top:8px}
.test-action-zone__top{display:flex;align-items:center;gap:8px}
.test-action-zone__title{font-size:12px;font-weight:600;color:#002d6b;flex:1}
.test-action-zone__actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.test-action-zone__bottom{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.test-action-zone__hint{font-size:10px;color:#8faad4;margin-left:auto;white-space:nowrap}
.test-chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;line-height:1.5}
.test-chip--tested{background:#e6f4e6;color:#006b00}
.test-chip--pending{background:#fff3e0;color:#6b3000}
.test-chip--empty{background:#f5f5f5;color:#a0a0a0;font-weight:400}
.test-action-zone__add{background:#fff;border:1px solid #cccccc;border-radius:4px;padding:5px 11px;font-size:11px;font-weight:500;color:#767676;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
.test-action-zone__add:hover{border-color:#8faad4;color:#003781;background:#f0f7ff}
.test-action-zone__btn{background:linear-gradient(135deg,#003781,#002d6b);color:#fff;border:none;border-radius:4px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;box-shadow:0 1px 3px rgba(0,55,129,.2);display:inline-flex;align-items:center;gap:5px}
.test-action-zone__btn:hover{background:linear-gradient(135deg,#002d6b,#001f52);box-shadow:0 2px 8px rgba(0,55,129,.3);transform:translateY(-1px)}
/* TestModal doc picker */
.test-doc-search{width:100%;padding:7px 11px;border:1.5px solid #d4d4d4;border-radius:4px;font-size:12px;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s;margin-bottom:8px;color:#333333;background:#fff}
.test-doc-search:focus{border-color:#003781;box-shadow:0 0 0 3px rgba(0,55,129,.07)}
.test-doc-upload-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;background:#fafafa;border:1.5px dashed #d4d4d4;border-radius:4px;cursor:pointer;font-size:11px;color:#a0a0a0;transition:all .12s;margin-bottom:8px;user-select:none;font-family:inherit}
.test-doc-upload-row:hover{border-color:#8faad4;background:#f0f7ff;color:#003781}
/* Ver card inside section */
.sec-ver-card{display:flex;align-items:center;background:#f5f5f5;border:1px solid #d4d4d4;border-radius:4px;padding:8px 14px;gap:0;flex-shrink:0}
.sec-ver-item{display:flex;flex-direction:column;gap:1px;flex:1}
.sec-ver-lbl{font-size:10px;font-weight:600;color:#a0a0a0;text-transform:uppercase;letter-spacing:.04em}
.sec-ver-val{font-size:12px;font-weight:600;color:#333333}
.sec-ver-div{width:1px;background:#d4d4d4;height:26px;margin:0 12px;flex-shrink:0}
/* Section doc panel */
.sec-docs__title{font-size:11px;font-weight:700;color:#444444;margin-bottom:8px}
.sec-docs__zone{border:1.5px dashed #cccccc;border-radius:4px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;background:#fff;transition:all .15s}
.sec-docs__zone:hover,.sec-docs__zone.drag-over{border-color:#003781;background:#eef2fb}
.sec-docs__dz-text{font-size:11px;color:#767676;text-align:center}
.sec-docs__browse{color:#003781;font-weight:500}.sec-docs__dz-hint{font-size:10px;color:#a0a0a0;text-align:center}
.sec-docs__filters{display:flex;gap:4px;flex-wrap:wrap}
.sec-docs__list{overflow-y:auto;display:flex;flex-direction:column;gap:2px;max-height:200px}
.sec-docs__list::-webkit-scrollbar{width:3px}.sec-docs__list::-webkit-scrollbar-thumb{background:#cccccc;border-radius:2px}
.sec-docs__empty{text-align:center;padding:14px;font-size:11px;color:#a0a0a0}
.sec-docs__footer{font-size:10px;color:#a0a0a0;padding-top:6px;border-top:1px solid #f5f5f5;margin-top:2px}
.sec-docs__footer strong{color:#767676}

/* ── Classification Level Cards ── */
.cl-card{border:1px solid #d4d4d4;border-radius:4px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:9px;background:#fff;cursor:pointer;user-select:none;transition:border-color .15s}
.cl-card:last-of-type{margin-bottom:8px}
.cl-card--active{border-color:#c4d3ee;background:#eef2fb}
.cl-card--required{background:#f5f5f5;cursor:default;opacity:.75}
.cl-card__cb{margin-top:2px;width:14px;height:14px;accent-color:#003781;flex-shrink:0}
.cl-card__cb:disabled{cursor:not-allowed}
.cl-card__name{font-size:12px;font-weight:600;color:#333333;line-height:1.4}
.cl-card__sub{font-size:10px;color:#a0a0a0;margin-top:1px}
.cl-mode{padding:9px 12px;border-radius:4px;border:1.5px solid #d4d4d4;background:#f5f5f5;display:flex;align-items:flex-start;gap:8px;transition:all .2s}
.cl-mode--l1l2{border-color:#c4d3ee;background:#eef2fb}
.cl-mode__icon{font-size:13px;flex-shrink:0;margin-top:1px}
.cl-mode__title{font-size:11px;font-weight:700;color:#444444;margin-bottom:2px;line-height:1.3}
.cl-mode--l1l2 .cl-mode__title{color:#002d6b}
.cl-mode__desc{font-size:10px;color:#767676;line-height:1.4}

/* ── Stage Pipeline Bar ── */
.stage-bar{display:flex;align-items:center;gap:2px;margin-left:auto;padding-left:16px;flex-shrink:0;overflow:hidden}
.stage-step{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:#a0a0a0;padding:2px 7px;border-radius:4px;white-space:nowrap}
.stage-step--active{color:#003781;background:#eef2fb;font-weight:600}
.stage-step--done{color:#008a00}
.stage-sep{color:#cccccc;font-size:11px;padding:0 1px;flex-shrink:0}

/* ── Readiness Checklist ── */
.readiness{display:flex;gap:6px;padding:9px 14px;background:#f5f5f5;border:1px solid #d4d4d4;border-radius:4px;flex-wrap:wrap;align-items:center}
.readiness__title{font-size:10px;font-weight:700;color:#a0a0a0;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;margin-right:2px}
.readiness__item{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;white-space:nowrap}
.readiness__item--ok{color:#008a00}.readiness__item--fail{color:#a0a0a0}
.readiness__sep{width:1px;height:14px;background:#d4d4d4;flex-shrink:0;align-self:center}

/* ── Test Expected vs Predicted ── */
.test-expected{display:flex;flex-direction:column;gap:6px}
.test-expected h4{font-size:12px;font-weight:600;color:#444444;margin-bottom:2px}
.test-expected__input{width:100%;padding:7px 10px;border:1px solid #cccccc;border-radius:4px;font-size:12px;outline:none;font-family:inherit;color:#333333;transition:border-color .15s}
.test-expected__input:focus{border-color:#003781;box-shadow:0 0 0 2px rgba(0,55,129,.08)}
.test-comparison{display:flex;flex-direction:column;gap:6px}
.test-comparison h4{font-size:12px;font-weight:600;color:#444444;margin-bottom:2px}
.test-comparison__row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:4px;font-size:12px}
.test-comparison__row--match{background:#f0fdf4;border:1px solid #b3ddb3}
.test-comparison__row--mismatch{background:#fef2f2;border:1px solid #f5b3b3}
.test-comparison__lbl{font-size:10px;font-weight:600;color:#a0a0a0;text-transform:uppercase;letter-spacing:.04em;min-width:70px;flex-shrink:0}
.test-comparison__val{font-weight:600;color:#333333;flex:1}
.test-comparison__badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:4px;margin-left:auto;flex-shrink:0}
.test-comparison__badge--match{background:#e6f4e6;color:#008a00}
.test-comparison__badge--mismatch{background:#fce8e8;color:#cc0000}

/* ── Schema badge ── */
.schema-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:#eef2fb;color:#003781;border:1px solid #c4d3ee;white-space:nowrap}
.schema-badge--empty{background:#f5f5f5;color:#a0a0a0;border-color:#d4d4d4}

/* ── Stage 1 LOB Prompt Section ── */
.l1-prompt-sec{background:#fff;border:2px solid #c4d3ee;border-radius:4px;margin-bottom:16px;overflow:hidden;transition:box-shadow .15s}
.l1-prompt-sec:hover{box-shadow:0 2px 12px rgba(0,55,129,.1)}
.l1-prompt-sec__hdr{display:flex;align-items:center;gap:8px;padding:12px 16px;background:linear-gradient(135deg,#eef2fb,#f0f9ff);border-bottom:1px solid #c4d3ee}
.l1-prompt-sec__badge{background:#002d6b;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.04em;flex-shrink:0}
.l1-prompt-sec__title{font-size:13px;font-weight:700;color:#001f52;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.l1-prompt-sec__body{overflow:hidden}
.l1-prompt-sec__prompt{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.l1-prompt-sec__desc{font-size:12px;color:#4b72b8;line-height:1.5;padding:8px 12px;background:#eef2fb;border-radius:4px;border-left:3px solid #8faad4;margin-bottom:2px}
/* Stage 2 label row */
.stage2-label{display:flex;align-items:center;gap:8px;margin:4px 0 12px}
.stage2-label__badge{font-size:10px;font-weight:700;color:#fff;background:#444444;padding:2px 8px;border-radius:20px;letter-spacing:.04em;flex-shrink:0}
.stage2-label__text{font-size:12px;color:#767676}
/* Sidebar nav items (L1-only mode) */
.sidebar__l1-nav{background:none;border:none;display:flex;align-items:center;gap:7px;width:100%;padding:7px 8px;border-radius:4px;font-size:12px;font-weight:500;color:#444444;cursor:pointer;font-family:inherit;text-align:left;transition:all .12s}
.sidebar__l1-nav:hover{background:#eef2fb;color:#003781}
.sidebar__l1-nav--active{background:#eef2fb;color:#003781;font-weight:600}
.sidebar__l1-nav__dot{width:7px;height:7px;border-radius:50%;background:#003781;flex-shrink:0}

/* ══ Theme v4: Component overrides ══════════════════════════════════════ */

/* Navbar */
.navbar{background:var(--srf);box-shadow:0 1px 0 var(--bdr)}
.navbar__brand{font-weight:800;color:var(--a);background:none;-webkit-text-fill-color:var(--a);letter-spacing:-.01em}
.navbar__nav-item{transition:color var(--tf) var(--smooth),border-color var(--tf) var(--smooth)}
.navbar__nav-item.active{color:var(--a);border-bottom-color:var(--a)}
.navbar__dd-item{transition:background var(--tf) var(--smooth),color var(--tf) var(--smooth)}
.navbar__dd-item.active{color:var(--a);background:var(--a-lt)}
.navbar__dd-item:hover{background:var(--a-lt);color:var(--a)}

/* App back btn */
.app__back-btn{color:var(--a)}

/* Buttons global */
.btn-primary{background:var(--a);box-shadow:0 1px 4px var(--a-glow);border:none;position:relative;overflow:hidden;transition:background var(--tf) var(--smooth),box-shadow var(--tf) var(--smooth),transform var(--tf) var(--smooth)}
.btn-primary:hover{background:var(--a-h);box-shadow:0 4px 12px var(--a-glow);transform:translateY(-1px)}
.btn-primary:active{transform:scale(.97) !important;box-shadow:none !important}
.btn-primary:disabled{background:var(--a-mid);cursor:not-allowed;transform:none !important;box-shadow:none !important}
.btn-outline{transition:border-color var(--tf) var(--smooth),color var(--tf) var(--smooth),background var(--tf) var(--smooth)}
.btn-outline:hover{border-color:var(--a-mid);color:var(--a);background:var(--a-lt)}
.btn-outline:active{transform:scale(.97)}
.btn-filter-active{background:var(--a-lt) !important;border-color:var(--a-mid) !important;color:var(--a) !important}

/* Stat cards — staggered load + hover lift */
.stat-card{border-radius:var(--r-md);border:1px solid var(--bdr);background:var(--srf);box-shadow:var(--sh-sm);transition:box-shadow var(--t) var(--smooth),transform var(--t) var(--smooth);animation:fadeUp .45s var(--smooth) both}
.stat-card:nth-child(1){animation-delay:0ms}
.stat-card:nth-child(2){animation-delay:55ms}
.stat-card:nth-child(3){animation-delay:110ms}
.stat-card:nth-child(4){animation-delay:165ms}
.stat-card:nth-child(1),.stat-card:nth-child(2),.stat-card:nth-child(3),.stat-card:nth-child(4){border-top:none}
.stat-card:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.stat-card__label{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em}
.stat-card__value{font-size:28px;font-weight:800;color:var(--tx1);background:none;-webkit-text-fill-color:var(--tx1);line-height:1.1;letter-spacing:-.02em}
.stat-card__sub{font-size:12px;color:var(--tx2);margin-top:2px}
.stat-card__bar-fill{background:var(--a)}

/* Pipeline */
.pipeline{border:1px solid var(--bdr);border-radius:var(--r-md);box-shadow:var(--sh-sm);background:var(--srf)}
.pipe-step__icon{border:1px solid var(--bdr);box-shadow:none;transition:transform var(--t) var(--spring),box-shadow var(--t) var(--smooth)}
.pipe-step:hover .pipe-step__icon{transform:scale(1.1) translateY(-2px);box-shadow:0 6px 18px var(--a-glow)}

/* LOB performance */
.lob-perf{border:1px solid var(--bdr);border-radius:var(--r-md);box-shadow:var(--sh-sm)}
.lob-perf__row{transition:background var(--tf) var(--smooth)}
.lob-perf__row:hover{background:#f4f5f7}

/* Quick links */
.quick-link{border-radius:var(--r-md);transition:box-shadow var(--t) var(--smooth),border-color var(--t) var(--smooth),transform var(--t) var(--spring)}
.quick-link:hover{border-color:var(--a-mid);box-shadow:0 6px 20px var(--a-glow);transform:translateY(-2px)}

/* Status chips */
.status-chip{padding:4px 12px;border-radius:var(--r-p);font-size:12px;font-weight:700;border:none;letter-spacing:.01em}
.status-chip--deployed{background:#e6f4e6;color:#006b00}
.status-chip--failed{background:#fce8e8;color:#cc0000}

/* Tables */
.ov-table-wrap{overflow:hidden}
.ov-table th{font-size:13px;font-weight:700;color:#003781;text-transform:none;letter-spacing:0;background:#fff;border-bottom:none;padding:12px 16px}
.ov-table tbody tr{transition:background var(--tf) var(--smooth)}
.ov-table tbody tr:hover{background:#f8f9fb}
.version-table th{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;background:#f8f9fb}

/* Badges */
.badge{padding:3px 10px;border-radius:var(--r-p);font-size:11px;font-weight:700}
.badge-active{background:#e6f4e6;color:#006b00}
.badge-archived{background:#f5f5f5;color:var(--tx2)}

/* Modals — spring entrance */
.modal{border-radius:8px;box-shadow:var(--sh-lg);animation:modalIn 260ms cubic-bezier(.34,1.2,.64,1) both}
.modal-overlay{backdrop-filter:blur(4px)}
.confirm-dialog{border-radius:8px;animation:modalIn 220ms cubic-bezier(.34,1.2,.64,1) both}
.modal__header{border-bottom:1px solid var(--bdr)}
.modal__footer{border-top:1px solid var(--bdr)}

/* Workspace */
.workspace__tab{transition:color var(--tf) var(--smooth),background var(--tf) var(--smooth)}
.workspace__tab.active{background:var(--srf);font-weight:700;color:var(--a);position:relative}
.workspace__tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--a);border-radius:1px}
.workspace__textarea{border-radius:var(--r);font-size:13px;border:1.5px solid var(--bdr);transition:border-color var(--tf) var(--smooth),box-shadow var(--tf) var(--smooth)}
.workspace__textarea:focus{border-color:var(--bdr-f);box-shadow:0 0 0 3px var(--a-glow)}
.workspace__ver-card{background:#f8f9fb;border-radius:var(--r);border:1px solid var(--bdr)}
.workspace__btn.primary{background:var(--a);box-shadow:0 1px 4px var(--a-glow);transition:all var(--tf) var(--smooth);position:relative;overflow:hidden}
.workspace__btn.primary:hover{background:var(--a-h);transform:translateY(-1px);box-shadow:0 4px 12px var(--a-glow)}
.workspace__btn.primary:active{transform:scale(.97);box-shadow:none}
.workspace__more-btn{transition:all var(--tf) var(--smooth)}
.workspace__more-btn:hover,.workspace__more-btn.active{background:var(--a-lt);border-color:var(--a-mid);color:var(--a)}
.workspace__more-item{transition:background var(--tf) var(--smooth),color var(--tf) var(--smooth)}
.workspace__more-item:hover{background:var(--a-lt)}
.workspace__more-item.active{color:var(--a);background:var(--a-lt)}

/* Doc panel */
.doc-panel__dropzone{border-radius:var(--r);transition:all var(--t) var(--smooth)}
.doc-panel__dropzone:hover,.doc-panel__dropzone.drag-over{border-color:var(--a);background:var(--a-lt)}
.doc-panel__browse{color:var(--a)}
.doc-panel__search:focus{border-color:var(--bdr-f);box-shadow:0 0 0 3px var(--a-glow)}
.doc-panel__cnt.all{background:var(--a)}
.doc-panel__cb{accent-color:var(--a)}
.doc-panel__sel-all{color:var(--a)}
.doc-panel__item{border-radius:4px;transition:background var(--tf) var(--smooth),border-color var(--tf) var(--smooth)}
.doc-panel__item:hover{background:#f4f5f7}

/* Sidebar — active pill indicator */
.sidebar{background:var(--srf);border-right:1px solid var(--bdr)}
.sidebar__l1-toggle{position:relative;transition:background var(--tf) var(--smooth),color var(--tf) var(--smooth)}
.sidebar__l1-toggle::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%) scaleY(0);width:3px;height:55%;background:var(--a);border-radius:0 2px 2px 0;transition:transform 220ms var(--spring)}
.sidebar__l1-toggle:hover{background:var(--a-lt)}
.sidebar__l1-toggle.active{background:var(--a-lt)}
.sidebar__l1-toggle.active::before{transform:translateY(-50%) scaleY(1)}
.sidebar__l1-toggle.active .sidebar__l1-name{color:var(--a);font-weight:700}
.sidebar__cb-label input{accent-color:var(--a)}
.sidebar__l0-input,.sidebar__add-input,.sidebar__add-l1-input,.sidebar__rename-input{border-color:var(--a)}
.sidebar__l0-value{transition:color var(--tf) var(--smooth)}
.sidebar__l0-edit-btn{transition:background var(--tf) var(--smooth);color:var(--a);border-color:var(--a)}
.sidebar__search:focus{border-color:var(--bdr-f)}
.sidebar__add-confirm{background:var(--a);transition:background var(--tf) var(--smooth)}
.sidebar__add-confirm:hover{background:var(--a-h)}
.sidebar__add-btn{transition:all var(--tf) var(--smooth)}
.sidebar__add-btn:hover{border-color:var(--a-mid);color:var(--a);background:var(--a-lt)}
.sidebar__add-l1-btn{transition:all var(--tf) var(--smooth)}
.sidebar__add-l1-btn:hover{border-color:var(--a-mid);color:var(--a);background:var(--a-lt)}
.sidebar__rename-ok{background:var(--a);transition:background var(--tf) var(--smooth)}
.sidebar__l1-nav{transition:all var(--tf) var(--smooth)}
.sidebar__l1-nav:hover{background:var(--a-lt);color:var(--a)}
.sidebar__l1-nav--active{background:var(--a-lt);color:var(--a);font-weight:700}
.sidebar__l1-nav__dot{background:var(--a)}

/* Detail scroll */
.detail-scroll__main{background:var(--bg)}
.detail-scroll__action-btn{transition:all var(--tf) var(--smooth)}
.detail-scroll__action-btn:hover{border-color:var(--a-mid);color:var(--a)}

/* Category accordion — hover lift */
.cat-sec{border:1px solid var(--bdr);border-radius:var(--r-md);box-shadow:var(--sh-sm);transition:box-shadow var(--t) var(--smooth),transform var(--t) var(--smooth)}
.cat-sec:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.cat-sec__hdr{background:var(--srf2);transition:background var(--tf) var(--smooth)}
.cat-sec__hdr:hover{background:#ebebeb}
.cat-sec__chevron{transition:transform 250ms var(--smooth)}

/* Test action zone */
.test-action-zone{background:var(--a-lt);border:1px solid var(--a-mid)}
.test-action-zone__title{color:var(--a);font-weight:700}
.test-action-zone__btn{background:var(--a) !important;border-radius:var(--r) !important;position:relative;overflow:hidden;transition:all var(--tf) var(--smooth) !important;box-shadow:0 1px 4px var(--a-glow) !important}
.test-action-zone__btn:hover{background:var(--a-h) !important;box-shadow:0 4px 12px var(--a-glow) !important;transform:translateY(-1px) !important}
.test-action-zone__btn:active{transform:scale(.97) !important}
.test-action-zone__add{transition:all var(--tf) var(--smooth)}
.test-action-zone__add:hover{border-color:var(--a-mid);color:var(--a);background:var(--a-lt)}
.test-doc-search:focus{border-color:var(--bdr-f);box-shadow:0 0 0 3px var(--a-glow)}
.test-doc-upload-row:hover{border-color:var(--bdr-f);background:var(--a-lt);color:var(--a)}
.test-doc-item{transition:all var(--tf) var(--smooth)}
.test-doc-item.selected{border-color:var(--a);background:var(--a-lt);color:var(--a-h);font-weight:500;box-shadow:0 0 0 3px var(--a-glow)}

/* Classification cards */
.cl-card{transition:border-color var(--tf) var(--smooth),box-shadow var(--tf) var(--smooth)}
.cl-card:hover{border-color:var(--a-mid);box-shadow:var(--sh-sm)}
.cl-card--active{border-color:var(--a-mid);background:var(--a-lt)}
.cl-card__cb{accent-color:var(--a)}

/* Stage bar */
.stage-step{transition:all var(--tf) var(--smooth)}
.stage-step--active{color:var(--a);background:var(--a-lt);font-weight:700}

/* LOB prompt section */
.l1-prompt-sec{border:2px solid var(--a-mid);border-radius:var(--r-md);transition:box-shadow var(--t) var(--smooth)}
.l1-prompt-sec:hover{box-shadow:0 4px 18px var(--a-glow)}
.l1-prompt-sec__hdr{background:var(--a-lt);border-bottom:1px solid var(--a-mid)}
.l1-prompt-sec__badge{background:var(--a)}
.l1-prompt-sec__title{color:var(--a-h)}
.l1-prompt-sec__desc{background:var(--a-lt);border-left:3px solid var(--a-mid);color:var(--a-h)}

/* Toasts */
.toast{border-radius:var(--r);box-shadow:0 4px 20px rgba(0,0,0,.1);animation:slideInRight 220ms var(--spring) both}

/* Inputs */
.add-modal-input:focus{border-color:var(--bdr-f);box-shadow:0 0 0 3px var(--a-glow)}
.test-expected__input:focus{border-color:var(--bdr-f);box-shadow:0 0 0 3px var(--a-glow)}
.ov-search:focus{border-color:var(--bdr-f);box-shadow:0 0 0 3px var(--a-glow)}

/* Overview table links */
.ov-bc-link{transition:color var(--tf) var(--smooth)}
.ov-bc-link:hover{color:var(--a)}
.tbl-name-link{color:var(--a)}
.tbl-view-btn{color:var(--a);transition:color var(--tf) var(--smooth)}
.page-btn{transition:all var(--tf) var(--smooth)}
.page-btn.active{background:var(--a)}

/* Prompt context chips */
.prompt-ctx-chip--l1{background:var(--a-d4);color:var(--a-h)}
.prompt-ctx-chip--l1l2{background:linear-gradient(135deg,var(--a-d4),#d1fae5);color:var(--a-h);border-color:var(--a-mid)}

/* Classification tree */
.of-tree__lob-btn,.of-tree__cat-btn{transition:background var(--tf) var(--smooth)}

/* Schema badge */
.schema-badge{background:var(--a-lt);color:var(--a);border-color:var(--a-mid)}

/* Spinner */
.test-spinner{border-color:var(--a-d4);border-top-color:var(--a)}

/* Section ver card */
.sec-ver-card{background:#f5f5f5;border:1px solid var(--bdr)}

/* Readiness */
.readiness{background:#f5f5f5;border:1px solid var(--bdr)}

/* Section docs */
.sec-docs__zone:hover,.sec-docs__zone.drag-over{border-color:var(--a);background:var(--a-lt)}
.sec-docs__browse{color:var(--a)}

/* ── Test result card v2 ── */
.tr-card{border-radius:var(--r-md);border:1px solid var(--bdr);overflow:hidden;animation:fadeUp .22s var(--smooth) both}
.tr-card__header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;gap:10px}
.tr-card__header--match{background:#f0fdf4;border-bottom:1px solid #b3ddb3}
.tr-card__header--mismatch{background:#fef2f2;border-bottom:1px solid #f5b3b3}
.tr-card__header--neutral{background:var(--a-lt);border-bottom:1px solid var(--a-mid)}
.tr-card__label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:3px}
.tr-card__predicted{font-size:17px;font-weight:800;color:var(--tx1);letter-spacing:-.01em}
.tr-card__verdict{font-size:11px;font-weight:700;padding:4px 11px;border-radius:var(--r-p);white-space:nowrap;flex-shrink:0}
.tr-card__verdict--match{background:#e6f4e6;color:#006b00}
.tr-card__verdict--mismatch{background:#fce8e8;color:#cc0000}
.tr-card__verdict--neutral{background:var(--a-d4);color:var(--a-h)}
/* Confidence bar */
.tr-conf{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--bdr);background:var(--srf)}
.tr-conf__title{font-size:11px;font-weight:600;color:var(--tx3);white-space:nowrap;min-width:70px}
.tr-conf__bar{flex:1;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.tr-conf__fill{height:100%;border-radius:3px;transition:width .7s var(--eout)}
.tr-conf__val{font-size:13px;font-weight:700;flex-shrink:0;min-width:42px;text-align:right}
/* Compare row */
.tr-compare{display:flex;align-items:center;border-bottom:1px solid var(--bdr)}
.tr-compare--match{background:#f7fef9}
.tr-compare--mismatch{background:#fff8f8}
.tr-compare__col{display:flex;flex-direction:column;gap:3px;flex:1;padding:11px 16px}
.tr-compare__lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3)}
.tr-compare__val{font-size:13px;font-weight:700;color:var(--tx1)}
.tr-compare__arrow{font-size:15px;font-weight:700;color:var(--tx3);flex-shrink:0;padding:0 2px}
.tr-compare--match .tr-compare__arrow{color:#008a00}
.tr-compare--mismatch .tr-compare__arrow{color:#cc0000}
/* Reasoning */
.tr-reasoning{padding:12px 16px;font-size:12px;color:var(--tx2);line-height:1.6;background:var(--srf);border-bottom:1px solid var(--bdr)}
/* Mismatch hint */
.tr-hint{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#fffbeb;font-size:11px;color:#6b3000}
.tr-hint__btn{margin-left:auto;background:none;border:none;font-size:11px;font-weight:600;color:#e07000;cursor:pointer;font-family:inherit;text-decoration:underline;padding:0;white-space:nowrap}
/* No expectation */
.tr-no-expect{display:flex;align-items:center;padding:10px 16px;background:var(--srf2);font-size:11px;color:var(--tx3)}
.tr-no-expect__btn{margin-left:auto;background:none;border:none;font-size:11px;font-weight:600;color:var(--a);cursor:pointer;font-family:inherit;padding:0;white-space:nowrap}
/* Expected label selector */
.test-expect-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--srf2);border:1px solid var(--bdr);border-radius:var(--r);animation:fadeUp .15s var(--smooth) both}
.test-expect-lbl{font-size:12px;font-weight:500;color:var(--tx2);white-space:nowrap;flex-shrink:0}
.test-expect-sel{flex:1;padding:6px 10px;border:1.5px solid var(--bdr);border-radius:var(--r-sm);font-size:12px;color:var(--tx1);background:var(--srf);outline:none;font-family:inherit;cursor:pointer;transition:border-color var(--tf) var(--smooth),box-shadow var(--tf) var(--smooth)}
.test-expect-sel:focus{border-color:var(--bdr-f);box-shadow:0 0 0 3px var(--a-glow)}
/* Per-doc status badges */
.test-status-badge--untested{background:#f5f5f5;color:var(--tx3)}
.test-status-badge--matched{background:#e6f4e6;color:#006b00}
.test-status-badge--mismatched{background:#fce8e8;color:#cc0000}
.test-status-badge--tested{background:var(--a-lt);color:var(--a-h)}

/* ── Main panel (unified center column) ── */
.main-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.main-panel .detail-scroll__main{flex:1}
/* ── Classification Setup wrap ── */
.cl-setup-wrap{padding:16px 20px 12px;flex-shrink:0;background:#fff;border-bottom:1px solid #ebebeb}
.cl-setup-wrap .cl-setup{margin-bottom:0}

/* ── Classification Setup bar ── */
.cl-setup{display:flex;flex-direction:column;gap:10px}
.cl-setup__label{font-size:16px;font-weight:700;color:#003781;white-space:nowrap;flex-shrink:0}
.cl-setup__row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cl-setup__radio{display:flex;align-items:center;gap:7px;padding:0;border:none;background:none;cursor:pointer;user-select:none;white-space:nowrap}
.cl-setup__radio:hover .cl-setup__radio-label{color:#003781}
.cl-setup__radio--active .cl-setup__radio-label{color:#003781;font-weight:600}
.cl-setup__radio input[type=radio]{accent-color:#003781;width:15px;height:15px;cursor:pointer;flex-shrink:0}
.cl-setup__radio-label{font-size:13px;font-weight:400;color:#444444;transition:color .12s}

/* ── Dev Panel ── */
.dev-panel{position:fixed;top:0;left:0;right:0;z-index:9999;background:#09090b;border-bottom:2px solid #f59e0b;font-family:ui-monospace,'SF Mono','Fira Code',monospace;font-size:11px;color:#71717a}
.dev-panel__bar{height:32px;display:flex;align-items:center;gap:8px;padding:0 10px}
.dev-panel__badge{background:#f59e0b;color:#000;font-weight:800;font-size:9px;padding:2px 6px;border-radius:3px;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.dev-panel__sep{width:1px;height:14px;background:#27272a;flex-shrink:0;margin:0 2px}
.dev-panel__scenario-label{color:#52525b;font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dev-panel__scenario-label b{color:#e4e4e7;font-weight:600}
.dev-panel__toggle{background:none;border:1px solid #3f3f46;color:#a1a1aa;padding:2px 8px;border-radius:3px;font-size:10px;cursor:pointer;font-family:inherit;transition:all .1s;white-space:nowrap;flex-shrink:0}
.dev-panel__toggle:hover{border-color:#71717a;color:#e4e4e7}
.dev-panel__reset{background:none;border:1px solid #7f1d1d;color:#f87171;padding:2px 7px;border-radius:3px;font-size:10px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.dev-panel__reset:hover{background:#450a0a}
.dev-panel__body{padding:10px 12px;display:flex;flex-direction:column;gap:10px;border-top:1px solid #18181b;max-height:240px;overflow-y:auto}
.dev-panel__body::-webkit-scrollbar{width:3px}.dev-panel__body::-webkit-scrollbar-thumb{background:#3f3f46}
.dev-panel__group{display:flex;flex-direction:column;gap:5px}
.dev-panel__group-label{font-size:9px;font-weight:700;color:#3f3f46;text-transform:uppercase;letter-spacing:.12em}
.dev-panel__chips{display:flex;flex-wrap:wrap;gap:4px}
.dev-chip{background:none;border:1px solid #27272a;color:#71717a;padding:3px 9px;border-radius:3px;font-size:10px;cursor:pointer;font-family:inherit;transition:all .1s;white-space:nowrap;line-height:1.4}
.dev-chip:hover{border-color:#52525b;color:#d4d4d8;background:#18181b}
.dev-chip--active{border-color:#f59e0b !important;color:#f59e0b !important;background:#1c1400 !important}
/* shift app down when dev panel is visible */
body.dev-on .navbar{top:32px !important}
body.dev-on .app__sub-bar{margin-top:84px !important}
body.dev-on .page-scroll{margin-top:84px !important}
body.dev-on .ov-page{padding-top:84px}

/* ═══════════════════════════════════════════════
   NDBX FormField + Input / Textarea
   appearance="auto"   → underline only (default)
   appearance="expert" → full box border
═══════════════════════════════════════════════ */

/* FormField wrapper */
.nx-ff{display:flex;flex-direction:column;gap:4px;width:100%}
.nx-ff__label{font-size:var(--inp-label-fz);font-weight:600;color:var(--inp-label);line-height:1.4;transition:color .15s}
.nx-ff__label--required::after{content:' *';color:var(--inp-border-error)}
.nx-ff__label--optional::after{content:' (Optional)';font-weight:400;color:var(--inp-label)}
.nx-ff__req{color:var(--inp-border-error);font-weight:700}
.nx-ff__opt{font-weight:400;color:var(--inp-label);font-size:.875em}
.nx-ff__hint{font-size:var(--inp-hint-fz);color:var(--inp-label);margin-top:2px}
.nx-ff__hint--error{color:var(--inp-border-error)}
.nx-ff__error{font-size:var(--inp-hint-fz);color:var(--inp-border-error);margin-top:2px}
.nx-ff__affix-wrap{position:relative;display:flex;align-items:center;width:100%}
.nx-ff--error .nx-ff__label{color:var(--inp-label-error)}
.nx-ff__char-count{font-size:var(--inp-hint-fz);color:var(--inp-label);margin-top:2px;text-align:right}

/* Base input (shared by both styles) */
.nx-input,.nx-textarea{
  width:100%;font-family:inherit;font-size:var(--inp-fz);
  color:var(--inp-text);background:var(--inp-bg);
  outline:none;transition:border-color .15s;
}
.nx-input::placeholder,.nx-textarea::placeholder{color:var(--inp-placeholder)}
.nx-input:disabled,.nx-textarea:disabled{color:var(--inp-text-dis);cursor:not-allowed}
.nx-input[readonly],.nx-textarea[readonly]{background:var(--inp-bg-readonly);cursor:default}

/* ── Default (underline) style ── */
.nx-input--auto,.nx-textarea--auto{
  border:none;border-bottom:1px solid var(--inp-border);
  border-radius:0;padding:8px 0;
  height:var(--inp-height);
  background:transparent;
}
.nx-input--auto:focus,.nx-textarea--auto:focus{border-bottom:2px solid var(--inp-border-focus)}
.nx-input--auto:disabled,.nx-textarea--auto:disabled{border-bottom-color:var(--inp-border-dis)}
.nx-input--auto.nx-input--error,.nx-textarea--auto.nx-textarea--error{border-bottom-color:var(--inp-border-error)}
.nx-textarea--auto{height:auto;min-height:80px;resize:vertical}

/* ── Expert (box) style ── */
.nx-input--expert,.nx-textarea--expert{
  border:1px solid var(--inp-border);border-radius:var(--r);
  padding:0 12px;height:var(--inp-height);
}
.nx-input--expert:focus,.nx-textarea--expert:focus{
  border-color:var(--inp-border-focus);
  box-shadow:0 0 0 2px var(--a-glow);
}
.nx-input--expert:disabled,.nx-textarea--expert:disabled{
  border-color:var(--inp-border-dis);background:var(--inp-bg-readonly);
}
.nx-input--expert[readonly],.nx-textarea--expert[readonly]{
  background:var(--inp-bg-readonly);border-color:var(--inp-border-dis);
}
.nx-input--expert.nx-input--error,.nx-textarea--expert.nx-textarea--error{
  border-color:var(--inp-border-error);
  box-shadow:0 0 0 2px rgba(204,0,0,.1);
}
.nx-textarea--expert{height:auto;min-height:80px;padding:8px 12px;resize:vertical}

/* focused FormField — label turns blue */
.nx-ff:focus-within .nx-ff__label{color:var(--inp-label-focus)}
.nx-ff--error .nx-ff__label{color:var(--inp-label-error)}
.nx-ff--disabled .nx-ff__label{color:var(--inp-label-dis)}

/* Input with prefix/suffix slot */
.nx-ff__input-wrap{position:relative;display:flex;align-items:center}
.nx-ff__prefix{position:absolute;left:12px;color:var(--inp-label);font-size:var(--inp-fz);pointer-events:none;user-select:none}
.nx-ff__suffix{position:absolute;right:10px;color:var(--inp-label);display:flex;align-items:center;cursor:pointer}
.nx-ff__input-wrap .nx-input--expert.has-prefix{padding-left:28px}
.nx-ff__input-wrap .nx-input--expert.has-suffix{padding-right:32px}

/* ── Completion Home (new-only — reuses .ov-page .ov-table .ov-pagination .status-chip .btn .page-btn) ── */
.cmp-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.cmp-toggle{display:flex;border:1.5px solid #cccccc;border-radius:6px;overflow:hidden}
.cmp-toggle__btn{padding:7px 16px;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.cmp-toggle__btn--on{background:#003781;color:#fff}
.cmp-toggle__btn--off{background:#fff;color:#767676}
.cmp-toggle__btn--off:hover{background:#f5f5f5}
.status-chip--locked{background:#fce8f4;color:#8b0058;border:1px solid #f0b3d8}
.status-chip--available{background:#e8f4ff;color:#0047ab;border:1px solid #b3d4f5}
.cmp-action-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;color:#767676;border-radius:4px;transition:all .15s}
.cmp-action-btn:hover{background:#f5f5f5;color:#003781}
.cmp-checkbox{width:16px;height:16px;cursor:pointer;accent-color:#003781}

/* ── Completion Detail ── */
/* doc tree — reuses .sidebar shell */
.dtree{width:200px;min-width:160px;flex-shrink:0;background:#fff;border-right:1px solid #d4d4d4;display:flex;flex-direction:column;overflow:hidden;position:relative}
.dtree__toast{position:absolute;bottom:52px;left:8px;right:8px;background:#1a1a2e;color:#fff;padding:7px 10px;border-radius:6px;font-size:11px;text-align:center;z-index:20;pointer-events:none;animation:bulk-in .15s ease}
.dtree__create{margin:10px 10px 6px;border:1.5px dashed #003781;background:transparent;color:#003781;border-radius:6px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;transition:background .15s;width:calc(100% - 20px)}
.dtree__create:hover{background:#eff6ff}
.dtree__tree{flex:1;overflow-y:auto;padding-bottom:8px}
.dtree__tree::-webkit-scrollbar{width:3px}.dtree__tree::-webkit-scrollbar-thumb{background:#d4d4d4;border-radius:2px}
.dtree__cat{border-bottom:1px solid #f0f0f0}
.dtree__cat-row{display:flex;align-items:center;gap:6px;padding:8px 10px;cursor:pointer;user-select:none;font-size:13px;font-weight:600;color:#1a1a2e}
.dtree__cat-row:hover{background:#f5f5f5}
.dtree__cat-row--active{background:#e8effa;color:#003781}
.dtree__cat-ico{font-size:12px;color:#003781;flex-shrink:0}
.dtree__cat-count{font-size:11px;color:#767676;font-weight:400;margin-left:2px}
.dtree__chev{font-size:10px;color:#aaa;margin-left:auto;transition:transform .15s}
.dtree__sub{margin-left:10px;padding-left:0}
.dtree__group-sub{margin-left:4px;padding-left:0}
.dtree__doc-row{position:relative}
.dtree__doc-row{display:flex;align-items:center;gap:5px;padding:6px 10px 6px 16px;cursor:pointer;font-size:12px;color:#444;user-select:none}
.dtree__doc-row:hover{background:#f5f5f5}
.dtree__doc-row--active{background:#ddeaff;color:#003781}
.dtree__doc-row--new{animation:node-flash 2s ease forwards}
@keyframes node-flash{0%{background:#d1fae5;outline:1.5px solid #34d399}40%{background:#d1fae5;outline:1.5px solid #34d399}100%{background:transparent;outline:1.5px solid transparent}}
.dtree__page-row{display:flex;align-items:center;padding:4px 8px 4px 28px;font-size:12px;color:#767676;cursor:pointer;user-select:none}
.dtree__page-row:hover{background:#f5f5f5}
.dtree__page-row--active{background:#ddeaff;color:#003781}
.dtree__del{margin-left:auto;background:none;border:none;cursor:pointer;color:#ccc;padding:2px 4px;border-radius:3px;font-size:11px;line-height:1;flex-shrink:0}
.dtree__del:hover{color:#cc0000;background:#fce8e8}
.dtree__page-more{background:none;border:none;cursor:pointer;color:#aaa;padding:2px 4px;border-radius:3px;font-size:13px;line-height:1;opacity:0;transition:opacity .1s;flex-shrink:0;font-family:inherit}
.dtree__page-row:hover .dtree__page-more{opacity:1}
.dtree__page-more:hover{color:#003781;background:#e0ecff}
.dtree__page-cb{flex-shrink:0;width:14px;height:14px;border:1.5px solid #ccc;border-radius:3px;cursor:pointer;margin-right:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;background:#fff;transition:all .1s;opacity:0}
.dtree__page-row:hover .dtree__page-cb,.dtree__page-row--selected .dtree__page-cb,
.dtree__doc-row:hover .dtree__page-cb,.dtree__doc-row--sel .dtree__page-cb{opacity:1}
.dtree__doc-row--sel .dtree__page-cb{background:#003781;border-color:#003781}
.dtree__doc-row--sel{background:#eef4ff}
.dtree__page-row--selected .dtree__page-cb{background:#003781;border-color:#003781}
.dtree__page-row--selected{background:#ddeaff;color:#003781}
.dtree__bulk-bar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:#003781;border-top:2px solid #002060;flex-shrink:0;animation:bulk-in .15s ease}
@keyframes bulk-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.dtree__bulk-count{font-size:11px;font-weight:600;color:rgba(255,255,255,.7);flex:1;white-space:nowrap}
.dtree__bulk-btn{background:rgba(255,255,255,.15);border:none;cursor:pointer;color:#fff;font-size:11px;padding:4px 8px;border-radius:4px;font-family:inherit;white-space:nowrap;transition:background .1s;flex-shrink:0}
.dtree__bulk-btn:hover{background:rgba(255,255,255,.28)}
.dtree__bulk-btn--danger{background:rgba(220,38,38,.35)}
.dtree__bulk-btn--danger:hover{background:rgba(220,38,38,.6)}
.dtree__bulk-sep{display:none}
.dtree__collapse{padding:8px;border-top:1px solid #ebebeb;display:flex;justify-content:flex-end}
.dtree__collapse-btn{background:none;border:none;cursor:pointer;color:#767676;font-size:12px;padding:4px 8px;border-radius:4px;font-family:inherit}
.dtree__collapse-btn:hover{background:#f5f5f5}
/* center doc viewer */

<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useRef, useEffect, useLayoutEffect, useCallback, useContext } = React;

/* ── Data ── */

const GLOBAL_PROMPT =
`You are an intelligent document classification assistant for an insurance company.

Your task is to analyse incoming documents and classify them accurately.

{{CLASSIFICATION_HIERARCHY}}

For every document:
1. Identify the primary document type based on content, structure, keywords, and layout
2. Return a JSON response with:
   - "classification": the exact document type name
   - "confidence": a score from 0 to 100
   - "reasoning": 1–2 concise sentences explaining the decision

Rules:
- Only classify into the types defined in the hierarchy above
- If a document spans multiple types, choose the primary intent
- Poor scan quality or handwriting should reduce confidence by 10–15 points
- If confidence is below 60, flag for manual review`;

/* ── Hierarchy context builder — used by preview to resolve {{CLASSIFICATION_HIERARCHY}} ── */
function buildHierarchy(level,l1Items,scopedCat=null){
  if(level==='global'){
    const lines=['L1 Categories and L2 Types:\n'];
    l1Items.forEach(cat=>{
      lines.push(cat.name);
      if(cat.l2&&cat.l2.length>0)cat.l2.forEach(t=>lines.push(`  - ${t.name}`));
      else lines.push('  (no L2 types defined)');
      lines.push('');
    });
    return lines.join('\n').trim();
  }
  if(level==='l1'){
    return 'L1 Categories:\n'+l1Items.map(cat=>`- ${cat.name}`).join('\n');
  }
  if(level==='l2'){
    const catName=scopedCat?.name||'this category';
    const types=scopedCat?.l2||[];
    return `L2 Types in ${catName}:\n`+(types.length>0?types.map(t=>`- ${t.name}`).join('\n'):'(no types defined)');
  }
  return '';
}

/* ── Hierarchy level labels — change here, updates everywhere ── */
const LABELS = {
  l0: { short:'L0', label:'L0 Class', full:'L0 Class', plural:'L0 Classes' },
  l1: { short:'L1', label:'L1 Class', full:'L1 Class', plural:'L1 Classes' },
  l2: { short:'L2', label:'L2 Class', full:'L2 Class', plural:'L2 Classes' },
};

/* ── DataService ──────────────────────────────────────────────────────────────
   Single source of truth for LOB taxonomy, datasets, and mock documents.
   Loads from /data/*.json — validates expected labels against LOB taxonomy.
   Provides derived helpers used by App and components.
────────────────────────────────────────────────────────────────────────────── */
const DataService={
  lobs:null,datasets:null,_rawDocs:null,
  async load(){
    const [lobs,datasets,docs]=await Promise.all([
      fetch('./data/lobs.json').then(r=>{if(!r.ok)throw new Error('lobs.json — HTTP '+r.status);return r.json();}),
      fetch('./data/datasets.json').then(r=>{if(!r.ok)throw new Error('datasets.json — HTTP '+r.status);return r.json();}),
      fetch('./data/documents.json').then(r=>{if(!r.ok)throw new Error('documents.json — HTTP '+r.status);return r.json();}),
    ]);
    this.lobs=lobs;this.datasets=datasets;this._rawDocs=docs;
    this._validate();
    return this;
  },
  /* All L1 + L2 label names for a LOB — used for autocomplete and mock targets */
  getAllLabels(lobId){
    const lob=this.lobs.find(l=>l.id===lobId);
    if(!lob)return[];
    return lob.categories.flatMap(c=>[c.name,...c.types.map(t=>t.name)]);
  },
  /* Docs scoped to a single LOB, shaped for App state */
  getDocsForLob(lobId){
    return(this._rawDocs||[])
      .filter(d=>d.lobId===lobId)
      .map(d=>({
        id:d.id,name:d.name,size:d.size,dataSetId:d.dataSetId,
        expectedLabels:d.expectedLabel?[d.expectedLabel]:[],
        status:d.lastTest?'Tested':'Pending',selected:false,
        lastTest:d.lastTest?{...d.lastTest,testedAt:d.lastTest.testedAt||'2025-03-01'}:null,
      }));
  },
  /* Warn on load if any doc's expected label is not in its LOB's taxonomy */
  _validate(){
    const byLob={};
    this.lobs.forEach(l=>{
      byLob[l.id]=new Set(l.categories.flatMap(c=>[c.name,...c.types.map(t=>t.name)]));
    });
    this._rawDocs.forEach(d=>{
      if(!d.expectedLabel)return;
      const valid=byLob[d.lobId];
      if(valid&&!valid.has(d.expectedLabel))
        console.warn(`[DataService] "${d.name}": expected "${d.expectedLabel}" not found in LOB "${d.lobId}"`);
    });
  },
};
const DataCtx=React.createContext(null);

/* ──────────────────────────────────────────────────────────────────────────
   Mock Classification Engine
   Data-driven: targets = [{id, name}] from l1Items (Stage 1) or cat.types (Stage 2)
   No hardcoded keyword→class mapping — derives from target names vs doc filename
────────────────────────────────────────────────────────────────────────── */
const mockClassify=(docName,targets)=>{
  if(!targets||targets.length===0)return null;

  // Tokenise filename: split on _ . - space, strip extension
  const tokens=docName.toLowerCase()
    .replace(/\.(pdf|jpg|jpeg|png)$/i,'')
    .replace(/[_.\-]/g,' ')
    .split(/\s+/).filter(Boolean);

  // Score each target by word-overlap between target name tokens and doc tokens
  const scored=targets.map(t=>{
    const tWords=t.name.toLowerCase().split(/[\s\-&\/]+/).filter(Boolean);
    let score=0;
    for(const tw of tWords){
      if(tokens.some(tok=>tok===tw||tok.startsWith(tw)||tw.startsWith(tok))) score+=1;
    }
    // Small noise so ties break randomly each run
    score+=Math.random()*0.35;
    return{...t,score};
  });

  scored.sort((a,b)=>b.score-a.score);
  const winner=scored[0];
  const runnerUp=scored[1];

  // Confidence: 82–96 if strong keyword match, 63–78 if weak
  const strong=winner.score>=1;
  const base=strong?82:63;
  const conf=Math.min(99,base+Math.floor(Math.random()*14));
  const confStr=`${conf.toFixed(1)}%`;

  // Runner-up mention
  const ruConfVal=Math.max(35,conf-13-Math.floor(Math.random()*14));
  const ruNote=runnerUp&&ruConfVal>=40
    ?` Next closest: "${runnerUp.name}" (${ruConfVal}%).`:'';

  const reviewNote=conf<75?' Manual review recommended.':'';
  const REASONS=[
    `Document filename pattern and content structure align with "${winner.name}" classification criteria.${ruNote}${reviewNote}`,
    `Keyword analysis and reference number format match "${winner.name}".${ruNote}${reviewNote}`,
    `Document identifiers — header, reference numbers, and terminology — indicate "${winner.name}".${ruNote}${reviewNote}`,
  ];

  const processingMs=900+Math.floor(Math.random()*1200);

  return{
    classification:winner.name,
    confidence:confStr,
    reasoning:REASONS[Math.floor(Math.random()*REASONS.length)].trim(),
    processingMs,
  };
};

const NAV_ITEMS = ['Home','Classification','Completion','Validation','Export','Report'];

/* ── Shared helpers ── */
function docStatus(doc){
  if(!doc?.lastTest)return'pending';
  if(doc.lastTest.match===true)return'tested';
  if(doc.lastTest.match===false)return'failed';
  return'no-label';
}

  Plus:    ({s=12})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>,
  Globe:   ()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>,
  File:    ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>,

/* ── NDBX Btn component
   Usage: <Btn variant="primary|secondary|tertiary|emphasis|attention|cta|danger"
               size="sm|md|lg" block loading disabled onClick>label</Btn>
   Maps nxButton="primary" → className="btn btn-primary"
────────────────────────────────────────────────────── */
function Btn({variant='primary',size,block,loading,disabled,onClick,className='',style,children,...rest}){
  const cls=[
    'btn',
    `btn-${variant}`,
    size==='sm'?'btn-sm':size==='lg'?'btn-lg':'',
    block?'btn-block':'',
    className,
  ].filter(Boolean).join(' ');
  return(
    <button className={cls} style={style} disabled={disabled||loading} onClick={onClick} {...rest}>
      {loading&&<span className="btn__spinner"/>}
      <span style={loading?{visibility:'hidden',position:'absolute'}:{}}>{children}</span>
    </button>
  );
}

/* ── NDBX Input ──────────────────────────────────────────
   FormField  — wrapper, maps to <nx-formfield>
   NxInput    — <input nxInput appearance="auto|expert">
   NxTextarea — <textarea nxInput appearance="auto|expert">

   Usage:
     <FormField label="Email" hint="We'll never share it" required>
       <NxInput appearance="expert" placeholder="you@example.com"/>
     </FormField>
     <FormField label="Notes" error="Too short">
       <NxTextarea appearance="auto" rows={3}/>
     </FormField>
────────────────────────────────────────────────────── */
function FormField({label,hint,error,optional,required,charCount,maxChars,appearance='expert',className='',style,children}){
  const hasError=!!error;
  return(
    <div className={['nx-ff',hasError?'nx-ff--error':'',className].filter(Boolean).join(' ')} style={style}>
      {label&&(
        <label className="nx-ff__label">
          {label}
          {required&&<span className="nx-ff__req" aria-hidden="true"> *</span>}
          {optional&&<span className="nx-ff__opt"> (optional)</span>}
        </label>
      )}
      <div className={`nx-ff__input-wrap nx-ff__input-wrap--${appearance}`}>
        {React.Children.map(children,child=>{
          if(!child)return null;
          return React.cloneElement(child,{
            appearance,
            error:hasError,
            'aria-invalid':hasError||undefined,
          });
        })}
      </div>
      {hasError
        ? <span className="nx-ff__hint nx-ff__hint--error">{error}</span>
        : hint
          ? <span className="nx-ff__hint">{hint}</span>
          : null
      }
      {maxChars!=null&&(
        <span className="nx-ff__char-count">{charCount||0}/{maxChars}</span>
      )}
    </div>
  );
}

function NxInput({appearance='expert',error,prefix,suffix,className='',style,...props}){
  const cls=[
    'nx-input',
    `nx-input--${appearance}`,
    error?'nx-input--error':'',
    prefix?'has-prefix':'',
    suffix?'has-suffix':'',
    className,
  ].filter(Boolean).join(' ');
  if(prefix||suffix){
    return(
      <div className="nx-ff__affix-wrap">
        {prefix&&<span className="nx-ff__prefix">{prefix}</span>}
        <input className={cls} style={style} {...props}/>
        {suffix&&<span className="nx-ff__suffix">{suffix}</span>}
      </div>
    );
  }
  return <input className={cls} style={style} {...props}/>;
}

function NxTextarea({appearance='expert',error,autoResize,className='',style,...props}){
  const ref=React.useRef(null);
  React.useEffect(()=>{
    if(!autoResize||!ref.current)return;
    const el=ref.current;
    const resize=()=>{ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; };
    el.addEventListener('input',resize);
    resize();
    return()=>el.removeEventListener('input',resize);
  },[autoResize]);
  const cls=[
    'nx-textarea',
    `nx-textarea--${appearance}`,
    error?'nx-input--error':'',
    className,
  ].filter(Boolean).join(' ');
  return <textarea ref={ref} className={cls} style={style} {...props}/>;
}

function ToastContainer({toasts,removeToast}){
  return <div className="toast-container">{toasts.map(t=>(
    <div key={t.id} className={`toast ${t.type}${t.exiting?' exiting':''}`}>

      <span className="toast__msg">{t.msg}</span>
      <button className="toast__close" onClick={()=>removeToast(t.id)}>×</button>
    </div>
  ))}</div>;
}
function useToast(){
  const [toasts,setToasts]=useState([]);
  const addToast=useCallback((msg,type='success')=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,type,exiting:false}]);
    setTimeout(()=>{
      setToasts(t=>t.map(x=>x.id===id?{...x,exiting:true}:x));
      setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),300);
    },3000);
  },[]);
  const removeToast=useCallback(id=>{
    setToasts(t=>t.map(x=>x.id===id?{...x,exiting:true}:x));
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),300);
  },[]);
  return{toasts,addToast,removeToast};
}

/* ── Shared Pagination ── */
function Pagination({page,totalPages,perPage,setPage,setPerPage,showPerPage=true}){
  const pages=[...new Set([1,2,...(page>3?['…']:[]),(page-1>2?page-1:null),(page>2?page:null),page,(page<totalPages-1?page+1:null),(page<totalPages-2?page+2:null),...(page<totalPages-2?['…']:[]),totalPages-1,totalPages].filter(x=>x!==null&&(typeof x==='string'||x>=1&&x<=totalPages)))];
  // Simpler approach:
  const makePages=()=>{
    if(totalPages<=7)return Array.from({length:totalPages},(_,i)=>i+1);
    const arr=[];
    arr.push(1);
    if(page>3)arr.push('…');
    for(let i=Math.max(2,page-1);i<=Math.min(totalPages-1,page+1);i++)arr.push(i);
    if(page<totalPages-2)arr.push('…');
    if(totalPages>1)arr.push(totalPages);
    return arr;
  };
  return(
    <div className="ov-pagination">
      {showPerPage&&<div className="ov-pagination__left">
        Items per page:
        <select className="ov-per-page" value={perPage} onChange={e=>{setPerPage&&setPerPage(Number(e.target.value));setPage(1);}}>
          {[10,20,50].map(n=><option key={n} value={n}>{n}</option>)}
        </select>
      </div>}
      <div className="ov-pagination__pages">
        <button className="page-btn" disabled={page===1} onClick={()=>setPage(1)}>⟨⟨</button>
        <button className="page-btn" disabled={page===1} onClick={()=>setPage(p=>p-1)}>⟨</button>
        {makePages().map((p,i)=>
          p==='…'
            ?<span key={'e'+i} className="page-ellipsis">…</span>
            :<button key={p} className={`page-btn${page===p?' active':''}`} onClick={()=>setPage(p)}>{p}</button>
        )}
        <button className="page-btn" disabled={page>=totalPages||totalPages===0} onClick={()=>setPage(p=>p+1)}>⟩</button>
        <button className="page-btn" disabled={page>=totalPages||totalPages===0} onClick={()=>setPage(totalPages)}>⟩⟩</button>
      </div>
    </div>
  );
}

  const [sortDir,setSortDir]=useState('asc');
  const [page,setPage]=useState(1);
  const [perPage,setPerPage]=useState(10);

  const handleSort=key=>{
    if(sortKey===key)setSortDir(d=>d==='asc'?'desc':'asc');
    else{setSortKey(key);setSortDir('asc');}
  };
  const SortIco=({col})=><span className="sort-icon">{sortKey===col?(sortDir==='asc'?'↑':'↓'):'↕'}</span>;

  const filtered=lobs
    .filter(l=>statusFilter==='All'||l.status===statusFilter)

    if(typeof av==='string')av=av.toLowerCase();
    if(typeof bv==='string')bv=bv.toLowerCase();
    return sortDir==='asc'?(av>bv?1:-1):(av<bv?1:-1);

  const totalPages=Math.max(1,Math.ceil(sorted.length/perPage));

                  const isRunning=runningIds.has(d.id);
                  const tested=live?.lastTest;
                  return(
                    <span key={d.id} className="file-sel__item">
                      {isRunning?<span style={{color:'var(--a)',fontSize:'11px'}}>⟳</span>
                        :tested?(tested.match===true?<span style={{color:'#006b00',fontSize:'11px'}}>✓</span>:tested.match===false?<span style={{color:'#cc0000',fontSize:'11px'}}>✗</span>:<span style={{color:'#1967d2',fontSize:'11px'}}>?</span>)
                        :<span style={{color:'var(--tx3)',fontSize:'11px'}}>·</span>}
                      <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.name}</span>
                      {tested&&(()=>{const st=docStatus(live||d);return<span className={`dlib__doc-status dlib__doc-status--${st}`}>{st==='tested'?'Tested':st==='failed'?'Failed':'No Label'}</span>;})()}
                      {isRunning&&<span className="dlib__doc-status dlib__doc-status--pending">Running…</span>}
                    </span>
                  );
                })}
              </div>
            }
          </div>
        </div>
      </div>}
      {(()=>{
        const live=selectedFiles.map(d=>docs.find(x=>x.id===d.id)||d);
        const tested=live.filter(d=>d.lastTest);
        const matched=tested.filter(d=>d.lastTest?.match===true);
        const validated=tested.filter(d=>d.lastTest?.match!==null);
        const accuracy=validated.length>0?Math.round(matched.length/validated.length*100):null;
        const tier=accuracy===null?null:accuracy>=80?'good':accuracy>=60?'warn':'fail';
        const stale=testedPromptSnap!==null&&prompt!==testedPromptSnap&&tested.length>0;
        const isActive=publishedSnap?.text===prompt;
        const isApproved=approvedSnap?.text===prompt&&!isActive;
        const pubDate=isActive?new Date(publishedSnap.publishedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):null;
        const runTest=()=>{const ids=selectedFiles.length>0?selectedFiles.map(d=>d.id):docs.map(d=>d.id);setRunningIds(new Set(ids));setTestedPromptSnap(prompt);onRunTest?.(ids);};
        return(
          <div className="run-test-bar">
            <div className="run-test-bar__info">
              {stale&&<div className="run-test-stale">⚠ Prompt edited — results may be outdated</div>}
              {!stale&&accuracy!==null&&(
                <div className="run-test-acc">
                  <span className={`run-test-acc__num run-test-acc__num--${tier}`}>{accuracy}%</span>
                  <div>
                    <div className="run-test-acc__bar"><div className={`run-test-acc__fill run-test-acc__fill--${tier}`} style={{width:accuracy+'%'}}/></div>
                    <div className="run-test-acc__sub">{matched.length}/{validated.length} validated</div>
                  </div>
                </div>
              )}
            </div>
            <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
              {accuracy!==null&&!runningIds.size&&<button className="run-test-rerun" onClick={runTest}>Re-run</button>}
              {isActive
                ?<span className="run-test-pub-badge">✓ Active · {publishedSnap.accuracy}% · {pubDate}</span>
                :isApproved&&!runningIds.size
                  ?<button className="run-test-deploy-btn" onClick={onDeploy}>Deploy to Production</button>
                  :accuracy===0&&!stale&&!runningIds.size
                    ?null
                    :accuracy!==null&&!stale&&!runningIds.size&&onApprove&&(
                        <button className="run-test-publish" onClick={()=>setShowPublishModal(true)}>
                          Approve for Production
                        </button>
                      )}
              <button className="run-test-btn" disabled={runningIds.size>0||selectedFiles.length===0} onClick={runTest}>
                {runningIds.size>0?'Running…':'Run test'}
              </button>
            </div>
            {showPublishModal&&accuracy!==null&&(
              <PublishModal accuracy={accuracy} testedCount={validated.length} matchedCount={matched.length}
                onConfirm={note=>{onApprove({text:prompt,accuracy,testedCount:validated.length,matchedCount:matched.length,note,publishedAt:new Date().toISOString()});setShowPublishModal(false);}}
                onClose={()=>setShowPublishModal(false)}/>
            )}
          </div>
        );
      })()}
      {showPreview&&<PreviewModal prompt={prompt} hierarchyContext={hierarchyContext} onClose={()=>setShowPreview(false)}/>}
      {showSelectFile&&<SelectFileModal docs={docs} dataSets={dataSets}
        onConfirm={ids=>{
          const sel=docs.filter(d=>ids.includes(d.id));
          setSelectedFiles(sel);
          onSelectFiles?.(ids);
          setShowSelectFile(false);
        }}
        onClose={()=>setShowSelectFile(false)}/>}
    </div>
  );
}

/* ── Select File Modal ── */
function SelectFileModal({docs,dataSets,onConfirm,onClose}){
  const [filter,setFilter]=useState('all');
  const [datasetFilters,setDatasetFilters]=useState(new Set());
  const [selectedIds,setSelectedIds]=useState(new Set());
  const [showFilterPop,setShowFilterPop]=useState(false);
  const dsMap=Object.fromEntries(dataSets.map(ds=>[ds.id,ds]));
  const getDocStatus=d=>docStatus(d);
  const counts={
    all:docs.length,
    untested:docs.filter(d=>!d.lastTest).length,
    matched:docs.filter(d=>d.lastTest?.match===true).length,
    failed:docs.filter(d=>d.lastTest?.match===false).length,
  };
  const statusFiltered=docs.filter(d=>{
    if(filter==='untested')return!d.lastTest;
    if(filter==='matched')return d.lastTest?.match===true;
    if(filter==='failed')return d.lastTest?.match===false;
    return true;
  });
  const filtered=datasetFilters.size>0?statusFiltered.filter(d=>datasetFilters.has(d.dataSetId||'')):statusFiltered;
  // group by dataset
  const groupMap={};
  const groupOrder=[];
  filtered.forEach(d=>{
    const key=d.dataSetId||'__none__';
    if(!groupMap[key]){groupMap[key]=[];groupOrder.push(key);}
    groupMap[key].push(d);
  });
  const toggle=id=>setSelectedIds(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const selectAll=()=>setSelectedIds(new Set(filtered.map(d=>d.id)));
  const clear=()=>setSelectedIds(new Set());
  const selectGroup=key=>setSelectedIds(s=>{const n=new Set(s);(groupMap[key]||[]).forEach(d=>n.add(d.id));return n;});
  const toggleDsFilter=id=>setDatasetFilters(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const selectedList=docs.filter(d=>selectedIds.has(d.id));
  const CHIP_MAX=4;
  const visibleChips=selectedList.slice(0,CHIP_MAX);
  const extraCount=selectedList.length-CHIP_MAX;
  const getDsName=key=>key==='__none__'?'No dataset':(dsMap[key]?.name||key);
  const getDsColor=key=>key==='__none__'?'#a0a0a0':(dsMap[key]?.color||'#003781');
  const statusBadge=d=>{
    const s=getDocStatus(d);
    if(s==='tested')return<span className="sf-status--tested">Tested</span>;
    if(s==='failed')return<span className="sf-status--failed">Failed</span>;
    if(s==='no-label')return<span className="sf-status--no-label">No Label</span>;
    return<span className="sf-status--pending">Pending</span>;
  };
  const expectedCell=d=>{
    const labels=d.expectedLabels||[];
    if(!labels.length)return<span style={{color:'var(--tx3)'}}>—</span>;
    const shown=labels.slice(0,2);
    const extra=labels.length-2;
    return<div style={{display:'flex',gap:'3px',flexWrap:'wrap'}}>
      {shown.map((l,i)=><span key={i} className="sf-exp-cell">{l}</span>)}
      {extra>0&&<span className="sf-exp-cell sf-exp-extra">+{extra}</span>}
    </div>;
  };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="sfm" onClick={e=>e.stopPropagation()}>
        <div className="sfm__hdr">
          <h3 className="sfm__title">Select file</h3>
          <button className="modal__close" onClick={onClose}>×</button>
        </div>
        <div className="sfm__bar" onClick={()=>showFilterPop&&setShowFilterPop(false)}>
          <div className="sfm__tabs">
            {[['all','All'],['untested','Untested'],['matched','Matched'],['failed','Failed']].map(([key,label])=>(
              <button key={key} className={`sf-tab${filter===key?' sf-tab--active':''}`} onClick={()=>setFilter(key)}>
                {label}<span className="sf-tab__count">{counts[key]}</span>
              </button>
            ))}
          </div>
          <div className="sfm__filter-wrap" onClick={e=>e.stopPropagation()}>
            <button className={`sfm__filter-btn${datasetFilters.size>0?' sfm__filter-btn--active':''}`}
              onClick={()=>setShowFilterPop(p=>!p)}>
              Filter{datasetFilters.size>0?` (${datasetFilters.size})`:''}<IC.ChevDown s={11}/>
            </button>
            {showFilterPop&&<div className="sfm__filter-pop">
              <div className="sfm__filter-pop-title">Dataset</div>
              {dataSets.length===0?<div style={{fontSize:'12px',color:'var(--tx3)'}}>No datasets</div>
                :dataSets.map(ds=>(
                  <label key={ds.id} className="sfm__filter-opt">
                    <input type="checkbox" checked={datasetFilters.has(ds.id)} onChange={()=>toggleDsFilter(ds.id)}/>
                    <span className="sfm__ds-dot" style={{background:ds.color||'#003781'}}/>
                    {ds.name}
                  </label>
                ))}
              {datasetFilters.size>0&&<button className="sf-link" style={{marginTop:'6px',fontSize:'11px'}} onClick={()=>setDatasetFilters(new Set())}>Clear filter</button>}
            </div>}
          </div>
        </div>
        <div className="sfm__actions">
          <button className="sf-link" onClick={selectAll}>Select all</button>
          <button className="sf-link" onClick={clear}>Clear</button>
        </div>
        <div className="sfm__table-wrap">
          <table className="sf-table">
            <thead>
              <tr>
                <th style={{width:'32px'}}/>
                <th>Document</th>
                <th>Expected</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              {groupOrder.length===0&&<tr><td colSpan={4} style={{textAlign:'center',color:'var(--tx3)',padding:'24px'}}>No documents</td></tr>}
              {groupOrder.map(key=>(
                <React.Fragment key={key}>
                  <tr className="sfm__ds-row">
                    <td colSpan={4}>
                      <div className="sfm__ds-row-inner">
                        <span className="sfm__ds-dot" style={{background:getDsColor(key)}}/>
                        <span className="sfm__ds-name">{getDsName(key)}</span>
                        <span className="sfm__ds-count">{groupMap[key].length} doc{groupMap[key].length>1?'s':''}</span>
                        <button className="sf-link sfm__ds-sel" onClick={()=>selectGroup(key)}>Select group</button>
                      </div>
                    </td>
                  </tr>
                  {groupMap[key].map(d=>(
                    <tr key={d.id} className={`sfm__doc-row${selectedIds.has(d.id)?' sfm__doc-row--sel':''}`} onClick={()=>toggle(d.id)}>
                      <td onClick={e=>e.stopPropagation()}><input type="checkbox" checked={selectedIds.has(d.id)} onChange={()=>toggle(d.id)}/></td>
                      <td><span className="sf-doc-name" title={d.name}>{d.name}</span></td>
                      <td>{expectedCell(d)}</td>
                      <td>{statusBadge(d)}</td>
                    </tr>
                  ))}
                </React.Fragment>
              ))}
            </tbody>
          </table>
        </div>
        {selectedIds.size>0&&<div className="sfm__sel-bar">
          <span className="sfm__sel-count">{selectedIds.size} selected</span>
          <div className="sfm__chips">
            {visibleChips.map(d=>(
              <span key={d.id} className="sfm__chip">
                <span className="sfm__chip-name" title={d.name}>{d.name}</span>
                <button className="sfm__chip-x" onClick={e=>{e.stopPropagation();toggle(d.id);}}>×</button>
              </span>
            ))}
            {extraCount>0&&<span className="sfm__chip sfm__chip--more">+{extraCount} more</span>}
          </div>
          <button className="sf-link sfm__sel-clear" onClick={clear}>clear all</button>
        </div>}
        <div className="sfm__footer">
          <button className="btn btn-outline btn-sm" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary btn-sm" disabled={selectedIds.size===0}
            onClick={()=>onConfirm([...selectedIds])}>
            Confirm{selectedIds.size>0?` (${selectedIds.size})`:''}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Readiness Checklist ── */
function ReadinessChecklist({l1Items,docs}){
  const typesOk=l1Items.some(i=>i.l2.length>0);
  const testOk=(docs||[]).some(d=>d.status==='Tested');
  const validationOk=false;
  const checks=[
    {label:'Doc types defined',ok:typesOk},
    {label:'Validation rules',ok:validationOk},
    {label:'Test run',ok:testOk},
  ];
  const doneCount=checks.filter(c=>c.ok).length;
  return(
    <div className="readiness">
      <span className="readiness__title">Ready {doneCount}/{checks.length}</span>
      {checks.map((c,i)=>(
        <React.Fragment key={c.label}>
          {i>0&&<span className="readiness__sep"/>}
          <span className={`readiness__item readiness__item--${c.ok?'ok':'fail'}`}>
            {c.ok?'✓':'○'} {c.label}
          </span>
        </React.Fragment>
      ))}
    </div>
  );
}

  const commitRenameL2=()=>{if(renameDraftL2.trim()&&renamingL2){const{l1id,l2id}=renamingL2;const l1=l1Items.find(i=>i.id===l1id);const l2=l1?.l2.find(x=>x.id===l2id);if(renameDraftL2.trim()!==l2?.name){setL1Items(items=>items.map(i=>i.id===l1id?{...i,l2:i.l2.map(x=>x.id===l2id?{...x,name:renameDraftL2.trim()}:x)}:i));addToast(`Renamed to "${renameDraftL2.trim()}"`);}setRenamingL2(null);}else{setRenamingL2(null);}};
  const cancelRenameL2=()=>setRenamingL2(null);
  const startRenameL1=id=>{const item=l1Items.find(i=>i.id===id);setRenameDraft(item?.name||'');setRenamingId(id);setShowMenu(null);};
  const commitRename=()=>{if(renameDraft.trim()&&renamingId){const item=l1Items.find(i=>i.id===renamingId);if(renameDraft.trim()!==item?.name){setL1Items(items=>items.map(i=>i.id===renamingId?{...i,name:renameDraft.trim()}:i));addToast(`Renamed to "${renameDraft.trim()}"`);}setRenamingId(null);setRenameDraft('');}else{setRenamingId(null);}};
  const cancelRename=()=>{setRenamingId(null);setRenameDraft('');};
  const requestDelL1=id=>{const item=l1Items.find(i=>i.id===id);setShowMenu(null);onConfirm({title:`Delete ${LABELS.l1.label}`,message:`Delete "${item?.name}"? This will remove its workspace tab.`,confirmLabel:'Delete',onConfirm:()=>{setL1Items(items=>items.filter(i=>i.id!==id));addToast(`"${item?.name}" deleted`,'warning');}});};
  const addL1=name=>{const id=name.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now();setL1Items(items=>[...items,{id,name,expanded:false,l2:[]}]);addToast(`"${name}" added`);setAddModal(null);};
  return(
    <aside className="sidebar" style={style}>
      <div className="sidebar__header"><h2 className="sidebar__title">Document Classification</h2></div>
      <div className="sidebar__search-top">
