<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intelligent Document &amp; Automation Solution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;color:#111827;background:#f9fafb;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}

.navbar{display:flex;align-items:center;justify-content:space-between;height:52px;background:#fff;border-bottom:1px solid #e5e7eb;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:100;gap:16px}
.navbar__left{display:flex;align-items:center;gap:10px;flex-shrink:0}
.navbar__logo{display:flex;align-items:center}
.navbar__brand{font-size:12px;font-weight:600;color:#111827;white-space:nowrap}
.navbar__nav{display:flex;align-items:center;list-style:none;flex:1;justify-content:center}
.navbar__nav-item{background:none;border:none;padding:0 12px;font-size:13px;color:#6b7280;height:52px;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;font-family:inherit}
.navbar__nav-item:hover{color:#111827}
.navbar__nav-item.active{color:#2563eb;font-weight:500;border-bottom-color:#2563eb}
.navbar__right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.navbar__dd{position:relative}
.navbar__dd-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid transparent;padding:5px 8px;border-radius:6px;font-size:12px;color:#6b7280;cursor:pointer;transition:background .15s;font-family:inherit}
.navbar__dd-btn:hover{background:#f9fafb;color:#111827}
.navbar__dd-menu{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 10px 15px rgba(0,0,0,.1);min-width:160px;z-index:200;overflow:hidden;animation:slideDown .12s ease}
.navbar__dd-item{background:none;border:none;display:block;width:100%;padding:8px 14px;font-size:12px;color:#111827;text-align:left;cursor:pointer;font-family:inherit;transition:background .15s}
.navbar__dd-item:hover{background:#f9fafb}
.navbar__dd-item.active{color:#2563eb;background:#eff6ff;font-weight:500}
.navbar__dd-item.danger{color:#dc2626}
.navbar__dd-item.danger:hover{background:#fef2f2}
.navbar__dd-divider{height:1px;background:#e5e7eb;margin:4px 0}
.navbar__avatar{width:32px;height:32px;border-radius:50%;background:#7c3aed;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;flex-shrink:0;transition:box-shadow .2s}
.navbar__avatar:hover{box-shadow:0 0 0 3px rgba(124,58,237,.3)}

.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.app__sub-bar{margin-top:52px;height:32px;background:#f3f4f6;border-bottom:1px solid #e5e7eb;padding:0 24px;display:flex;align-items:center;flex-shrink:0}
.app__breadcrumb{font-size:12px;color:#6b7280}
.app__back-bar{height:36px;background:#fff;border-bottom:1px solid #e5e7eb;padding:0 20px;display:flex;align-items:center;flex-shrink:0}
.app__back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:12px;color:#2563eb;font-weight:500;cursor:pointer;font-family:inherit}
.app__back-btn:hover{text-decoration:underline}
.app__content{flex:1;display:flex;overflow:hidden;min-height:0}

/* Page scroll wrapper (Dashboard + Config List) */
.page-scroll{flex:1;overflow-y:auto;padding:28px 32px;margin-top:52px}
.page-scroll::-webkit-scrollbar{width:5px}.page-scroll::-webkit-scrollbar-track{background:transparent}.page-scroll::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:3px}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.page-hdr__left h1{font-size:22px;font-weight:700;color:#111827}
.page-hdr__left p{font-size:13px;color:#6b7280;margin-top:3px}
.page-hdr__actions{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ── Dashboard ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:18px 20px;display:flex;flex-direction:column;gap:6px;transition:box-shadow .15s}
.stat-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.07)}
.stat-card__label{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em}
.stat-card__value{font-size:26px;font-weight:700;color:#111827;line-height:1}
.stat-card__sub{font-size:11px;color:#6b7280;display:flex;align-items:center;gap:4px}
.stat-card__sub.up{color:#16a34a}
.stat-card__sub.down{color:#dc2626}
.stat-card__bar{height:3px;background:#f3f4f6;border-radius:2px;margin-top:4px;overflow:hidden}
.stat-card__bar-fill{height:100%;border-radius:2px;background:#2563eb}

.section-title{font-size:14px;font-weight:700;color:#111827;margin-bottom:14px}

/* Pipeline */
.pipeline{display:flex;align-items:center;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:20px 24px;margin-bottom:28px;overflow-x:auto;gap:0}
.pipe-step{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;min-width:90px}
.pipe-step__icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.pipe-step__label{font-size:11px;font-weight:600;color:#374151;text-align:center;white-space:nowrap}
.pipe-step__count{font-size:10px;color:#9ca3af;text-align:center}
.pipe-arrow{color:#d1d5db;font-size:20px;flex-shrink:0;padding:0 4px;margin-bottom:24px}

/* LOB performance */
.lob-perf{background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:28px}
.lob-perf__hdr{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid #e5e7eb;gap:0}
.lob-perf__hdr span{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em}
.lob-perf__hdr span:first-child{flex:2}
.lob-perf__hdr span:not(:first-child){flex:1;text-align:center}
.lob-perf__row{display:flex;align-items:center;padding:13px 20px;border-bottom:1px solid #f9fafb;transition:background .1s}
.lob-perf__row:last-child{border-bottom:none}
.lob-perf__row:hover{background:#f9fafb}
.lob-perf__name{flex:2;display:flex;align-items:center;gap:10px}
.lob-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lob-perf__name-text{font-size:13px;font-weight:600;color:#111827}
.lob-perf__name-sub{font-size:11px;color:#9ca3af}
.lob-perf__cell{flex:1;text-align:center;font-size:12px;color:#374151}
.lob-perf__conf{font-weight:700;color:#111827}
.conf-bar{width:80px;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden;margin:0 auto 2px}
.conf-bar__fill{height:100%;border-radius:3px}

/* Quick links */
.quick-links{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.quick-link{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;text-align:left}
.quick-link:hover{border-color:#2563eb;box-shadow:0 4px 12px rgba(37,99,235,.1)}
.quick-link__icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.quick-link__label{font-size:13px;font-weight:600;color:#111827}
.quick-link__sub{font-size:11px;color:#9ca3af;margin-top:1px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}.btn-primary:disabled{background:#93c5fd;cursor:not-allowed}
.btn-outline{background:#fff;color:#374151;border:1px solid #d1d5db}.btn-outline:hover{background:#f9fafb;border-color:#9ca3af}
.btn-danger{background:#dc2626;color:#fff;border:none}.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 11px;font-size:12px}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
.modal{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-width:520px;width:92vw;display:flex;flex-direction:column;max-height:90vh;animation:scaleIn .15s ease}
.modal.lg{max-width:700px}
.modal__header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #e5e7eb;flex-shrink:0}
.modal__header h3{font-size:15px;font-weight:600;color:#111827}
.modal__close{background:none;border:none;font-size:22px;color:#9ca3af;cursor:pointer;line-height:1;padding:0 4px;border-radius:4px;transition:all .1s}
.modal__close:hover{color:#111827;background:#f3f4f6}
.modal__body{padding:20px;overflow-y:auto;flex:1}
.modal__body::-webkit-scrollbar{width:4px}.modal__body::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px}
.modal__footer{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid #e5e7eb;flex-shrink:0}

/* ── Version table & badges ── */
.version-table{width:100%;border-collapse:collapse}
.version-table th{padding:8px 12px;font-size:12px;font-weight:600;color:#374151;text-align:left;background:#f9fafb;border-bottom:1px solid #e5e7eb}
.version-table td{padding:10px 12px;border-bottom:1px solid #f3f4f6;font-size:13px;color:#374151}
.version-table tbody tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:500}
.badge-active{background:#dcfce7;color:#16a34a}.badge-archived{background:#f3f4f6;color:#6b7280}

/* ── Preview / Test modals ── */
.preview-box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:14px;max-height:320px;overflow-y:auto}
.preview-box pre{font-family:'Fira Code',monospace,sans-serif;font-size:12px;line-height:1.6;color:#374151;white-space:pre-wrap;word-break:break-word}
.test-modal{display:flex;flex-direction:column;gap:16px}
.test-modal h4{font-size:13px;font-weight:600;color:#111827;margin-bottom:8px}
.test-running{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;font-size:13px;color:#1e40af}
.test-spinner{width:16px;height:16px;border:2px solid #bfdbfe;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.test-result{display:flex;flex-direction:column;gap:8px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px}
.test-result__item{display:flex;gap:8px;font-size:13px}
.test-result__label{font-weight:600;color:#374151;min-width:110px;flex-shrink:0}
.test-result__value{color:#111827}

/* ── Confirm dialog ── */
.confirm-dialog{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-width:400px;width:90vw;padding:28px 24px;display:flex;flex-direction:column;align-items:center;gap:12px;animation:scaleIn .15s ease}
.confirm-dialog__icon{font-size:28px}
.confirm-dialog__title{font-size:16px;font-weight:700;color:#111827;text-align:center}
.confirm-dialog__msg{font-size:13px;color:#6b7280;text-align:center;line-height:1.5}
.confirm-dialog__actions{display:flex;gap:10px;margin-top:4px}

/* ── Toasts ── */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.12);font-size:13px;min-width:240px;max-width:360px;pointer-events:all;animation:slideInRight .25s ease;transition:opacity .25s,transform .25s}
.toast.exiting{opacity:0;transform:translateX(20px)}
.toast.success{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.toast.error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.toast.warning{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.toast.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.toast__icon{font-size:14px;flex-shrink:0}
.toast__msg{flex:1;line-height:1.4}
.toast__close{background:none;border:none;font-size:16px;cursor:pointer;opacity:.5;padding:0 2px;line-height:1;color:inherit;margin-left:4px;font-family:inherit;transition:opacity .1s}
.toast__close:hover{opacity:1}

/* ── Sidebar ── */
.sidebar{width:220px;min-width:220px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar__header{padding:14px 16px 10px;border-bottom:1px solid #f3f4f6;flex-shrink:0}
.sidebar__title{font-size:13px;font-weight:700;color:#111827}
.sidebar__section{padding:12px 16px;flex-shrink:0}
.sidebar__section-lbl{font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:block}
.sidebar__cb-label{display:flex;align-items:center;gap:7px;font-size:12px;color:#374151;cursor:pointer;padding:2px 0;user-select:none}
.sidebar__cb-label input{accent-color:#2563eb;cursor:pointer}
.sidebar__divider{height:1px;background:#f3f4f6;flex-shrink:0}
.sidebar__level0{padding:10px 16px;flex-shrink:0}
.sidebar__level-lbl{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px}
.sidebar__level-lbl.sub{margin:8px 0 4px;padding:0 2px}
.sidebar__l0-input{width:100%;border:1px solid #2563eb;border-radius:5px;padding:4px 8px;font-size:12px;outline:none;font-family:inherit;color:#111827}
.sidebar__l0-name{font-size:13px;font-weight:600;color:#111827;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.sidebar__l0-name:hover{color:#2563eb}
.sidebar__l1-header{padding:6px 16px 0;flex-shrink:0}
.sidebar__list-controls{display:flex;align-items:center;gap:6px;padding:6px 16px 8px;flex-shrink:0}
.sidebar__search-wrap{position:relative;flex:1;display:flex;align-items:center}
.sidebar__search-icon{position:absolute;left:7px;color:#9ca3af;display:flex;align-items:center;pointer-events:none}
.sidebar__search{width:100%;padding:5px 8px 5px 24px;border:1px solid #e5e7eb;border-radius:5px;font-size:11px;outline:none;font-family:inherit;color:#374151;transition:border-color .15s}
.sidebar__search:focus{border-color:#2563eb}
.sidebar__collapse-btn{background:none;border:1px solid #e5e7eb;border-radius:5px;padding:4px 7px;font-size:11px;color:#6b7280;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .1s;flex-shrink:0}
.sidebar__collapse-btn:hover{color:#111827;border-color:#9ca3af}
.sidebar__l1-list{flex:1;overflow-y:auto;padding:0 8px 8px}
.sidebar__l1-list::-webkit-scrollbar{width:3px}.sidebar__l1-list::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px}
.sidebar__no-results{font-size:12px;color:#9ca3af;padding:8px;font-style:italic}
.sidebar__empty-l1{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 0;color:#9ca3af}
.sidebar__empty-l1 p{font-size:12px;text-align:center;line-height:1.5}
.sidebar__l1-item{border-radius:6px;margin-bottom:2px}
.sidebar__l1-row{display:flex;align-items:center;border-radius:6px;transition:background .1s}
.sidebar__l1-row:hover{background:#f9fafb}
.sidebar__l1-toggle{flex:1;display:flex;align-items:center;gap:6px;background:none;border:none;padding:7px 8px;cursor:pointer;font-family:inherit;text-align:left;min-width:0;border-radius:6px 0 0 6px}
.sidebar__l1-name{font-size:12px;font-weight:500;color:#111827;flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar__l2-count{font-size:10px;color:#9ca3af;background:#f3f4f6;border-radius:10px;padding:1px 6px;flex-shrink:0}
.sidebar__menu-wrap{position:relative;flex-shrink:0}
.sidebar__menu-btn{background:none;border:none;padding:7px 8px;cursor:pointer;color:#9ca3af;display:flex;align-items:center;transition:color .1s;border-radius:0 6px 6px 0}
.sidebar__menu-btn:hover{color:#374151;background:#f3f4f6}
.sidebar__ctx-menu{position:absolute;right:0;top:100%;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 8px 20px rgba(0,0,0,.1);z-index:50;min-width:130px;overflow:hidden;animation:slideDown .1s ease}
.sidebar__ctx-item{display:block;width:100%;padding:8px 14px;font-size:12px;color:#111827;background:none;border:none;text-align:left;cursor:pointer;font-family:inherit;transition:background .1s}
.sidebar__ctx-item:hover{background:#f9fafb}.sidebar__ctx-item.danger{color:#dc2626}.sidebar__ctx-item.danger:hover{background:#fef2f2}
.sidebar__l2-wrap{padding:0 8px 6px 16px}
.sidebar__empty-l2{font-size:11px;color:#9ca3af;padding:4px;font-style:italic}
.sidebar__l2-list{list-style:none;display:flex;flex-direction:column;gap:1px}
.sidebar__l2-item{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:5px;font-size:12px;color:#4b5563;transition:background .1s}
.sidebar__l2-item:hover{background:#f9fafb}
.sidebar__l2-del{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:15px;line-height:1;padding:0 2px;margin-left:auto;border-radius:3px;transition:color .1s;font-family:inherit}
.sidebar__l2-del:hover{color:#dc2626}
.sidebar__add-input-wrap{display:flex;flex-direction:column;gap:5px;padding:4px 0}
.sidebar__add-input{border:1px solid #2563eb;border-radius:5px;padding:5px 8px;font-size:12px;outline:none;font-family:inherit;color:#111827;width:100%}
.sidebar__add-actions{display:flex;gap:5px}
.sidebar__add-confirm{background:#2563eb;color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;transition:background .1s}
.sidebar__add-confirm:hover{background:#1d4ed8}.sidebar__add-confirm:disabled{background:#93c5fd;cursor:not-allowed}
.sidebar__add-cancel{background:none;border:1px solid #e5e7eb;border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer;color:#6b7280;font-family:inherit;transition:all .1s}
.sidebar__add-cancel:hover{border-color:#9ca3af;color:#374151}
.sidebar__add-btn{background:none;border:1px dashed #d1d5db;border-radius:5px;padding:5px 8px;font-size:11px;color:#9ca3af;cursor:pointer;width:100%;display:flex;align-items:center;gap:4px;font-family:inherit;transition:all .15s;margin-top:2px}
.sidebar__add-btn:hover{border-color:#2563eb;color:#2563eb;background:#eff6ff}
.sidebar__add-l1-bar{padding:8px;border-top:1px solid #f3f4f6;flex-shrink:0}
.sidebar__add-l1-input-wrap{display:flex;gap:5px}
.sidebar__add-l1-input{flex:1;border:1px solid #2563eb;border-radius:5px;padding:5px 8px;font-size:12px;outline:none;font-family:inherit;color:#111827}
.sidebar__add-l1-btn{background:none;border:1px dashed #d1d5db;border-radius:6px;padding:7px 10px;font-size:12px;color:#6b7280;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;transition:all .15s}
.sidebar__add-l1-btn:hover{border-color:#2563eb;color:#2563eb;background:#eff6ff}

/* ── Workspace ── */
.workspace{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.workspace__header{padding:12px 20px 0;flex-shrink:0}
.workspace__title{font-size:13px;font-weight:700;color:#111827}
.workspace__tab-area{flex-shrink:0}
.workspace__tabs{display:flex;align-items:center;padding:0 16px;position:relative}
.workspace__tabs--l1{background:#fff;border-bottom:1px solid #e5e7eb;height:40px}
.workspace__tabs--l2{background:#f9fafb;border-bottom:1px solid #e5e7eb;height:34px}
.workspace__tabs-inner{display:flex;align-items:center;flex:1;overflow:hidden;height:100%}
.workspace__tab{padding:0 14px;height:100%;background:none;border:none;font-size:12px;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0}
.workspace__tab:hover{color:#111827;background:#f9fafb}
.workspace__tab.active{color:#2563eb;font-weight:500;border-bottom-color:#2563eb;background:#fafcff}
.workspace__tab--l2{font-size:11px}

/* ── Document Panel ── */

.doc-panel__list-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;flex-shrink:0}
.doc-panel__sel-info{font-size:11px;color:#6b7280}

.doc-panel__empty{text-align:center;padding:24px;font-size:12px;color:#9ca3af}
.doc-panel__item{display:flex;align-items:center;gap:7px;padding:6px 7px;border-radius:6px;border:1px solid transparent;transition:all .1s}

.workspace__preview-link{background:none;border:none;font-size:11px;color:#9ca3af;cursor:pointer;padding:0;font-family:inherit;text-decoration:underline;text-underline-offset:2px}

/* ── Keyframes ── */
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Overview table pages ── */

.tbl-name-link{color:#2563eb;font-weight:500;cursor:pointer;background:none;border:none;font-family:inherit;font-size:13px;padding:0;text-align:left}

.tbl-actions{display:flex;align-items:center;gap:8px}
.tbl-view-btn{background:none;border:none;color:#2563eb;font-size:12px;font-weight:500;cursor:pointer;padding:0;font-family:inherit}
.tbl-view-btn:hover{text-decoration:underline}
.tbl-icon-btn{background:none;border:none;cursor:pointer;color:#6b7280;padding:4px;border-radius:4px;display:flex;align-items:center;transition:all .12s}
.tbl-icon-btn:hover{color:#111827;background:#f3f4f6}.tbl-icon-btn.danger:hover{color:#dc2626;background:#fee2e2}
.tbl-empty{text-align:center;color:#9ca3af;padding:32px;font-size:13px}
.sort-both{font-size:10px;color:#9ca3af;margin-left:3px}
.status-chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid transparent}

.modal__toolbar{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:8px 20px;border-bottom:1px solid #f3f4f6;flex-shrink:0}

/* ── UX Improvements ── */
/* Clickable table rows */
.ov-table tbody tr{cursor:pointer}
.ov-table tbody tr td:last-child{cursor:default}
/* Prompt status dot in types modal */
.type-prompt-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;margin-right:7px;vertical-align:middle}
.type-prompt-dot--set{background:#16a34a}
.type-prompt-dot--empty{background:#d1d5db}
/* Inline rename input in sidebar */
.sidebar__rename-wrap{flex:1;display:flex;align-items:center;gap:4px;padding:4px 6px}
.sidebar__rename-input{flex:1;border:1px solid #2563eb;border-radius:4px;padding:3px 6px;font-size:12px;font-weight:500;color:#111827;outline:none;font-family:inherit;min-width:0}
.sidebar__rename-ok{background:#2563eb;color:#fff;border:none;border-radius:4px;padding:3px 7px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.sidebar__rename-ok:disabled{background:#93c5fd;cursor:not-allowed}
.sidebar__rename-cancel{background:none;border:1px solid #e5e7eb;border-radius:4px;padding:3px 6px;font-size:11px;cursor:pointer;color:#6b7280;font-family:inherit}
/* Search clear button */
.search-clear-btn{position:absolute;right:8px;background:none;border:none;color:#9ca3af;cursor:pointer;font-size:14px;line-height:1;padding:0;display:flex;align-items:center;transition:color .1s}
.search-clear-btn:hover{color:#374151}
/* Active filter highlight */
.btn-filter-active{background:#eff6ff!important;border-color:#bfdbfe!important;color:#1d4ed8!important}
/* Reset prompt inline confirm */
.reset-confirm{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fef9c3;border:1px solid #fde047;border-radius:7px;font-size:12px;color:#713f12}
.reset-confirm__actions{display:flex;gap:6px;margin-left:auto}
/* Wider types modal */
.modal.types{max-width:440px}
/* Improve workspace no-title layout */
.workspace__header{padding:10px 20px 0}
.workspace__title{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em}

/* ── Prompt context chip ── */
.prompt-ctx-chip{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.03em;flex-shrink:0;line-height:16px}
.prompt-ctx-chip--global{background:#f3e8ff;color:#7c3aed}
.prompt-ctx-chip--l1{background:#dbeafe;color:#1d4ed8}
.prompt-ctx-chip--l2{background:#d1fae5;color:#065f46}
.prompt-ctx-scope{font-size:11px;color:#9ca3af;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Output Format Modal ── */
.of-modal{max-width:980px;width:95vw;height:82vh;display:flex;flex-direction:column}
.of-modal .modal__body{display:flex;flex:1;overflow:hidden;padding:0!important}

.of-tree::-webkit-scrollbar{width:4px}.of-tree::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px}

.of-tree__lob-btn:hover{background:#f3f4f6}
.of-tree__cat-btn{width:100%;padding:6px 12px 6px 20px;background:none;border:none;display:flex;align-items:center;gap:5px;font-size:12px;color:#4b5563;cursor:pointer;text-align:left;font-family:inherit;transition:background .1s}
.of-tree__cat-btn:hover{background:#f3f4f6}
.of-tree__type-btn{width:100%;padding:5px 10px 5px 34px;background:none;border:none;font-size:12px;color:#6b7280;cursor:pointer;text-align:left;font-family:inherit;border-radius:0;transition:all .1s;display:block}
.of-tree__type-btn:hover{background:#eff6ff;color:#2563eb}
.of-tree__type-btn.active{background:#eff6ff;color:#2563eb;font-weight:500;border-right:2px solid #2563eb}
.of-schema{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px 18px}

- Only classify into the types defined in the hierarchy above
- If a document spans multiple types, choose the primary intent
- Poor scan quality or handwriting should reduce confidence by 10–15 points

/* ── Toast ── */
function ToastContainer({toasts,removeToast}){
  return <div className="toast-container">{toasts.map(t=>(
    <div key={t.id} className={`toast ${t.type}${t.exiting?' exiting':''}`}>
      <span className="toast__icon">{t.type==='success'?'✓':t.type==='error'?'✕':t.type==='warning'?'⚠':'ℹ'}</span>
      <span className="toast__msg">{t.msg}</span>
      <button className="toast__close" onClick={()=>removeToast(t.id)}>×</button>
    </div>
  ))}</div>;
}
function useToast(){
  const [toasts,setToasts]=useState([]);
  const addToast=useCallback((msg,type='success')=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,type,exiting:false}]);
    setTimeout(()=>{
      setToasts(t=>t.map(x=>x.id===id?{...x,exiting:true}:x));
      setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),300);
    },3000);
  },[]);
  const removeToast=useCallback(id=>{
    setToasts(t=>t.map(x=>x.id===id?{...x,exiting:true}:x));
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),300);
  },[]);
  return{toasts,addToast,removeToast};
}

/* ── Shared Pagination ── */
function Pagination({page,totalPages,perPage,setPage,setPerPage,showPerPage=true}){
  const pages=[...new Set([1,2,...(page>3?['…']:[]),(page-1>2?page-1:null),(page>2?page:null),page,(page<totalPages-1?page+1:null),(page<totalPages-2?page+2:null),...(page<totalPages-2?['…']:[]),totalPages-1,totalPages].filter(x=>x!==null&&(typeof x==='string'||x>=1&&x<=totalPages)))];
  // Simpler approach:
  const makePages=()=>{
    if(totalPages<=7)return Array.from({length:totalPages},(_,i)=>i+1);
    const arr=[];
    arr.push(1);
    if(page>3)arr.push('…');
    for(let i=Math.max(2,page-1);i<=Math.min(totalPages-1,page+1);i++)arr.push(i);
    if(page<totalPages-2)arr.push('…');
    if(totalPages>1)arr.push(totalPages);
    return arr;
  };
  return(
    <div className="ov-pagination">
      {showPerPage&&<div className="ov-pagination__left">
        Items per page:
        <select className="ov-per-page" value={perPage} onChange={e=>{setPerPage&&setPerPage(Number(e.target.value));setPage(1);}}>
          {[10,20,50].map(n=><option key={n} value={n}>{n}</option>)}
        </select>
      </div>}
      <div className="ov-pagination__pages">
        <button className="page-btn" disabled={page===1} onClick={()=>setPage(1)}>⟨⟨</button>
        <button className="page-btn" disabled={page===1} onClick={()=>setPage(p=>p-1)}>⟨</button>
        {makePages().map((p,i)=>
          p==='…'
            ?<span key={'e'+i} className="page-ellipsis">…</span>
            :<button key={p} className={`page-btn${page===p?' active':''}`} onClick={()=>setPage(p)}>{p}</button>
        )}
        <button className="page-btn" disabled={page>=totalPages||totalPages===0} onClick={()=>setPage(p=>p+1)}>⟩</button>
        <button className="page-btn" disabled={page>=totalPages||totalPages===0} onClick={()=>setPage(totalPages)}>⟩⟩</button>
      </div>
    </div>
  );
}

  const [search,setSearch]=useState('');

  const [sortKey,setSortKey]=useState(null);
  const [sortDir,setSortDir]=useState('asc');
  const [page,setPage]=useState(1);
  const [perPage,setPerPage]=useState(10);

  const handleSort=key=>{
    if(sortKey===key)setSortDir(d=>d==='asc'?'desc':'asc');
    else{setSortKey(key);setSortDir('asc');}
  };
  const SortIco=({col})=><span className="sort-both">{sortKey===col?(sortDir==='asc'?'↑':'↓'):'⇅'}</span>;

  const filtered=lobs
    .filter(l=>statusFilter==='All'||l.status===statusFilter)

  const sorted=sortKey?[...filtered].sort((a,b)=>{
    let av=a[sortKey],bv=b[sortKey];
    if(typeof av==='string')av=av.toLowerCase();
    if(typeof bv==='string')bv=bv.toLowerCase();
    return sortDir==='asc'?(av>bv?1:-1):(av<bv?1:-1);
  }):filtered;
  const totalPages=Math.max(1,Math.ceil(sorted.length/perPage));

                <td><button className="tbl-name-link" onClick={e=>{e.stopPropagation();onSelectLob(lob);}}>{lob.name}</button></td>

        <Pagination page={page} totalPages={totalPages} perPage={perPage} setPage={setPage} setPerPage={p=>{setPerPage(p);setPage(1);}}/>

  const [renamingId,setRenamingId]=useState(null);
  const [renameDraft,setRenameDraft]=useState('');

  const toggleL1=id=>setL1Items(items=>items.map(i=>i.id===id?{...i,expanded:!i.expanded}:i));

  const commitRename=()=>{if(renameDraft.trim()&&renamingId){const item=l1Items.find(i=>i.id===renamingId);if(renameDraft.trim()!==item?.name){setL1Items(items=>items.map(i=>i.id===renamingId?{...i,name:renameDraft.trim()}:i));addToast(`Renamed to "${renameDraft.trim()}"`);}setRenamingId(null);setRenameDraft('');}else{setRenamingId(null);}};
  const cancelRename=()=>{setRenamingId(null);setRenameDraft('');};
  const requestDelL1=id=>{const item=l1Items.find(i=>i.id===id);setShowMenu(null);onConfirm({title:'Delete Level 1 item',message:`Delete "${item?.name}"? This will remove its workspace tab.`,confirmLabel:'Delete',onConfirm:()=>{setL1Items(items=>items.filter(i=>i.id!==id));addToast(`"${item?.name}" deleted`,'warning');}});};
  const addL1=()=>{if(!addL1Name.trim())return;const id=addL1Name.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now();setL1Items(items=>[...items,{id,name:addL1Name.trim(),expanded:false,l2:[]}]);addToast(`"${addL1Name.trim()}" added`);setAddL1Name('');setShowAddL1(false);};

        {editingL0?<input className="sidebar__l0-input" value={l0Draft} onChange={e=>setL0Draft(e.target.value)} onBlur={commitL0} onKeyDown={e=>{if(e.key==='Enter')commitL0();if(e.key==='Escape'){setL0Draft(l0Name);setEditingL0(false);}}} autoFocus/>
        :<span className="sidebar__l0-name" title="Click to rename" onClick={()=>{setL0Draft(l0Name);setEditingL0(true);}}>{l0Name} <IC.Edit/></span>}
      </div>
      <div className="sidebar__divider"/>
      <div className="sidebar__l1-header"><span className="sidebar__level-lbl">Level : 1</span></div>
      <div className="sidebar__list-controls">
        <div className="sidebar__search-wrap">
          <span className="sidebar__search-icon"><IC.Search/></span>
          <input className="sidebar__search" placeholder="Search…" value={sidebarSearch} onChange={e=>setSidebarSearch(e.target.value)}/>
        </div>
        {l1Items.length>0&&<button className="sidebar__collapse-btn" onClick={toggleAllExpand}>{allExpanded?'⊖ All':'⊕ All'}</button>}

      <div className="sidebar__l1-list">

        {l1Items.length===0?<div className="sidebar__empty-l1"><IC.Layers/><p>No level 1 items yet.<br/>Add one below.</p></div>
        :filteredL1.map(item=>(

            <div className="sidebar__l1-row">

              <span className="sidebar__level-lbl sub">Level : 2</span>
              {item.l2.length===0?<p className="sidebar__empty-l2">There's no document type</p>
              :<ul className="sidebar__l2-list">{item.l2.map(l2=>(
                <li key={l2.id} className="sidebar__l2-item"><IC.Grid/><span>{l2.name}</span>
                  <button className="sidebar__l2-del" onClick={()=>delL2(item.id,l2.id,l2.name)}>×</button>

              {showAddL2===item.id?<div className="sidebar__add-input-wrap">
                <input ref={addL2Ref} className="sidebar__add-input" value={addL2Name} onChange={e=>setAddL2Name(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addL2(item.id);if(e.key==='Escape'){setShowAddL2(null);setAddL2Name('');}}} placeholder="Type name…"/>
                <div className="sidebar__add-actions">

      <div className="sidebar__add-l1-bar">
        {showAddL1?<div className="sidebar__add-l1-input-wrap">
          <input ref={addL1Ref} className="sidebar__add-l1-input" value={addL1Name} onChange={e=>setAddL1Name(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addL1();if(e.key==='Escape'){setShowAddL1(false);setAddL1Name('');}}} placeholder="Level 1 name…"/>
          <button className="sidebar__add-confirm" onClick={addL1} disabled={!addL1Name.trim()}>Add</button>

      </div>
    </aside>
  );

/* ── Workspace (Detail) ── */
const DEFAULT_TAB_META={version:'V.1',score:'N/A',status:'Draft'};

function WorkspaceTabs({l1Items,activeL1Tab,setActiveL1Tab,activeTab,setActiveTab,cbLevels}){
  const [showMore,setShowMore]=useState(false);
  const [moreSearch,setMoreSearch]=useState('');
  const [visibleCount,setVisibleCount]=useState(999);
  const outerRef=useRef(null);
  const tabRefs=useRef([]);
  const cachedW=useRef([]);
  const recalcRef=useRef(null);
  const MORE_W=100; // px reserved for "+N more" pill

  const allL1=[
    {id:'global',label:'Global',l2:[]},
    ...(cbLevels.l1?[{id:'l1',label:'L1 Classification',l2:[]}]:[]),
    ...(cbLevels.l2?l1Items.map(i=>({id:i.id,label:i.name,l2:i.l2})):[]),
  ];

  // Always keep recalcRef current so ResizeObserver closure doesn't go stale
  recalcRef.current=()=>{
    const outer=outerRef.current;
    if(!outer||cachedW.current.length===0)return;
    const avail=outer.offsetWidth-40; // 40px = 20px left + 20px right padding
    let used=0,count=0;
    for(let i=0;i<cachedW.current.length;i++){
      const w=cachedW.current[i]||80;
      const wouldHaveMore=count<cachedW.current.length-1;
      if(count>0&&used+w+(wouldHaveMore?MORE_W:0)>avail)break;
      used+=w;count++;
    }
    const n=Math.max(1,count);
    setVisibleCount(prev=>prev===n?prev:n);
  };

  // When tab count changes, reset so all tabs render visible for measurement
  useEffect(()=>{
    cachedW.current=[];
    setVisibleCount(999);
  },[allL1.length]);

  // After every render: cache widths of currently-visible tabs, then recalc
  useLayoutEffect(()=>{
    tabRefs.current.forEach((el,i)=>{
      if(el&&el.offsetWidth>0)cachedW.current[i]=el.offsetWidth;
    });
    recalcRef.current();
  });

  // Watch container resize
  useEffect(()=>{
    const outer=outerRef.current;
    if(!outer)return;
    const ro=new ResizeObserver(()=>recalcRef.current?.());
    ro.observe(outer);
    return()=>ro.disconnect();
  },[]);

  const hiddenAll=allL1.slice(visibleCount);
  const filtered=moreSearch?hiddenAll.filter(t=>t.label.toLowerCase().includes(moreSearch.toLowerCase())):hiddenAll;
  const hiddenCount=hiddenAll.length;
  const anyHiddenActive=hiddenAll.some(t=>t.id===activeL1Tab);
  const handleL1=id=>{setActiveL1Tab(id);setActiveTab(id);setShowMore(false);setMoreSearch('');};
  const activeL1Item=l1Items.find(i=>i.id===activeL1Tab);
  const l2Tabs=activeL1Item?.l2||[];

  return(
    <div className="workspace__tab-area">
      <div className="workspace__tabs workspace__tabs--l1" ref={outerRef}>
        {/* Inner div clips overflow; more-wrap sits outside so dropdown is never clipped */}
        <div className="workspace__tabs-inner">
          {allL1.map((t,i)=>(
            <button key={t.id} ref={el=>{tabRefs.current[i]=el;}}
              className={`workspace__tab${activeL1Tab===t.id?' active':''}${i>=visibleCount?' workspace__tab--hidden':''}`}
              onClick={()=>handleL1(t.id)}>{t.label}</button>
          ))}
        </div>
        {hiddenCount>0&&(
          <div className="workspace__more-wrap">
            <button className={`workspace__more-btn${anyHiddenActive?' active':''}`}
              onClick={e=>{e.stopPropagation();setShowMore(s=>!s);}}>
              +{hiddenCount} more <IC.ChevDown s={11}/>
            </button>
            {showMore&&(
              <div className="workspace__more-menu" onClick={e=>e.stopPropagation()}>
                <input className="workspace__more-search" placeholder="Search tabs…"
                  value={moreSearch} onChange={e=>setMoreSearch(e.target.value)} autoFocus/>
                <div style={{maxHeight:'220px',overflowY:'auto'}}>
                  {filtered.map(t=>(
                    <button key={t.id} className={`workspace__more-item${activeL1Tab===t.id?' active':''}`}
                      onClick={()=>handleL1(t.id)}>{t.label}</button>
                  ))}
                  {filtered.length===0&&<div style={{padding:'8px 14px',fontSize:'12px',color:'#9ca3af'}}>No results</div>}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
      {l2Tabs.length>0&&(
        <div className="workspace__tabs workspace__tabs--l2">
          {l2Tabs.map(l2=>(
            <button key={l2.id} className={`workspace__tab workspace__tab--l2${activeTab===l2.id?' active':''}`}
              onClick={()=>setActiveTab(l2.id)}>{l2.name}</button>
          ))}
        </div>
      )}
    </div>
  );
}

function Workspace({activeL1Tab,setActiveL1Tab,activeTab,setActiveTab,l1Items,prompts,defaultPrompts,tabMeta,saveStates,onEdit,onSave,onVersion,onPreview,onTest,cbLevels}){
  const getMeta=tabId=>{
    if(tabId==='global')return{version:'1.0',score:'N/A',status:'Active',title:'Global Prompt'};
    const base=tabMeta?.[tabId]||DEFAULT_TAB_META;
    if(tabId==='l1')return{...base,title:'Level 1 : Classification'};
    const item=l1Items.find(i=>i.id===tabId);
    if(item)return{...base,title:`Level 2 : ${item.name}`};
    for(const l1 of l1Items){const l2=l1.l2.find(x=>x.id===tabId);if(l2)return{...base,title:`${l1.name}  ›  ${l2.name}`};}
    return{...base,title:tabId};
  };
  const getCtx=tabId=>{
    if(tabId==='global')return{level:'global',chip:'Global',scope:'Base instructions · inherited by all levels'};
    if(tabId==='l1')return{level:'l1',chip:'L1',scope:'Classifies documents into categories'};
    const item=l1Items.find(i=>i.id===tabId);
    if(item)return{level:'l2',chip:'L2',scope:`Within ${item.name}`};
    for(const l1 of l1Items){const l2=l1.l2.find(x=>x.id===tabId);if(l2)return{level:'l2',chip:'L2',scope:`${l1.name} › ${l2.name}`};}
    return{level:'l1',chip:'',scope:''};
  };
  const [showResetConfirm,setShowResetConfirm]=useState(false);
  useEffect(()=>setShowResetConfirm(false),[activeTab]);
  const meta=getMeta(activeTab);
  const ctx=getCtx(activeTab);
  const prompt=prompts[activeTab]||'';
  const ss=saveStates[activeTab];
  const showWarn=activeTab==='l1'&&!prompt.includes('{{CLASSIFICATION_HIERARCHY}}');
  const found=[...new Set(prompt.match(/\{\{[^}]+\}\}/g)||[])];
  const missing=['{{CLASSIFICATION_HIERARCHY}}'].filter(p=>!prompt.includes(p));
  const doReset=()=>{onEdit(activeTab,defaultPrompts?.[activeTab]||'');setShowResetConfirm(false);};
  return(
    <main className="workspace">
      <div className="workspace__header"><span className="workspace__title">Classification Prompts</span></div>
      <WorkspaceTabs l1Items={l1Items} activeL1Tab={activeL1Tab} setActiveL1Tab={setActiveL1Tab} activeTab={activeTab} setActiveTab={setActiveTab} cbLevels={cbLevels}/>
      <div className="workspace__body">
        <div className="workspace__lv-header">
          <h3 className="workspace__lv-title">{meta.title}</h3>
          <button className="workspace__manage-btn" onClick={onVersion}>Manage version</button>
        </div>
        <div className="workspace__ver-card">
          <div className="workspace__ver-item"><span className="workspace__ver-lbl">Version</span><span className="workspace__ver-val">{meta.version}</span></div>
          <div className="workspace__ver-div"/>
          <div className="workspace__ver-item"><span className="workspace__ver-lbl">Confidence score</span><span className="workspace__ver-val">{meta.score}</span></div>
          <div className="workspace__ver-div"/>
          <div className="workspace__ver-item"><span className="workspace__ver-lbl">Status</span><span className={`workspace__status ${meta.status.toLowerCase()}`}>{meta.status}</span></div>
        </div>
        {showWarn&&<div className="workspace__warn"><IC.Warn/><span>The <code>{'{{CLASSIFICATION_HIERARCHY}}'}</code> placeholder is required</span></div>}
        <div className="workspace__prompt-sec">
          <div className="workspace__prompt-hdr">
            <div style={{display:'flex',alignItems:'center',gap:'6px',minWidth:0,overflow:'hidden'}}>
              <span className={`prompt-ctx-chip prompt-ctx-chip--${ctx.level}`}>{ctx.chip}</span>
              <span className="workspace__prompt-lbl">Classification prompt</span>
              {ctx.scope&&<span className="prompt-ctx-scope">· {ctx.scope}</span>}

              {ss==='unsaved'&&<span className="save-indicator unsaved">● Unsaved changes</span>}
              {ss==='saved'&&<span className="save-indicator saved"><IC.Check/> Saved</span>}
              <button className="workspace__reset-btn" onClick={()=>setShowResetConfirm(true)}>Reset</button>
            </div>
          </div>
          <textarea className="workspace__textarea" value={prompt} onChange={e=>onEdit(activeTab,e.target.value)} spellCheck={false}/>
          {showResetConfirm&&<div className="reset-confirm">
            <span>Reset prompt to default? This will discard all changes.</span>
            <div className="reset-confirm__actions">
              <button className="btn-sm btn-outline" onClick={()=>setShowResetConfirm(false)}>Cancel</button>
              <button className="btn-sm btn-danger" onClick={doReset}>Reset</button>
            </div>
          </div>}
          <div className="prompt-footer">
            <div className="placeholder-row">
              {(found.length>0||missing.length>0)&&<span className="placeholder-row__lbl">Placeholders:</span>}
              {found.map(p=><span key={p} className="ph-badge found"><IC.Check/> {p}</span>)}
              {missing.map(p=><span key={p} className="ph-badge missing">⚠ {p}</span>)}
            </div>
            <span className="char-count">{prompt.length.toLocaleString()} chars</span>
          </div>
        </div>
        <div className="workspace__actions">
          <button className="workspace__preview-link" onClick={onPreview}>View full prompt</button>
          <button className="workspace__btn primary" onClick={()=>{onSave(activeTab);onTest();}}>Test prompt</button>
        </div>
      </div>
    </main>
  );
}

  const allCount=allDocs.length,testedCount=allDocs.filter(d=>d.status==='Tested').length,pendCount=allDocs.filter(d=>d.status==='Pending').length;
  const selCount=allDocs.filter(d=>d.selected).length,allSel=docs.length>0&&docs.every(d=>d.selected);
  return(
    <aside className="doc-panel">
      <div className="doc-panel__upload">
        <p className="doc-panel__sec-title">Upload test document</p>
        <div className={`doc-panel__dropzone${dragOver?' drag-over':''}`}
          onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
          onDrop={e=>{e.preventDefault();setDragOver(false);handleUpload(e.dataTransfer.files);}}
          onClick={()=>fileRef.current?.click()}>
          <input ref={fileRef} type="file" accept=".jpg,.jpeg,.png,.pdf" multiple style={{display:'none'}} onChange={e=>handleUpload(e.target.files)}/>

      <div className="doc-panel__docs">
        <p className="doc-panel__sec-title">Documents</p>
        <div className="doc-panel__search-wrap"><span className="doc-panel__search-icon"><IC.Search/></span>
          <input className="doc-panel__search" placeholder="Search documents…" value={search} onChange={e=>setSearch(e.target.value)}/>
          {search&&<button className="search-clear-btn" onClick={()=>setSearch('')}>×</button>}</div>
        <div className="doc-panel__filters">
          {[['all','All',allCount],['tested','Tested',testedCount],['pending','Pending',pendCount]].map(([id,lbl,cnt])=>(
            <button key={id} className={`doc-panel__filter-btn${filter===id?' active':''}`} onClick={()=>setFilter(id)}>

          <button className="doc-panel__sel-all" onClick={selAll}>{allSel&&docs.length>0?'Deselect all':'Select all'}</button>
        </div>
        <div className="doc-panel__list">
          {docs.length===0?<div className="doc-panel__empty">{search?'No results found':'No documents found'}</div>
          :docs.map(doc=>(
            <div key={doc.id} className={`doc-panel__item${doc.selected?' selected':''}`}>
              <input type="checkbox" className="doc-panel__cb" checked={doc.selected} onChange={()=>toggleSel(doc.id)}/>
              <span className="doc-panel__file-icon"><IC.File/></span>
              <span className="doc-panel__file-name" title={doc.name}>{doc.name}</span>
              <span className={`doc-panel__status ${doc.status.toLowerCase()}`}>{doc.status}</span>
              <button className="doc-panel__del" onClick={()=>delDoc(doc.id)} title="Delete"><IC.Trash/></button>
            </div>

    </aside>
  );
}

function TestModal({prompt,docs,onMarkTested,onClose}){
  const pending=(docs||[]).filter(d=>d.status==='Pending');
  const [selDoc,setSelDoc]=useState(()=>pending[0]?.id||null);
  const [running,setRunning]=useState(false);
  const [result,setResult]=useState(null);
  const [showPrompt,setShowPrompt]=useState(false);
  const run=()=>{
    setRunning(true);setResult(null);
    const doc=docs.find(d=>d.id===selDoc);
    const fname=(doc?.name||'').toLowerCase();
    // Derive mock result from filename keywords
    const classify=()=>{
      if(fname.includes('fnol')||fname.includes('claim_notif'))return{c:'FNOL',sc:96,r:'Document contains incident date, vehicle details, and "first notice of loss" form structure.'};
      if(fname.includes('repair_inv')||fname.includes('repair_invoice'))return{c:'Repair Invoice',sc:94,r:'Garage letterhead, labour hours breakdown, parts list, and total cost with VAT — consistent with a completed repair invoice.'};
      if(fname.includes('estimate'))return{c:'Estimate',sc:92,r:'Pre-repair cost estimate with "subject to inspection" language. No completion date or authorisation number present.'};
      if(fname.includes('police_report')||fname.includes('police_rep'))return{c:'Police Report',sc:97,r:'Official police station header, officer badge number, incident CAD reference, and official stamp detected.'};
      if(fname.includes('quotation')||fname.includes('quote'))return{c:'Quotation',sc:93,r:'Vehicle details, premium calculation breakdown, and validity period found. No policy number assigned — pre-binding stage.'};
      if(fname.includes('renewal'))return{c:'Renewal Quote',sc:91,r:'Existing policy number present alongside renewal effective date and prior year premium comparison.'};
      if(fname.includes('complaint'))return{c:'Simple Complaint',sc:88,r:'Customer dissatisfaction language detected. Single grievance, no regulatory escalation or legal references.'};
      if(fname.includes('schadenmeldung')||fname.includes('kfz'))return{c:'KFZ Schaden',sc:95,r:'German motor damage claim. KFZ-Kennzeichen and Schadennummer detected. Consistent with Schadenmeldung structure.'};
      if(fname.includes('versicherungsschein')||fname.includes('police'))return{c:'Versicherungsschein',sc:94,r:'German policy document. Versicherungsscheinnummer and Versicherungsnehmer fields present.'};
      if(fname.includes('eho')||fname.includes('inspection'))return{c:'EHO Inspection Report',sc:90,r:'Local authority header, food hygiene rating scale, and improvement notice section detected.'};
      if(fname.includes('pre_auth')||fname.includes('preauth'))return{c:'Pre-Authorisation Request',sc:89,r:'Consultant referral language, ICD-10 code field, and proposed treatment plan present. No invoice amount — pre-treatment stage.'};
      if(fname.includes('survey')||fname.includes('rics'))return{c:'RICS Valuation Survey',sc:91,r:'RICS-accredited surveyor credentials, rebuild cost figure, and property risk features section detected.'};
      if(fname.includes('cargo')||fname.includes('lading'))return{c:'Cargo Claim',sc:93,r:'Bill of Lading number, outturn report reference, and cargo damage description consistent with marine cargo claim.'};
      if(fname.includes('hull'))return{c:'Hull Claim',sc:90,r:'IMO vessel number, collision damage description, and repair yard estimate present — consistent with hull insurance claim.'};
      if(fname.includes('subsidence'))return{c:'Subsidence Claim',sc:87,r:'Structural engineer report, crack mapping reference, and soil investigation findings consistent with subsidence damage claim.'};
      if(fname.includes('annual')||fname.includes('schedule'))return{c:'Annual Policy Schedule',sc:95,r:'12-month coverage period, policy number, named insured, and insurer stamp detected — consistent with annual policy schedule.'};
      if(fname.includes('cancel')||fname.includes('kuendigung'))return{c:'Cancellation',sc:93,r:'Effective cancellation date, reason for cancellation, and pro-rata refund calculation present.'};
      if(fname.includes('endorse')||fname.includes('nachtrag'))return{c:'Endorsement / Nachtrag',sc:92,r:'References original policy number with a specific amendment effective date — consistent with a policy endorsement.'};
      if(fname.includes('witness'))return{c:'Witness Statement',sc:94,r:'Third-party witness name, contact details, and declaration of truth with dated signature detected.'};
      if(fname.includes('photo')||fname.includes('.jpg'))return{c:'Accident Photos',sc:85,r:'Multi-angle vehicle damage photographs with embedded timestamps. Scene context visible — consistent with accident evidence submission.'};
      return{c:'Policy Document',sc:82,r:'Insurance-related document structure detected. Specific sub-type could not be determined with high confidence — recommend manual review.'};
    };
    const{c,sc,r}=classify();
    const jitter=Math.round((Math.random()*3-1.5)*10)/10;
    setTimeout(()=>{
      setResult({classification:c,confidence:`${Math.min(99,Math.max(60,sc+jitter)).toFixed(1)}%`,reasoning:r});
      setRunning(false);
      if(selDoc)onMarkTested(selDoc);
    },1800);
  };
  return(<div className="modal-overlay" onClick={onClose}><div className="modal lg" onClick={e=>e.stopPropagation()}>
    <div className="modal__header"><h3>Test Prompt</h3><button className="modal__close" onClick={onClose}>×</button></div>
    <div className="modal__body"><div className="test-modal">
      <div className="test-doc-section">
        <h4>Test against</h4>
        {pending.length===0
          ?<div className="test-doc-none">No pending documents — upload a file first to test against real content.</div>
          :<div className="test-doc-list">{pending.map(d=>(
            <label key={d.id} className={`test-doc-item${selDoc===d.id?' selected':''}`} onClick={()=>setSelDoc(d.id)}>
              <input type="radio" name="testDoc" checked={selDoc===d.id} onChange={()=>setSelDoc(d.id)}/>
              <IC.File/><span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.name}</span>
            </label>
          ))}</div>
        }
      </div>
      <button className="test-prompt-toggle" onClick={()=>setShowPrompt(s=>!s)}>
        {showPrompt?'▾':'▸'} {showPrompt?'Hide prompt':'View prompt being tested'}
      </button>
      {showPrompt&&<div className="preview-box" style={{marginBottom:'12px'}}><pre>{prompt}</pre></div>}
      {running&&<div className="test-running"><div className="test-spinner"/><span>Running classification test…</span></div>}
      {result&&<div className="test-result-section"><h4>Result</h4><div className="test-result">
        <div className="test-result__item"><span className="test-result__label">Classification:</span><span className="test-result__value">{result.classification}</span></div>
        <div className="test-result__item"><span className="test-result__label">Confidence:</span><span className="test-result__value">{result.confidence}</span></div>
        <div className="test-result__item"><span className="test-result__label">Reasoning:</span><span className="test-result__value">{result.reasoning}</span></div>
      </div></div>}
    </div></div>
    <div className="modal__footer">
      <button className="btn btn-outline" onClick={onClose}>Close</button>
      <button className="btn btn-primary" onClick={run} disabled={running}>{running?'Running…':result?'Run again':'Run Test'}</button>
    </div>
  </div></div>);
}

function OutputFormatModal({lobs,schemas:initSchemas,onSave,activeLobId,onClose}){
  // Auto-expand: use activeLobId if provided, else first LOB that has types
  const [expandedLobs,setExpandedLobs]=useState(()=>{
    const e={};
    const target=activeLobId
      ?lobs.find(l=>l.id===activeLobId)
      :lobs.find(l=>l.categories.some(c=>c.types.length>0));
    if(target)e[target.id]=true;
    return e;
  });
  const [expandedCats,setExpandedCats]=useState(()=>{
    // Auto-expand first category with types in the target LOB
    const e={};
    const target=activeLobId?lobs.find(l=>l.id===activeLobId):lobs.find(l=>l.categories.some(c=>c.types.length>0));
    if(target){const cat=target.categories.find(c=>c.types.length>0);if(cat)e[cat.id+target.id]=true;}
    return e;
  });
  const [sel,setSel]=useState(null); // {lobId,catId,typeId,lobName,catName,typeName}
  const [schemas,setSchemas]=useState(initSchemas||{});  // initialized from persisted state
  const [jsonMode,setJsonMode]=useState(false);
  const [showImport,setShowImport]=useState(false);

  const toggleLob=id=>setExpandedLobs(e=>({...e,[id]:!e[id]}));
  const toggleCat=id=>setExpandedCats(e=>({...e,[id]:!e[id]}));
  const getSchema=tid=>schemas[tid]||[];
  const setSchema=(tid,fields)=>setSchemas(s=>({...s,[tid]:fields}));

  const selectType=(lob,cat,type)=>{
    setSel({lobId:lob.id,catId:cat.id,typeId:type.id,lobName:lob.name,catName:cat.name,typeName:type.name});
    setJsonMode(false);setShowImport(false);
  };

  const addField=()=>{
    if(!sel)return;
    setSchema(sel.typeId,[...getSchema(sel.typeId),{id:Date.now().toString(),name:'',type:'string',required:false,description:''}]);
  };
  const updateField=(tid,fid,key,val)=>setSchema(tid,getSchema(tid).map(f=>f.id===fid?{...f,[key]:val}:f));
  const deleteField=(tid,fid)=>setSchema(tid,getSchema(tid).filter(f=>f.id!==fid));
  const importTemplate=name=>{
    if(!sel)return;
    setSchema(sel.typeId,OF_TEMPLATES[name].map(f=>({...f,id:Date.now().toString()+Math.random()})));
    setShowImport(false);
  };

  const toJson=()=>{
    if(!sel)return '// Select a document type from the tree';
    const fields=getSchema(sel.typeId);
    if(!fields.length)return '// No fields defined yet\n// Click "+ Add field" or import a template';
    const schema=Object.fromEntries(fields.filter(f=>f.name).map(f=>[f.name,{
      type:f.type,...(f.required?{required:true}:{}),...(f.description?{description:f.description}:{})
    }]));
    return JSON.stringify({document_type:sel.typeName,schema},null,2);
  };

  const fields=sel?getSchema(sel.typeId):[];
  // Scope tree: if opened from a specific LOB, show only that LOB; otherwise show all
  const scopedLobs=activeLobId
    ?lobs.filter(l=>l.id===activeLobId)
    :lobs.filter(l=>l.categories.some(c=>c.types.length>0));

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal of-modal" onClick={e=>e.stopPropagation()}>
        <div className="modal__header">
          <h3>Output Format{activeLobId&&scopedLobs[0]?` — ${scopedLobs[0].name}`:''}</h3>
          <button className="modal__close" onClick={onClose}>×</button>
        </div>
        <div className="modal__body">
          {/* ── Left tree ── */}
          <div className="of-tree">
            {scopedLobs.length===0&&<div style={{padding:'12px',fontSize:'12px',color:'#9ca3af'}}>No document types defined</div>}
            {scopedLobs.map(lob=>(
              <div key={lob.id} className="of-tree__lob">
                <button className="of-tree__lob-btn" onClick={()=>toggleLob(lob.id)}
                  style={activeLobId?{cursor:'default',fontWeight:600}:{}}>
                  {!activeLobId&&<span style={{fontSize:'10px',opacity:.7}}>{expandedLobs[lob.id]?'▾':'▸'}</span>}
                  {lob.name}
                </button>
                {expandedLobs[lob.id]&&lob.categories.filter(c=>c.types.length>0).map(cat=>(
                  <div key={cat.id}>
                    <button className="of-tree__cat-btn" onClick={()=>toggleCat(cat.id+lob.id)}>
                      <span style={{fontSize:'10px',opacity:.7}}>{expandedCats[cat.id+lob.id]?'▾':'▸'}</span>
                      {cat.name}
                    </button>
                    {expandedCats[cat.id+lob.id]&&cat.types.map(type=>(
                      <button key={type.id}
                        className={`of-tree__type-btn${sel?.typeId===type.id?' active':''}`}
                        onClick={()=>selectType(lob,cat,type)}>
                        {type.name}
                        {schemas[type.id]?.length>0&&<span className="of-type-badge">{schemas[type.id].length}</span>}
                      </button>
                    ))}
                  </div>
                ))}
              </div>
            ))}
          </div>

          {/* ── Right schema panel ── */}
          <div className="of-schema" onClick={()=>setShowImport(false)}>
            {!sel?(
              <div className="of-no-sel">
                <span style={{fontSize:'32px'}}>🗂️</span>
                <span>Select a document type from the tree<br/>to define its extraction schema</span>
              </div>
            ):(
              <>
                <div className="of-schema__hdr">
                  <div>
                    <div className="of-schema__title">{sel.typeName}</div>
                    <div className="of-schema__path">{sel.lobName} › {sel.catName} › {sel.typeName}</div>
                  </div>
                  <div className="of-schema__actions">
                    <button className={`btn btn-sm${jsonMode?' btn-primary':' btn-outline'}`}
                      onClick={()=>setJsonMode(m=>!m)}>
                      {jsonMode?'Field view':'JSON view'}
                    </button>
                    {!jsonMode&&<>
                      <div className="import-dd" onClick={e=>e.stopPropagation()}>
                        <button className="btn btn-outline btn-sm"
                          onClick={()=>setShowImport(s=>!s)}>
                          Import template ▾
                        </button>
                        {showImport&&(
                          <div className="import-dd__menu">
                            {Object.keys(OF_TEMPLATES).map(t=>(
                              <button key={t} className="import-dd__item" onClick={()=>importTemplate(t)}>{t}</button>
                            ))}
                          </div>
                        )}
                      </div>
                      <button className="btn btn-primary btn-sm" onClick={addField}><IC.Plus s={11}/> Add field</button>
                    </>}
                  </div>
                </div>
                {jsonMode?(
                  <pre className="of-json">{toJson()}</pre>
                ):(
                  <div className="of-table-wrap">
                    <table className="of-table">
                      <thead><tr>
                        <th style={{width:'22%'}}>Field name</th>
                        <th style={{width:'15%'}}>Data type</th>
                        <th style={{width:'9%',textAlign:'center'}}>Required</th>
                        <th>Description</th>
                        <th style={{width:'36px'}}></th>
                      </tr></thead>
                      <tbody>
                        {fields.length===0?(
                          <tr><td colSpan={5} className="of-empty-row">
                            No fields yet — click "+ Add field" or import a template
                          </td></tr>
                        ):fields.map(f=>(
                          <tr key={f.id}>
                            <td><input className="of-field-input" placeholder="field_name" value={f.name}
                              onChange={e=>updateField(sel.typeId,f.id,'name',e.target.value)}/></td>
                            <td>
                              <select className="of-type-sel" value={f.type}
                                onChange={e=>updateField(sel.typeId,f.id,'type',e.target.value)}>
                                {OF_FIELD_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                              </select>
                            </td>
                            <td style={{textAlign:'center'}}>
                              <input type="checkbox" className="of-req-cb" checked={f.required}
                                onChange={e=>updateField(sel.typeId,f.id,'required',e.target.checked)}/>
                            </td>
                            <td><input className="of-field-input" placeholder="Field description…" value={f.description}
                              onChange={e=>updateField(sel.typeId,f.id,'description',e.target.value)}/></td>
                            <td>
                              <button className="of-del-btn" title="Remove field"
                                onClick={()=>deleteField(sel.typeId,f.id)}><IC.Trash/></button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
        <div className="modal__footer">
          <button className="btn btn-outline" onClick={onClose}>Discard</button>
          <button className="btn btn-primary" onClick={()=>onSave(schemas)}>Save schema</button>
        </div>
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const {toasts,addToast,removeToast}=useToast();
  const [page,setPage]=useState('lob-overview');
  const [activeNav,setActiveNav]=useState('classification');
  const [selectedLob,setSelectedLob]=useState(null);
  const [typesModal,setTypesModal]=useState(null); // {lob, category}
  const [showOutputFormat,setShowOutputFormat]=useState(false);
  const [ofSchemas,setOfSchemas]=useState({});
  const [tabMeta,setTabMeta]=useState({});       // persists across modal open/close
  const [ofActiveLobId,setOfActiveLobId]=useState(null); // pre-selects LOB in tree
  const [menus,setMenusState]=useState({user:false,tenant:false,lang:false});
  const setMenu=key=>setMenusState(m=>Object.fromEntries(Object.keys(m).map(k=>[k,k===key?!m[k]:false])));
  const handleNav=nav=>{
    if(nav==='home'){setPage('dashboard');setActiveNav('home');return;}
    if(nav==='classification'){setPage('lob-overview');setActiveNav('classification');return;}
    addToast(`${nav.charAt(0).toUpperCase()+nav.slice(1)} section coming soon`,'info');
  };

  const [lobs,setLobs]=useState(INIT_LOBS);
  const updateLobData=updated=>setLobs(ls=>ls.map(l=>l.id===updated.id?updated:l));
  

  /* Detail page state — initialized from selected LOB */
  const [selectedLobId,setSelectedLobId]=useState(null);
  const [cbLevels,setCbLevels]=useState({l1:true,l2:false});
  const [l1Items,setL1Items]=useState([]);
  const [l0Name,setL0Name]=useState('');
  const [activeL1Tab,setActiveL1Tab]=useState('l1');
  const [activeTab,setActiveTab]=useState('l1');
  const [prompts,setPrompts]=useState({});
  const [defaultPrompts,setDefaultPrompts]=useState({});
  const [saveStates,setSaveStates]=useState({});
  const saveTimers=useRef({});
  const [showMenu,setShowMenu]=useState(null);
  const [modal,setModal]=useState(null);
  const [confirmState,setConfirmState]=useState(null);
  const [docs,setDocs]=useState(makeDocs());
  const [filter,setFilter]=useState('pending');
  const [search,setSearch]=useState('');

  const onSelectLob=lob=>{
    setSelectedLob(lob);
    setPage('category-overview');
    setActiveNav('classification');
  };

  const deleteLob=lobId=>{
    setLobs(ls=>ls.filter(l=>l.id!==lobId));
    setPage('lob-overview');
    addToast('LOB deleted','warning');
  };
  const deleteCategory=(lobId,catId)=>{
    setLobs(ls=>ls.map(l=>l.id===lobId?{...l,categories:l.categories.filter(c=>c.id!==catId)}:l));
    addToast('Category deleted','warning');
  };
  const addCategory=(lobId,name)=>{
    const c={id:`cat-${Date.now()}`,name,activeVersion:'V.1',status:'Draft',confidence:0,trainedBy:'',prompt:'',types:[]};
    setLobs(ls=>ls.map(l=>l.id===lobId?{...l,categories:[...l.categories,c]}:l));
    addToast(`Category "${name}" added`);
  };
  const addType=(lobId,catId,name)=>{
    const t={id:`type-${Date.now()}`,name,tags:[],prompt:''};
    setLobs(ls=>ls.map(l=>l.id===lobId?{...l,categories:l.categories.map(c=>c.id===catId?{...c,types:[...c.types,t]}:c)}:l));
    addToast(`Type "${name}" added`);
  };

  const onSelectCategory=(lob,cat)=>{
    if(cat.types.length>0){
      setTypesModal({lob,category:cat});
    } else {
      onManagePrompt(lob,cat,null);
    }
  };

  const onManagePrompt=(lob,cat,type)=>{
    const newL1Items=lob.categories.map(c=>({
      id:c.id, name:c.name, expanded:false,
      l2:c.types.map(t=>({id:t.id, name:t.name}))
    }));
    const newPrompts={
      global:GLOBAL_PROMPT,
      l1:lob.lobPrompt||'',
      ...lob.categories.reduce((acc,c)=>{
        acc[c.id]=c.prompt||'';
        c.types.forEach(t=>{acc[t.id]=t.prompt||'';});
        return acc;
      },{})
    };
    // Build tab meta from live lob data
    const meta={
      global:{version:'1.0',score:'N/A',status:'Active'},
      l1:{version:lob.classLv1Version||'V.1',score:`${lob.confidence}%`,status:lob.status},
    };
    lob.categories.forEach(c=>{
      meta[c.id]={version:c.activeVersion||'V.1',score:`${c.confidence}%`,status:c.status};
      c.types.forEach(t=>{meta[t.id]={version:c.activeVersion||'V.1',score:`${c.confidence}%`,status:c.status};});
    });
    const startTab=type?type.id:cat?cat.id:'l1';
    const startL1Tab=cat?cat.id:'l1';
    setSelectedLobId(lob.id);
    setL1Items(newL1Items);
    setL0Name(lob.name);
    setPrompts(newPrompts);
    setDefaultPrompts(newPrompts);
    setTabMeta(meta);
    setSaveStates({});
    setActiveTab(startTab);
    setActiveL1Tab(startL1Tab);
    setPage('detail');
    setActiveNav('classification');
  };

  const onBackToList=()=>{
    setPage('category-overview');
  };

  const handleEdit=useCallback((tabId,value)=>{
    setPrompts(p=>({...p,[tabId]:value}));
    setSaveStates(s=>({...s,[tabId]:'unsaved'}));
    clearTimeout(saveTimers.current[tabId]);
    saveTimers.current[tabId]=setTimeout(()=>setSaveStates(s=>({...s,[tabId]:'saved'})),1500);
  },[]);
  const handleSave=useCallback(tabId=>{clearTimeout(saveTimers.current[tabId]);setSaveStates(s=>({...s,[tabId]:'saved'}));addToast('Prompt saved');},[addToast]);

  const filteredDocs=docs.filter(d=>filter==='all'||d.status.toLowerCase()===filter).filter(d=>!search||d.name.toLowerCase().includes(search.toLowerCase()));
  const toggleSel=id=>setDocs(ds=>ds.map(d=>d.id===id?{...d,selected:!d.selected}:d));
  const selAll=()=>{const ids=new Set(filteredDocs.map(d=>d.id));const all=filteredDocs.every(d=>d.selected);setDocs(ds=>ds.map(d=>ids.has(d.id)?{...d,selected:!all}:d));};
  const delDoc=id=>{setDocs(ds=>ds.filter(d=>d.id!==id));addToast('Document removed','warning');};
  const markTested=id=>setDocs(ds=>ds.map(d=>d.id===id?{...d,status:'Tested',selected:false}:d));
  const selCount=docs.filter(d=>d.selected).length;
  const bulkDelete=()=>{setDocs(ds=>ds.filter(d=>!d.selected));addToast(`${selCount} document(s) deleted`,'warning');};
  const handleUpload=files=>{
    const all=Array.from(files);
    const valid=all.filter(f=>['image/jpeg','image/png','application/pdf'].includes(f.type)&&f.size<=5*1024*1024);
    const badType=all.filter(f=>!['image/jpeg','image/png','application/pdf'].includes(f.type));
    const tooBig=all.filter(f=>f.type&&f.size>5*1024*1024);
    valid.forEach(f=>setDocs(prev=>[...prev,{id:Date.now()+Math.random(),name:f.name,status:'Pending',selected:false}]));
    if(valid.length>0)addToast(`${valid.length} file(s) uploaded`,'success');
    if(badType.length>0)addToast(`${badType.length} file(s) rejected — PDF/JPG/PNG only`,'error');
    if(tooBig.length>0)addToast(`${tooBig.length} file(s) rejected — max 5MB`,'error');
  };

  useEffect(()=>{
    const validTabs=new Set(['global']);
    if(cbLevels.l1)validTabs.add('l1');
    if(cbLevels.l2)l1Items.forEach(i=>{validTabs.add(i.id);i.l2.forEach(l2=>validTabs.add(l2.id));});
    if(!validTabs.has(activeTab)){
      // Prefer L1 when coming from L2, else fall back to Global
      const fallback=(activeTab!=='l1'&&cbLevels.l1)?'l1':'global';
      setActiveTab(fallback);setActiveL1Tab(fallback);
    }
  },[l1Items,cbLevels]);

  useEffect(()=>{
    const handler=e=>{
      if(e.key==='Escape'){setModal(null);setConfirmState(null);}
      if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();handleSave(activeTab);}
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[activeTab,handleSave]);

  const closeAll=()=>{setMenusState({user:false,tenant:false,lang:false});setShowMenu(null);};
  const selectedLobFromState=lobs.find(l=>l.id===selectedLobId)||selectedLob;

  return(
    <div className="app" onClick={closeAll}>
      <NavBar activeNav={activeNav} onNav={handleNav} menus={menus} setMenu={setMenu}/>

      {page==='dashboard'&&<Dashboard lobs={lobs} onNavigate={nav=>{if(nav==='config-list'){setPage('config-list');setActiveNav('classification');}else addToast(`${nav} coming soon`,'info');}}/>}

      {page==='lob-overview'&&<LobOverview lobs={lobs} onSelectLob={onSelectLob} addToast={addToast}
        onOpenOutputFormat={()=>{setOfActiveLobId(null);setShowOutputFormat(true);}}
        onConfirm={setConfirmState} onDeleteLob={deleteLob}/>}

      {page==='category-overview'&&selectedLob&&<CategoryOverview
        lob={lobs.find(l=>l.id===selectedLob.id)||selectedLob}
        onBack={()=>setPage('lob-overview')}
        onSelectCategory={onSelectCategory}
        onManagePrompt={onManagePrompt}
        onOpenOutputFormat={()=>{setOfActiveLobId(selectedLob.id);setShowOutputFormat(true);}}
        onConfirm={setConfirmState}
        onAddCategory={addCategory}
        onDeleteCategory={deleteCategory}
        addToast={addToast}/>}

      {page==='detail'&&<>
        <div className="app__sub-bar">
          <span className="app__breadcrumb">Classification › {selectedLob?.name||''} › Prompt management</span>
        </div>
        <div className="app__back-bar">
          <button className="app__back-btn" onClick={onBackToList}><IC.Back/> Back to Categories</button>
        </div>
        <div className="app__content">
          <Sidebar cbLevels={cbLevels} setCbLevels={setCbLevels} l0Name={l0Name} setL0Name={setL0Name}
            l1Items={l1Items} setL1Items={setL1Items} showMenu={showMenu} setShowMenu={setShowMenu}
            addToast={addToast} onConfirm={setConfirmState}/>
          <Workspace activeL1Tab={activeL1Tab} setActiveL1Tab={setActiveL1Tab} activeTab={activeTab} setActiveTab={setActiveTab} l1Items={l1Items}
            prompts={prompts} defaultPrompts={defaultPrompts} tabMeta={tabMeta} saveStates={saveStates}
            onEdit={handleEdit} onSave={handleSave} cbLevels={cbLevels}
            onVersion={()=>setModal('version')} onPreview={()=>setModal('preview')} onTest={()=>setModal('test')}/>
          <DocumentPanel docs={filteredDocs} allDocs={docs} filter={filter} setFilter={setFilter}
            search={search} setSearch={setSearch} toggleSel={toggleSel} selAll={selAll}
            delDoc={delDoc} bulkDelete={bulkDelete} handleUpload={handleUpload}/>
        </div>
        {modal==='version'&&<VersionModal lob={selectedLobFromState} onClose={()=>setModal(null)}/>}
        {modal==='preview'&&<PreviewModal prompt={prompts[activeTab]||''} onClose={()=>setModal(null)}/>}
        {modal==='test'&&<TestModal prompt={prompts[activeTab]||''} docs={docs} onMarkTested={markTested} onClose={()=>setModal(null)}/>}
      </>}

      {typesModal&&(()=>{
        const freshLob=lobs.find(l=>l.id===typesModal.lob.id)||typesModal.lob;
        const freshCat=freshLob.categories.find(c=>c.id===typesModal.category.id)||typesModal.category;
        return <TypesModal
          lob={freshLob} category={freshCat}
          onClose={()=>setTypesModal(null)}
          onManagePrompt={(lob,cat,type)=>{setTypesModal(null);onManagePrompt(lob,cat,type);}}
          onAddType={addType}
          addToast={addToast}/>;
      })()}

      {confirmState&&<div className="modal-overlay" onClick={()=>setConfirmState(null)}>
        <div className="confirm-dialog" onClick={e=>e.stopPropagation()}>
          <div className="confirm-dialog__icon">⚠️</div>
          <div className="confirm-dialog__title">{confirmState.title}</div>
          <p className="confirm-dialog__msg">{confirmState.message}</p>
          <div className="confirm-dialog__actions">
            <button className="btn btn-outline" onClick={()=>setConfirmState(null)}>Cancel</button>
            <button className="btn btn-danger" onClick={()=>{confirmState.onConfirm();setConfirmState(null);}}>{confirmState.confirmLabel}</button>
          </div>
        </div>
      </div>}

      {showOutputFormat&&<OutputFormatModal lobs={lobs} schemas={ofSchemas}
        onSave={saved=>{setOfSchemas(saved);addToast('Output format saved');setShowOutputFormat(false);}}
        activeLobId={ofActiveLobId} onClose={()=>setShowOutputFormat(false)}/>}

      <ToastContainer toasts={toasts} removeToast={removeToast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
