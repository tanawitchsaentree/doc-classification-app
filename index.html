<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intelligent Document &amp; Automation Solution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;color:#111827;background:#f9fafb;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}

.navbar{display:flex;align-items:center;justify-content:space-between;height:52px;background:#fff;border-bottom:1px solid #e5e7eb;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:100;gap:16px}
.navbar__left{display:flex;align-items:center;gap:10px;flex-shrink:0}
.navbar__logo{display:flex;align-items:center}
.navbar__brand{font-size:12px;font-weight:600;color:#111827;white-space:nowrap}
.navbar__nav{display:flex;align-items:center;list-style:none;flex:1;justify-content:center}
.navbar__nav-item{background:none;border:none;padding:0 12px;font-size:13px;color:#6b7280;height:52px;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;font-family:inherit}
.navbar__nav-item:hover{color:#111827}
.navbar__nav-item.active{color:#2563eb;font-weight:500;border-bottom-color:#2563eb}
.navbar__right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.navbar__dd{position:relative}
.navbar__dd-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid transparent;padding:5px 8px;border-radius:6px;font-size:12px;color:#6b7280;cursor:pointer;transition:background .15s;font-family:inherit}
.navbar__dd-btn:hover{background:#f9fafb;color:#111827}
.navbar__dd-menu{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 10px 15px rgba(0,0,0,.1);min-width:160px;z-index:200;overflow:hidden;animation:slideDown .12s ease}
.navbar__dd-item{background:none;border:none;display:block;width:100%;padding:8px 14px;font-size:12px;color:#111827;text-align:left;cursor:pointer;font-family:inherit;transition:background .15s}
.navbar__dd-item:hover{background:#f9fafb}
.navbar__dd-item.active{color:#2563eb;background:#eff6ff;font-weight:500}
.navbar__dd-item.danger{color:#dc2626}
.navbar__dd-item.danger:hover{background:#fef2f2}
.navbar__dd-divider{height:1px;background:#e5e7eb;margin:4px 0}
.navbar__avatar{width:32px;height:32px;border-radius:50%;background:#7c3aed;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;flex-shrink:0;transition:box-shadow .2s}
.navbar__avatar:hover{box-shadow:0 0 0 3px rgba(124,58,237,.3)}

.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.app__sub-bar{margin-top:52px;height:32px;background:#f3f4f6;border-bottom:1px solid #e5e7eb;padding:0 24px;display:flex;align-items:center;flex-shrink:0}
.app__breadcrumb{font-size:12px;color:#6b7280}
.app__back-bar{height:36px;background:#fff;border-bottom:1px solid #e5e7eb;padding:0 20px;display:flex;align-items:center;flex-shrink:0}
.app__back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:12px;color:#2563eb;font-weight:500;cursor:pointer;font-family:inherit}
.app__back-btn:hover{text-decoration:underline}
.app__content{flex:1;display:flex;overflow:hidden;min-height:0}

/* Page scroll wrapper (Dashboard + Config List) */
.page-scroll{flex:1;overflow-y:auto;padding:28px 32px;margin-top:52px}
.page-scroll::-webkit-scrollbar{width:5px}.page-scroll::-webkit-scrollbar-track{background:transparent}.page-scroll::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:3px}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.page-hdr__left h1{font-size:22px;font-weight:700;color:#111827}
.page-hdr__left p{font-size:13px;color:#6b7280;margin-top:3px}
.page-hdr__actions{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ── Dashboard ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:18px 20px;display:flex;flex-direction:column;gap:6px;transition:box-shadow .15s}
.stat-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.07)}
.stat-card__label{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em}
.stat-card__value{font-size:26px;font-weight:700;color:#111827;line-height:1}
.stat-card__sub{font-size:11px;color:#6b7280;display:flex;align-items:center;gap:4px}
.stat-card__sub.up{color:#16a34a}
.stat-card__sub.down{color:#dc2626}
.stat-card__bar{height:3px;background:#f3f4f6;border-radius:2px;margin-top:4px;overflow:hidden}
.stat-card__bar-fill{height:100%;border-radius:2px;background:#2563eb}

.section-title{font-size:14px;font-weight:700;color:#111827;margin-bottom:14px}

/* Pipeline */
.pipeline{display:flex;align-items:center;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:20px 24px;margin-bottom:28px;overflow-x:auto;gap:0}
.pipe-step{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;min-width:90px}
.pipe-step__icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.pipe-step__label{font-size:11px;font-weight:600;color:#374151;text-align:center;white-space:nowrap}
.pipe-step__count{font-size:10px;color:#9ca3af;text-align:center}
.pipe-arrow{color:#d1d5db;font-size:20px;flex-shrink:0;padding:0 4px;margin-bottom:24px}

/* LOB performance */
.lob-perf{background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:28px}
.lob-perf__hdr{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid #e5e7eb;gap:0}
.lob-perf__hdr span{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em}
.lob-perf__hdr span:first-child{flex:2}
.lob-perf__hdr span:not(:first-child){flex:1;text-align:center}
.lob-perf__row{display:flex;align-items:center;padding:13px 20px;border-bottom:1px solid #f9fafb;transition:background .1s}
.lob-perf__row:last-child{border-bottom:none}
.lob-perf__row:hover{background:#f9fafb}
.lob-perf__name{flex:2;display:flex;align-items:center;gap:10px}
.lob-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lob-perf__name-text{font-size:13px;font-weight:600;color:#111827}
.lob-perf__name-sub{font-size:11px;color:#9ca3af}
.lob-perf__cell{flex:1;text-align:center;font-size:12px;color:#374151}
.lob-perf__conf{font-weight:700;color:#111827}
.conf-bar{width:80px;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden;margin:0 auto 2px}
.conf-bar__fill{height:100%;border-radius:3px}

/* Quick links */
.quick-links{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.quick-link{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;text-align:left}
.quick-link:hover{border-color:#2563eb;box-shadow:0 4px 12px rgba(37,99,235,.1)}
.quick-link__icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.quick-link__label{font-size:13px;font-weight:600;color:#111827}
.quick-link__sub{font-size:11px;color:#9ca3af;margin-top:1px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}.btn-primary:disabled{background:#93c5fd;cursor:not-allowed}
.btn-outline{background:#fff;color:#374151;border:1px solid #d1d5db}.btn-outline:hover{background:#f9fafb;border-color:#9ca3af}
.btn-danger{background:#dc2626;color:#fff;border:none}.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 11px;font-size:12px}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
.modal{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-width:520px;width:92vw;display:flex;flex-direction:column;max-height:90vh;animation:scaleIn .15s ease}
.modal.lg{max-width:700px}
.modal.xl{max-width:900px}
.modal__header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #e5e7eb;flex-shrink:0}
.modal__header h3{font-size:15px;font-weight:600;color:#111827}
.modal__close{background:none;border:none;font-size:22px;color:#9ca3af;cursor:pointer;line-height:1;padding:0 4px;border-radius:4px;transition:all .1s}
.modal__close:hover{color:#111827;background:#f3f4f6}
.modal__body{padding:20px;overflow-y:auto;overflow-x:auto;flex:1}
.modal__body::-webkit-scrollbar{width:4px}.modal__body::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px}
.modal__footer{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid #e5e7eb;flex-shrink:0}

/* ── Version table & badges ── */
.version-table{width:100%;border-collapse:collapse}
.version-table th{padding:8px 12px;font-size:12px;font-weight:600;color:#374151;text-align:left;background:#f9fafb;border-bottom:1px solid #e5e7eb}
.version-table td{padding:10px 12px;border-bottom:1px solid #f3f4f6;font-size:13px;color:#374151}
.version-table tbody tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:500}
.badge-active{background:#dcfce7;color:#16a34a}.badge-archived{background:#f3f4f6;color:#6b7280}

/* ── Preview / Test modals ── */
.preview-box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:14px;max-height:320px;overflow-y:auto}
.preview-box pre{font-family:'Fira Code',monospace,sans-serif;font-size:12px;line-height:1.6;color:#374151;white-space:pre-wrap;word-break:break-word}
.test-modal{display:flex;flex-direction:column;gap:16px}
.test-modal h4{font-size:13px;font-weight:600;color:#111827;margin-bottom:8px}
.test-running{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;font-size:13px;color:#1e40af}
.test-spinner{width:16px;height:16px;border:2px solid #bfdbfe;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.test-result{display:flex;flex-direction:column;gap:8px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px}
.test-result__item{display:flex;gap:8px;font-size:13px}
.test-result__label{font-weight:600;color:#374151;min-width:110px;flex-shrink:0}
.test-result__value{color:#111827}

/* ── Confirm dialog ── */
.confirm-dialog{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-width:400px;width:90vw;padding:28px 24px;display:flex;flex-direction:column;align-items:center;gap:12px;animation:scaleIn .15s ease}
.confirm-dialog__icon{font-size:28px}
.confirm-dialog__title{font-size:16px;font-weight:700;color:#111827;text-align:center}
.confirm-dialog__msg{font-size:13px;color:#6b7280;text-align:center;line-height:1.5}
.confirm-dialog__actions{display:flex;gap:10px;margin-top:4px}

/* ── Toasts ── */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.12);font-size:13px;min-width:240px;max-width:360px;pointer-events:all;animation:slideInRight .25s ease;transition:opacity .25s,transform .25s}
.toast.exiting{opacity:0;transform:translateX(20px)}
.toast.success{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.toast.error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.toast.warning{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.toast.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.toast__icon{font-size:14px;flex-shrink:0}
.toast__msg{flex:1;line-height:1.4}
.toast__close{background:none;border:none;font-size:16px;cursor:pointer;opacity:.5;padding:0 2px;line-height:1;color:inherit;margin-left:4px;font-family:inherit;transition:opacity .1s}
.toast__close:hover{opacity:1}

/* ── Sidebar ── */
.sidebar{width:220px;min-width:160px;max-width:400px;background:#fff;border-right:none;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.resize-handle{width:4px;flex-shrink:0;background:transparent;cursor:col-resize;position:relative;z-index:2;transition:background 150ms var(--smooth)}
.resize-handle:hover,.resize-handle--active{background:var(--a-mid)}
.resize-handle::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:2px;height:32px;background:var(--bdr);border-radius:1px;transition:background 150ms}
.resize-handle:hover::after,.resize-handle--active::after{background:var(--a)}
.sidebar__header{padding:14px 16px 10px;border-bottom:1px solid #f3f4f6;flex-shrink:0}
.sidebar__title{font-size:13px;font-weight:700;color:#111827}
.sidebar__section{padding:12px 16px;flex-shrink:0}
.sidebar__section-lbl{font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:block}
.sidebar__cb-label{display:flex;align-items:center;gap:7px;font-size:12px;color:#374151;cursor:pointer;padding:2px 0;user-select:none}
.sidebar__cb-label input{accent-color:#2563eb;cursor:pointer}
.sidebar__divider{height:1px;background:#f3f4f6;flex-shrink:0}
.sidebar__level0{padding:10px 16px;flex-shrink:0}
.sidebar__level-lbl{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px}
.sidebar__level-lbl.sub{margin:8px 0 4px;padding:0 2px}
.sidebar__l0-input{width:100%;border:1px solid #2563eb;border-radius:5px;padding:4px 8px;font-size:12px;outline:none;font-family:inherit;color:#111827}
.sidebar__l0-name{font-size:13px;font-weight:600;color:#111827;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.sidebar__l0-name:hover{color:#2563eb}
.sidebar__l1-header{padding:6px 16px 0;flex-shrink:0}
.sidebar__list-controls{display:flex;align-items:center;gap:6px;padding:6px 16px 8px;flex-shrink:0}
.sidebar__search-wrap{position:relative;flex:1;display:flex;align-items:center}
.sidebar__search-icon{position:absolute;left:7px;color:#9ca3af;display:flex;align-items:center;pointer-events:none}
.sidebar__search{width:100%;padding:5px 8px 5px 24px;border:1px solid #e5e7eb;border-radius:5px;font-size:11px;outline:none;font-family:inherit;color:#374151;transition:border-color .15s}
.sidebar__search:focus{border-color:#2563eb}
.sidebar__collapse-btn{background:none;border:1px solid #e5e7eb;border-radius:5px;padding:4px 7px;font-size:11px;color:#6b7280;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .1s;flex-shrink:0}
.sidebar__collapse-btn:hover{color:#111827;border-color:#9ca3af}
.sidebar__l1-list{flex:1;overflow-y:auto;padding:0 8px 8px}
.sidebar__l1-list::-webkit-scrollbar{width:3px}.sidebar__l1-list::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px}
.sidebar__no-results{font-size:12px;color:#9ca3af;padding:8px;font-style:italic}
.sidebar__empty-l1{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 0;color:#9ca3af}
.sidebar__empty-l1 p{font-size:12px;text-align:center;line-height:1.5}
.sidebar__l1-item{border-radius:6px;margin-bottom:2px}
.sidebar__l1-row{display:flex;align-items:center;border-radius:6px;transition:background .1s}
.sidebar__l1-row:hover{background:#f9fafb}
.sidebar__l1-toggle{flex:1;display:flex;align-items:center;gap:6px;background:none;border:none;padding:7px 8px;cursor:pointer;font-family:inherit;text-align:left;min-width:0;border-radius:6px 0 0 6px}
.sidebar__l1-name{font-size:12px;font-weight:500;color:#111827;flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar__l2-count{font-size:10px;color:#9ca3af;background:#f3f4f6;border-radius:10px;padding:1px 6px;flex-shrink:0}
.sidebar__menu-wrap{position:relative;flex-shrink:0}
.sidebar__menu-btn{background:none;border:none;padding:7px 8px;cursor:pointer;color:#9ca3af;display:flex;align-items:center;transition:color .1s;border-radius:0 6px 6px 0}
.sidebar__menu-btn:hover{color:#374151;background:#f3f4f6}
.sidebar__ctx-menu{position:absolute;right:0;top:100%;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 8px 20px rgba(0,0,0,.1);z-index:50;min-width:130px;overflow:hidden;animation:slideDown .1s ease}
.sidebar__ctx-item{display:block;width:100%;padding:8px 14px;font-size:12px;color:#111827;background:none;border:none;text-align:left;cursor:pointer;font-family:inherit;transition:background .1s}
.sidebar__ctx-item:hover{background:#f9fafb}.sidebar__ctx-item.danger{color:#dc2626}.sidebar__ctx-item.danger:hover{background:#fef2f2}
.sidebar__l2-wrap{padding:0 8px 6px 16px}
.sidebar__empty-l2{font-size:11px;color:#9ca3af;padding:4px;font-style:italic}
.sidebar__l2-list{list-style:none;display:flex;flex-direction:column;gap:1px}
.sidebar__l2-item{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:5px;font-size:12px;color:#4b5563;transition:background .1s}
.sidebar__l2-item:hover{background:#f9fafb}
.sidebar__l2-del{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:15px;line-height:1;padding:0 2px;margin-left:auto;border-radius:3px;transition:color .1s;font-family:inherit}
.sidebar__l2-del:hover{color:#dc2626}
.sidebar__add-input-wrap{display:flex;flex-direction:column;gap:5px;padding:4px 0}
.sidebar__add-input{border:1px solid #2563eb;border-radius:5px;padding:5px 8px;font-size:12px;outline:none;font-family:inherit;color:#111827;width:100%}
.sidebar__add-actions{display:flex;gap:5px}
.sidebar__add-confirm{background:#2563eb;color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;transition:background .1s}
.sidebar__add-confirm:hover{background:#1d4ed8}.sidebar__add-confirm:disabled{background:#93c5fd;cursor:not-allowed}
.sidebar__add-cancel{background:none;border:1px solid #e5e7eb;border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer;color:#6b7280;font-family:inherit;transition:all .1s}
.sidebar__add-cancel:hover{border-color:#9ca3af;color:#374151}
.sidebar__add-btn{background:none;border:1px dashed #d1d5db;border-radius:5px;padding:5px 8px;font-size:11px;color:#9ca3af;cursor:pointer;width:100%;display:flex;align-items:center;gap:4px;font-family:inherit;transition:all .15s;margin-top:2px}
.sidebar__add-btn:hover{border-color:#2563eb;color:#2563eb;background:#eff6ff}
.sidebar__add-l1-bar{padding:8px;border-top:1px solid #f3f4f6;flex-shrink:0}
.sidebar__add-l1-input-wrap{display:flex;gap:5px}
.sidebar__add-l1-input{flex:1;border:1px solid #2563eb;border-radius:5px;padding:5px 8px;font-size:12px;outline:none;font-family:inherit;color:#111827}
.sidebar__add-l1-btn{background:none;border:1px dashed #d1d5db;border-radius:6px;padding:7px 10px;font-size:12px;color:#6b7280;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;transition:all .15s}
.sidebar__add-l1-btn:hover{border-color:#2563eb;color:#2563eb;background:#eff6ff}

/* ── Workspace ── */
.workspace{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.workspace__header{padding:12px 20px 0;flex-shrink:0}
.workspace__title{font-size:13px;font-weight:700;color:#111827}
.workspace__tab-area{flex-shrink:0}
.workspace__tabs{display:flex;align-items:center;padding:0 16px;position:relative}
.workspace__tabs--l1{background:#fff;border-bottom:1px solid #e5e7eb;height:40px}
.workspace__tabs--l2{background:#f9fafb;border-bottom:1px solid #e5e7eb;height:34px}
.workspace__tabs-inner{display:flex;align-items:center;flex:1;overflow:hidden;height:100%}
.workspace__tab{padding:0 14px;height:100%;background:none;border:none;font-size:12px;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0}
.workspace__tab:hover{color:#111827;background:#f9fafb}
.workspace__tab.active{color:#2563eb;font-weight:500;border-bottom-color:#2563eb;background:#fafcff}
.workspace__tab--l2{font-size:11px}
.workspace__tab--hidden{visibility:hidden;pointer-events:none;position:absolute;top:0}
.workspace__more-wrap{position:relative;flex-shrink:0;padding:0 8px}
.workspace__more-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:5px;font-size:11px;color:#6b7280;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s}
.workspace__more-btn:hover,.workspace__more-btn.active{background:#eff6ff;border-color:#bfdbfe;color:#2563eb}
.workspace__more-menu{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 10px 25px rgba(0,0,0,.1);z-index:50;min-width:180px;overflow:hidden;animation:slideDown .12s ease}
.workspace__more-search{width:100%;padding:8px 12px;border:none;border-bottom:1px solid #f3f4f6;font-size:12px;outline:none;font-family:inherit;color:#374151}
.workspace__more-item{display:block;width:100%;padding:8px 14px;font-size:12px;color:#374151;background:none;border:none;text-align:left;cursor:pointer;font-family:inherit;transition:background .1s}
.workspace__more-item:hover{background:#f9fafb}.workspace__more-item.active{color:#2563eb;background:#eff6ff;font-weight:500}
.workspace__body{flex:1;overflow-y:auto;padding:24px 20px 16px;display:flex;flex-direction:column;gap:14px}
.workspace__body::-webkit-scrollbar{width:4px}.workspace__body::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px}
.workspace__lv-header{display:flex;align-items:center;justify-content:space-between}
.workspace__lv-title{font-size:14px;font-weight:600;color:#111827}
.workspace__manage-btn{background:none;border:1px solid #e5e7eb;border-radius:6px;padding:5px 12px;font-size:12px;color:#374151;cursor:pointer;font-family:inherit;transition:all .12s}
.workspace__manage-btn:hover{border-color:#9ca3af;background:#f9fafb}
.workspace__ver-card{display:flex;align-items:center;background:#f9fafb;border:1px solid #f3f4f6;border-radius:8px;padding:10px 16px}
.workspace__ver-item{display:flex;flex-direction:column;gap:2px;flex:1}
.workspace__ver-lbl{font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em}
.workspace__ver-val{font-size:13px;font-weight:600;color:#111827}
.workspace__ver-div{width:1px;background:#e5e7eb;height:32px;flex-shrink:0;margin:0 16px}
.workspace__status{font-size:12px;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-flex;align-items:center}
.workspace__status.active{background:#dcfce7;color:#16a34a}.workspace__status.draft{background:#f3f4f6;color:#6b7280}.workspace__status.failed{background:#fee2e2;color:#dc2626}
.workspace__warn{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:7px;font-size:12px;color:#92400e}
.workspace__warn code{background:#fef3c7;border-radius:3px;padding:1px 5px;font-family:monospace;font-size:11px}
.workspace__prompt-sec{display:flex;flex-direction:column;gap:6px}
.workspace__prompt-hdr{display:flex;align-items:center;justify-content:space-between}
.workspace__prompt-lbl{font-size:12px;font-weight:600;color:#374151}
.workspace__prompt-hdr-right{display:flex;align-items:center;gap:10px}
.workspace__reset-btn{background:none;border:none;font-size:11px;color:#6b7280;cursor:pointer;font-family:inherit;padding:0;transition:color .1s}
.workspace__reset-btn:hover{color:#dc2626}
.workspace__textarea{min-height:220px;border:1px solid #e5e7eb;border-radius:8px;padding:12px;font-size:12px;font-family:'Fira Code',monospace,sans-serif;color:#111827;resize:vertical;outline:none;line-height:1.6;transition:border-color .15s,box-shadow .15s;background:#fff;width:100%}
.workspace__textarea:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.prompt-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.placeholder-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.placeholder-row__lbl{font-size:11px;color:#9ca3af}
.ph-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:500}
.ph-badge.found{background:#dcfce7;color:#16a34a}.ph-badge.missing{background:#fef3c7;color:#92400e}
.char-count{font-size:11px;color:#9ca3af;flex-shrink:0}
.workspace__actions{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:4px}
.workspace__btn{padding:7px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;border:none}
.workspace__btn.outline{background:#fff;border:1px solid #e5e7eb;color:#374151}.workspace__btn.outline:hover{border-color:#9ca3af;background:#f9fafb}
.workspace__btn.primary{background:#2563eb;color:#fff}.workspace__btn.primary:hover{background:#1d4ed8}
.save-indicator{font-size:11px;display:flex;align-items:center;gap:3px}
.save-indicator.unsaved{color:#d97706}.save-indicator.saved{color:#16a34a}

/* ── Document Panel ── */
.doc-panel{width:260px;min-width:200px;max-width:420px;background:#fff;border-left:none;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.doc-panel__upload{padding:14px;border-bottom:1px solid #e5e7eb;flex-shrink:0}
.doc-panel__sec-title{font-size:12px;font-weight:600;color:#111827;margin-bottom:10px}
.doc-panel__dropzone{border:1.5px dashed #d1d5db;border-radius:8px;padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all .15s;background:#fff}
.doc-panel__dropzone:hover,.doc-panel__dropzone.drag-over{border-color:#2563eb;background:#eff6ff}
.doc-panel__dz-text{font-size:11px;color:#6b7280;text-align:center}
.doc-panel__browse{color:#2563eb;font-weight:500;cursor:pointer}
.doc-panel__browse:hover{text-decoration:underline}
.doc-panel__dz-hint{font-size:10px;color:#9ca3af;text-align:center}
.doc-panel__docs{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px 14px 0}
.doc-panel__search-wrap{position:relative;display:flex;align-items:center;margin-bottom:8px}
.doc-panel__search-icon{position:absolute;left:8px;color:#9ca3af;display:flex;align-items:center;pointer-events:none}
.doc-panel__search{width:100%;padding:6px 8px 6px 26px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;outline:none;font-family:inherit;transition:border-color .15s}
.doc-panel__search:focus{border-color:#2563eb}
.doc-panel__filters{display:flex;align-items:center;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.doc-panel__filter-btn{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;border:1px solid transparent;font-size:11px;font-weight:500;color:#6b7280;background:#f3f4f6;cursor:pointer;font-family:inherit;transition:all .12s}
.doc-panel__filter-btn:hover{background:#e5e7eb;color:#374151}
.doc-panel__filter-btn.active{background:#fff;border-color:#e5e7eb;color:#111827;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.doc-panel__cnt{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:15px;padding:0 4px;border-radius:8px;font-size:10px;font-weight:700;color:#fff}
.doc-panel__cnt.all{background:#2563eb}.doc-panel__cnt.processed{background:#16a34a}.doc-panel__cnt.pending{background:#d97706}
.bulk-bar{display:flex;align-items:center;gap:6px;padding:6px 0;flex-shrink:0}
.bulk-bar__info{font-size:11px;color:#374151;font-weight:500;flex:1}
.bulk-bar__btn{background:none;border:1px solid #e5e7eb;border-radius:5px;padding:3px 8px;font-size:11px;color:#374151;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:3px;transition:all .1s}
.bulk-bar__btn:hover{background:#f9fafb;border-color:#9ca3af}
.bulk-bar__btn.danger{color:#dc2626;border-color:#fecaca}.bulk-bar__btn.danger:hover{background:#fef2f2}
.doc-panel__list-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;flex-shrink:0}
.doc-panel__sel-info{font-size:11px;color:#6b7280}
.doc-panel__sel-all{background:none;border:none;font-size:11px;color:#2563eb;cursor:pointer;font-family:inherit;font-weight:500;padding:0}
.doc-panel__sel-all:hover{text-decoration:underline}
.doc-panel__list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;margin:0 -2px;padding:0 2px}
.doc-panel__list::-webkit-scrollbar{width:3px}.doc-panel__list::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px}
.doc-panel__empty{text-align:center;padding:24px;font-size:12px;color:#9ca3af}
.doc-panel__item{display:flex;align-items:center;gap:7px;padding:6px 7px;border-radius:6px;border:1px solid transparent;transition:all .1s}
.doc-panel__item:hover{background:#f9fafb;border-color:#f3f4f6}
.doc-panel__item.selected{background:#eff6ff;border-color:#bfdbfe}
.doc-panel__cb{width:14px;height:14px;accent-color:#2563eb;cursor:pointer;flex-shrink:0}
.doc-panel__file-icon{color:#6366f1;flex-shrink:0;display:flex;align-items:center}
.doc-panel__file-name{flex:1;font-size:11px;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.doc-panel__status{font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;flex-shrink:0}
.doc-panel__status.tested{background:#dcfce7;color:#16a34a}
.doc-panel__status.pending{background:#fef3c7;color:#92400e}
.doc-panel__cnt.tested{background:#16a34a}
.test-doc-section{margin-bottom:2px}
.test-doc-section h4,.test-result-section h4{font-size:12px;font-weight:600;color:#374151;margin-bottom:10px}
.test-doc-list{display:flex;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto;padding-right:2px}
.test-doc-list::-webkit-scrollbar{width:3px}.test-doc-list::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px}
.test-doc-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:1.5px solid transparent;background:#f9fafb;cursor:pointer;font-size:12px;color:#374151;transition:all .12s;user-select:none}
.test-doc-item:hover{border-color:#bfdbfe;background:#f0f7ff;color:#1e40af}
.test-doc-item.selected{border-color:#2563eb;background:#eff6ff;color:#1d4ed8;font-weight:500;box-shadow:0 0 0 3px rgba(37,99,235,.07)}
.test-doc-item input[type=radio]{display:none}
.test-status-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;flex-shrink:0;white-space:nowrap;line-height:1.4}
.test-status-badge--tested{background:#dcfce7;color:#15803d}
.test-status-badge--pending{background:#fef3c7;color:#92400e}
.test-doc-none{font-size:12px;color:#9ca3af;padding:14px;background:#f9fafb;border-radius:8px;text-align:center;border:1px solid #f3f4f6}
.test-prompt-toggle{background:none;border:none;font-size:11px;color:#9ca3af;cursor:pointer;padding:4px 0 8px;font-family:inherit;text-align:left;display:flex;align-items:center;gap:4px}
.test-prompt-toggle:hover{color:#6b7280}
.workspace__preview-link{background:none;border:none;font-size:11px;color:#9ca3af;cursor:pointer;padding:0;font-family:inherit;text-decoration:underline;text-underline-offset:2px}
.workspace__preview-link:hover{color:#6b7280}
.doc-panel__del{background:none;border:none;cursor:pointer;color:#d1d5db;padding:2px;border-radius:4px;display:flex;align-items:center;transition:all .1s;flex-shrink:0}
.doc-panel__del:hover{color:#dc2626;background:#fee2e2}
.doc-panel__footer{padding:8px 0;font-size:11px;color:#9ca3af;border-top:1px solid #f3f4f6;flex-shrink:0}
.doc-panel__footer strong{color:#6b7280}

/* ── Data Sets panel ── */
.doc-panel__sets{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:0 10px 8px}
.doc-panel__sets-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 0 6px;flex-shrink:0}
.doc-panel__sets-title{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em}
.doc-panel__new-set{background:none;border:none;font-size:11px;color:var(--a);font-weight:500;cursor:pointer;padding:0;font-family:inherit}
.doc-panel__new-set:hover{text-decoration:underline}
.ds-group{border:1px solid var(--bdr);border-radius:var(--r-md);overflow:hidden;margin-bottom:6px;flex-shrink:0}
.ds-group__hdr{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--srf);cursor:pointer;user-select:none;transition:background var(--tf) var(--smooth)}
.ds-group__hdr:hover{background:var(--srf2)}
.ds-group__dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ds-group__name{font-size:12px;font-weight:600;color:var(--tx1);flex:1}
.ds-group__count{font-size:11px;color:var(--tx3);background:var(--srf2);border:1px solid var(--bdr);border-radius:20px;padding:1px 7px;font-weight:500}
.ds-group__chev{color:var(--tx3);transition:transform var(--tf) var(--smooth);display:flex;align-items:center;flex-shrink:0}
.ds-group__chev--open{transform:rotate(180deg)}
.ds-group__body{background:var(--bg);border-top:1px solid var(--bdr)}
.ds-group__sel-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;border-bottom:1px solid var(--bdr);background:var(--srf2)}
.ds-group__sel-all{background:none;border:none;font-size:10px;color:var(--a);font-weight:500;cursor:pointer;font-family:inherit}
.ds-group__sel-all:hover{text-decoration:underline}
.ds-doc-row{display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid var(--bdr);transition:background var(--tf) var(--smooth);cursor:pointer}
.ds-doc-row:last-child{border-bottom:none}
.ds-doc-row:hover{background:var(--srf)}
.ds-doc-row--selected{background:var(--a-lt)}
.ds-doc-row input[type=checkbox]{accent-color:var(--a);flex-shrink:0;width:13px;height:13px;cursor:pointer}
.ds-doc-sub-line{display:flex;align-items:center;gap:4px;flex-wrap:wrap;min-width:0}
.expect-chip{font-size:10px;font-weight:500;padding:1px 6px;border-radius:20px;background:var(--a-lt);color:var(--a);border:1px solid var(--a-mid);white-space:nowrap;flex-shrink:0}
.trace-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px;white-space:nowrap}
.trace-badge--match{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.trace-badge--mismatch{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca}
.trace-badge--tested{background:var(--srf2);color:var(--tx3);border:1px solid var(--bdr)}
.ds-doc-del{background:none;border:none;cursor:pointer;color:var(--tx3);padding:2px;border-radius:3px;display:flex;align-items:center;flex-shrink:0;opacity:0;transition:all var(--tf)}
.ds-doc-row:hover .ds-doc-del,.ds-doc-row--selected .ds-doc-del{opacity:1}
.ds-doc-del:hover{color:#dc2626;background:#fee2e2}
.ds-empty{text-align:center;padding:12px;font-size:11px;color:var(--tx3)}
/* Doc panel tabs */
.dp-tabs{display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0;background:var(--srf)}
.dp-tab{flex:1;padding:8px 4px;font-size:11px;font-weight:600;color:var(--tx3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all var(--tf) var(--smooth);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
.dp-tab:hover{color:var(--tx1)}
.dp-tab--active{color:var(--a);border-bottom-color:var(--a)}
.dp-tab__badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:20px;background:var(--a-lt);color:var(--a)}
/* Doc metadata */
.ds-doc-info{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.ds-doc-name{font-size:11px;color:var(--tx1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ds-doc-sub{font-size:10px;color:var(--tx3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Testing Results tab */
.tr-list{display:flex;flex-direction:column;gap:0;padding:0 10px 8px}
.tr-row{display:flex;flex-direction:column;gap:4px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.tr-row:last-child{border-bottom:none}
.tr-row--running{opacity:.55}
.tr-row__top{display:flex;align-items:center;gap:6px}
.tr-row__name{font-size:11px;font-weight:600;color:var(--tx1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tr-row__result{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tr-row__result--match{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.tr-row__result--mismatch{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca}
.tr-row__meta{font-size:10px;color:var(--tx3)}
.tr-row__spinner{width:12px;height:12px;border:2px solid var(--bdr);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.tr-summary{display:flex;align-items:center;gap:10px;padding:6px 0 8px;border-bottom:1px solid var(--bdr);margin-bottom:2px;flex-shrink:0}
.tr-summary__stat{font-size:11px;font-weight:700}
.tr-summary__stat--total{color:var(--tx2)}
.tr-summary__stat--match{color:#15803d}
.tr-summary__stat--mismatch{color:#b91c1c}
.run-bar{position:sticky;bottom:0;background:var(--a);padding:8px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;animation:fadeUp .15s ease}
.run-bar__count{font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
.run-bar__actions{display:flex;gap:6px}
.run-bar__btn{font-size:11px;font-weight:600;padding:4px 11px;border-radius:var(--r);border:none;cursor:pointer;font-family:inherit;transition:all var(--tf) var(--smooth)}
.run-bar__btn--primary{background:#fff;color:var(--a)}.run-bar__btn--primary:hover{background:var(--a-lt)}
.run-bar__btn--ghost{background:rgba(255,255,255,.15);color:#fff}.run-bar__btn--ghost:hover{background:rgba(255,255,255,.25)}
/* Save row at bottom of prompt */
.prompt-save-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0 4px;margin-top:4px;border-top:1px solid var(--bdr)}
.prompt-save-row__state{font-size:11px;color:var(--tx3)}
.prompt-save-row__state--unsaved{color:#d97706}
.prompt-save-row__state--saved{color:#16a34a}
/* Upload pending form */
.upload-pending{border:1px solid var(--bdr);border-radius:var(--r);padding:8px 10px;background:var(--srf);margin-top:8px;display:flex;flex-direction:column;gap:6px}
.upload-pending__file{font-size:11px;font-weight:600;color:var(--tx1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upload-pending__row{display:flex;align-items:center;gap:6px}
.upload-pending__label{font-size:10px;color:var(--tx3);white-space:nowrap;width:52px;flex-shrink:0}
.upload-pending__sel{flex:1;font-size:11px;border:1px solid var(--bdr);border-radius:var(--r);padding:3px 6px;background:var(--srf);color:var(--tx1);font-family:inherit;cursor:pointer}
.upload-pending__sel:focus{outline:none;border-color:var(--a)}
.upload-pending__input{flex:1;font-size:11px;border:1px solid var(--bdr);border-radius:var(--r);padding:3px 6px;background:var(--srf);color:var(--tx1);font-family:inherit}
.upload-pending__input:focus{outline:none;border-color:var(--a)}
.upload-pending__chips{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.upload-pending__chip{font-size:10px;font-weight:500;padding:1px 6px;border-radius:20px;background:var(--a-lt);color:var(--a);border:1px solid var(--a-mid);display:flex;align-items:center;gap:3px}
.upload-pending__chip-rm{cursor:pointer;color:var(--a);font-weight:700;line-height:1}
.upload-pending__chip-rm:hover{color:#b91c1c}
.upload-pending__actions{display:flex;gap:6px;justify-content:flex-end;margin-top:2px}
/* ── Test Panel ── */
.tp-context{display:flex;align-items:center;gap:6px;padding:7px 12px;background:#eff6ff;border-bottom:1px solid #dbeafe;flex-shrink:0}
.tp-context__dot{width:7px;height:7px;border-radius:50%;background:var(--a);flex-shrink:0}
.tp-context__label{font-size:10px;font-weight:700;color:#93c5fd;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.tp-context__prompt{font-size:11px;font-weight:600;color:#1d4ed8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}

.tp-sel-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 12px 6px;flex-shrink:0}

.tp-empty{text-align:center;padding:32px 12px;font-size:11px;color:var(--tx3);line-height:1.6}

   Theme v4 · Spotify Light × Allianz Blue
   ══════════════════════════════════════════════════════ */

/* ── Design tokens ── */
:root{
  --a:     #003781; --a-h:#002d6b; --a-act:#001f52;
  --a-lt:  #eef2fb; --a-mid:#c4d3ee; --a-d4:#d4e0f5;
  --a-glow:rgba(0,55,129,.12);
  --bg:    #f5f5f5; --srf:#fff; --srf2:#f2f2f2;
  --bdr:   #e4e4e4; --bdr-f:#7a9cc8;
  --tx1:   #121212; --tx2:#535353; --tx3:#a7a7a7;
  --r-sm:6px; --r:10px; --r-md:12px; --r-lg:16px; --r-p:999px;
  --sh-sm: 0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md: 0 4px 16px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --sh-lg: 0 20px 48px rgba(0,0,0,.13),0 4px 12px rgba(0,0,0,.06);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --smooth:cubic-bezier(.4,0,.2,1);
  --eout:  cubic-bezier(0,0,.2,1);
  --tf:120ms; --t:200ms; --ts:300ms;
}

/* ── Base ── */
body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg)}

/* ── Keyframes ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes dropIn{from{opacity:0;transform:translateY(-5px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(110%)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 var(--a-glow)}70%{box-shadow:0 0 0 8px transparent}100%{box-shadow:0 0 0 0 transparent}}

/* ── Toasts ── */
.toast{border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1)}

/* ── Inputs & forms ── */
.add-modal-input{width:100%;padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;outline:none;font-family:inherit;color:#111827;transition:border-color .15s,box-shadow .15s}
.add-modal-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.add-modal-label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:6px}
.add-modal-hint{font-size:11px;color:#9ca3af;margin-top:4px}

/* ── Detail Scroll Layout (L1 only mode) ── */
.detail-scroll{flex:1;display:flex;overflow:hidden;min-height:0}
.detail-scroll__main{flex:1;overflow-y:auto;padding:16px 20px;background:#f3f4f6}
.detail-scroll__main::-webkit-scrollbar{width:5px}.detail-scroll__main::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
.detail-scroll__toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-shrink:0}
.detail-scroll__count{font-size:12px;color:#6b7280}
.detail-scroll__actions{display:flex;gap:6px}
.detail-scroll__action-btn{background:#fff;border:1px solid #e5e7eb;border-radius:6px;padding:4px 10px;font-size:11px;color:#6b7280;cursor:pointer;font-family:inherit;transition:all .12s}
.detail-scroll__action-btn:hover{border-color:#9ca3af;color:#374151}
/* Category accordion */
.cat-sec{background:#fff;border:1px solid #e5e7eb;border-radius:12px;margin-bottom:12px;overflow:hidden;transition:box-shadow .15s}
.cat-sec:hover{box-shadow:0 2px 10px rgba(0,0,0,.07)}
.cat-sec__hdr{display:flex;align-items:center;gap:8px;padding:11px 16px;cursor:pointer;user-select:none;background:#fafafa;transition:background .12s}
.cat-sec__hdr:hover{background:#f3f4f6}
.cat-sec--open .cat-sec__hdr{border-bottom:1px solid #e5e7eb}
.cat-sec__chevron{color:#9ca3af;display:flex;flex-shrink:0;transition:transform .2s}
.cat-sec--closed .cat-sec__chevron{transform:rotate(-90deg)}
.cat-sec__name{font-size:13px;font-weight:600;color:#111827;flex:1}
.cat-sec__meta{display:flex;align-items:center;gap:5px}
.cat-sec__tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;background:#f3f4f6;color:#6b7280;white-space:nowrap}
.cat-sec__tag--deployed{background:#dcfce7;color:#16a34a}.cat-sec__tag--failed{background:#fee2e2;color:#dc2626}.cat-sec__tag--draft{background:#f3f4f6;color:#6b7280}
.cat-sec__body{overflow:hidden}
.cat-sec__prompt{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
/* ── Test action zone (section footer bar) ── */
.test-action-zone{display:flex;flex-direction:column;gap:8px;padding:12px 14px;background:#f8faff;border:1px solid #dbeafe;border-radius:10px;margin-top:8px}
.test-action-zone__top{display:flex;align-items:center;gap:8px}
.test-action-zone__title{font-size:12px;font-weight:600;color:#1d4ed8;flex:1}
.test-action-zone__actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.test-action-zone__bottom{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.test-action-zone__hint{font-size:10px;color:#93c5fd;margin-left:auto;white-space:nowrap}
.test-chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;line-height:1.5}
.test-chip--tested{background:#dcfce7;color:#15803d}
.test-chip--pending{background:#fef3c7;color:#92400e}
.test-chip--empty{background:#f3f4f6;color:#9ca3af;font-weight:400}
.test-action-zone__add{background:#fff;border:1px solid #d1d5db;border-radius:7px;padding:5px 11px;font-size:11px;font-weight:500;color:#6b7280;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
.test-action-zone__add:hover{border-color:#93c5fd;color:#2563eb;background:#f0f7ff}
.test-action-zone__btn{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;box-shadow:0 1px 3px rgba(37,99,235,.2);display:inline-flex;align-items:center;gap:5px}
.test-action-zone__btn:hover{background:linear-gradient(135deg,#1d4ed8,#1e40af);box-shadow:0 2px 8px rgba(37,99,235,.3);transform:translateY(-1px)}
/* TestModal doc picker */
.test-doc-search{width:100%;padding:7px 11px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:12px;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s;margin-bottom:8px;color:#111827;background:#fff}
.test-doc-search:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.07)}
.test-doc-upload-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;background:#fafafa;border:1.5px dashed #e5e7eb;border-radius:8px;cursor:pointer;font-size:11px;color:#9ca3af;transition:all .12s;margin-bottom:8px;user-select:none;font-family:inherit}
.test-doc-upload-row:hover{border-color:#93c5fd;background:#f0f7ff;color:#2563eb}
/* Ver card inside section */
.sec-ver-card{display:flex;align-items:center;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px 14px;gap:0;flex-shrink:0}
.sec-ver-item{display:flex;flex-direction:column;gap:1px;flex:1}
.sec-ver-lbl{font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em}
.sec-ver-val{font-size:12px;font-weight:600;color:#111827}
.sec-ver-div{width:1px;background:#e5e7eb;height:26px;margin:0 12px;flex-shrink:0}
/* Section doc panel */
.sec-docs__title{font-size:11px;font-weight:700;color:#374151;margin-bottom:8px}
.sec-docs__zone{border:1.5px dashed #d1d5db;border-radius:8px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;background:#fff;transition:all .15s}
.sec-docs__zone:hover,.sec-docs__zone.drag-over{border-color:#2563eb;background:#eff6ff}
.sec-docs__dz-text{font-size:11px;color:#6b7280;text-align:center}
.sec-docs__browse{color:#2563eb;font-weight:500}.sec-docs__dz-hint{font-size:10px;color:#9ca3af;text-align:center}
.sec-docs__filters{display:flex;gap:4px;flex-wrap:wrap}
.sec-docs__list{overflow-y:auto;display:flex;flex-direction:column;gap:2px;max-height:200px}
.sec-docs__list::-webkit-scrollbar{width:3px}.sec-docs__list::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}
.sec-docs__empty{text-align:center;padding:14px;font-size:11px;color:#9ca3af}
.sec-docs__footer{font-size:10px;color:#9ca3af;padding-top:6px;border-top:1px solid #f3f4f6;margin-top:2px}
.sec-docs__footer strong{color:#6b7280}

/* ── Classification Level Cards ── */
.cl-card{border:1px solid #e5e7eb;border-radius:8px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:9px;background:#fff;cursor:pointer;user-select:none;transition:border-color .15s}
.cl-card:last-of-type{margin-bottom:8px}
.cl-card--active{border-color:#bfdbfe;background:#eff6ff}
.cl-card--required{background:#f9fafb;cursor:default;opacity:.75}
.cl-card__cb{margin-top:2px;width:14px;height:14px;accent-color:#2563eb;flex-shrink:0}
.cl-card__cb:disabled{cursor:not-allowed}
.cl-card__name{font-size:12px;font-weight:600;color:#111827;line-height:1.4}
.cl-card__sub{font-size:10px;color:#9ca3af;margin-top:1px}
.cl-mode{padding:9px 12px;border-radius:8px;border:1.5px solid #e5e7eb;background:#f9fafb;display:flex;align-items:flex-start;gap:8px;transition:all .2s}
.cl-mode--l1l2{border-color:#bfdbfe;background:#eff6ff}
.cl-mode__icon{font-size:13px;flex-shrink:0;margin-top:1px}
.cl-mode__title{font-size:11px;font-weight:700;color:#374151;margin-bottom:2px;line-height:1.3}
.cl-mode--l1l2 .cl-mode__title{color:#1d4ed8}
.cl-mode__desc{font-size:10px;color:#6b7280;line-height:1.4}

/* ── Stage Pipeline Bar ── */
.stage-bar{display:flex;align-items:center;gap:2px;margin-left:auto;padding-left:16px;flex-shrink:0;overflow:hidden}
.stage-step{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:#9ca3af;padding:2px 7px;border-radius:4px;white-space:nowrap}
.stage-step--active{color:#2563eb;background:#eff6ff;font-weight:600}
.stage-step--done{color:#16a34a}
.stage-sep{color:#d1d5db;font-size:11px;padding:0 1px;flex-shrink:0}

/* ── Readiness Checklist ── */
.readiness{display:flex;gap:6px;padding:9px 14px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:9px;flex-wrap:wrap;align-items:center}
.readiness__title{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;margin-right:2px}
.readiness__item{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;white-space:nowrap}
.readiness__item--ok{color:#16a34a}.readiness__item--fail{color:#9ca3af}
.readiness__sep{width:1px;height:14px;background:#e5e7eb;flex-shrink:0;align-self:center}

/* ── Test Expected vs Predicted ── */
.test-expected{display:flex;flex-direction:column;gap:6px}
.test-expected h4{font-size:12px;font-weight:600;color:#374151;margin-bottom:2px}
.test-expected__input{width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;outline:none;font-family:inherit;color:#111827;transition:border-color .15s}
.test-expected__input:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.08)}
.test-comparison{display:flex;flex-direction:column;gap:6px}
.test-comparison h4{font-size:12px;font-weight:600;color:#374151;margin-bottom:2px}
.test-comparison__row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;font-size:12px}
.test-comparison__row--match{background:#f0fdf4;border:1px solid #bbf7d0}
.test-comparison__row--mismatch{background:#fef2f2;border:1px solid #fecaca}
.test-comparison__lbl{font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em;min-width:70px;flex-shrink:0}
.test-comparison__val{font-weight:600;color:#111827;flex:1}
.test-comparison__badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:10px;margin-left:auto;flex-shrink:0}
.test-comparison__badge--match{background:#dcfce7;color:#16a34a}
.test-comparison__badge--mismatch{background:#fee2e2;color:#dc2626}

/* ── Schema badge ── */
.schema-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;white-space:nowrap}
.schema-badge--empty{background:#f3f4f6;color:#9ca3af;border-color:#e5e7eb}

/* ── Stage 1 LOB Prompt Section ── */
.l1-prompt-sec{background:#fff;border:2px solid #bfdbfe;border-radius:12px;margin-bottom:16px;overflow:hidden;transition:box-shadow .15s}
.l1-prompt-sec:hover{box-shadow:0 2px 12px rgba(37,99,235,.1)}
.l1-prompt-sec__hdr{display:flex;align-items:center;gap:8px;padding:12px 16px;background:linear-gradient(135deg,#eff6ff,#f0f9ff);border-bottom:1px solid #bfdbfe}
.l1-prompt-sec__badge{background:#1d4ed8;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.04em;flex-shrink:0}
.l1-prompt-sec__title{font-size:13px;font-weight:700;color:#1e40af;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.l1-prompt-sec__body{overflow:hidden}
.l1-prompt-sec__prompt{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.l1-prompt-sec__desc{font-size:12px;color:#4b72b8;line-height:1.5;padding:8px 12px;background:#eff6ff;border-radius:7px;border-left:3px solid #93c5fd;margin-bottom:2px}
/* Stage 2 label row */
.stage2-label{display:flex;align-items:center;gap:8px;margin:4px 0 12px}
.stage2-label__badge{font-size:10px;font-weight:700;color:#fff;background:#374151;padding:2px 8px;border-radius:20px;letter-spacing:.04em;flex-shrink:0}
.stage2-label__text{font-size:12px;color:#6b7280}
/* Sidebar nav items (L1-only mode) */
.sidebar__l1-nav{background:none;border:none;display:flex;align-items:center;gap:7px;width:100%;padding:7px 8px;border-radius:6px;font-size:12px;font-weight:500;color:#374151;cursor:pointer;font-family:inherit;text-align:left;transition:all .12s}
.sidebar__l1-nav:hover{background:#eff6ff;color:#2563eb}
.sidebar__l1-nav--active{background:#eff6ff;color:#2563eb;font-weight:600}
.sidebar__l1-nav__dot{width:7px;height:7px;border-radius:50%;background:#2563eb;flex-shrink:0}

/* ══ Theme v4: Component overrides ══════════════════════════════════════ */

/* Navbar */
.navbar{background:var(--srf);box-shadow:0 1px 0 var(--bdr)}
.navbar__brand{font-weight:800;color:var(--a);background:none;-webkit-text-fill-color:var(--a);letter-spacing:-.01em}
.navbar__nav-item{transition:color var(--tf) var(--smooth),border-color var(--tf) var(--smooth)}
.navbar__nav-item.active{color:var(--a);border-bottom-color:var(--a)}
.navbar__dd-item{transition:background var(--tf) var(--smooth),color var(--tf) var(--smooth)}
.navbar__dd-item.active{color:var(--a);background:var(--a-lt)}
.navbar__dd-item:hover{background:var(--a-lt);color:var(--a)}

/* App back btn */
.app__back-btn{color:var(--a)}

/* Buttons global */
.btn-primary{background:var(--a);box-shadow:0 1px 4px var(--a-glow);border:none;position:relative;overflow:hidden;transition:background var(--tf) var(--smooth),box-shadow var(--tf) var(--smooth),transform var(--tf) var(--smooth)}
.btn-primary:hover{background:var(--a-h);box-shadow:0 4px 12px var(--a-glow);transform:translateY(-1px)}
.btn-primary:active{transform:scale(.97) !important;box-shadow:none !important}
.btn-primary:disabled{background:var(--a-mid);cursor:not-allowed;transform:none !important;box-shadow:none !important}
.btn-outline{transition:border-color var(--tf) var(--smooth),color var(--tf) var(--smooth),background var(--tf) var(--smooth)}
.btn-outline:hover{border-color:var(--a-mid);color:var(--a);background:var(--a-lt)}
.btn-outline:active{transform:scale(.97)}
.btn-filter-active{background:var(--a-lt) !important;border-color:var(--a-mid) !important;color:var(--a) !important}

/* Stat cards — staggered load + hover lift */
.stat-card{border-radius:var(--r-md);border:1px solid var(--bdr);background:var(--srf);box-shadow:var(--sh-sm);transition:box-shadow var(--t) var(--smooth),transform var(--t) var(--smooth);animation:fadeUp .45s var(--smooth) both}
.stat-card:nth-child(1){animation-delay:0ms}
.stat-card:nth-child(2){animation-delay:55ms}
.stat-card:nth-child(3){animation-delay:110ms}
.stat-card:nth-child(4){animation-delay:165ms}
.stat-card:nth-child(1),.stat-card:nth-child(2),.stat-card:nth-child(3),.stat-card:nth-child(4){border-top:none}
.stat-card:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.stat-card__label{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em}
.stat-card__value{font-size:28px;font-weight:800;color:var(--tx1);background:none;-webkit-text-fill-color:var(--tx1);line-height:1.1;letter-spacing:-.02em}
.stat-card__sub{font-size:12px;color:var(--tx2);margin-top:2px}
.stat-card__bar-fill{background:var(--a)}

/* Pipeline */
.pipeline{border:1px solid var(--bdr);border-radius:var(--r-md);box-shadow:var(--sh-sm);background:var(--srf)}
.pipe-step__icon{border:1px solid var(--bdr);box-shadow:none;transition:transform var(--t) var(--spring),box-shadow var(--t) var(--smooth)}
.pipe-step:hover .pipe-step__icon{transform:scale(1.1) translateY(-2px);box-shadow:0 6px 18px var(--a-glow)}

/* LOB performance */
.lob-perf{border:1px solid var(--bdr);border-radius:var(--r-md);box-shadow:var(--sh-sm)}
.lob-perf__row{transition:background var(--tf) var(--smooth)}
.lob-perf__row:hover{background:#f4f5f7}

/* Quick links */
.quick-link{border-radius:var(--r-md);transition:box-shadow var(--t) var(--smooth),border-color var(--t) var(--smooth),transform var(--t) var(--spring)}
.quick-link:hover{border-color:var(--a-mid);box-shadow:0 6px 20px var(--a-glow);transform:translateY(-2px)}

/* Status chips */
.status-chip{padding:4px 12px;border-radius:var(--r-p);font-size:12px;font-weight:700;border:none;letter-spacing:.01em}
.status-chip--deployed{background:#dcfce7;color:#15803d}
.status-chip--failed{background:#fee2e2;color:#dc2626}

/* Tables */
.ov-table-wrap{border-radius:var(--r-md);border:1px solid var(--bdr);box-shadow:var(--sh-sm);overflow:hidden}
.ov-table th{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;background:#f8f9fb;border-bottom:1px solid var(--bdr);padding:10px 16px}
.ov-table tbody tr{transition:background var(--tf) var(--smooth)}
.ov-table tbody tr:hover{background:#f8f9fb}
.version-table th{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;background:#f8f9fb}

/* Badges */
.badge{padding:3px 10px;border-radius:var(--r-p);font-size:11px;font-weight:700}
.badge-active{background:#dcfce7;color:#15803d}
.badge-archived{background:#f3f4f6;color:var(--tx2)}

/* Modals — spring entrance */
.modal{border-radius:16px;box-shadow:var(--sh-lg);animation:modalIn 260ms cubic-bezier(.34,1.2,.64,1) both}
.modal-overlay{backdrop-filter:blur(4px)}
.confirm-dialog{border-radius:16px;animation:modalIn 220ms cubic-bezier(.34,1.2,.64,1) both}
.modal__header{border-bottom:1px solid var(--bdr)}
.modal__footer{border-top:1px solid var(--bdr)}

/* Workspace */
.workspace__tab{transition:color var(--tf) var(--smooth),background var(--tf) var(--smooth)}
.workspace__tab.active{background:var(--srf);font-weight:700;color:var(--a);position:relative}
.workspace__tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--a);border-radius:1px}
.workspace__textarea{border-radius:var(--r);font-size:13px;border:1.5px solid var(--bdr);transition:border-color var(--tf) var(--smooth),box-shadow var(--tf) var(--smooth)}
.workspace__textarea:focus{border-color:var(--bdr-f);box-shadow:0 0 0 3px var(--a-glow)}
.workspace__ver-card{background:#f8f9fb;border-radius:var(--r);border:1px solid var(--bdr)}
.workspace__btn.primary{background:var(--a);box-shadow:0 1px 4px var(--a-glow);transition:all var(--tf) var(--smooth);position:relative;overflow:hidden}
.workspace__btn.primary:hover{background:var(--a-h);transform:translateY(-1px);box-shadow:0 4px 12px var(--a-glow)}
.workspace__btn.primary:active{transform:scale(.97);box-shadow:none}
.workspace__more-btn{transition:all var(--tf) var(--smooth)}
.workspace__more-btn:hover,.workspace__more-btn.active{background:var(--a-lt);border-color:var(--a-mid);color:var(--a)}
.workspace__more-item{transition:background var(--tf) var(--smooth),color var(--tf) var(--smooth)}
.workspace__more-item:hover{background:var(--a-lt)}
.workspace__more-item.active{color:var(--a);background:var(--a-lt)}

/* Doc panel */
.doc-panel__dropzone{border-radius:var(--r);transition:all var(--t) var(--smooth)}
.doc-panel__dropzone:hover,.doc-panel__dropzone.drag-over{border-color:var(--a);background:var(--a-lt)}
.doc-panel__browse{color:var(--a)}
.doc-panel__search:focus{border-color:var(--bdr-f);box-shadow:0 0 0 3px var(--a-glow)}
.doc-panel__cnt.all{background:var(--a)}
.doc-panel__cb{accent-color:var(--a)}
.doc-panel__sel-all{color:var(--a)}
.doc-panel__item{border-radius:8px;transition:background var(--tf) var(--smooth),border-color var(--tf) var(--smooth)}
.doc-panel__item:hover{background:#f4f5f7}

/* Sidebar — active pill indicator */
.sidebar{background:var(--srf);border-right:1px solid var(--bdr)}
.sidebar__l1-toggle{position:relative;transition:background var(--tf) var(--smooth),color var(--tf) var(--smooth)}
.sidebar__l1-toggle::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%) scaleY(0);width:3px;height:55%;background:var(--a);border-radius:0 2px 2px 0;transition:transform 220ms var(--spring)}
.sidebar__l1-toggle:hover{background:var(--a-lt)}
.sidebar__l1-toggle.active{background:var(--a-lt)}
.sidebar__l1-toggle.active::before{transform:translateY(-50%) scaleY(1)}
.sidebar__l1-toggle.active .sidebar__l1-name{color:var(--a);font-weight:700}
.sidebar__cb-label input{accent-color:var(--a)}
.sidebar__l0-input,.sidebar__add-input,.sidebar__add-l1-input,.sidebar__rename-input{border-color:var(--a)}
.sidebar__l0-name{transition:color var(--tf) var(--smooth)}
.sidebar__l0-name:hover{color:var(--a)}
.sidebar__search:focus{border-color:var(--bdr-f)}
.sidebar__add-confirm{background:var(--a);transition:background var(--tf) var(--smooth)}
.sidebar__add-confirm:hover{background:var(--a-h)}
.sidebar__add-btn{transition:all var(--tf) var(--smooth)}
.sidebar__add-btn:hover{border-color:var(--a-mid);color:var(--a);background:var(--a-lt)}
.sidebar__add-l1-btn{transition:all var(--tf) var(--smooth)}
.sidebar__add-l1-btn:hover{border-color:var(--a-mid);color:var(--a);background:var(--a-lt)}
.sidebar__rename-ok{background:var(--a);transition:background var(--tf) var(--smooth)}
.sidebar__l1-nav{transition:all var(--tf) var(--smooth)}
.sidebar__l1-nav:hover{background:var(--a-lt);color:var(--a)}
.sidebar__l1-nav--active{background:var(--a-lt);color:var(--a);font-weight:700}
.sidebar__l1-nav__dot{background:var(--a)}

/* Detail scroll */
.detail-scroll__main{background:var(--bg)}
.detail-scroll__action-btn{transition:all var(--tf) var(--smooth)}
.detail-scroll__action-btn:hover{border-color:var(--a-mid);color:var(--a)}

/* Category accordion — hover lift */
.cat-sec{border:1px solid var(--bdr);border-radius:var(--r-md);box-shadow:var(--sh-sm);transition:box-shadow var(--t) var(--smooth),transform var(--t) var(--smooth)}
.cat-sec:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.cat-sec__hdr{background:var(--srf2);transition:background var(--tf) var(--smooth)}
.cat-sec__hdr:hover{background:#ebebeb}
.cat-sec__chevron{transition:transform 250ms var(--smooth)}

/* Test action zone */
.test-action-zone{background:var(--a-lt);border:1px solid var(--a-mid)}
.test-action-zone__title{color:var(--a);font-weight:700}
.test-action-zone__btn{background:var(--a) !important;border-radius:var(--r) !important;position:relative;overflow:hidden;transition:all var(--tf) var(--smooth) !important;box-shadow:0 1px 4px var(--a-glow) !important}
.test-action-zone__btn:hover{background:var(--a-h) !important;box-shadow:0 4px 12px var(--a-glow) !important;transform:translateY(-1px) !important}
.test-action-zone__btn:active{transform:scale(.97) !important}
.test-action-zone__add{transition:all var(--tf) var(--smooth)}
.test-action-zone__add:hover{border-color:var(--a-mid);color:var(--a);background:var(--a-lt)}
.test-doc-search:focus{border-color:var(--bdr-f);box-shadow:0 0 0 3px var(--a-glow)}
.test-doc-upload-row:hover{border-color:var(--bdr-f);background:var(--a-lt);color:var(--a)}
.test-doc-item{transition:all var(--tf) var(--smooth)}
.test-doc-item.selected{border-color:var(--a);background:var(--a-lt);color:var(--a-h);font-weight:500;box-shadow:0 0 0 3px var(--a-glow)}

/* Classification cards */
.cl-card{transition:border-color var(--tf) var(--smooth),box-shadow var(--tf) var(--smooth)}
.cl-card:hover{border-color:var(--a-mid);box-shadow:var(--sh-sm)}
.cl-card--active{border-color:var(--a-mid);background:var(--a-lt)}
.cl-card__cb{accent-color:var(--a)}

/* Stage bar */
.stage-step{transition:all var(--tf) var(--smooth)}
.stage-step--active{color:var(--a);background:var(--a-lt);font-weight:700}

/* LOB prompt section */
.l1-prompt-sec{border:2px solid var(--a-mid);border-radius:var(--r-md);transition:box-shadow var(--t) var(--smooth)}
.l1-prompt-sec:hover{box-shadow:0 4px 18px var(--a-glow)}
.l1-prompt-sec__hdr{background:var(--a-lt);border-bottom:1px solid var(--a-mid)}
.l1-prompt-sec__badge{background:var(--a)}
.l1-prompt-sec__title{color:var(--a-h)}
.l1-prompt-sec__desc{background:var(--a-lt);border-left:3px solid var(--a-mid);color:var(--a-h)}

/* Toasts */
.toast{border-radius:var(--r);box-shadow:0 4px 20px rgba(0,0,0,.1);animation:slideInRight 220ms var(--spring) both}

/* Inputs */
.add-modal-input:focus{border-color:var(--bdr-f);box-shadow:0 0 0 3px var(--a-glow)}
.test-expected__input:focus{border-color:var(--bdr-f);box-shadow:0 0 0 3px var(--a-glow)}
.ov-search:focus{border-color:var(--bdr-f);box-shadow:0 0 0 3px var(--a-glow)}

/* Overview table links */
.ov-bc-link{transition:color var(--tf) var(--smooth)}
.ov-bc-link:hover{color:var(--a)}
.tbl-name-link{color:var(--a)}
.tbl-view-btn{color:var(--a);transition:color var(--tf) var(--smooth)}
.page-btn{transition:all var(--tf) var(--smooth)}
.page-btn.active{background:var(--a)}

/* Prompt context chips */
.prompt-ctx-chip--l1{background:var(--a-d4);color:var(--a-h)}

- Poor scan quality or handwriting should reduce confidence by 10–15 points

/* ── Hierarchy context builder — used by preview to resolve {{CLASSIFICATION_HIERARCHY}} ── */
function buildHierarchy(level,l1Items,scopedCat=null){
  if(level==='global'){
    const lines=['L1 Categories and L2 Types:\n'];
    l1Items.forEach(cat=>{
      lines.push(cat.name);
      if(cat.l2&&cat.l2.length>0)cat.l2.forEach(t=>lines.push(`  - ${t.name}`));
      else lines.push('  (no L2 types defined)');
      lines.push('');
    });
    return lines.join('\n').trim();
  }
  if(level==='l1'){
    return 'L1 Categories:\n'+l1Items.map(cat=>`- ${cat.name}`).join('\n');
  }
  if(level==='l2'){
    const catName=scopedCat?.name||'this category';
    const types=scopedCat?.l2||[];
    return `L2 Types in ${catName}:\n`+(types.length>0?types.map(t=>`- ${t.name}`).join('\n'):'(no types defined)');
  }
  return '';
}

/* ──────────────────────────────────────────────────────────────────────────
   Mock Classification Engine
   Data-driven: targets = [{id, name}] from l1Items (Stage 1) or cat.types (Stage 2)
   No hardcoded keyword→class mapping — derives from target names vs doc filename
────────────────────────────────────────────────────────────────────────── */
const mockClassify=(docName,targets)=>{
  if(!targets||targets.length===0)return null;

  // Tokenise filename: split on _ . - space, strip extension
  const tokens=docName.toLowerCase()
    .replace(/\.(pdf|jpg|jpeg|png)$/i,'')
    .replace(/[_.\-]/g,' ')
    .split(/\s+/).filter(Boolean);

  // Score each target by word-overlap between target name tokens and doc tokens
  const scored=targets.map(t=>{
    const tWords=t.name.toLowerCase().split(/[\s\-&\/]+/).filter(Boolean);
    let score=0;
    for(const tw of tWords){
      if(tokens.some(tok=>tok===tw||tok.startsWith(tw)||tw.startsWith(tok))) score+=1;
    }
    // Small noise so ties break randomly each run
    score+=Math.random()*0.35;
    return{...t,score};
  });

  scored.sort((a,b)=>b.score-a.score);
  const winner=scored[0];
  const runnerUp=scored[1];

  // Confidence: 82–96 if strong keyword match, 63–78 if weak
  const strong=winner.score>=1;
  const base=strong?82:63;
  const conf=Math.min(99,base+Math.floor(Math.random()*14));
  const confStr=`${conf.toFixed(1)}%`;

  // Runner-up mention
  const ruConfVal=Math.max(35,conf-13-Math.floor(Math.random()*14));
  const ruNote=runnerUp&&ruConfVal>=40
    ?` Next closest: "${runnerUp.name}" (${ruConfVal}%).`:'';

  const reviewNote=conf<75?' Manual review recommended.':'';
  const REASONS=[
    `Document filename pattern and content structure align with "${winner.name}" classification criteria.${ruNote}${reviewNote}`,
    `Keyword analysis and reference number format match "${winner.name}".${ruNote}${reviewNote}`,
    `Document identifiers — header, reference numbers, and terminology — indicate "${winner.name}".${ruNote}${reviewNote}`,
  ];

  const processingMs=900+Math.floor(Math.random()*1200);

  return{
    classification:winner.name,
    confidence:confStr,
    reasoning:REASONS[Math.floor(Math.random()*REASONS.length)].trim(),
    processingMs,
  };
};

function ToastContainer({toasts,removeToast}){
  return <div className="toast-container">{toasts.map(t=>(
    <div key={t.id} className={`toast ${t.type}${t.exiting?' exiting':''}`}>
      <span className="toast__icon">{t.type==='success'?'✓':t.type==='error'?'✕':t.type==='warning'?'⚠':'ℹ'}</span>
      <span className="toast__msg">{t.msg}</span>
      <button className="toast__close" onClick={()=>removeToast(t.id)}>×</button>
    </div>
  ))}</div>;
}
function useToast(){
  const [toasts,setToasts]=useState([]);
  const addToast=useCallback((msg,type='success')=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,type,exiting:false}]);
    setTimeout(()=>{
      setToasts(t=>t.map(x=>x.id===id?{...x,exiting:true}:x));
      setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),300);
    },3000);
  },[]);
  const removeToast=useCallback(id=>{
    setToasts(t=>t.map(x=>x.id===id?{...x,exiting:true}:x));
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),300);
  },[]);
  return{toasts,addToast,removeToast};
}

  const deployed=lobs.filter(l=>l.status==='Deployed').length;
  // Pipeline counts derived from deployed lob/type stats
  const deployedTypes=lobs.reduce((a,l)=>a+l.categories.filter(c=>c.status==='Deployed').reduce((b,c)=>b+c.types.length,0),0);
  const totalDocs=deployedTypes*18+47;
