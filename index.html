        </div>
      </div>
      <div className="sidebar__divider"/>
      <div className="sidebar__level0">
        <div className="sidebar__l0-row">
          <div className="sidebar__l0-left">
            {editingL0
              ?<input className="sidebar__l0-input" value={l0Draft} onChange={e=>setL0Draft(e.target.value)} onBlur={commitL0} onKeyDown={e=>{if(e.key==='Enter')commitL0();if(e.key==='Escape'){setL0Draft(l0Name);setEditingL0(false);}}} autoFocus/>
              :<div style={{display:'flex',alignItems:'center',gap:'5px'}}>
                <span className="sidebar__l0-value">{l0Name}</span>
                <span className="sidebar__l0-info" title="Level 0"><IC.Info/></span>
              </div>}
          </div>
          {!editingL0&&<button className="sidebar__l0-edit-btn" title="Rename" onClick={()=>{setL0Draft(l0Name);setEditingL0(true);}}><IC.Edit/></button>}
        </div>
      </div>
      <div className="sidebar__divider"/>
      <div className="sidebar__l1-header">
        <button className="sidebar__add-l1-inline" onClick={()=>setAddModal({type:'l1'})}><IC.Plus s={11}/> Add level 1 class</button>
      </div>
      <div className="sidebar__l1-list">
        {filteredL1.length===0&&l1Items.length>0?<div className="sidebar__no-results">No results for "{sidebarSearch}"</div>:null}
        {l1Items.length===0?<div className="sidebar__empty-l1"><IC.Layers/><p>No level 1 items yet.</p></div>
        :filteredL1.map(item=>(
          <div key={item.id} className="sidebar__l1-item">
            {renamingId===item.id?(
              <div className="sidebar__rename-wrap" onClick={e=>e.stopPropagation()}>
                <input className="sidebar__rename-input" value={renameDraft}
                  onChange={e=>setRenameDraft(e.target.value)}
                  onBlur={commitRename}
                  onKeyDown={e=>{if(e.key==='Enter')commitRename();if(e.key==='Escape')cancelRename();}}
                  autoFocus/>
                <button className="sidebar__rename-ok" onClick={commitRename} disabled={!renameDraft.trim()}>✓</button>
                <button className="sidebar__rename-cancel" onClick={cancelRename}>✕</button>
              </div>
            ):(
            <div className="sidebar__l1-row">
              <button className={`sidebar__l1-toggle${activeCatId===item.id?' active':''}`}
                onClick={()=>{toggleL1(item.id);onScrollTo?.(item.id);}}>
                <IC.Folder s={16}/>
                <span className="sidebar__l1-name">{item.name}</span>
                {item.expanded?<IC.ChevUp/>:<IC.ChevDown/>}
              </button>
              <div className="sidebar__menu-wrap">
                <button className="sidebar__menu-btn" onClick={e=>{e.stopPropagation();setShowMenu(showMenu===item.id?null:item.id);}}><IC.Dots/></button>
                {showMenu===item.id&&<div className="sidebar__ctx-menu" onClick={e=>e.stopPropagation()}>
                  <button className="sidebar__ctx-item" onClick={()=>startRenameL1(item.id)}>Rename</button>
                  <button className="sidebar__ctx-item" onClick={()=>{setShowMenu(null);setAddModal({type:'l2',parentId:item.id,parentName:item.name});}}>Add level 2 class</button>
                  <button className="sidebar__ctx-item danger" onClick={()=>requestDelL1(item.id)}>Delete</button>
                </div>}
              </div>
            </div>
            )}
            {item.expanded&&<div className="sidebar__l2-wrap">
              {item.l2.length===0
                ?<p className="sidebar__empty-l2">There's no level 2 class</p>
                :<ul className="sidebar__l2-list">{item.l2.map(l2=>(
                  <li key={l2.id} className="sidebar__l2-item">
                    <IC.File/>
                    {renamingL2?.l2id===l2.id
                      ?<>
                        <input className="sidebar__rename-input" style={{flex:1,fontSize:'12px',padding:'2px 6px'}}
                          value={renameDraftL2} onChange={e=>setRenameDraftL2(e.target.value)}
                          onBlur={commitRenameL2}
                          onKeyDown={e=>{if(e.key==='Enter')commitRenameL2();if(e.key==='Escape')cancelRenameL2();}}
                          autoFocus/>
                        <button className="sidebar__rename-ok" onClick={commitRenameL2} disabled={!renameDraftL2.trim()}>✓</button>
                        <button className="sidebar__rename-cancel" onClick={cancelRenameL2}>✕</button>
                      </>
                      :<>
                        <span className="sidebar__l2-name">{l2.name}</span>
                        <div className="sidebar__l2-actions">
                          <button className="sidebar__l2-action-btn" title="Rename" onClick={e=>{e.stopPropagation();startRenameL2(item.id,l2.id);}}><IC.Edit/></button>
                          <button className="sidebar__l2-action-btn sidebar__l2-action-btn--del" title="Delete" onClick={e=>{e.stopPropagation();delL2(item.id,l2.id,l2.name);}}><IC.Trash/></button>
                        </div>
                      </>}
                  </li>
                ))}</ul>}
            </div>}
            <div className="sidebar__l1-divider"/>
          </div>
        ))}
      </div>
      {addModal&&(addModal.type==='l1'
        ?<AddClassModal level="l1" lobName={l0Name} onConfirm={name=>addL1(name)} onClose={()=>setAddModal(null)}/>
        :<AddClassModal level="l2" lobName={l0Name} parentName={addModal.parentName} onConfirm={name=>addL2(addModal.parentId,name)} onClose={()=>setAddModal(null)}/>
      )}
    </aside>
  );
}

function AddClassModal({level='l1',lobName='',parentName='',onConfirm,onClose}){
  const [name,setName]=useState('');
  const inputRef=useRef(null);
  useEffect(()=>{inputRef.current?.focus();},[]);
  const submit=()=>{if(!name.trim())return;onConfirm(name.trim());};
  const isL1=level==='l1';
  const desc=isL1
    ?`A Level 1 class is a document category under "${lobName}". It gets its own classification prompt to route incoming documents into the right category.`
    :`A Level 2 class is a sub-type under "${parentName}". It enables fine-grained classification once a document has been routed to this category.`;
  const eg=isL1?'e.g. Schadenmeldung, Schadenabschluss':'e.g. Sustainability Report, Claim Form';
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="acm" onClick={e=>e.stopPropagation()}>
        <div className="acm__top">
          <span className={`acm__badge acm__badge--${level}`}>{isL1?'L1':'L2'}</span>
          <h3 className="acm__title">{isL1?'Add Level 1 class':'Add Level 2 class'}</h3>
          <button className="modal__close" style={{marginLeft:'auto'}} onClick={onClose}>×</button>
        </div>
        <p className="acm__desc">{desc}</p>
        <div className="acm__ctx">
          <span className="acm__ctx-lbl">{isL1?'Under (Level 0)':'Under (Level 1)'}</span>
          <span className="acm__ctx-val">{isL1?lobName:parentName}</span>
        </div>
        <div className="acm__field">
          <label className="acm__lbl">Class name</label>
          <input ref={inputRef} className="acm__input"
            value={name} onChange={e=>setName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')submit();if(e.key==='Escape')onClose();}}
            placeholder={eg}/>
        </div>
        <div className="acm__footer">
          <button className="btn btn-outline btn-sm" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary btn-sm" onClick={submit} disabled={!name.trim()}>Add class</button>
        </div>
      </div>
    </div>
  );
}

/* ── Workspace (Detail) ── */
const DEFAULT_TAB_META={version:'V.1',score:'N/A',status:'Draft'};

function WorkspaceTabs({l1Items,activeL1Tab,setActiveL1Tab,activeTab,setActiveTab}){
  const [showMore,setShowMore]=useState(false);
  const [moreSearch,setMoreSearch]=useState('');
  const [visibleCount,setVisibleCount]=useState(999);
  const outerRef=useRef(null);
  const tabRefs=useRef([]);
  const cachedW=useRef([]);
  const recalcRef=useRef(null);
  const MORE_W=100; // px reserved for "+N more" pill

  // L2 Class mode → one tab per L1 category (each routes to its L2 types)
  const allL1=l1Items.map(i=>({id:i.id,label:i.name,l2:i.l2||[]}));

  // Always keep recalcRef current so ResizeObserver closure doesn't go stale
  recalcRef.current=()=>{
    const outer=outerRef.current;
    if(!outer||cachedW.current.length===0)return;
    const avail=outer.offsetWidth-40; // 40px = 20px left + 20px right padding
    let used=0,count=0;
    for(let i=0;i<cachedW.current.length;i++){
      const w=cachedW.current[i]||80;
      const wouldHaveMore=count<cachedW.current.length-1;
      if(count>0&&used+w+(wouldHaveMore?MORE_W:0)>avail)break;
      used+=w;count++;
    }
    const n=Math.max(1,count);
    setVisibleCount(prev=>prev===n?prev:n);
  };

  // When tab count changes, reset so all tabs render visible for measurement
  useEffect(()=>{
    cachedW.current=[];
    setVisibleCount(999);
  },[allL1.length]);

  // After every render: cache widths of currently-visible tabs, then recalc
  useLayoutEffect(()=>{
    tabRefs.current.forEach((el,i)=>{
      if(el&&el.offsetWidth>0)cachedW.current[i]=el.offsetWidth;
    });
    recalcRef.current();
  });

  // Watch container resize
  useEffect(()=>{
    const outer=outerRef.current;
    if(!outer)return;
    const ro=new ResizeObserver(()=>recalcRef.current?.());
    ro.observe(outer);
    return()=>ro.disconnect();
  },[]);

  const hiddenAll=allL1.slice(visibleCount);
  const filtered=moreSearch?hiddenAll.filter(t=>t.label.toLowerCase().includes(moreSearch.toLowerCase())):hiddenAll;
  const hiddenCount=hiddenAll.length;
  const anyHiddenActive=hiddenAll.some(t=>t.id===activeL1Tab);
  const handleL1=id=>{setActiveL1Tab(id);setActiveTab(id);setShowMore(false);setMoreSearch('');};
  // No L2 sub-tabs in workspace bar — type-level prompts accessed through types modal
  const l2Tabs=[];

  return(
    <div className="workspace__tab-area">
      <div className="workspace__tabs workspace__tabs--l1" ref={outerRef}>
        {/* Inner div clips overflow; more-wrap sits outside so dropdown is never clipped */}
        <div className="workspace__tabs-inner">
          {allL1.map((t,i)=>(
            <button key={t.id} ref={el=>{tabRefs.current[i]=el;}}
              className={`workspace__tab${activeL1Tab===t.id?' active':''}${i>=visibleCount?' workspace__tab--hidden':''}`}
              onClick={()=>handleL1(t.id)}>{t.label}</button>
          ))}
        </div>
        {hiddenCount>0&&(
          <div className="workspace__more-wrap">
            <button className={`workspace__more-btn${anyHiddenActive?' active':''}`}
              onClick={e=>{e.stopPropagation();setShowMore(s=>!s);}}>
              +{hiddenCount} more <IC.ChevDown s={11}/>
            </button>
            {showMore&&(
              <div className="workspace__more-menu" onClick={e=>e.stopPropagation()}>
                <input className="workspace__more-search" placeholder="Search tabs…"
                  value={moreSearch} onChange={e=>setMoreSearch(e.target.value)} autoFocus/>
                <div style={{maxHeight:'220px',overflowY:'auto'}}>
                  {filtered.map(t=>(
                    <button key={t.id} className={`workspace__more-item${activeL1Tab===t.id?' active':''}`}
                      onClick={()=>handleL1(t.id)}>{t.label}</button>
                  ))}
                  {filtered.length===0&&<div style={{padding:'8px 14px',fontSize:'12px',color:'#9ca3af'}}>No results</div>}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
      {l2Tabs.length>0&&(
        <div className="workspace__tabs workspace__tabs--l2">
          {l2Tabs.map(l2=>(
            <button key={l2.id} className={`workspace__tab workspace__tab--l2${activeTab===l2.id?' active':''}`}
              onClick={()=>setActiveTab(l2.id)}>{l2.name}</button>
          ))}
        </div>
      )}
    </div>
  );
}

function Workspace({activeL1Tab,setActiveL1Tab,activeTab,setActiveTab,l1Items,prompts,defaultPrompts,tabMeta,saveStates,onEdit,onSave,onVersion,docs,dataSets=[],onRunTest,approvedPrompts,publishedPrompts,onApprove,onDeploy}){
  const getMeta=tabId=>{
    const base=tabMeta?.[tabId]||DEFAULT_TAB_META;
    const item=l1Items.find(i=>i.id===tabId);
    if(item)return{...base,title:`${item.name} — L2 Class Prompt`};
    return{...base,title:tabId};
  };
  const getCtx=tabId=>{
    const item=l1Items.find(i=>i.id===tabId);
    if(item)return{level:'l2',chip:'L2 Class',scope:`${item.name} → routes to L2 types`};
    return{level:'l2',chip:'L2 Class',scope:''};
  };
  const [showResetConfirm,setShowResetConfirm]=useState(false);
  const [showSelectFile,setShowSelectFile]=useState(false);
  const [selectedFiles,setSelectedFiles]=useState([]);
  const [testedPromptSnap,setTestedPromptSnap]=useState(null);
  const [showPublishModal,setShowPublishModal]=useState(false);
  const selectFileBtnRef=useRef(null);
  const [runningIds,setRunningIds]=useState(new Set());
  useEffect(()=>setShowResetConfirm(false),[activeTab]);
  useEffect(()=>{setSelectedFiles([]);setRunningIds(new Set());setShowSelectFile(false);},[activeTab]);
  useEffect(()=>{
    setRunningIds(prev=>{
      if(prev.size===0)return prev;
      const next=new Set(prev);
      docs.forEach(d=>{if(prev.has(d.id)&&d.lastTest)next.delete(d.id);});
      return next.size===prev.size?prev:next;
    });
  },[docs]);
  const meta=getMeta(activeTab);
  const ctx=getCtx(activeTab);
  const prompt=prompts[activeTab]||'';
  const ss=saveStates[activeTab];
  const showWarn=!prompt.includes('{{CLASSIFICATION_HIERARCHY}}');
  const found=[...new Set(prompt.match(/\{\{[^}]+\}\}/g)||[])];
  const missing=['{{CLASSIFICATION_HIERARCHY}}'].filter(p=>!prompt.includes(p));
  const doReset=()=>{onEdit(activeTab,defaultPrompts?.[activeTab]||'');setShowResetConfirm(false);};
  return(
    <main className="workspace" style={{display:'flex',flexDirection:'column'}}>
      <WorkspaceTabs l1Items={l1Items} activeL1Tab={activeL1Tab} setActiveL1Tab={setActiveL1Tab} activeTab={activeTab} setActiveTab={setActiveTab}/>
      <div style={{flex:1,overflowY:'auto',padding:'16px 20px',background:'#f5f5f5'}}>
        <div className="l1-prompt-sec" id={`cat-sec-${activeTab}`}>
          <div className="l1-prompt-sec__hdr" style={{cursor:'default'}}>
            <span className="l1-prompt-sec__badge">Stage 2</span>
            <span className="l1-prompt-sec__title">{meta.title}</span>
            <div style={{display:'flex',alignItems:'center',gap:'6px',marginLeft:'auto'}}>
              <span className="lps-ver-pill">{meta.version}</span>
              {meta.score!=='N/A'&&<span className="lps-ver-pill">{meta.score}</span>}
              <span className={`workspace__status ${meta.status.toLowerCase()}`}>{meta.status}</span>
              <button className="workspace__manage-btn" onClick={e=>{e.stopPropagation();onVersion();}}>Manage version</button>
            </div>
          </div>
          <div className="l1-prompt-sec__body">
            <div className="l1-prompt-sec__prompt">
              {showWarn&&<div style={{display:'flex',alignItems:'center',gap:'7px',padding:'7px 10px',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:'6px',marginBottom:'10px',fontSize:'11px',color:'#92400e'}}><IC.Warn/> The <code style={{fontFamily:'monospace',background:'#fef3c7',padding:'1px 4px',borderRadius:'3px'}}>{'{{CLASSIFICATION_HIERARCHY}}'}</code> placeholder is required</div>}
              <div className="prompt-label-row">
                <span className="prompt-label-text">L2 classification prompt</span>
                <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                  <button className="save-link" onClick={()=>onSave(activeTab)} disabled={ss!=='unsaved'}>Save draft</button>
                  <button className="workspace__reset-btn" onClick={()=>setShowResetConfirm(true)}>Reset</button>
                </div>
              </div>
              <textarea className="workspace__textarea" style={{minHeight:'200px',width:'100%'}} value={prompt} onChange={e=>onEdit(activeTab,e.target.value)} spellCheck={false}/>
              {showResetConfirm&&<div className="reset-confirm">
                <span>Reset prompt to default? This will discard all changes.</span>
                <div className="reset-confirm__actions">
                  <button className="btn-sm btn-outline" onClick={()=>setShowResetConfirm(false)}>Cancel</button>
                  <button className="btn-sm btn-danger" onClick={doReset}>Reset</button>
                </div>
              </div>}
              <div className="prompt-footer" style={{marginTop:'6px'}}>
                <div className="placeholder-row">
                  {found.map(p=><span key={p} className="ph-badge found"><IC.Check/> {p}</span>)}
                  {missing.map(p=><span key={p} className="ph-badge missing">⚠ {p}</span>)}
                </div>
                <span className="char-count">{prompt.length.toLocaleString()} chars</span>
              </div>
              <div className="file-sel">
                <div className="file-sel__hdr">
                  <span className="file-sel__hdr-label">File selected</span>
                  <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                    {selectedFiles.length>0&&<button className="file-sel__select-link" style={{color:'var(--tx3)'}}
                      onClick={()=>{setSelectedFiles([]);setRunningIds(new Set());}}>Clear</button>}
                    <button ref={selectFileBtnRef} className="file-sel__select-link" onClick={()=>setShowSelectFile(true)}>Select file</button>
                  </div>
                </div>
                {selectedFiles.length===0
                  ?<div className="file-sel__empty">No files selected</div>
                  :<div className="file-sel__selected-list">
                    <span className="file-sel__count">{selectedFiles.length} file{selectedFiles.length>1?'s':''} selected</span>
                    {selectedFiles.map(d=>{
                      const live=docs.find(x=>x.id===d.id);
                      const isRunning=runningIds.has(d.id);
                      const tested=live?.lastTest;
                      return(
                        <span key={d.id} className="file-sel__item">
                          {isRunning?<span style={{color:'var(--a)',fontSize:'11px'}}>⟳</span>
                            :tested?(tested.match===true?<span style={{color:'#006b00',fontSize:'11px'}}>✓</span>:tested.match===false?<span style={{color:'#cc0000',fontSize:'11px'}}>✗</span>:<span style={{color:'#1967d2',fontSize:'11px'}}>?</span>)
                            :<span style={{color:'var(--tx3)',fontSize:'11px'}}>·</span>}
                          <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.name}</span>
                          {tested&&(()=>{const st=docStatus(live||d);return<span className={`dlib__doc-status dlib__doc-status--${st}`}>{st==='tested'?'Tested':st==='failed'?'Failed':'No Label'}</span>;})()}
                          {isRunning&&<span className="dlib__doc-status dlib__doc-status--pending">Running…</span>}
                        </span>
                      );
                    })}
                  </div>
                }
              </div>
            </div>
          </div>
        </div>
      </div>
      {(()=>{
        const publishedSnap=publishedPrompts?.[activeTab]||null;
        const approvedSnap=approvedPrompts?.[activeTab]||null;
        const live=selectedFiles.map(d=>docs.find(x=>x.id===d.id)||d);
        const tested=live.filter(d=>d.lastTest);
        const matched=tested.filter(d=>d.lastTest?.match===true);
        const validated=tested.filter(d=>d.lastTest?.match!==null);
        const accuracy=validated.length>0?Math.round(matched.length/validated.length*100):null;
        const tier=accuracy===null?null:accuracy>=80?'good':accuracy>=60?'warn':'fail';
        const stale=testedPromptSnap!==null&&prompt!==testedPromptSnap&&tested.length>0;
        const isActive=publishedSnap?.text===prompt;
        const isApproved=approvedSnap?.text===prompt&&!isActive;
        const pubDate=isActive?new Date(publishedSnap.publishedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):null;
        const runTest=()=>{const ids=selectedFiles.length>0?selectedFiles.map(d=>d.id):docs.map(d=>d.id);setRunningIds(new Set(ids));setTestedPromptSnap(prompt);onRunTest?.(ids);};
        return(
          <div className="run-test-bar">
            <div className="run-test-bar__info">
              {stale&&<div className="run-test-stale">⚠ Prompt edited — results may be outdated</div>}
              {!stale&&accuracy!==null&&(
                <div className="run-test-acc">
                  <span className={`run-test-acc__num run-test-acc__num--${tier}`}>{accuracy}%</span>
                  <div>
                    <div className="run-test-acc__bar"><div className={`run-test-acc__fill run-test-acc__fill--${tier}`} style={{width:accuracy+'%'}}/></div>
                    <div className="run-test-acc__sub">{matched.length}/{validated.length} validated</div>
                  </div>
                </div>
              )}
            </div>
            <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
              {accuracy!==null&&!runningIds.size&&<button className="run-test-rerun" onClick={runTest}>Re-run</button>}
              {isActive
                ?<span className="run-test-pub-badge">✓ Active · {publishedSnap.accuracy}% · {pubDate}</span>
                :isApproved&&!runningIds.size
                  ?<button className="run-test-deploy-btn" onClick={()=>onDeploy(activeTab)}>Deploy to Production</button>
                  :accuracy===0&&!stale&&!runningIds.size
                    ?null
                    :accuracy!==null&&!stale&&!runningIds.size&&onApprove&&(
                        <button className="run-test-publish" onClick={()=>setShowPublishModal(true)}>
                          Approve for Production
                        </button>
                      )}
              <button className="run-test-btn" disabled={runningIds.size>0||selectedFiles.length===0} onClick={runTest}>
                {runningIds.size>0?'Running…':'Run test'}
              </button>
            </div>
            {showPublishModal&&accuracy!==null&&(
              <PublishModal accuracy={accuracy} testedCount={validated.length} matchedCount={matched.length}
                onConfirm={note=>{onApprove(activeTab,{text:prompt,accuracy,testedCount:validated.length,matchedCount:matched.length,note,publishedAt:new Date().toISOString()});setShowPublishModal(false);}}
                onClose={()=>setShowPublishModal(false)}/>
            )}
          </div>
        );
      })()}
      {showSelectFile&&<SelectFileModal docs={docs} dataSets={dataSets}
        onConfirm={ids=>{
          const sel=docs.filter(d=>ids.includes(d.id));
          setSelectedFiles(sel);
          setShowSelectFile(false);
        }}
        onClose={()=>setShowSelectFile(false)}/>}
    </main>
  );
}


/* ── Document Panel (Doc Library — upload & organize only) ── */
function UploadModal({rawFiles,dataSets,addDataSet,onConfirm,onClose}){
  const fmt=b=>b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';
  const [items,setItems]=useState(()=>rawFiles.map(f=>({file:f,dataSetId:dataSets[0]?.id||'',expectedLabels:[],addLabelInput:''})));
  const [bulkDs,setBulkDs]=useState(dataSets[0]?.id||'');
  const [bulkLabels,setBulkLabels]=useState([]);
  const [bulkLabelInput,setBulkLabelInput]=useState('');
  const [showCreateDs,setShowCreateDs]=useState(dataSets.length===0);
  const [createDsName,setCreateDsName]=useState('');

  const upd=(i,patch)=>setItems(it=>it.map((x,j)=>j===i?{...x,...patch}:x));
  const remove=i=>setItems(it=>{const n=it.filter((_,j)=>j!==i);if(!n.length)onClose();return n;});
  const addExp=(i,label)=>{if(!label.trim())return;setItems(it=>it.map((x,j)=>j===i&&x.expectedLabels.length<2&&!x.expectedLabels.includes(label.trim())?{...x,expectedLabels:[...x.expectedLabels,label.trim()],addLabelInput:''}:x));};
  const rmExp=(i,label)=>setItems(it=>it.map((x,j)=>j===i?{...x,expectedLabels:x.expectedLabels.filter(l=>l!==label)}:x));
  const addBulkLabel=label=>{
    const l=label.trim();if(!l||bulkLabels.length>=2||bulkLabels.includes(l))return;
    setBulkLabels(ls=>[...ls,l]);setBulkLabelInput('');
    setItems(it=>it.map(x=>x.expectedLabels.includes(l)||x.expectedLabels.length>=2?x:{...x,expectedLabels:[...x.expectedLabels,l]}));
  };
  const removeBulkLabel=l=>{setBulkLabels(ls=>ls.filter(x=>x!==l));setItems(it=>it.map(x=>({...x,expectedLabels:x.expectedLabels.filter(e=>e!==l)})));};
  const applyToAll=()=>setItems(it=>it.map(x=>({...x,dataSetId:bulkDs,expectedLabels:[...bulkLabels]})));

  const handleCreateDs=()=>{
    if(!createDsName.trim())return;
    const id=addDataSet(createDsName.trim());
    setBulkDs(id);
    setItems(it=>it.map(x=>({...x,dataSetId:id})));
    setCreateDsName('');
    setShowCreateDs(false);
  };

  const canAdd=items.length>0&&items.every(x=>x.dataSetId||bulkDs);
  const handleConfirm=()=>{
    const newDocs=items.map(x=>{
      const dsId=x.dataSetId||bulkDs;
      if(!dsId)return null;
      return{id:Date.now()+Math.random(),name:x.file.name,size:fmt(x.file.size),dataSetId:dsId,
        expectedLabels:x.expectedLabels.length?x.expectedLabels:[...bulkLabels],
        status:'Pending',selected:false,lastTest:null};
    }).filter(Boolean);
    if(newDocs.length)onConfirm(newDocs);
  };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="upm" onClick={e=>e.stopPropagation()}>
        <div className="upm__hdr">
          <span className="upm__title">Add files <span>({items.length})</span></span>
          <button className="modal__close" onClick={onClose}>×</button>
        </div>
        <div className="upm__bulk">
          <div className="upm__bulk-hdr">
            <span className="upm__bulk-title">Apply to all</span>
            {items.length>1&&<button className="upm__apply-btn" onClick={applyToAll}>Apply ↓</button>}
          </div>
          <div className="upload-pending__row">
            <span className="upload-pending__label">Data Set</span>
            {dataSets.length===0&&!showCreateDs
              ?<span className="upm__empty-ds">No datasets yet —</span>
              :<select className="upload-pending__sel" value={bulkDs}
                  onChange={e=>setBulkDs(e.target.value)}>
                  {dataSets.map(ds=><option key={ds.id} value={ds.id}>{ds.name}</option>)}
                </select>
            }
            <button className="upm__new-ds-link" onClick={()=>setShowCreateDs(s=>!s)}>
              {showCreateDs?'Cancel':'+ New'}
            </button>
          </div>
          {showCreateDs&&(
            <div className="upm__create-ds">
              <input autoFocus placeholder="Dataset name…" value={createDsName}
                onChange={e=>setCreateDsName(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter')handleCreateDs();if(e.key==='Escape')setShowCreateDs(false);}}/>
              <button className="upm__create-ds-ok" onClick={handleCreateDs} disabled={!createDsName.trim()}>Create</button>
            </div>
          )}
          <div className="upload-pending__row">
            <span className="upload-pending__label">Label</span>
            <div className="upload-pending__chips">
              {bulkLabels.map(l=><span key={l} className="upload-pending__chip">{l}<span className="upload-pending__chip-rm" onClick={()=>removeBulkLabel(l)}>×</span></span>)}
              {bulkLabels.length<2&&<input className="upload-pending__input" style={{width:'90px'}} placeholder="Add label…" value={bulkLabelInput}
                onChange={e=>setBulkLabelInput(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter'||e.key===','){addBulkLabel(bulkLabelInput);}}}/>}
            </div>
            {bulkLabels.length>0&&<span style={{fontSize:10,color:'#888',marginLeft:4}}>applied to all</span>}
          </div>
        </div>
        <div className="upm__body">
          {items.map((x,i)=>(
            <div key={i} className="upm__row">
              <div className="upm__row-hdr">
                <span className="upm__fname" title={x.file.name}>{x.file.name}</span>
                <span className="upm__fsize">{fmt(x.file.size)}</span>
                <button className="upm__remove" onClick={()=>remove(i)} title="Remove">×</button>
              </div>
              <div className="upload-pending__row">
                <span className="upload-pending__label">Data Set</span>
                <select className="upload-pending__sel" value={x.dataSetId}
                  onChange={e=>upd(i,{dataSetId:e.target.value})}>
                  {dataSets.map(ds=><option key={ds.id} value={ds.id}>{ds.name}</option>)}
                  {!x.dataSetId&&<option value="">— select —</option>}
                </select>
              </div>
              <div className="upload-pending__row">
                <span className="upload-pending__label">Expect</span>
                <div className="upload-pending__chips">
                  {x.expectedLabels.map(l=><span key={l} className="upload-pending__chip">{l}<span className="upload-pending__chip-rm" onClick={()=>rmExp(i,l)}>×</span></span>)}
                  {x.expectedLabels.length<2&&<input className="upload-pending__input" style={{width:'90px'}} placeholder="Add label…" value={x.addLabelInput||''}
                    onChange={e=>upd(i,{addLabelInput:e.target.value})}
                    onKeyDown={e=>{if(e.key==='Enter'||e.key===',')addExp(i,x.addLabelInput||'');}}/>}
                </div>
              </div>
            </div>
          ))}
        </div>
        <div className="upm__ftr">
          <button className="btn btn-outline" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleConfirm} disabled={!canAdd}>
            Add {items.length} file{items.length>1?'s':''}
          </button>
        </div>
      </div>
    </div>
  );
}

function DocumentPanel({docs,dataSets,onAddDocs,delDoc,addDataSet,delDataSet,style}){
  const [dragOver,setDragOver]=useState(false);
  const [rawFiles,setRawFiles]=useState([]);
  const [openSets,setOpenSets]=useState(()=>Object.fromEntries((dataSets||[]).map(ds=>[ds.id,true])));
  const fileRef=useRef(null);

  const processRawFiles=files=>{
    const valid=Array.from(files).filter(f=>['image/jpeg','image/png','application/pdf'].includes(f.type)&&f.size<=5*1024*1024);
    if(!valid.length)return;
    setRawFiles(valid);
  };
  const handleUploadConfirm=newDocs=>{onAddDocs(newDocs);setRawFiles([]);};
  const handleUploadClose=()=>setRawFiles([]);

  return(
    <aside className="doc-panel" style={style}>
      {/* Upload zone */}
      <div className="doc-panel__upload">
        <p className="doc-panel__sec-title">Upload files</p>
        <p className="doc-panel__sec-desc">Up to 5 files, only PDF, PNG and JPEG files, filesize up to 5 MB</p>
        <div className={`doc-panel__dropzone${dragOver?' drag-over':''}`}
          onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
          onDrop={e=>{e.preventDefault();setDragOver(false);processRawFiles(e.dataTransfer.files);}}
          onClick={()=>fileRef.current?.click()}>
          <input ref={fileRef} type="file" accept=".jpg,.jpeg,.png,.pdf" multiple style={{display:'none'}} onChange={e=>processRawFiles(e.target.files)}/>
          <IC.Upload/>
          <p className="doc-panel__dz-text">Drag and drop files here or</p>
          <span className="doc-panel__browse">Choose files</span>
        </div>
      </div>
      {rawFiles.length>0&&<UploadModal rawFiles={rawFiles} dataSets={dataSets} addDataSet={addDataSet} onConfirm={handleUploadConfirm} onClose={handleUploadClose}/>}

      {/* Dataset library */}
      <div className="dlib__sets">
        <div className="dlib__hdr">
          <span className="dlib__title">Document Library</span>
          <button className="dlib__new-set" onClick={()=>{const n=window.prompt('New Data Set name:');if(n?.trim())addDataSet(n.trim());}}>+ New dataset</button>
        </div>
        {dataSets.map(ds=>{
          const setDocs=docs.filter(d=>d.dataSetId===ds.id);
          const isOpen=openSets[ds.id]!==false;
          return(
            <div key={ds.id} className="dlib__group">
              <div className="dlib__group-hdr" onClick={()=>setOpenSets(o=>({...o,[ds.id]:!o[ds.id]}))}>
                <span className="dlib__group-dot" style={{background:ds.color}}/>
                <span className="dlib__group-name">{ds.name}</span>
                <span className="dlib__group-count">{setDocs.length}</span>
                <button className="ds-doc-del" title="Delete data set" onClick={e=>{e.stopPropagation();if(window.confirm(`Delete "${ds.name}" and its ${setDocs.length} document(s)?`))delDataSet(ds.id);}}><IC.Trash/></button>
                <span className={`dlib__group-chev${isOpen?' dlib__group-chev--open':''}`}><IC.ChevDown s={12}/></span>
              </div>
              {isOpen&&<div className="dlib__group-body">
                {setDocs.length===0
                  ?<div className="ds-empty">No documents yet</div>
                  :setDocs.map(doc=>{
                    const st=docStatus(doc);
                    const stLabel=st==='tested'?'✓ Tested':st==='failed'?'✗ Failed':st==='no-label'?'No Label':'Pending';
                    return(
                      <div key={doc.id} className="dlib__doc">
                        <span className="dlib__doc-name" title={doc.name}>{doc.name}</span>
                        {doc.size&&<span className="dlib__doc-size">{doc.size}</span>}
                        <span className={`dlib__doc-status dlib__doc-status--${st}`}>{stLabel}</span>
                        <button className="ds-doc-del" onClick={()=>delDoc(doc.id)} title="Remove"><IC.Trash/></button>
                      </div>
                    );
                  })
                }
              </div>}
            </div>
          );
        })}
        {dataSets.length===0&&<div className="ds-empty" style={{paddingTop:'20px'}}>No data sets yet</div>}
      </div>
    </aside>
  );
}

/* targets = [{id,name}]  — categories for Stage 1, types for Stage 2
   testTitle  = string shown in modal header
   expectedPlaceholder = hint text for the expected input */
function TestModal({prompt,docs,onMarkTested,onClose,targets=[],testTitle='Test Prompt',onAddDoc,addToast}){
  const allDocs=docs||[];
  const [docSearch,setDocSearch]=useState('');
  const [selDoc,setSelDoc]=useState(()=>allDocs.find(d=>d.status==='Pending')?.id||allDocs[0]?.id||null);
  const [expectedLabel,setExpectedLabel]=useState('');
  const [running,setRunning]=useState(false);
  const [result,setResult]=useState(null);
  const [showPrompt,setShowPrompt]=useState(false);
  const [docResults,setDocResults]=useState({});
  const fileRef=useRef(null);

  useEffect(()=>{setResult(null);setExpectedLabel('');},[selDoc]);

  const filteredDocs=allDocs.filter(d=>!docSearch||d.name.toLowerCase().includes(docSearch.toLowerCase()));

  const processFiles=files=>{
    const all=Array.from(files);
    const valid=all.filter(f=>['image/jpeg','image/png','application/pdf'].includes(f.type)&&f.size<=5*1024*1024);
    if(onAddDoc)valid.forEach(f=>onAddDoc({id:Date.now()+Math.random(),name:f.name,status:'Pending',selected:false}));
    if(valid.length>0&&addToast)addToast(`${valid.length} file(s) added`,'success');
    if(all.filter(f=>!['image/jpeg','image/png','application/pdf'].includes(f.type)).length>0&&addToast)addToast('Some files rejected — PDF/JPG/PNG only','error');
    if(all.filter(f=>f.type&&f.size>5*1024*1024).length>0&&addToast)addToast('Some files rejected — max 5MB','error');
  };

  const getDocBadge=doc=>{
    const dr=docResults[doc.id];
    if(!dr)return{label:'Untested',cls:'untested'};
    if(dr.matched===true)return{label:'✓ Match',cls:'matched'};
    if(dr.matched===false)return{label:'✗ Mismatch',cls:'mismatched'};
    return{label:'Tested',cls:'tested'};
  };

  const run=()=>{
    const doc=allDocs.find(d=>d.id===selDoc);
    if(!doc)return;
    setRunning(true);setResult(null);
    const effectiveTargets=targets.length>0
      ?targets
      :[{id:'doc',name:doc.name.replace(/\.(pdf|jpg|jpeg|png)$/i,'').replace(/[_-]/g,' ')||'Document'}];
    const r=mockClassify(doc.name,effectiveTargets);
    const delay=r?.processingMs||1400;
    setTimeout(()=>{
      const matched=expectedLabel
        ?r.classification.toLowerCase().trim()===expectedLabel.toLowerCase().trim()
        :null;
      const full={...r,expectedLabel,matched};
      setResult(full);
      setDocResults(prev=>({...prev,[selDoc]:full}));
      setRunning(false);
      if(selDoc&&onMarkTested)onMarkTested(selDoc);
    },delay);
  };

  const confNum=result?parseFloat(result.confidence)||0:0;
  const confColor=confNum>=85?'#006b00':confNum>=70?'#e07000':'#cc0000';

  return(<div className="modal-overlay" onClick={onClose}><div className="modal lg" onClick={e=>e.stopPropagation()}>
    <div className="modal__header">
      <div>
        <h3>{testTitle}</h3>
        {targets.length>0&&<div style={{fontSize:'11px',color:'#9ca3af',marginTop:'2px'}}>
          {targets.length} target{targets.length!==1?'s':''}: {targets.slice(0,4).map(t=>t.name).join(', ')}{targets.length>4?` +${targets.length-4} more`:''}
        </div>}
      </div>
      <button className="modal__close" onClick={onClose}>×</button>
    </div>
    <div className="modal__body"><div className="test-modal">

      {/* ── 1. Doc selector ── */}
      <div className="test-doc-section">
        <h4>Select document</h4>
        <input className="test-doc-search" placeholder="Search…" value={docSearch} onChange={e=>setDocSearch(e.target.value)}/>
        {onAddDoc&&<div className="test-doc-upload-row" onClick={()=>fileRef.current?.click()}>
          <input ref={fileRef} type="file" accept=".jpg,.jpeg,.png,.pdf" multiple style={{display:'none'}} onChange={e=>processFiles(e.target.files)}/>
          <span style={{fontSize:'13px'}}>↑</span> Upload document
        </div>}
        {filteredDocs.length===0
          ?<div className="test-doc-none">{allDocs.length===0?'No documents yet — upload one above.':'No documents match your search.'}</div>
          :<div className="test-doc-list">{filteredDocs.map(d=>{
            const badge=getDocBadge(d);
            return(
              <label key={d.id} className={`test-doc-item${selDoc===d.id?' selected':''}`} onClick={()=>setSelDoc(d.id)}>
                <input type="radio" name="testDoc" checked={selDoc===d.id} onChange={()=>setSelDoc(d.id)}/>
                <IC.File/>
                <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.name}</span>
                <span className={`test-status-badge test-status-badge--${badge.cls}`}>{badge.label}</span>
              </label>
            );
          })}</div>
        }
      </div>

      {/* ── 2. Expected label (appears after doc selected) ── */}
      {selDoc&&!running&&(
        <div className="test-expect-row">
          <span className="test-expect-lbl">I expect this to be</span>
          <select className="test-expect-sel" value={expectedLabel} onChange={e=>{setExpectedLabel(e.target.value);setResult(null);}}>
            <option value="">— No expectation (skip) —</option>
            {targets.map(t=><option key={t.id} value={t.name}>{t.name}</option>)}
          </select>
        </div>
      )}

      {/* ── Prompt toggle ── */}
      <button className="test-prompt-toggle" onClick={()=>setShowPrompt(s=>!s)}>
        {showPrompt?'▾':'▸'} {showPrompt?'Hide prompt':'View prompt'}
      </button>
      {showPrompt&&<div className="preview-box" style={{marginBottom:'8px'}}><pre>{prompt}</pre></div>}

      {/* ── Running ── */}
      {running&&<div className="test-running"><div className="test-spinner"/><span>Classifying document…</span></div>}

      {/* ── Result card ── */}
      {result&&(()=>{
        const {matched}=result;
        const hdr=matched===true?'match':matched===false?'mismatch':'neutral';
        return(
          <div className="tr-card">
            {/* Header */}
            <div className={`tr-card__header tr-card__header--${hdr}`}>
              <div>
                <div className="tr-card__label">Predicted classification</div>
                <div className="tr-card__predicted">{result.classification}</div>
              </div>
              <span className={`tr-card__verdict tr-card__verdict--${hdr}`}>
                {matched===true?'✓ Match':matched===false?'✗ Mismatch':'Result'}
              </span>
            </div>
            {/* Confidence bar */}
            <div className="tr-conf">
              <span className="tr-conf__title">Confidence</span>
              <div className="tr-conf__bar"><div className="tr-conf__fill" style={{width:result.confidence,background:confColor}}/></div>
              <span className="tr-conf__val" style={{color:confColor}}>{result.confidence}</span>
            </div>
            {/* Expected vs Predicted (only when expected was set) */}
            {matched!==null&&(
              <div className={`tr-compare tr-compare--${matched?'match':'mismatch'}`}>
                <div className="tr-compare__col">
                  <span className="tr-compare__lbl">Expected</span>
                  <span className="tr-compare__val">{result.expectedLabel}</span>
                </div>
                <span className="tr-compare__arrow">{matched?'✓':'✗'}</span>
                <div className="tr-compare__col">
                  <span className="tr-compare__lbl">Predicted</span>
                  <span className="tr-compare__val">{result.classification}</span>
                </div>
              </div>
            )}
            {/* Reasoning */}
            <div className="tr-reasoning">{result.reasoning}</div>
            {/* Mismatch: actionable hint */}
            {matched===false&&(
              <div className="tr-hint">
                <span>💡 Prompt may need adjustment to better distinguish these document types.</span>
                <button className="tr-hint__btn" onClick={onClose}>Open editor →</button>
              </div>
            )}
            {/* No expectation: offer to set */}
            {matched===null&&(
              <div className="tr-no-expect">
                <span>No expected label — result only</span>
                <button className="tr-no-expect__btn" onClick={()=>setResult(null)}>Set expected & retest →</button>
              </div>
            )}
          </div>
        );
      })()}

    </div></div>
    <div className="modal__footer">
      <button className="btn btn-outline" onClick={onClose}>Close</button>
      <button className="btn btn-primary" onClick={run} disabled={running||!selDoc}>
        {running?'Running…':result?'Run again':'Run Test'}
      </button>
    </div>
  </div></div>);
}

/* ── Browse Classification Tree Modal ── */
function ClassificationTreeModal({lobs,activeLobId,onClose}){
  const scopedLobs=activeLobId?lobs.filter(l=>l.id===activeLobId):lobs;
  const [expandedLobs,setExpandedLobs]=useState(()=>{
    const e={};
    if(activeLobId){e[activeLobId]=true;}
    else if(scopedLobs[0]){e[scopedLobs[0].id]=true;}
    return e;
  });
  const [expandedCats,setExpandedCats]=useState(()=>{
    const e={};
    const target=activeLobId?lobs.find(l=>l.id===activeLobId):scopedLobs[0];
    if(target&&target.categories[0])e[target.categories[0].id+target.id]=true;
    return e;
  });
  const toggleLob=id=>setExpandedLobs(e=>({...e,[id]:!e[id]}));
  const toggleCat=id=>setExpandedCats(e=>({...e,[id]:!e[id]}));

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal of-modal" onClick={e=>e.stopPropagation()}>
        <div className="modal__header">
          <h3>Browse Classification Tree{activeLobId&&scopedLobs[0]?` — ${scopedLobs[0].name}`:''}</h3>
          <button className="modal__close" onClick={onClose}>×</button>
        </div>
        <div className="modal__body">
          <div className="of-tree">
            {scopedLobs.length===0&&<div className="of-tree__empty">No classification data defined</div>}
            {scopedLobs.map(lob=>(
              <div key={lob.id} className="of-tree__lob">
                <button className="of-tree__lob-btn" onClick={()=>!activeLobId&&toggleLob(lob.id)}>
                  {!activeLobId&&<span className="of-tree__chev">{expandedLobs[lob.id]?'▾':'▸'}</span>}
                  <span className="of-tree__level-tag">{LABELS.l0.short}</span>
                  {lob.name}
                  <span className="of-tree__count">{lob.categories.length} {LABELS.l1.short}</span>
                </button>
                {(activeLobId||expandedLobs[lob.id])&&lob.categories.map(cat=>(
                  <div key={cat.id}>
                    <button className="of-tree__cat-btn" onClick={()=>toggleCat(cat.id+lob.id)}>
                      <span className="of-tree__chev">{expandedCats[cat.id+lob.id]?'▾':'▸'}</span>
                      <span className="of-tree__level-tag l1">{LABELS.l1.short}</span>
                      {cat.name}
                      {cat.types.length>0&&<span className="of-tree__count">{cat.types.length} {LABELS.l2.short}</span>}
                    </button>
                    {expandedCats[cat.id+lob.id]&&(
                      cat.types.length===0
                        ?<div className="of-tree__no-l2">No {LABELS.l2.short} defined</div>
                        :cat.types.map(type=>(
                          <div key={type.id} className="of-tree__type-row">
                            <span className="of-tree__level-tag l2">{LABELS.l2.short}</span>
                            {type.name}
                          </div>
                        ))
                    )}
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
        <div className="modal__footer">
          <button className="btn btn-primary" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

function ResizeHandle({onResize}){
  const activeRef=useRef(false);
  const [active,setActive]=useState(false);
  const onMouseDown=e=>{
    e.preventDefault();
    let lastX=e.clientX;
    activeRef.current=true;
    setActive(true);
    const onMove=e=>{if(!activeRef.current)return;const dx=e.clientX-lastX;lastX=e.clientX;onResize(dx);};
    const onUp=()=>{activeRef.current=false;setActive(false);document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  };
  return <div className={`resize-handle${active?' resize-handle--active':''}`} onMouseDown={onMouseDown}/>;
}

function CompletionHome({onOpen,addToast}){
  const [dateFrom,setDateFrom]=useState('');
  const [dateTo,setDateTo]=useState('');
  const [ingestionId,setIngestionId]=useState('');
  const [docCategory,setDocCategory]=useState('');
  const [statusFilter,setStatusFilter]=useState('');
  const [queueFilter,setQueueFilter]=useState('');
  const [mode,setMode]=useState('Manual');
  const [sortCol,setSortCol]=useState('date');
  const [sortDir,setSortDir]=useState('desc');
  const [pageNum,setPageNum]=useState(1);
  const [pageSize,setPageSize]=useState(10);
  const [selected,setSelected]=useState(new Set());
  const [moreFilters,setMoreFilters]=useState(false);
  const [localDocs,setLocalDocs]=useState(CMP_DOCS);

  const parseDocDate=s=>{const[dp]=s.split(' | ');const[d,m,y]=dp.split('-');return new Date(`${y}-${m}-${d}`);};

  const sort=(col)=>{
    if(sortCol===col){setSortDir(d=>d==='asc'?'desc':'asc');}
    else{setSortCol(col);setSortDir('asc');}
    setPageNum(1);
  };

  const handleDelete=()=>{
    const n=selected.size;
    setLocalDocs(prev=>prev.filter(d=>!selected.has(d.id)));
    setSelected(new Set());
    addToast?.(`${n} document${n>1?'s':''} deleted`,'warning');
  };
  const handleChangeQueue=()=>{addToast?.(`Change queue for ${selected.size} document${selected.size>1?'s':''}…`,'info');};

  const filtered=localDocs.filter(d=>{
    if(dateFrom&&parseDocDate(d.date)<new Date(dateFrom))return false;
    if(dateTo){const to=new Date(dateTo);to.setHours(23,59,59,999);if(parseDocDate(d.date)>to)return false;}
    if(ingestionId&&!d.id.includes(ingestionId))return false;
    if(docCategory&&!d.category.toLowerCase().includes(docCategory.toLowerCase()))return false;
    if(statusFilter&&d.status!==statusFilter)return false;
    if(queueFilter&&d.queue!==queueFilter)return false;
    return true;
  });

  const sorted=[...filtered].sort((a,b)=>{
    const v=sortDir==='asc'?1:-1;
    if(sortCol==='date')return a.date<b.date?-v:v;
    if(sortCol==='id')return a.id<b.id?-v:v;
    if(sortCol==='sender')return a.sender<b.sender?-v:v;
    if(sortCol==='user')return a.user<b.user?-v:v;
    if(sortCol==='status')return a.status<b.status?-v:v;
    if(sortCol==='category')return a.category<b.category?-v:v;
    if(sortCol==='queue')return a.queue<b.queue?-v:v;
    return 0;
  });

  const totalPages=Math.max(1,Math.ceil(sorted.length/pageSize));
  const rows=sorted.slice((pageNum-1)*pageSize,pageNum*pageSize);
  const allSelected=rows.length>0&&rows.every(r=>selected.has(r.id));
  const toggleAll=()=>{
    const next=new Set(selected);
    if(allSelected){rows.forEach(r=>next.delete(r.id));}
    else{rows.forEach(r=>next.add(r.id));}
    setSelected(next);
  };
  const toggleOne=id=>{const next=new Set(selected);next.has(id)?next.delete(id):next.add(id);setSelected(next);};

  const SortIco=({col})=>{
    if(sortCol!==col)return<span className="sort-icon">⇅</span>;
    return<span className="sort-icon" style={{color:'#003781'}}>{sortDir==='asc'?'↑':'↓'}</span>;
  };

  const pageNums=(()=>{
    if(totalPages<=7)return Array.from({length:totalPages},(_,i)=>i+1);
    const pages=[];pages.push(1);
    if(pageNum>3)pages.push('…');
    for(let i=Math.max(2,pageNum-1);i<=Math.min(totalPages-1,pageNum+1);i++)pages.push(i);
    if(pageNum<totalPages-2)pages.push('…');
    pages.push(totalPages);
    return pages;
  })();

  const clearFilters=()=>{setDateFrom('');setDateTo('');setIngestionId('');setDocCategory('');setStatusFilter('');setQueueFilter('');setPageNum(1);};

  return(
    <div className="ov-page">
      <h1 className="ov-title">Document list</h1>

      {/* Filters */}
      <div className="ov-filters">
        <div className="ov-filter-row">
          <div className="ov-filter-group">
            <span className="ov-filter-label">Date from:</span>
            <input type="date" className="ov-search" style={{width:160}} value={dateFrom} onChange={e=>{setDateFrom(e.target.value);setPageNum(1);}}/>
          </div>
          <div className="ov-filter-group">
            <span className="ov-filter-label">to:</span>
            <input type="date" className="ov-search" style={{width:160}} value={dateTo} onChange={e=>{setDateTo(e.target.value);setPageNum(1);}}/>
          </div>
          <div className="ov-filter-group">
            <span className="ov-filter-label">IngestionID</span>
            <input className="ov-search" value={ingestionId} onChange={e=>{setIngestionId(e.target.value);setPageNum(1);}} placeholder=""/>
          </div>
          <div className="ov-filter-group">
            <span className="ov-filter-label">Document Category</span>
            <input className="ov-search" style={{width:200}} value={docCategory} onChange={e=>{setDocCategory(e.target.value);setPageNum(1);}} placeholder=""/>
          </div>
          <div style={{display:'flex',alignItems:'flex-end',gap:8}}>
            <button className="btn btn-primary btn-sm" onClick={()=>setPageNum(1)}>Apply</button>
            <button className="btn btn-outline btn-sm" onClick={clearFilters}>Clear filters</button>
          </div>
        </div>
        <button style={{background:'none',border:'none',color:'#003781',fontSize:'12px',cursor:'pointer',display:'flex',alignItems:'center',gap:4,padding:0,fontFamily:'inherit'}} onClick={()=>setMoreFilters(v=>!v)}>
          More filters <span style={{fontSize:'10px'}}>{moreFilters?'▲':'▼'}</span>
        </button>
      </div>
      {moreFilters&&(
        <div className="ov-filter-row" style={{paddingTop:8,borderTop:'1px solid #ebebeb',marginTop:8}}>
          <div className="ov-filter-group">
            <span className="ov-filter-label">Status</span>
            <select className="ov-search" style={{width:140}} value={statusFilter} onChange={e=>{setStatusFilter(e.target.value);setPageNum(1);}}>
              <option value="">All</option>
              {[...new Set(CMP_DOCS.map(d=>d.status))].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div className="ov-filter-group">
            <span className="ov-filter-label">Queue</span>
            <select className="ov-search" style={{width:160}} value={queueFilter} onChange={e=>{setQueueFilter(e.target.value);setPageNum(1);}}>
              <option value="">All</option>
              {[...new Set(CMP_DOCS.map(d=>d.queue))].map(q=><option key={q} value={q}>{q}</option>)}
            </select>
          </div>
        </div>
      )}

      {/* Toolbar */}
      <div className="cmp-toolbar">
        <span style={{fontSize:'13px',color:'#767676',whiteSpace:'nowrap'}}>Ingestion mode</span>
        <div className="cmp-toggle">
          <button className={`cmp-toggle__btn ${mode==='Manual'?'cmp-toggle__btn--on':'cmp-toggle__btn--off'}`} onClick={()=>setMode('Manual')}>Manual</button>
          <button className={`cmp-toggle__btn ${mode==='Automatic'?'cmp-toggle__btn--on':'cmp-toggle__btn--off'}`} onClick={()=>setMode('Automatic')}>Automatic</button>
        </div>
        <div style={{flex:1}}/>
        <button className="btn btn-outline btn-sm" disabled={selected.size===0} onClick={handleChangeQueue}>Change queue</button>
        <button className="btn btn-outline btn-sm" disabled={selected.size===0} onClick={handleDelete}>Delete</button>
        <button className="btn btn-outline btn-sm" disabled={filtered.length===0} onClick={()=>addToast?.(`Exporting ${filtered.length} row${filtered.length>1?'s':''}…`,'success')}>Export to excel</button>
        <button className="btn btn-outline btn-sm" onClick={()=>{setLocalDocs(CMP_DOCS);setSelected(new Set());setPageNum(1);}}>Refresh</button>
      </div>

      {/* Table */}
      <div className="ov-table-wrap">
        <table className="ov-table">
          <thead>
            <tr>
              <th style={{width:40}}><input type="checkbox" className="cmp-checkbox" checked={allSelected} onChange={toggleAll}/></th>
              <th className="sortable" onClick={()=>sort('date')}>IngestionDate <SortIco col="date"/></th>
              <th className="sortable" onClick={()=>sort('id')}>IngestionID <SortIco col="id"/></th>
              <th className="sortable" onClick={()=>sort('sender')}>Sender <SortIco col="sender"/></th>
              <th className="sortable" onClick={()=>sort('user')}>User name <SortIco col="user"/></th>
              <th className="sortable" onClick={()=>sort('status')}>Status <SortIco col="status"/></th>
              <th className="sortable" onClick={()=>sort('category')}>Document Category <SortIco col="category"/></th>
              <th className="sortable" onClick={()=>sort('queue')}>Queue <SortIco col="queue"/></th>
              <th style={{width:40}}/>
            </tr>
          </thead>
          <tbody>
            {rows.length===0
              ?<tr><td colSpan={9} style={{textAlign:'center',color:'#767676',padding:'32px'}}>No documents found</td></tr>
              :rows.map(d=>(
              <tr key={d.id} onClick={()=>onOpen&&onOpen(d)}>
                <td onClick={e=>e.stopPropagation()}><input type="checkbox" className="cmp-checkbox" checked={selected.has(d.id)} onChange={()=>toggleOne(d.id)}/></td>
                <td style={{whiteSpace:'nowrap',color:'#767676'}}>{d.date}</td>
                <td style={{fontFamily:'monospace',fontSize:'12px',color:'#444'}}>{d.id}<span style={{marginLeft:4,cursor:'pointer',opacity:.4,fontSize:'12px'}}>⧉</span></td>
                <td style={{maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.sender}</td>
                <td>{d.user}</td>
                <td><span className={`status-chip status-chip--${d.status.toLowerCase()}`}>{d.status}</span></td>
                <td>{d.category}</td>
                <td>{d.queue}</td>
                <td><button className="cmp-action-btn" title="Open">✎</button></td>
              </tr>
            ))}
          </tbody>
        </table>
        <div className="ov-pagination">
          <div className="ov-pagination__left">
            Items per page:
            <select className="ov-per-page" value={pageSize} onChange={e=>{setPageSize(Number(e.target.value));setPageNum(1);}}>
              {[10,25,50].map(n=><option key={n}>{n}</option>)}
            </select>
          </div>
          <div className="ov-pagination__pages">
            <button className="page-btn" disabled={pageNum===1} onClick={()=>setPageNum(1)}>«</button>
            <button className="page-btn" disabled={pageNum===1} onClick={()=>setPageNum(p=>p-1)}>‹</button>
            {pageNums.map((p,i)=>
              p==='…'
                ?<span key={`d${i}`} className="page-ellipsis">…</span>
                :<button key={p} className={`page-btn${pageNum===p?' active':''}`} onClick={()=>setPageNum(p)}>{p}</button>
            )}
            <button className="page-btn" disabled={pageNum===totalPages} onClick={()=>setPageNum(p=>p+1)}>›</button>
            <button className="page-btn" disabled={pageNum===totalPages} onClick={()=>setPageNum(totalPages)}>»</button>
          </div>
        </div>
      </div>
    </div>
  );
}

          <span style={{flex:1}}>{n.label}</span>
          {hasDocs&&<span style={{color:'#bbb',display:'inline-flex',transform:isOpen?'rotate(0)':'rotate(-90deg)',transition:'transform .15s'}}><IC.ChevDown s={10}/></span>}
        </div>

        style={{display:'flex',alignItems:'center',gap:6,width:'100%',padding:'5px 14px',paddingLeft:14+depth*14,background:'none',border:'none',cursor:'pointer',textAlign:'left',fontSize:12,color:'#1a1a2e',fontFamily:'inherit',transition:'background .1s'}}
        onMouseEnter={e=>e.currentTarget.style.background='#f0f5ff'}

  });

        <div className="modal__body" style={{padding:'4px 0',maxHeight:360,overflowY:'auto'}}>
          {!hasAny&&<p style={{padding:'10px 16px',fontSize:13,color:'#767676'}}>No other documents available.</p>}
          {tree.map(cat=>{

                onClick={()=>hasDocs&&toggleCat(cat.id)}>
