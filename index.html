function DocTree({expanded,setExpanded,active,setActive}){
  const [tree,setTree]=useState(()=>JSON.parse(JSON.stringify(CMP_TREE)));
  const [drop,setDrop]=useState(null); // {id, pos:'before'|'after'|'into'}
  const drag=useRef(null);
  const [ctx,setCtx]=useState(null); // {nodeId,catId,isGroup,x,y}
  const [assignModal,setAssignModal]=useState(null); // {nodeId,catId}
  const [splitModal,setSplitModal]=useState(null); // {doc,catId}
  const [selPages,setSelPages]=useState(null); // {docId, indices: Set<number>}
  const [bulkMoveOpen,setBulkMoveOpen]=useState(false);
  const [selDocs,setSelDocs]=useState(new Set());
  const [bulkDocMoveOpen,setBulkDocMoveOpen]=useState(false);
  const selDocLastId=useRef(null);
  const [toast,setToast]=useState(null);
  const [newNodeIds,setNewNodeIds]=useState(new Set());
  const fileUploadRef=useRef(null);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const flashNodes=ids=>{setNewNodeIds(new Set(ids));setTimeout(()=>setNewNodeIds(new Set()),2000);};
  const handleUploadFiles=files=>{
    const arr=Array.from(files);if(!arr.length)return;
    const newNodes=arr.map(f=>{
      const isPdf=f.name.toLowerCase().endsWith('.pdf');
      const pageCount=isPdf?Math.min(10,Math.max(1,Math.ceil(f.size/50000))):1;
      const pages=Array.from({length:pageCount},(_,i)=>`Page ${i+1}`);
      return{id:`upload-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,type:'document',label:f.name.replace(/\.[^/.]+$/,''),pages};
    });
    setTree(t=>{const nt=clone(t);const uc=nt.find(c=>c.id==='unclassified');if(uc)uc.docs.push(...newNodes);return nt;});
    setExpanded(p=>({...p,unclassified:true}));
    flashNodes(newNodes.map(n=>n.id));
    showToast(`${newNodes.length} document${newNodes.length>1?'s':''} added to UnClassified`);
  };
  const selLastIdx=useRef(null);
  const [pageCtx,setPageCtx]=useState(null);
  const [rangeModal,setRangeModal]=useState(null);
  const [rangeFrom,setRangeFrom]=useState('');
  const [rangeTo,setRangeTo]=useState('');
  const openPageCtx=(e,docId,pi,totalPages)=>{e.stopPropagation();e.preventDefault();setPageCtx({docId,pi,x:e.clientX,y:e.clientY,totalPages});};
  const selectToEnd=()=>{if(!pageCtx)return;const{docId,pi,totalPages}=pageCtx;const idx=new Set();for(let i=pi;i<totalPages;i++)idx.add(i);setSelPages({docId,indices:idx});if(selDocs.size>0)setSelDocs(new Set());selLastIdx.current=pi;setPageCtx(null);};
  const selectFromStart=()=>{if(!pageCtx)return;const{docId,pi}=pageCtx;const idx=new Set();for(let i=0;i<=pi;i++)idx.add(i);setSelPages({docId,indices:idx});if(selDocs.size>0)setSelDocs(new Set());selLastIdx.current=pi;setPageCtx(null);};
  const openRangeModal=()=>{if(!pageCtx)return;setRangeFrom(String(pageCtx.pi+1));setRangeTo(String(pageCtx.totalPages));setRangeModal({docId:pageCtx.docId,totalPages:pageCtx.totalPages,x:pageCtx.x,y:pageCtx.y});setPageCtx(null);};
  const applyRange=()=>{if(!rangeModal)return;const f=parseInt(rangeFrom,10),t=parseInt(rangeTo,10);if(!f||!t||f<1||t>rangeModal.totalPages||f>t)return;const idx=new Set();for(let i=f-1;i<=t-1;i++)idx.add(i);setSelPages({docId:rangeModal.docId,indices:idx});if(selDocs.size>0)setSelDocs(new Set());selLastIdx.current=f-1;setRangeModal(null);};
  const toggle=id=>setExpanded(p=>({...p,[id]:!p[id]}));
  const clone=t=>JSON.parse(JSON.stringify(t));

  /* ── find any node (group or document) recursively ── */
  const findNode=(tr,nodeId)=>{
    for(let ci=0;ci<tr.length;ci++){
      const search=docs=>{
        for(let di=0;di<docs.length;di++){
          if(docs[di].id===nodeId)return{catIdx:ci,catId:tr[ci].id,parentDocs:docs,nodeIdx:di,node:docs[di]};
          if(docs[di].docs?.length){const r=search(docs[di].docs);if(r)return r;}
        }return null;
      };
      const r=search(tr[ci].docs);if(r)return r;
    }return null;
  };

  /* ── move node to root of a category ── */
  const moveNodeToCat=(nodeId,catId)=>setTree(prev=>{
    const t=clone(prev);const loc=findNode(t,nodeId);
    if(!loc||loc.catId===catId)return prev;
    const[node]=loc.parentDocs.splice(loc.nodeIdx,1);
    const cat=t.find(c=>c.id===catId);if(!cat)return prev;
    cat.docs.push(node);return t;
  });

  /* ── move node before/after a sibling ── */
  const moveNodeRelative=(nodeId,refId,pos)=>{
    if(nodeId===refId)return;
    setTree(prev=>{
      const t=clone(prev);
      const src=findNode(t,nodeId);const ref=findNode(t,refId);
      if(!src||!ref)return prev;
      const[node]=src.parentDocs.splice(src.nodeIdx,1);
      const ri=ref.parentDocs.findIndex(d=>d.id===refId);
      if(ri===-1)return prev;
      ref.parentDocs.splice(pos==='before'?ri:ri+1,0,node);
      return t;
    });
  };

  /* ── move node into a group ── */
  const moveNodeIntoGroup=(nodeId,groupId)=>{
    if(nodeId===groupId)return;
    setTree(prev=>{
      const t=clone(prev);
      const src=findNode(t,nodeId);const grp=findNode(t,groupId);
      if(!src||!grp||!grp.node.docs)return prev;
      const[node]=src.parentDocs.splice(src.nodeIdx,1);
      grp.node.docs.push(node);return t;
    });
  };

  /* ── move page between/within documents ── */
  const movePage=(fromDocId,fromPi,toDocId,toPi)=>setTree(prev=>{
    const t=clone(prev);
    const from=findNode(t,fromDocId);const to=findNode(t,toDocId);
    if(!from||!to)return prev;
    const[pg]=from.node.pages.splice(fromPi,1);
    let ins=toPi!==undefined?toPi:to.node.pages.length;
    if(fromDocId===toDocId&&fromPi<ins)ins--;
    to.node.pages.splice(Math.max(0,ins),0,pg);
    return t;
  });

  /* ── context menu actions ── */
  const handleAssign=(nodeId,catId)=>{moveNodeToCat(nodeId,catId);setAssignModal(null);};
  const handleSplit=(nodeId)=>{
    const loc=findNode(tree,nodeId);
    if(!loc||!loc.node.pages?.length){setCtx(null);return;}
    const ts=Date.now();
    const newIds=loc.node.pages.map((_,i)=>`${nodeId}-sp${i}-${ts+i}`);
    const count=loc.node.pages.length;
    setTree(prev=>{
      const t=clone(prev);const locT=findNode(t,nodeId);
      if(!locT)return prev;
      const newDocs=locT.node.pages.map((pg,i)=>({id:newIds[i],type:'document',label:`${locT.node.label} (${pg})`,pages:[pg]}));
      locT.parentDocs.splice(locT.nodeIdx,1,...newDocs);
      return t;
    });
    setCtx(null);
    flashNodes(newIds);
    showToast(`Split into ${count} document${count>1?'s':''}`);
  };
  const handleSplitAssign=(asgn)=>{
    const{doc}=splitModal;
    const ts=Date.now();
    const newIds=asgn.map((_,i)=>`${doc.id}-sa${i}-${ts+i}`);
    const catIds=[...new Set(asgn.map(a=>a.catId))];
    setTree(prev=>{
      const t=clone(prev);const loc=findNode(t,doc.id);
      if(!loc)return prev;
      loc.parentDocs.splice(loc.nodeIdx,1);
      asgn.forEach(({page,catId:cid},i)=>{
        const newDoc={id:newIds[i],type:'document',label:`${doc.label} (${page})`,pages:[page]};
        const cat=t.find(c=>c.id===cid);if(cat)cat.docs.push(newDoc);
      });
      return t;
    });
    // expand target categories so user can see the new nodes
    setExpanded(prev=>{const next={...prev};catIds.forEach(id=>{next[id]=true;});return next;});
    setSplitModal(null);setCtx(null);
    flashNodes(newIds);
    showToast(`Split into ${asgn.length} doc${asgn.length>1?'s':''} across ${catIds.length} categor${catIds.length>1?'ies':'y'}`);
  };
  const handleDelete=(nodeId)=>{
    setTree(prev=>{
      const t=clone(prev);const loc=findNode(t,nodeId);
      if(!loc)return prev;
      loc.parentDocs.splice(loc.nodeIdx,1);return t;
    });
    setCtx(null);
  };
  const openCtx=(e,nodeId,catId,isGroup)=>{
    e.stopPropagation();e.preventDefault();
    setCtx({nodeId,catId,isGroup,x:e.clientX,y:e.clientY});
  };

  /* ── document multi-selection ── */
  const toggleDoc=(e,docId,siblings)=>{
    e.stopPropagation();
    if(selPages)setSelPages(null); // clear page selection
    if(e.shiftKey&&selDocLastId.current!==null){
      const ids=siblings.map(s=>s.id);
      const li=ids.indexOf(selDocLastId.current);const ci=ids.indexOf(docId);
      if(li!==-1&&ci!==-1){
        const newSet=new Set(selDocs);
        const lo=Math.min(li,ci);const hi=Math.max(li,ci);
        for(let i=lo;i<=hi;i++)newSet.add(ids[i]);
        setSelDocs(newSet);return;
      }
    }
    const newSet=new Set(selDocs);
    if(newSet.has(docId))newSet.delete(docId);else newSet.add(docId);
    setSelDocs(newSet.size>0?newSet:new Set());
    selDocLastId.current=docId;
  };
  const handleBulkDocMove=(catId)=>{
    const n=selDocs.size;
    const catLabel=tree.find(c=>c.id===catId)?.label||'category';
    setTree(prev=>{
      const t=clone(prev);
      [...selDocs].forEach(docId=>{
        const loc=findNode(t,docId);
        if(!loc||loc.catId===catId)return;
        const[node]=loc.parentDocs.splice(loc.nodeIdx,1);
        const cat=t.find(c=>c.id===catId);if(cat)cat.docs.push(node);
      });
      return t;
    });
    setSelDocs(new Set());setBulkDocMoveOpen(false);
    showToast(`${n} document${n>1?'s':''} moved to ${catLabel}`);
  };
  const handleBulkDocDelete=()=>{
    const n=selDocs.size;
    setTree(prev=>{
      const t=clone(prev);
      const locs=[...selDocs].map(id=>findNode(t,id)).filter(Boolean);
      locs.sort((a,b)=>b.nodeIdx-a.nodeIdx);
      locs.forEach(loc=>loc.parentDocs.splice(loc.nodeIdx,1));
      return t;
    });
    setSelDocs(new Set());
    showToast(`${n} document${n>1?'s':''} deleted`);
  };

  /* ── page multi-selection ── */
  const togglePage=(e,docId,pi)=>{
    e.stopPropagation();
    if(selDocs.size>0)setSelDocs(new Set()); // clear doc selection
    if(e.shiftKey&&selPages?.docId===docId&&selLastIdx.current!==null){
      const lo=Math.min(selLastIdx.current,pi);
      const hi=Math.max(selLastIdx.current,pi);
      const newIdx=new Set(selPages.indices);
      for(let i=lo;i<=hi;i++)newIdx.add(i);
      setSelPages({docId,indices:newIdx});
    }else{
      if(selPages?.docId!==docId){
        setSelPages({docId,indices:new Set([pi])});
      }else{
        const newIdx=new Set(selPages.indices);
        if(newIdx.has(pi))newIdx.delete(pi);else newIdx.add(pi);
        setSelPages(newIdx.size>0?{docId,indices:newIdx}:null);
      }
      selLastIdx.current=pi;
    }
  };

  /* ── move multiple pages ── */
  const movePagesMulti=(fromDocId,indices,toDocId,toPi)=>setTree(prev=>{
    const t=clone(prev);
    const from=findNode(t,fromDocId);const to=findNode(t,toDocId);
    if(!from||!to)return prev;
    const sorted=[...indices].sort((a,b)=>b-a);
    const pages=sorted.map(i=>from.node.pages[i]);
    sorted.forEach(i=>from.node.pages.splice(i,1));
    pages.reverse();
    let ins=toPi!==undefined?toPi:to.node.pages.length;
    if(fromDocId===toDocId){const removedBefore=sorted.filter(i=>i<ins).length;ins=Math.max(0,ins-removedBefore);}
    to.node.pages.splice(ins,0,...pages);
    return t;
  });

  /* ── bulk action handlers ── */
  const handleBulkMove=(toDocId)=>{
    if(!selPages)return;
    const n=selPages.indices.size;
    const dest=findNode(tree,toDocId)?.node?.label||'document';
    movePagesMulti(selPages.docId,[...selPages.indices],toDocId,undefined);
    setSelPages(null);setBulkMoveOpen(false);
    showToast(`${n} page${n>1?'s':''} moved to "${dest}"`);
  };
  const handleBulkNewDoc=()=>{
    if(!selPages)return;
    const newId=`nd-${Date.now()}`;
    const n=selPages.indices.size;
    const srcLoc=findNode(tree,selPages.docId);
    const srcLabel=srcLoc?.node?.label||'Document';
    setTree(prev=>{
      const t=clone(prev);const loc=findNode(t,selPages.docId);
      if(!loc)return prev;
      const sorted=[...selPages.indices].sort((a,b)=>a-b);
      const pages=sorted.map(i=>loc.node.pages[i]);
      [...sorted].reverse().forEach(i=>loc.node.pages.splice(i,1));
      const newDoc={id:newId,type:'document',label:`${srcLabel} (split)`,pages};
      if(loc.node.pages.length===0){loc.parentDocs.splice(loc.nodeIdx,1,newDoc);}
      else{loc.parentDocs.splice(loc.nodeIdx+1,0,newDoc);}
      return t;
    });
    setSelPages(null);
    flashNodes([newId]);
    showToast(`${n} page${n>1?'s':''} split into new document`);
  };
  const handleBulkDelete=()=>{
    if(!selPages)return;
    setTree(prev=>{
      const t=clone(prev);const loc=findNode(t,selPages.docId);
      if(!loc)return prev;
      [...selPages.indices].sort((a,b)=>b-a).forEach(i=>loc.node.pages.splice(i,1));
      return t;
    });
    setSelPages(null);
  };
  const deletePage=(docId,pi)=>{
    setTree(prev=>{
      const t=clone(prev);const loc=findNode(t,docId);
      if(!loc)return prev;
      loc.node.pages.splice(pi,1);
      return t;
    });
    // clear selection if the deleted page was selected
    setSelPages(prev=>{
      if(!prev||prev.docId!==docId)return prev;
      const newIdx=new Set(prev.indices);newIdx.delete(pi);
      // shift indices > pi down by 1
      const shifted=new Set([...newIdx].map(i=>i>pi?i-1:i));
      return shifted.size>0?{docId,indices:shifted}:null;
    });
  };

  /* ── drag handlers ── */
  const onStart=(e,info)=>{drag.current=info;e.dataTransfer.effectAllowed='move';e.stopPropagation();};
  const onEnd=()=>{setDrop(null);drag.current=null;};
  const onLeave=e=>{if(!e.currentTarget.contains(e.relatedTarget))setDrop(null);};
  // 3-zone for groups (top 25% before, mid into, bottom 25% after), 2-zone for docs
  const getZone=(e,isGroupTarget)=>{
    const r=e.currentTarget.getBoundingClientRect();
    const pct=(e.clientY-r.top)/r.height;
    if(!isGroupTarget)return pct<0.5?'before':'after';
    if(pct<0.25)return'before';if(pct>0.75)return'after';return'into';
  };
  const onOver=(e,id,pos,valid)=>{
    e.preventDefault();e.stopPropagation();
    if(valid){e.dataTransfer.dropEffect='move';setDrop({id,pos});}
    else e.dataTransfer.dropEffect='none';
  };
  const onDrop=(e,handler)=>{
    e.preventDefault();e.stopPropagation();
    if(drag.current)handler();
    setDrop(null);drag.current=null;
  };

  /* ── insert line ── */
  const InsLine=({id})=>(
    <div style={{height:drop?.id===id?3:0,background:'#003781',borderRadius:2,margin:'1px 8px',transition:'height .1s'}}/>
  );

  /* ── render pages ── */
  const renderPages=(doc,depth)=>doc.pages?.map((pg,pi)=>{
    const isSel=selPages?.docId===doc.id&&selPages.indices.has(pi);
    const isDraggingSingle=drag.current?.type==='page'&&drag.current.docId===doc.id&&drag.current.pageIdx===pi;
    const isDraggingMulti=drag.current?.type==='pages'&&drag.current.docId===doc.id&&drag.current.indices?.has(pi);
    const isDragging=isDraggingSingle||isDraggingMulti;
    const dropId=`p-${doc.id}-${pi}`;
    return(
      <div key={`${doc.id}-pg-${pi}`}
        draggable
        onDragStart={e=>{
          if(isSel&&selPages.indices.size>1){
            onStart(e,{type:'pages',docId:doc.id,indices:new Set(selPages.indices)});
          }else{
            onStart(e,{type:'page',docId:doc.id,pageIdx:pi});
          }
        }}
        onDragEnd={onEnd}
        onDragOver={e=>{
          const dt=drag.current?.type;
          if(dt==='page'||dt==='pages'){const pos=getZone(e,false);onOver(e,dropId,pos,true);}
        }}
        onDragLeave={onLeave}
        onDrop={e=>onDrop(e,()=>{
          const ins=drop?.pos==='before'?pi:pi+1;
          if(drag.current.type==='page')movePage(drag.current.docId,drag.current.pageIdx,doc.id,ins);
          else if(drag.current.type==='pages')movePagesMulti(drag.current.docId,[...drag.current.indices],doc.id,ins);
        })}>
        {drop?.id===dropId&&drop.pos==='before'&&<InsLine id={dropId}/>}
        <div className={`dtree__page-row${active===doc.id+pg?' dtree__page-row--active':''}${isDragging?' dtree__drag-ghost':''}${isSel?' dtree__page-row--selected':''}`}
          style={{paddingLeft:10+depth*12}} onClick={()=>setActive(doc.id+pg)}>
          <div className="dtree__page-cb" onClick={e=>togglePage(e,doc.id,pi)}>{isSel&&'✓'}</div>
          <span style={{flex:1}}>{pg}</span>
          <button className="dtree__page-more" onClick={e=>openPageCtx(e,doc.id,pi,doc.pages.length)}>⋮</button>
          <button className="dtree__del" onClick={e=>{e.stopPropagation();deletePage(doc.id,pi);}}>🗑</button>
        </div>
        {drop?.id===dropId&&drop.pos==='after'&&<InsLine id={dropId}/>}
      </div>
    );
  });

  /* ── render nodes (groups + documents, any depth) ── */
  const renderDocs=(docs,catId,depth=0)=>docs.map(d=>{
    const isGroup=d.type==='group';
    const isOpen=expanded[d.id];
    const isDragging=drag.current?.type==='node'&&drag.current.nodeId===d.id;
    const isDropInto=drop?.id===d.id&&drop.pos==='into';
    const hasChildren=isGroup?(d.docs?.length>0):(d.pages?.length>0);
    return(
      <div key={d.id}>
        {drop?.id===`bd-${d.id}`&&<InsLine id={`bd-${d.id}`}/>}
        <div className={`dtree__doc-row${active===d.id?' dtree__doc-row--active':''}${isDragging?' dtree__drag-ghost':''}${isDropInto?' dtree__doc-row--drop':''}${newNodeIds.has(d.id)?' dtree__doc-row--new':''}${selDocs.has(d.id)?' dtree__doc-row--sel':''}`}
          style={{paddingLeft:16+depth*12}}
          draggable
          onDragStart={e=>onStart(e,{type:'node',nodeId:d.id})}
          onDragEnd={onEnd}
          onDragOver={e=>{
            const dt=drag.current?.type;
            if(dt==='node'){
              const zone=getZone(e,isGroup);
              if(zone==='before')onOver(e,`bd-${d.id}`,'before',true);
              else if(zone==='after')onOver(e,`ad-${d.id}`,'after',true);
              else onOver(e,d.id,'into',true);
            }else if(dt==='page'&&!isGroup){onOver(e,d.id,'into',true);}
            else e.preventDefault();
          }}
          onDragLeave={onLeave}
          onDrop={e=>onDrop(e,()=>{
            if(drag.current.type==='node'){
              const pos=drop?.pos;const sl=findNode(tree,drag.current.nodeId)?.node?.label;
              if(pos==='before'||pos==='after')moveNodeRelative(drag.current.nodeId,d.id,pos);
              else if(pos==='into'&&isGroup){moveNodeIntoGroup(drag.current.nodeId,d.id);showToast(`"${sl}" moved into "${d.label}"`);}
            }else if(drag.current.type==='page'){
              const isCross=drag.current.docId!==d.id;
              const pgLabel=findNode(tree,drag.current.docId)?.node?.pages?.[drag.current.pageIdx];
              movePage(drag.current.docId,drag.current.pageIdx,d.id,undefined);
              if(isCross)showToast(`"${pgLabel}" moved to "${d.label}"`);
            }
          })}
          onClick={()=>{setActive(d.id);if(hasChildren)toggle(d.id);}}>
          <div className="dtree__page-cb" onClick={e=>toggleDoc(e,d.id,docs)}>{selDocs.has(d.id)&&'✓'}</div>
          <span style={{display:'flex',alignItems:'center',color:isGroup?(depth===0?'#3a6bc4':'#6b9fd4'):(depth===0?'#5a7ea8':'#8aaac4')}}>{isGroup?<IC.Folder s={13}/>:<IC.File/>}</span>
          <span style={{flex:1}}>{d.label}</span>
          {hasChildren&&<span className="dtree__chev" style={{transform:isOpen?'rotate(0)':'rotate(-90deg)'}}><IC.ChevDown s={10}/></span>}
          <button className="dtree__more-btn" onClick={e=>openCtx(e,d.id,catId,isGroup)}>⋮</button>
        </div>
        {drop?.id===`ad-${d.id}`&&<InsLine id={`ad-${d.id}`}/>}
        {isOpen&&isGroup&&<div className="dtree__group-sub">{renderDocs(d.docs,catId,depth+1)}</div>}
        {isOpen&&!isGroup&&hasChildren&&renderPages(d,depth)}
      </div>
    );
  });

  return(
    <div className="dtree" onClick={()=>{setCtx(null);setPageCtx(null);setRangeModal(null);}}>
      <input ref={fileUploadRef} type="file" accept=".jpg,.jpeg,.png,.pdf" multiple style={{display:'none'}} onChange={e=>{handleUploadFiles(e.target.files);e.target.value='';}}/>
      <button className="dtree__create" onClick={()=>fileUploadRef.current?.click()}>+ Upload Document</button>
      <div className="dtree__tree">
        {tree.map(cat=>{
          const isOpen=expanded[cat.id];const hasDocs=cat.docs?.length>0;
          const isCatDrop=drop?.id===`cat-${cat.id}`;
          return(
            <div key={cat.id} className="dtree__cat">
              <div className={`dtree__cat-row${active===cat.id?' dtree__cat-row--active':''}${isCatDrop?' dtree__cat-row--drop':''}`}
                onDragOver={e=>drag.current?.type==='node'&&onOver(e,`cat-${cat.id}`,'into',true)}
                onDragLeave={onLeave}
                onDrop={e=>onDrop(e,()=>{const sl=findNode(tree,drag.current.nodeId)?.node?.label;moveNodeToCat(drag.current.nodeId,cat.id);showToast(`"${sl}" moved to ${cat.label}`);})}
                onClick={()=>{setActive(cat.id);if(hasDocs)toggle(cat.id);}}>
                <span className="dtree__cat-ico"><IC.Folder s={14}/></span>
                <span>{cat.label}</span>
                {hasDocs&&<span className="dtree__chev" style={{transform:isOpen?'rotate(0)':'rotate(-90deg)'}}><IC.ChevDown s={10}/></span>}
              </div>
              {isOpen&&hasDocs&&<div className="dtree__sub">{renderDocs(cat.docs,cat.id)}</div>}
            </div>
          );
        })}
      </div>
      {(selDocs.size>0||(selPages&&selPages.indices.size>0))&&(
        <div className="dtree__bulk-bar" onClick={e=>e.stopPropagation()}>
          {selDocs.size>0?(
            <>
              <span className="dtree__bulk-count">{selDocs.size} doc{selDocs.size>1?'s':''}</span>
              <button className="dtree__bulk-btn" onClick={()=>setBulkDocMoveOpen(true)}>Move</button>
              <button className="dtree__bulk-btn dtree__bulk-btn--danger" onClick={handleBulkDocDelete}>Delete</button>
            </>
          ):(
            <>
              <span className="dtree__bulk-count">{selPages.indices.size} page{selPages.indices.size>1?'s':''}</span>
              <button className="dtree__bulk-btn" onClick={()=>setBulkMoveOpen(true)}>Move</button>
              <button className="dtree__bulk-btn" onClick={handleBulkNewDoc}>Split</button>
              <button className="dtree__bulk-btn dtree__bulk-btn--danger" onClick={handleBulkDelete}>Delete</button>
            </>
          )}
        </div>
      )}
      <div className="dtree__collapse"><button className="dtree__collapse-btn">«</button></div>
      {ctx&&(
        <div className="dtree-ctx" style={{top:ctx.y,left:ctx.x}} onClick={e=>e.stopPropagation()}>
          <button className="dtree-ctx__item" onClick={()=>{setAssignModal({nodeId:ctx.nodeId,catId:ctx.catId});setCtx(null);}}>Move to category</button>
          {!ctx.isGroup&&<>
            <button className="dtree-ctx__item" onClick={()=>handleSplit(ctx.nodeId)}>Split document</button>
            <button className="dtree-ctx__item" onClick={()=>{const loc=findNode(tree,ctx.nodeId);setSplitModal({doc:loc?.node,catId:ctx.catId});setCtx(null);}}>Split and assign</button>
          </>}
          <div className="dtree-ctx__sep"/>
          <button className="dtree-ctx__item dtree-ctx__item--danger" onClick={()=>handleDelete(ctx.nodeId)}>Delete</button>
        </div>
      )}
      {pageCtx&&(
        <div className="dtree-ctx" style={{top:pageCtx.y,left:pageCtx.x}} onClick={e=>e.stopPropagation()}>
          <button className="dtree-ctx__item" onClick={selectToEnd}>Select page {pageCtx.pi+1} to end</button>
          <button className="dtree-ctx__item" onClick={selectFromStart}>Select start to page {pageCtx.pi+1}</button>
          <div className="dtree-ctx__sep"/>
          <button className="dtree-ctx__item" onClick={openRangeModal}>Select range…</button>
        </div>
      )}
      {assignModal&&<AssignCatModal tree={tree} nodeId={assignModal.nodeId} nodeLabel={findNode(tree,assignModal.nodeId)?.node?.label||''} currentCatId={assignModal.catId} onAssign={handleAssign} onClose={()=>setAssignModal(null)}/>}
      {splitModal&&<SplitAssignModal tree={tree} doc={splitModal.doc} currentCatId={splitModal.catId} onConfirm={handleSplitAssign} onClose={()=>setSplitModal(null)}/>}
      {rangeModal&&(
        <>
        <div style={{position:'fixed',inset:0,zIndex:299}} onClick={()=>setRangeModal(null)}/>
        <div className="dtree-range" style={{top:rangeModal.y,left:rangeModal.x}} onClick={e=>e.stopPropagation()}>
          <div className="dtree-range__title">Select page range</div>
          <div className="dtree-range__row">
            <input className="dtree-range__input" type="number" min={1} max={rangeModal.totalPages} value={rangeFrom} onChange={e=>setRangeFrom(e.target.value)} onKeyDown={e=>e.key==='Enter'&&applyRange()} autoFocus/>
            <span style={{color:'#aaa',fontSize:13}}>–</span>
            <input className="dtree-range__input" type="number" min={1} max={rangeModal.totalPages} value={rangeTo} onChange={e=>setRangeTo(e.target.value)} onKeyDown={e=>e.key==='Enter'&&applyRange()}/>
          </div>
          <div className="dtree-range__hint">1 – {rangeModal.totalPages} pages</div>
          <button className="dtree-range__apply" onClick={applyRange}
            disabled={!rangeFrom||!rangeTo||parseInt(rangeFrom)<1||parseInt(rangeTo)>rangeModal.totalPages||parseInt(rangeFrom)>parseInt(rangeTo)}>
            Apply
          </button>
        </div>
        </>
      )}
      {toast&&<div className="dtree__toast">{toast}</div>}
      {bulkMoveOpen&&selPages&&<BulkMoveModal tree={tree} excludeDocId={selPages.docId} sourceLabel={findNode(tree,selPages.docId)?.node?.label||''} count={selPages.indices.size} onMove={handleBulkMove} onClose={()=>setBulkMoveOpen(false)}/>}
      {bulkDocMoveOpen&&<BulkDocMoveModal tree={tree} count={selDocs.size} docLabels={[...selDocs].map(id=>findNode(tree,id)?.node?.label||id)} onMove={handleBulkDocMove} onClose={()=>setBulkDocMoveOpen(false)}/>}
    </div>
  );
}

                    <table className="cdp-etbl" onClick={e=>e.stopPropagation()}>
                      <thead>
                        <tr>
                          {cols.map(c=>(
                            <th key={c}>
                              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:4}}>
                                {colLabels[c]}
                                <div className="cdp-col-menu">
                                  <button className="cdp-sec__ico" style={{fontSize:'11px'}} onClick={e=>{e.stopPropagation();setColMenu(colMenu===c?null:c);}}>⋮</button>
                                  {colMenu===c&&<div className="cdp-col-menu__dd">
                                    <button className="cdp-col-menu__item" onClick={()=>setColMenu(null)}>Delete column</button>
                                  </div>}
                                </div>
                              </div>
                            </th>
                          ))}
                          <th style={{width:26}}/>
                        </tr>
                      </thead>
                      <tbody>
                        {rows.map((row,i)=>(
                          <tr key={i}>
                            {cols.map(c=>(
                              <td key={c}>
                                <div className="cdp-cell">
                                  <input className="cdp-cell__in" value={row[c]} onChange={e=>setCell(i,c,e.target.value)}/>
                                  {row._v[c]&&<span className={`cdp-cell__ico ${icoClass(row._v[c])}`}>{icoChar(row._v[c])}</span>}
                                </div>
                              </td>
                            ))}
                            <td><button className="cdp-etbl__del" onClick={()=>delRow(i)}>🗑</button></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <button className="cdp-add-row" onClick={addRow}>+ Add row</button>
                </div>}
              </div>
            </div>}
          </div>
          {/* Second collapsed Tables section */}
          <div className="cdp-sec">
            <div className="cdp-sec__hdr" onClick={()=>{}}>
              <span className="cdp-sec__title">Tables</span>
              <button className="cdp-sec__ico" onClick={e=>e.stopPropagation()}>⤢</button>
              <button className="cdp-sec__ico">▼</button>
            </div>
          </div>
          {/* Footer actions */}
          <div style={{padding:'12px 14px',borderTop:'1px solid #d4d4d4',display:'flex',gap:8,justifyContent:'flex-end',marginTop:'auto',flexShrink:0}}>
            <button className="btn btn-outline btn-sm">Save draft</button>
            <button className="btn btn-outline btn-sm" style={{color:'#cc0000',borderColor:'#cc0000'}}>Reject</button>
            <button className="btn btn-primary btn-sm">Submit →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App({devOverrides={}}){
  const ds=useContext(DataCtx);
  const {toasts,addToast,removeToast}=useToast();
  const [page,setPage]=useState(devOverrides.page||'dashboard');
  const [activeNav,setActiveNav]=useState('home');
  const [completionDoc,setCompletionDoc]=useState(null);
  const [showOutputFormat,setShowOutputFormat]=useState(false);
  const [tabMeta,setTabMeta]=useState(devOverrides.tabMeta||{});
  const [ofActiveLobId,setOfActiveLobId]=useState(null);
  const [menus,setMenusState]=useState({user:false,tenant:false,lang:false});
  const setMenu=key=>setMenusState(m=>Object.fromEntries(Object.keys(m).map(k=>[k,k===key?!m[k]:false])));
  const handleNav=nav=>{
    if(nav==='home'){setPage('dashboard');setActiveNav('home');return;}
    if(nav==='classification'){setPage('lob-overview');setActiveNav('classification');return;}
    if(nav==='completion'){setPage('completion');setActiveNav('completion');setCompletionDoc(null);return;}
    addToast(`${nav.charAt(0).toUpperCase()+nav.slice(1)} section coming soon`,'info');
  };

  const [lobs,setLobs]=useState(devOverrides.lobs!==undefined?devOverrides.lobs:ds.lobs);
  const updateLobData=updated=>setLobs(ls=>ls.map(l=>l.id===updated.id?updated:l));

  /* Detail page state — initialized from selected LOB */
  const [selectedLobId,setSelectedLobId]=useState(devOverrides.selectedLobId||null);
  const [promptLevel,setPromptLevel]=useState(devOverrides.promptLevel||'class');
  const [sidebarW,setSidebarW]=useState(220);
  const [docPanelW,setDocPanelW]=useState(260);
  const [l1Items,setL1Items]=useState(devOverrides.l1Items||[]);
  const [l0Name,setL0Name]=useState(devOverrides.l0Name||'');
  const [activeL1Tab,setActiveL1Tab]=useState(devOverrides.activeL1Tab||'l1');
  const [activeTab,setActiveTab]=useState(devOverrides.activeTab||'l1');
  const [prompts,setPrompts]=useState(devOverrides.prompts||{});
  const [defaultPrompts,setDefaultPrompts]=useState(devOverrides.defaultPrompts||{});
  const [saveStates,setSaveStates]=useState(devOverrides.saveStates||{});
  const [publishedPrompts,setPublishedPrompts]=useState(devOverrides.publishedPrompts||{});
  const [approvedPrompts,setApprovedPrompts]=useState({});
  const saveTimers=useRef({});
  const [showMenu,setShowMenu]=useState(null);
  const [modal,setModal]=useState(null);
  const [confirmState,setConfirmState]=useState(null);
  // Data Sets
  const [dataSets,setDataSets]=useState(ds.datasets);
  const addDataSet=name=>{const id=`ds-${Date.now()}`;setDataSets(prev=>[...prev,{id,name,color:'#6b7280'}]);return id;};
  const delDataSet=id=>{setDataSets(prev=>prev.filter(d=>d.id!==id));setDocs(prev=>prev.filter(d=>d.dataSetId!==id));};

  // Global docs pool
  const [docs,setDocs]=useState(devOverrides.docs!==undefined?devOverrides.docs:[]);
  const [filter,setFilter]=useState('pending');
  // Sidebar active scroll target (L1-only mode)
  const [activeCatId,setActiveCatId]=useState(null);
  const scrollToCategory=id=>{
    setActiveCatId(id);
    if(promptLevel==='class'){setActiveL1Tab(id);setActiveTab(id);}
    else setTimeout(()=>{document.getElementById(`cat-sec-${id}`)?.scrollIntoView({behavior:'smooth',block:'start'});},50);
  };
  // L1 only mode: per-category docs {[catId]: [{id,name,status,selected}]}
  const [catDocs,setCatDocs]=useState({});
  const getCatDocs=catId=>catDocs[catId]||[];
  const setCatDocsFor=(catId,updater)=>setCatDocs(prev=>({...prev,[catId]:typeof updater==='function'?updater(prev[catId]||[]):updater}));
  const addCatDoc=(catId,doc)=>setCatDocsFor(catId,prev=>[...prev,doc]);
  const toggleCatSel=(catId,docId)=>setCatDocsFor(catId,prev=>prev.map(d=>d.id===docId?{...d,selected:!d.selected}:d));
  const delCatDoc=(catId,docId)=>{setCatDocsFor(catId,prev=>prev.filter(d=>d.id!==docId));addToast('Document removed','warning');};
  const markCatTested=(catId,docId)=>setCatDocsFor(catId,prev=>prev.map(d=>d.id===docId?{...d,status:'Tested',selected:false}:d));

  const onSelectLob=lob=>onManagePrompt(lob,null,null);

  const deleteLob=lobId=>{
    setLobs(ls=>ls.filter(l=>l.id!==lobId));
    setPage('lob-overview');
    addToast(`${LABELS.l0.label} deleted`,'warning');
  };
  const deleteCategory=(lobId,catId)=>{
    setLobs(ls=>ls.map(l=>l.id===lobId?{...l,categories:l.categories.filter(c=>c.id!==catId)}:l));
    addToast('Category deleted','warning');
  };
  const addCategory=(lobId,name)=>{
    const c={id:`cat-${Date.now()}`,name,activeVersion:'V.1',status:'Draft',confidence:0,trainedBy:'',prompt:'',types:[]};
    setLobs(ls=>ls.map(l=>l.id===lobId?{...l,categories:[...l.categories,c]}:l));
    addToast(`Category "${name}" added`);
  };
  const addType=(lobId,catId,name)=>{
    const t={id:`type-${Date.now()}`,name,tags:[],prompt:''};
    setLobs(ls=>ls.map(l=>l.id===lobId?{...l,categories:l.categories.map(c=>c.id===catId?{...c,types:[...c.types,t]}:c)}:l));
    addToast(`Type "${name}" added`);
  };

  const onManagePrompt=(lob,cat,type)=>{
    const newL1Items=lob.categories.map(c=>({
      id:c.id, name:c.name, expanded:false,
      l2:c.types.map(t=>({id:t.id, name:t.name}))
    }));
    const newPrompts={
      global:GLOBAL_PROMPT,
      l1:lob.lobPrompt||'',
      ...lob.categories.reduce((acc,c)=>{
        acc[c.id]=c.prompt||'';
        c.types.forEach(t=>{acc[t.id]=t.prompt||'';});
        return acc;
      },{})
    };
    // Build tab meta from live lob data — normalize 'Deployed' → 'Active'
    const normStatus=s=>s==='Deployed'?'Active':s;
    const meta={
      global:{version:'1.0',score:'N/A',status:'Active'},
      l1:{version:lob.classL1Version||'V.1',score:`${lob.confidence}%`,status:normStatus(lob.status)},
    };
    lob.categories.forEach(c=>{
      meta[c.id]={version:c.activeVersion||'V.1',score:`${c.confidence}%`,status:normStatus(c.status)};
      c.types.forEach(t=>{meta[t.id]={version:c.activeVersion||'V.1',score:`${c.confidence}%`,status:normStatus(c.status)};});
    });
    // Seed publishedPrompts for keys already Deployed/Active in source data
    const isLive=s=>s==='Deployed'||s==='Active';
    const seedPub={};
    if(isLive(lob.status)){
      const latestVer=lob.versions?.[lob.versions.length-1];
      const publishedAt=latestVer?new Date(latestVer.date+' 00:00:00').toISOString():new Date().toISOString();
      const accuracy=typeof lob.confidence==='number'?lob.confidence:parseInt(lob.confidence)||null;
      seedPub['l1']={text:lob.lobPrompt||'',accuracy,publishedAt,note:latestVer?.note||''};
    }
    lob.categories.forEach(c=>{
      if(isLive(c.status)){
        const accuracy=typeof c.confidence==='number'?c.confidence:parseInt(c.confidence)||null;
        const publishedAt=new Date().toISOString();
        seedPub[c.id]={text:c.prompt||'',accuracy,publishedAt,note:''};
        c.types.forEach(t=>{seedPub[t.id]={text:t.prompt||'',accuracy,publishedAt,note:''};});
      }
    });
    // Class mode: land on clicked category or first; Global: same
    const startTab=cat?cat.id:(newL1Items[0]?.id||'');
    const startL1Tab=startTab;
    setSelectedLobId(lob.id);
    setL1Items(newL1Items);
    setL0Name(lob.name);
    setPrompts(newPrompts);
    setDefaultPrompts(newPrompts);
    setTabMeta(meta);
    setSaveStates({});
    setActiveTab(startTab);
    setActiveL1Tab(startL1Tab);
    setDocs(ds.getDocsForLob(lob.id));
    setPublishedPrompts(seedPub);
    setApprovedPrompts({});
    setPage('detail');
    setActiveNav('classification');
  };

  const onBackToList=()=>setPage('lob-overview');

  const handleEdit=useCallback((tabId,value)=>{
    setPrompts(p=>({...p,[tabId]:value}));
    setSaveStates(s=>({...s,[tabId]:'unsaved'}));
    clearTimeout(saveTimers.current[tabId]);
    saveTimers.current[tabId]=setTimeout(()=>setSaveStates(s=>({...s,[tabId]:'saved'})),1500);
  },[]);
  const handleSave=useCallback(tabId=>{clearTimeout(saveTimers.current[tabId]);setSaveStates(s=>({...s,[tabId]:'saved'}));addToast('Prompt saved');},[addToast]);

  const toggleSel=(id,forceTo)=>setDocs(prev=>prev.map(d=>d.id===id?{...d,selected:forceTo!==undefined?forceTo:!d.selected}:d));
  const delDoc=id=>{setDocs(prev=>prev.filter(d=>d.id!==id));addToast('Document removed','warning');};
  const markTested=(id,testMeta)=>setDocs(prev=>prev.map(d=>d.id===id?{...d,status:'Tested',selected:false,lastTest:testMeta||d.lastTest}:d));
  const approvePrompt=(promptKey,snapshot)=>{
    setApprovedPrompts(prev=>({...prev,[promptKey]:snapshot}));
    setTabMeta(prev=>({...prev,[promptKey]:{...(prev[promptKey]||{}),status:'Approved'}}));
    addToast('Prompt approved — ready to deploy ✓','success');
  };
  const deployPrompt=(promptKey)=>{
    const snapshot=approvedPrompts[promptKey];
    if(!snapshot)return;
    const newScore=snapshot.accuracy!=null?`${snapshot.accuracy}%`:'N/A';
    const isLobLevel=promptKey==='global';
    setTabMeta(p=>({...p,[promptKey]:{...(p[promptKey]||{}),status:'Deploying'}}));
    setTimeout(()=>{
      setPublishedPrompts(pp=>({...pp,[promptKey]:snapshot}));
      /* update header badge: increment version number + new score */
      setTabMeta(p=>{
        const curr=p[promptKey]||{};
        const currNum=parseInt((curr.version||'V.0').replace(/[^0-9]/g,''))||0;
        const nextVer='V.'+(currNum+1);
        return{...p,[promptKey]:{...curr,status:'Active',version:nextVer,score:newScore}};
      });
      setLobs(ls=>ls.map(l=>{
        if(!selectedLobId||l.id!==selectedLobId)return l;
        if(isLobLevel){
          /* L1/Global deploy — version history lives at LOB level */
          const existing=(l.versions||[]).map(v=>({...v,status:'Archived'}));
          const nextVer='V.'+(existing.length+1);
          const newEntry={
            v:nextVer,
            date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),
            score:newScore,status:'Active',note:snapshot.note||'',createdBy:'User',
          };
          return{...l,status:'Active',confidence:snapshot.accuracy??l.confidence,
            classL1Version:nextVer,versions:[...existing,newEntry]};
        } else {
          /* L2 deploy — update only the specific category, don't touch LOB-level status */
          const updatedCats=l.categories.map(c=>{
            if(c.id!==promptKey)return c;
            const catNum=parseInt((c.activeVersion||'V.0').replace(/[^0-9]/g,''))||0;
            return{...c,status:'Active',confidence:snapshot.accuracy??c.confidence,
              activeVersion:'V.'+(catNum+1)};
          });
          return{...l,categories:updatedCats};
        }
      }));
      addToast('Prompt deployed & active ✓','success');
    },1500);
  };
  const updateDocExpected=(id,label)=>setDocs(prev=>prev.map(d=>{
    if(d.id!==id)return d;
    const newLabels=label?[label]:[];
    /* live-recalculate match if doc already has test result */
    const newLastTest=d.lastTest?{...d.lastTest,match:label?d.lastTest.pred===label:null}:d.lastTest;
    return{...d,expectedLabels:newLabels,lastTest:newLastTest};
  }));
  const onAddDocs=newDocs=>{setDocs(prev=>[...prev,...newDocs]);addToast(`${newDocs.length} file(s) added`,'success');};

  useEffect(()=>{
    const validIds=new Set(l1Items.map(i=>i.id));
    if(!validIds.has(activeTab)&&l1Items.length>0){
      const first=l1Items[0].id;
      setActiveTab(first);setActiveL1Tab(first);
    }
  },[l1Items,promptLevel]);

  useEffect(()=>{
    const handler=e=>{
      if(e.key==='Escape'){setModal(null);setConfirmState(null);}
      if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();handleSave(activeTab);}
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[activeTab,handleSave]);

  const closeAll=()=>{setMenusState({user:false,tenant:false,lang:false});setShowMenu(null);};
  const selectedLobFromState=lobs.find(l=>l.id===selectedLobId);

  return(
    <div className="app" onClick={closeAll}>
      <NavBar activeNav={activeNav} onNav={handleNav} menus={menus} setMenu={setMenu}/>

      {page==='dashboard'&&<Dashboard onNavigate={nav=>{
        if(nav==='lob-overview'){setPage('lob-overview');setActiveNav('classification');}
        else if(nav==='completion'){setPage('completion');setActiveNav('completion');}
        else addToast(`${nav} coming soon`,'info');
      }}/>}

      {page==='lob-overview'&&<LobOverview lobs={lobs} onSelectLob={onSelectLob} addToast={addToast}
        onOpenOutputFormat={()=>{setOfActiveLobId(null);setShowOutputFormat(true);}}
        onConfirm={setConfirmState} onDeleteLob={deleteLob}/>}

      {page==='completion'&&<CompletionHome onOpen={doc=>{setCompletionDoc(doc);setPage('completion-detail');}} addToast={addToast}/>}
      {page==='completion-detail'&&<CompletionDetail doc={completionDoc} onBack={()=>{setPage('completion');setActiveNav('completion');}}/>}


      {page==='detail'&&<>
        <div className="app__sub-bar">
          <span className="app__breadcrumb">Classification › {l0Name} › Prompt management</span>
        </div>
        <div className="app__back-bar">
          <button className="app__back-btn" onClick={onBackToList}><IC.Back/> Back to Classification</button>
          <PipelineBar/>
        </div>
        {/* ── Unified layout: sidebar | main-panel | docpanel ── */}
        <div className="app__content">
          <Sidebar promptLevel={promptLevel} l0Name={l0Name} setL0Name={setL0Name}
            l1Items={l1Items} setL1Items={setL1Items} showMenu={showMenu} setShowMenu={setShowMenu}
            addToast={addToast} onConfirm={setConfirmState}
            onScrollTo={scrollToCategory} activeCatId={promptLevel==='class'?activeL1Tab:activeCatId}
            style={{width:sidebarW+'px',borderRight:'1px solid var(--bdr)'}}/>
          <ResizeHandle onResize={dx=>setSidebarW(w=>Math.min(400,Math.max(160,w+dx)))}/>
          <div className="main-panel">
            {/* Prompt Management — always visible */}
            <div className="cl-setup-wrap">
              <div className="cl-setup">
                <span className="cl-setup__label">Prompt management</span>
                <div className="cl-setup__row">
                  {[{id:'global',label:'Global'},{id:'class',label:'Class level prompt'}].map(opt=>(
                    <label key={opt.id} className={`cl-setup__radio${promptLevel===opt.id?' cl-setup__radio--active':''}`} onClick={e=>e.stopPropagation()}>
                      <input type="radio" name="promptLevel" value={opt.id} checked={promptLevel===opt.id} onChange={()=>setPromptLevel(opt.id)}/>
                      <span className="cl-setup__radio-label">{opt.label}</span>
                    </label>
                  ))}
                </div>
              </div>
            </div>
            {/* Center content — swaps based on promptLevel */}
            {(()=>{
              const activePromptLabel=(()=>{
                if(promptLevel==='global')return`${l0Name} · Global`;
                const cat=l1Items.find(i=>i.id===activeTab);return cat?`${cat.name} · Class`:`${l0Name} · Class`;
              })();
              const currentPromptText=promptLevel==='global'?(prompts['global']||''):(prompts[activeTab]||'');
              const promptKey=promptLevel==='global'?'global':activeTab;
              const publishedSnap=publishedPrompts[promptKey]||null;
              const approvedSnap=approvedPrompts[promptKey]||null;
              const labelSuggestions=promptLevel==='global'?[...l1Items.map(i=>i.name),...l1Items.flatMap(i=>i.l2.map(l=>l.name))]:(l1Items.find(i=>i.id===activeTab)?.l2.map(l=>l.name)||[]);
              const onRunInline=(docIds)=>{
                const sel=docs.filter(d=>docIds.includes(d.id));
                const targets=labelSuggestions.map(name=>({id:name,name}));
                const eff=targets.length>0?targets:[{id:'unknown',name:'Unknown'}];
                sel.forEach((doc,i)=>{setTimeout(()=>{
                  const r=mockClassify(doc.name,eff);
                  const pred=r?.classification||'Unknown';
                  const conf=r?parseInt(r.confidence)||50:50;
                  const expected=doc.expectedLabels?.[0];
                  const match=expected?(pred===expected):null;
                  markTested(doc.id,{ctx:activePromptLabel,pred,conf,match,testedAt:new Date().toISOString()});
                },900+i*500+Math.random()*300);});
              };
              return promptLevel==='class'
                ?<Workspace activeL1Tab={activeL1Tab} setActiveL1Tab={setActiveL1Tab} activeTab={activeTab} setActiveTab={setActiveTab} l1Items={l1Items}
                    prompts={prompts} defaultPrompts={defaultPrompts} tabMeta={tabMeta} saveStates={saveStates}
                    onEdit={handleEdit} onSave={handleSave} onVersion={()=>setModal('version')}
                    docs={docs} dataSets={dataSets}
                    publishedPrompts={publishedPrompts} approvedPrompts={approvedPrompts}
                    onRunTest={onRunInline} onApprove={approvePrompt} onDeploy={deployPrompt}/>
                :<div className="detail-scroll__main" style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
                    <div style={{flex:1,overflowY:'auto'}}>
                      <LobPromptSection key={promptKey}
                        lobName={l0Name} prompt={prompts[promptKey]||''} defaultPrompt={defaultPrompts[promptKey]||''}
                        meta={tabMeta[promptKey]} saveState={saveStates[promptKey]}
                        onEdit={val=>handleEdit(promptKey,val)} onSave={()=>handleSave(promptKey)}
                        onVersion={()=>setModal('version')}
                        hierarchyContext={buildHierarchy('global',l1Items)}
                        promptMode='global' publishedSnap={publishedSnap}
                        docs={docs} dataSets={dataSets}
                        onSelectFiles={ids=>setDocs(prev=>prev.map(d=>({...d,selected:ids.includes(d.id)})))}
                        onRunTest={onRunInline}
                        approvedSnap={approvedSnap}
                        onApprove={snapshot=>approvePrompt(promptKey,snapshot)}
                        onDeploy={()=>deployPrompt(promptKey)}/>
                    </div>
                  </div>;
            })()}
          </div>
          <ResizeHandle onResize={dx=>setDocPanelW(w=>Math.min(420,Math.max(200,w-dx)))}/>
          <DocumentPanel docs={docs} dataSets={dataSets} onAddDocs={onAddDocs}
            delDoc={delDoc} addDataSet={addDataSet} delDataSet={delDataSet}
            style={{width:docPanelW+'px',borderLeft:'1px solid var(--bdr)'}}/>
        </div>
        {modal==='version'&&<VersionModal lob={selectedLobFromState} onClose={()=>setModal(null)}/>}
      </>}


      {confirmState&&<div className="modal-overlay" onClick={()=>setConfirmState(null)}>
        <div className="confirm-dialog" onClick={e=>e.stopPropagation()}>
          <div className="confirm-dialog__icon">⚠️</div>
          <div className="confirm-dialog__title">{confirmState.title}</div>
          <p className="confirm-dialog__msg">{confirmState.message}</p>
          <div className="confirm-dialog__actions">
            <button className="btn btn-outline" onClick={()=>setConfirmState(null)}>Cancel</button>
            <button className="btn btn-danger" onClick={()=>{confirmState.onConfirm();setConfirmState(null);}}>{confirmState.confirmLabel}</button>
          </div>
        </div>
      </div>}

      {showOutputFormat&&<ClassificationTreeModal lobs={lobs}
        activeLobId={ofActiveLobId} onClose={()=>setShowOutputFormat(false)}/>}

      <ToastContainer toasts={toasts} removeToast={removeToast}/>
    </div>
  );
}

function Root(){
  const ds=useContext(DataCtx);

  /* ── Dev scenarios — computed once when ds loads, stable after that ── */
  const DEV_SCENARIOS=React.useMemo(()=>{
    const build=(lob,opts={})=>{
      if(!lob)return{page:'lob-overview'};
      const l1Items=lob.categories.map(c=>({id:c.id,name:c.name,expanded:false,l2:c.types.map(t=>({id:t.id,name:t.name}))}));
      const prompts={global:GLOBAL_PROMPT,l1:opts.l1Prompt!==undefined?opts.l1Prompt:(lob.lobPrompt||''),
        ...lob.categories.reduce((acc,c)=>{acc[c.id]=opts.catPrompt!==undefined?opts.catPrompt:(c.prompt||'');c.types.forEach(t=>{acc[t.id]=t.prompt||'';});return acc;},{})};
      const normS=s=>s==='Deployed'?'Active':s;
      const tabMeta={global:{version:'1.0',score:'N/A',status:'Active'},l1:{version:lob.classL1Version||'V.1',score:`${lob.confidence}%`,status:normS(lob.status)}};
      lob.categories.forEach(c=>{tabMeta[c.id]={version:c.activeVersion||'V.1',score:`${c.confidence}%`,status:normS(c.status)};c.types.forEach(t=>{tabMeta[t.id]={version:c.activeVersion||'V.1',score:`${c.confidence}%`,status:normS(c.status)};});});
      const isLive=s=>s==='Deployed'||s==='Active';
      const seedPub={};
      if(isLive(lob.status)){
        const latestVer=lob.versions?.[lob.versions.length-1];
        const publishedAt=latestVer?new Date(latestVer.date+' 00:00:00').toISOString():new Date().toISOString();
        const accuracy=typeof lob.confidence==='number'?lob.confidence:parseInt(lob.confidence)||null;
        seedPub['l1']={text:lob.lobPrompt||'',accuracy,publishedAt,note:latestVer?.note||''};
      }
      lob.categories.forEach(c=>{
        if(isLive(c.status)){
          const accuracy=typeof c.confidence==='number'?c.confidence:parseInt(c.confidence)||null;
          const publishedAt=new Date().toISOString();
          seedPub[c.id]={text:c.prompt||'',accuracy,publishedAt,note:''};
          c.types.forEach(t=>{seedPub[t.id]={text:t.prompt||'',accuracy,publishedAt,note:''};});
        }
      });
      const firstCatId=l1Items[0]?.id||'l1';
      return{page:'detail',selectedLobId:lob.id,l0Name:lob.name,l1Items,prompts,defaultPrompts:prompts,
        tabMeta,activeTab:firstCatId,activeL1Tab:firstCatId,
        promptLevel:opts.promptLevel||'class',
        publishedPrompts:seedPub,
        ...(opts.docs!==undefined?{docs:opts.docs}:{}),
        ...(opts.lobs!==undefined?{lobs:opts.lobs}:{}),
        ...(opts.saveStates!==undefined?{saveStates:opts.saveStates}:{})};
    };
    const lob=ds.lobs[0];
    const lobDocs=ds.getDocsForLob(lob.id);
    /* doc state presets — each called once here, result is frozen in the memo */
    const pending =lobDocs.map(d=>({...d,status:'Pending', selected:false,lastTest:null}));
    const selected=lobDocs.map(d=>({...d,status:'Pending', selected:true, lastTest:null}));
    const matched =lobDocs.map(d=>({...d,status:'Tested',  selected:false,lastTest:{ctx:'L1 Class',pred:d.expectedLabels?.[0]||'Schadenmeldung',conf:91,match:true, testedAt:'2025-03-01'}}));
    const mismatch=lobDocs.map(d=>({...d,status:'Tested',  selected:false,lastTest:{ctx:'L1 Class',pred:'Wrong Category',conf:44,match:false,testedAt:'2025-03-01'}}));
    const mixed   =lobDocs.map((d,i)=>i%3===2
      ?{...d,status:'Tested',selected:false,lastTest:{ctx:'L1 Class',pred:'Other Class',                   conf:51,match:false,testedAt:'2025-03-01'}}
      :{...d,status:'Tested',selected:false,lastTest:{ctx:'L1 Class',pred:d.expectedLabels?.[0]||'Unknown',conf:84,match:true, testedAt:'2025-03-01'}});
    /* lowConf — random values frozen at memo-compute time, not at render time */
    const lowConf =lobDocs.map(d=>{const conf=Math.floor(45+Math.random()*20);const pred=d.expectedLabels?.[0]||'Unknown';const match=d.expectedLabels?.[0]?(pred===d.expectedLabels[0]):null;return{...d,status:'Tested',selected:false,lastTest:{ctx:'L1 Class',pred,conf,match,testedAt:'2025-03-01'}};});
    return[
      {id:'ov-default',  group:'Overview', label:'Default',        state:{page:'lob-overview'}},
      {id:'ov-empty',    group:'Overview', label:'Empty — no LOBs',state:{page:'lob-overview',lobs:[]}},
      {id:'ov-failed',   group:'Overview', label:'All Failed',     state:{page:'lob-overview',lobs:ds.lobs.map(l=>({...l,status:'Failed',confidence:0}))}},
      {id:'ov-draft',    group:'Overview', label:'All Draft',      state:{page:'lob-overview',lobs:ds.lobs.map(l=>({...l,status:'Draft',confidence:0,trainedBy:''}))}},
      {id:'ov-single',   group:'Overview', label:'Single LOB',     state:{page:'lob-overview',lobs:[lob]}},
      {id:'det-l1',      group:'Prompt Detail', label:'L1 Mode',             state:build(lob,{promptLevel:'class'})},
      {id:'det-l2',      group:'Prompt Detail', label:'L2 Mode',             state:build(lob,{promptLevel:'class'})},
      {id:'det-global',  group:'Prompt Detail', label:'Global Mode',         state:build(lob,{promptLevel:'global'})},
      {id:'det-nocat',   group:'Prompt Detail', label:'No Categories',       state:build({...lob,categories:[]},{})},
      {id:'det-noph',    group:'Prompt Detail', label:'Missing Placeholder', state:build(lob,{l1Prompt:'Classify this document into the correct category.',promptLevel:'class'})},
      {id:'det-unsaved', group:'Prompt Detail', label:'Unsaved Changes',     state:build(lob,{promptLevel:'class',saveStates:{'l1':'unsaved'}})},
      {id:'det-docs-matched', group:'Prompt Detail', label:'Docs — All Matched',  state:build(lob,{promptLevel:'class',docs:matched})},
      {id:'det-docs-miss',    group:'Prompt Detail', label:'Docs — All Mismatch', state:build(lob,{promptLevel:'class',docs:mismatch})},
      {id:'det-docs-mixed',   group:'Prompt Detail', label:'Docs — Mixed',        state:build(lob,{promptLevel:'class',docs:mixed})},
      {id:'det-docs-lowconf', group:'Prompt Detail', label:'Docs — Low Conf',     state:build(lob,{promptLevel:'class',docs:lowConf})},
      {id:'doc-empty',   group:'Documents', label:'Empty Library',  state:build(lob,{promptLevel:'class',docs:[]})},
      {id:'doc-pending', group:'Documents', label:'All Pending',    state:build(lob,{promptLevel:'class',docs:pending})},
      {id:'doc-tested',  group:'Documents', label:'All Tested',     state:build(lob,{promptLevel:'class',docs:matched})},
    ];
  },[ds]);
  const [activeScenario,setActiveScenario]=useState(null);
  return(
    <>
      <DevPanel scenarios={DEV_SCENARIOS} onApply={setActiveScenario} onReset={()=>setActiveScenario(null)} activeId={activeScenario?.id}/>
      <App key={activeScenario?.id||'default'} devOverrides={activeScenario?.state||{}}/>
    </>
  );
}

function AppLoader(){
  const [ds,setDs]=useState(null);
  const [err,setErr]=useState(null);
  useEffect(()=>{DataService.load().then(setDs).catch(e=>setErr(e.message));},[]);
  if(err)return(
    <div style={{padding:40,fontFamily:'monospace',fontSize:13,color:'#cc0000'}}>
      <b>Data load failed:</b> {err}<br/>
      <span style={{color:'#767676'}}>Local dev: run <b>npx serve .</b> in the project directory, then reload.</span>
    </div>
  );
  if(!ds)return<div style={{padding:40,color:'#767676',fontSize:13}}>Loading…</div>;
  return<DataCtx.Provider value={ds}><Root/></DataCtx.Provider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppLoader/>);

</script>
</body>
</html>
