<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intelligent Document &amp; Automation Solution</title>
<!-- NDBX: Allianz Neo fallback via system/web fonts -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;color:#333333;background:#f5f5f5;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}

.navbar{display:flex;align-items:center;justify-content:space-between;height:52px;background:#fff;border-bottom:1px solid #d4d4d4;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:100;gap:16px}
.navbar__left{display:flex;align-items:center;gap:10px;flex-shrink:0}
.navbar__logo{display:flex;align-items:center}
.navbar__brand{font-size:12px;font-weight:600;color:#333333;white-space:nowrap}
.navbar__nav{display:flex;align-items:center;list-style:none;flex:1;justify-content:center}
.navbar__nav-item{background:none;border:none;padding:0 12px;font-size:13px;color:#767676;height:52px;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;font-family:inherit}
.navbar__nav-item:hover{color:#333333}
.navbar__nav-item.active{color:#003781;font-weight:500;border-bottom-color:#003781}
.navbar__right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.navbar__dd{position:relative}
.navbar__dd-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid transparent;padding:5px 8px;border-radius:4px;font-size:12px;color:#767676;cursor:pointer;transition:background .15s;font-family:inherit}
.navbar__dd-btn:hover{background:#f5f5f5;color:#333333}
.navbar__dd-menu{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid #d4d4d4;border-radius:4px;box-shadow:0 10px 15px rgba(0,0,0,.1);min-width:160px;z-index:200;overflow:hidden;animation:slideDown .12s ease}
.navbar__dd-item{background:none;border:none;display:block;width:100%;padding:8px 14px;font-size:12px;color:#333333;text-align:left;cursor:pointer;font-family:inherit;transition:background .15s}
.navbar__dd-item:hover{background:#f5f5f5}
.navbar__dd-item.active{color:#003781;background:#eef2fb;font-weight:500}
.navbar__dd-item.danger{color:#cc0000}
.navbar__dd-item.danger:hover{background:#fef2f2}
.navbar__dd-divider{height:1px;background:#d4d4d4;margin:4px 0}
.navbar__avatar{width:32px;height:32px;border-radius:50%;background:#003781;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;flex-shrink:0;transition:box-shadow .2s}
.navbar__avatar:hover{box-shadow:0 0 0 3px rgba(0,55,129,.2)}

.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.app__sub-bar{margin-top:52px;height:32px;background:#f5f5f5;border-bottom:1px solid #d4d4d4;padding:0 24px;display:flex;align-items:center;flex-shrink:0}
.app__breadcrumb{font-size:12px;color:#767676}
.app__back-bar{height:36px;background:#fff;border-bottom:1px solid #d4d4d4;padding:0 20px;display:flex;align-items:center;flex-shrink:0}
.app__back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:12px;color:#003781;font-weight:500;cursor:pointer;font-family:inherit}
.app__back-btn:hover{text-decoration:underline}
.app__content{flex:1;display:flex;overflow:hidden;min-height:0}

/* Page scroll wrapper (Dashboard + Config List) */
.page-scroll{flex:1;overflow-y:auto;padding:28px 32px;margin-top:52px}
.page-scroll::-webkit-scrollbar{width:5px}.page-scroll::-webkit-scrollbar-track{background:transparent}.page-scroll::-webkit-scrollbar-thumb{background:#d4d4d4;border-radius:3px}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.page-hdr__left h1{font-size:22px;font-weight:700;color:#333333}
.page-hdr__left p{font-size:13px;color:#767676;margin-top:3px}
.page-hdr__actions{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ── Dashboard ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:#fff;border:1px solid #d4d4d4;border-radius:4px;padding:18px 20px;display:flex;flex-direction:column;gap:6px;transition:box-shadow .15s}
.stat-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.07)}
.stat-card__label{font-size:11px;font-weight:600;color:#a0a0a0;text-transform:uppercase;letter-spacing:.05em}
.stat-card__value{font-size:26px;font-weight:700;color:#333333;line-height:1}
.stat-card__sub{font-size:11px;color:#767676;display:flex;align-items:center;gap:4px}
.stat-card__sub.up{color:#008a00}
.stat-card__sub.down{color:#cc0000}
.stat-card__bar{height:3px;background:#f5f5f5;border-radius:2px;margin-top:4px;overflow:hidden}
.stat-card__bar-fill{height:100%;border-radius:2px;background:#003781}

.section-title{font-size:14px;font-weight:700;color:#333333;margin-bottom:14px}

/* Pipeline */
.pipeline{display:flex;align-items:center;background:#fff;border:1px solid #d4d4d4;border-radius:4px;padding:20px 24px;margin-bottom:28px;overflow-x:auto;gap:0}
.pipe-step{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;min-width:90px}
.pipe-step__icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.pipe-step__label{font-size:11px;font-weight:600;color:#444444;text-align:center;white-space:nowrap}
.pipe-step__count{font-size:10px;color:#a0a0a0;text-align:center}
.pipe-arrow{color:#cccccc;font-size:20px;flex-shrink:0;padding:0 4px;margin-bottom:24px}

/* LOB performance */
.lob-perf{background:#fff;border:1px solid #d4d4d4;border-radius:4px;overflow:hidden;margin-bottom:28px}
.lob-perf__hdr{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid #d4d4d4;gap:0}
.lob-perf__hdr span{font-size:11px;font-weight:600;color:#a0a0a0;text-transform:uppercase;letter-spacing:.04em}
.lob-perf__hdr span:first-child{flex:2}
.lob-perf__hdr span:not(:first-child){flex:1;text-align:center}
.lob-perf__row{display:flex;align-items:center;padding:13px 20px;border-bottom:1px solid #f5f5f5;transition:background .1s}
.lob-perf__row:last-child{border-bottom:none}
.lob-perf__row:hover{background:#f5f5f5}
.lob-perf__name{flex:2;display:flex;align-items:center;gap:10px}
.lob-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lob-perf__name-text{font-size:13px;font-weight:600;color:#333333}
.lob-perf__name-sub{font-size:11px;color:#a0a0a0}
.lob-perf__cell{flex:1;text-align:center;font-size:12px;color:#444444}
.lob-perf__conf{font-weight:700;color:#333333}
.conf-bar{width:80px;height:6px;background:#f5f5f5;border-radius:3px;overflow:hidden;margin:0 auto 2px}
.conf-bar__fill{height:100%;border-radius:3px}

/* Quick links */
.quick-links{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.quick-link{background:#fff;border:1px solid #d4d4d4;border-radius:4px;padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;text-align:left}
.quick-link:hover{border-color:#003781;box-shadow:0 4px 12px rgba(0,55,129,.1)}
.quick-link__icon{width:36px;height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.quick-link__label{font-size:13px;font-weight:600;color:#333333}
.quick-link__sub{font-size:11px;color:#a0a0a0;margin-top:1px}
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.dash-card{background:#fff;border:1px solid #e4e8f0;border-radius:10px;padding:28px 24px 22px;display:flex;flex-direction:column;gap:0;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.dash-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);border-color:#c4cfdf}
.dash-card__icon{width:56px;height:56px;background:#1a4fd6;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:18px;flex-shrink:0}
.dash-card__title{font-size:16px;font-weight:600;color:#1a1a2e;margin-bottom:10px}
.dash-card__desc{font-size:13px;color:#666;line-height:1.6;flex:1;margin-bottom:18px}
.dash-card__open{background:none;border:none;color:#1a4fd6;font-size:13px;font-weight:500;cursor:pointer;padding:0;text-align:left;font-family:inherit}
.dash-card__open:hover{text-decoration:underline}

/* ── NDBX Button spinner (loading state) ── */
.btn__spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.btn-secondary .btn__spinner,.btn-tertiary .btn__spinner{border-color:rgba(0,55,129,.3);border-top-color:var(--btn-primary)}
/* ── NDBX Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  height:var(--btn-h-md);padding:0 var(--btn-px-md);
  border-radius:var(--btn-r);border:2px solid transparent;
  font-family:inherit;font-size:var(--btn-fz-md);
  font-weight:var(--btn-font-weight);
  text-transform:var(--btn-text-transform);
  letter-spacing:var(--btn-letter-spacing);
  cursor:pointer;white-space:nowrap;
  transition:background .15s,border-color .15s,color .15s;
  text-decoration:none;
}
.btn:disabled,.btn[disabled]{cursor:not-allowed;pointer-events:none}
/* sizes */
.btn-sm{height:var(--btn-h-sm);padding:0 var(--btn-px-sm);font-size:var(--btn-fz-sm)}
.btn-lg{height:var(--btn-h-lg);padding:0 var(--btn-px-lg);font-size:var(--btn-fz-lg)}
.btn-block{width:100%}
/* primary */
.btn-primary{background:var(--btn-primary);color:#fff;border-color:var(--btn-primary)}
.btn-primary:hover:not(:disabled){background:var(--btn-primary-h);border-color:var(--btn-primary-h)}
.btn-primary:active:not(:disabled){background:#001e57;border-color:#001e57}
.btn-primary:disabled{background:var(--btn-primary-dis);border-color:var(--btn-primary-dis);color:#fff}
/* secondary — outlined */
.btn-secondary,.btn-outline{background:transparent;color:var(--btn-secondary);border-color:var(--btn-secondary)}
.btn-secondary:hover:not(:disabled),.btn-outline:hover:not(:disabled){background:var(--btn-secondary-h);border-color:var(--btn-secondary)}
.btn-secondary:active:not(:disabled),.btn-outline:active:not(:disabled){background:#dce6f4;border-color:var(--btn-secondary)}
.btn-secondary:disabled,.btn-outline:disabled{border-color:var(--btn-secondary-dis);color:var(--btn-secondary-dis)}
/* tertiary — text only */
.btn-tertiary{background:transparent;color:var(--btn-primary);border-color:transparent}
.btn-tertiary:hover:not(:disabled){background:#eef2fb;border-color:transparent}
.btn-tertiary:active:not(:disabled){background:#dce6f4;border-color:transparent}
.btn-tertiary:disabled{color:var(--btn-primary-dis);border-color:transparent}
/* emphasis — orange */
.btn-emphasis{background:var(--btn-emphasis);color:#fff;border-color:var(--btn-emphasis)}
.btn-emphasis:hover:not(:disabled){background:var(--btn-emphasis-h);border-color:var(--btn-emphasis-h)}
.btn-emphasis:disabled{background:var(--btn-emphasis-dis);border-color:var(--btn-emphasis-dis);color:#fff}
/* attention — magenta */
.btn-attention{background:var(--btn-attention);color:#fff;border-color:var(--btn-attention)}
.btn-attention:hover:not(:disabled){background:var(--btn-attention-h);border-color:var(--btn-attention-h)}
.btn-attention:disabled{background:var(--btn-attention-dis);border-color:var(--btn-attention-dis);color:#fff}
/* cta — green */
.btn-cta{background:var(--btn-cta);color:#fff;border-color:var(--btn-cta)}
.btn-cta:hover:not(:disabled){background:var(--btn-cta-h);border-color:var(--btn-cta-h)}
.btn-cta:disabled{background:var(--btn-cta-dis);border-color:var(--btn-cta-dis);color:#fff}
/* danger — red */
.btn-danger{background:var(--btn-danger);color:#fff;border-color:var(--btn-danger)}
.btn-danger:hover:not(:disabled){background:var(--btn-danger-h);border-color:var(--btn-danger-h)}
.btn-danger:disabled{background:var(--btn-danger-dis);border-color:var(--btn-danger-dis);color:#fff}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
.modal{background:#fff;border-radius:4px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-width:520px;width:92vw;display:flex;flex-direction:column;max-height:90vh;animation:scaleIn .15s ease}
.modal.lg{max-width:700px}
.modal.xl{max-width:900px}
.modal__header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #d4d4d4;flex-shrink:0}
.modal__header h3{font-size:15px;font-weight:600;color:#333333}
.modal__close{background:none;border:none;font-size:22px;color:#a0a0a0;cursor:pointer;line-height:1;padding:0 4px;border-radius:4px;transition:all .1s}
.modal__close:hover{color:#333333;background:#f5f5f5}
.modal__body{padding:20px;overflow-y:auto;overflow-x:auto;flex:1}
.modal__body::-webkit-scrollbar{width:4px}.modal__body::-webkit-scrollbar-thumb{background:#d4d4d4;border-radius:2px}
.modal__footer{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid #d4d4d4;flex-shrink:0}

/* ── Add Class Modal ── */
.acm{background:#fff;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.16);width:420px;max-width:94vw;padding:24px;display:flex;flex-direction:column;gap:14px}
.acm__top{display:flex;align-items:center;gap:10px}
.acm__badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.04em;flex-shrink:0}
.acm__badge--l1{background:#dbeafe;color:#1d4ed8}
.acm__badge--l2{background:#d1fae5;color:#065f46}
.acm__title{font-size:15px;font-weight:700;color:#111827;margin:0}
.acm__desc{font-size:12px;color:#6b7280;line-height:1.6;margin:0;padding:12px 14px;background:#f9fafb;border-radius:6px;border-left:3px solid #d1d5db}
.acm__ctx{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f0f4ff;border-radius:6px}
.acm__ctx-lbl{font-size:11px;color:#6b7280;flex-shrink:0}
.acm__ctx-val{font-size:12px;font-weight:600;color:#003781;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acm__field{display:flex;flex-direction:column;gap:5px}
.acm__lbl{font-size:12px;font-weight:600;color:#374151}
.acm__input{border:1.5px solid #d1d5db;border-radius:6px;padding:9px 12px;font-size:13px;outline:none;font-family:inherit;color:#111827;background:#fff;transition:border-color .15s;width:100%;box-sizing:border-box}
.acm__input:focus{border-color:#003781;box-shadow:0 0 0 3px rgba(0,55,129,.08)}
.acm__footer{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding-top:4px}

/* ── Version table & badges ── */
.version-table{width:100%;border-collapse:collapse}
.version-table th{padding:8px 12px;font-size:12px;font-weight:600;color:#444444;text-align:left;background:#f5f5f5;border-bottom:1px solid #d4d4d4}
.version-table td{padding:10px 12px;border-bottom:1px solid #f5f5f5;font-size:13px;color:#444444}
.version-table tbody tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:4px;font-size:11px;font-weight:500}
.badge-active{background:#e6f4e6;color:#008a00}.badge-archived{background:#f5f5f5;color:#767676}

/* ── Preview / Test modals ── */
.preview-box{background:#f8fafc;border:1px solid #d4d4d4;border-radius:4px;padding:14px;max-height:320px;overflow-y:auto}
.preview-box pre{font-family:'Fira Code',monospace,sans-serif;font-size:12px;line-height:1.6;color:#444444;white-space:pre-wrap;word-break:break-word}
.test-modal{display:flex;flex-direction:column;gap:16px}
.test-modal h4{font-size:13px;font-weight:600;color:#333333;margin-bottom:8px}
.test-running{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#eef2fb;border:1px solid #c4d3ee;border-radius:4px;font-size:13px;color:#001f52}
.test-spinner{width:16px;height:16px;border:2px solid #c4d3ee;border-top-color:#003781;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.test-result{display:flex;flex-direction:column;gap:8px;background:#f5f5f5;border:1px solid #d4d4d4;border-radius:4px;padding:14px}
.test-result__item{display:flex;gap:8px;font-size:13px}
.test-result__label{font-weight:600;color:#444444;min-width:110px;flex-shrink:0}
.test-result__value{color:#333333}

/* ── Confirm dialog ── */
.confirm-dialog{background:#fff;border-radius:4px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-width:400px;width:90vw;padding:28px 24px;display:flex;flex-direction:column;align-items:center;gap:12px;animation:scaleIn .15s ease}
.confirm-dialog__icon{font-size:28px}
.confirm-dialog__title{font-size:16px;font-weight:700;color:#333333;text-align:center}
.confirm-dialog__msg{font-size:13px;color:#767676;text-align:center;line-height:1.5}
.confirm-dialog__actions{display:flex;gap:10px;margin-top:4px}

/* ── Toasts ── */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:4px;box-shadow:0 4px 12px rgba(0,0,0,.12);font-size:13px;min-width:240px;max-width:360px;pointer-events:all;animation:slideInRight .25s ease;transition:opacity .25s,transform .25s}
.toast.exiting{opacity:0;transform:translateX(20px)}
.toast.success{background:#f0fdf4;border:1px solid #b3ddb3;color:#166534}
.toast.error{background:#fef2f2;border:1px solid #f5b3b3;color:#991b1b}
.toast.warning{background:#fffbeb;border:1px solid #ffd580;color:#6b3000}
.toast.info{background:#eef2fb;border:1px solid #c4d3ee;color:#001f52}
.toast__icon{font-size:14px;flex-shrink:0}
.toast__msg{flex:1;line-height:1.4}
.toast__close{background:none;border:none;font-size:16px;cursor:pointer;opacity:.5;padding:0 2px;line-height:1;color:inherit;margin-left:4px;font-family:inherit;transition:opacity .1s}
.toast__close:hover{opacity:1}

/* ── Sidebar ── */
.sidebar{width:260px;min-width:200px;max-width:400px;background:#fff;border-right:none;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.resize-handle{width:4px;flex-shrink:0;background:transparent;cursor:col-resize;position:relative;z-index:2;transition:background 150ms var(--smooth)}
.resize-handle:hover,.resize-handle--active{background:var(--a-mid)}
.resize-handle::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:2px;height:32px;background:var(--bdr);border-radius:1px;transition:background 150ms}
.resize-handle:hover::after,.resize-handle--active::after{background:var(--a)}
.sidebar__header{padding:16px 16px 12px;border-bottom:1px solid #ebebeb;flex-shrink:0}
.sidebar__title{font-size:14px;font-weight:700;color:#003781;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar__section{padding:12px 16px;flex-shrink:0}
.sidebar__section-lbl{font-size:10px;font-weight:600;color:#a0a0a0;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:block}
.sidebar__cb-label{display:flex;align-items:center;gap:7px;font-size:12px;color:#444444;cursor:pointer;padding:2px 0;user-select:none}
.sidebar__cb-label input{accent-color:#003781;cursor:pointer}
.sidebar__divider{height:1px;background:#f5f5f5;flex-shrink:0}
.sidebar__search-top{padding:10px 16px;flex-shrink:0;position:relative;display:flex;align-items:center}
.sidebar__search-wrap{position:relative;flex:1;display:flex;align-items:center}
.sidebar__search-icon{position:absolute;left:10px;color:#a0a0a0;display:flex;align-items:center;pointer-events:none}
.sidebar__search{width:100%;padding:9px 12px 9px 34px;border:1.5px solid #d4d4d4;border-radius:20px;font-size:13px;outline:none;font-family:inherit;color:#444444;transition:border-color .15s}
.sidebar__search:focus{border-color:#003781}
.sidebar__level0{padding:14px 16px 14px;flex-shrink:0}
.sidebar__l0-row{display:flex;align-items:center;justify-content:space-between}
.sidebar__l0-left{display:flex;flex-direction:column;gap:2px;min-width:0}
.sidebar__l0-label{font-size:12px;font-weight:700;color:#003781;display:block}
.sidebar__l0-value{font-size:18px;font-weight:700;color:#003781;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar__l0-input{width:100%;border:1px solid #003781;border-radius:4px;padding:4px 8px;font-size:14px;font-weight:700;outline:none;font-family:inherit;color:#003781;background:transparent}
.sidebar__l0-info{color:#a0a0a0;display:flex;align-items:center;cursor:default;flex-shrink:0;line-height:1}
.sidebar__l0-info:hover{color:#003781}
.sidebar__l0-edit-btn{background:none;border:1px solid #003781;border-radius:4px;padding:5px 6px;cursor:pointer;color:#003781;display:flex;align-items:center;flex-shrink:0;transition:background .15s}
.sidebar__l0-edit-btn:hover{background:#eef2fb}
.sidebar__l1-header{padding:6px 8px 4px;flex-shrink:0}
.sidebar__add-l1-inline{background:none;border:1px dashed #c0c9d8;border-radius:5px;font-size:12px;color:#003781;font-weight:500;cursor:pointer;font-family:inherit;padding:6px 10px;white-space:nowrap;display:flex;align-items:center;gap:4px;width:100%;transition:all .15s}
.sidebar__add-l1-inline:hover{border-color:#003781;background:#eef2fb}
.sidebar__l1-list{flex:1;overflow-y:auto;padding:0 8px 8px}
.sidebar__l1-list::-webkit-scrollbar{width:3px}.sidebar__l1-list::-webkit-scrollbar-thumb{background:#d4d4d4;border-radius:2px}
.sidebar__no-results{font-size:12px;color:#a0a0a0;padding:8px;font-style:italic}
.sidebar__empty-l1{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 0;color:#a0a0a0}
.sidebar__empty-l1 p{font-size:12px;text-align:center;line-height:1.5}
.sidebar__l1-item{border-radius:4px;margin-bottom:2px}
.sidebar__l1-row{display:flex;align-items:center;border-radius:4px;transition:background .1s}
.sidebar__l1-row:hover{background:#f5f5f5}
.sidebar__l1-toggle{flex:1;display:flex;align-items:center;gap:8px;background:none;border:none;padding:10px 8px;cursor:pointer;font-family:inherit;text-align:left;min-width:0;border-radius:4px 0 0 6px;color:#003781}
.sidebar__l1-name{font-size:14px;font-weight:600;color:#003781;flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar__l2-count{font-size:10px;color:#a0a0a0;background:#f5f5f5;border-radius:4px;padding:1px 6px;flex-shrink:0}
.sidebar__menu-wrap{position:relative;flex-shrink:0}
.sidebar__menu-btn{background:none;border:none;padding:7px 8px;cursor:pointer;color:#a0a0a0;display:flex;align-items:center;transition:color .1s;border-radius:0 6px 6px 0}
.sidebar__menu-btn:hover{color:#444444;background:#f5f5f5}
.sidebar__ctx-menu{position:absolute;right:0;top:100%;background:#fff;border:1px solid #d4d4d4;border-radius:4px;box-shadow:0 8px 20px rgba(0,0,0,.1);z-index:50;min-width:130px;overflow:hidden;animation:slideDown .1s ease}
.sidebar__ctx-item{display:block;width:100%;padding:8px 14px;font-size:12px;color:#333333;background:none;border:none;text-align:left;cursor:pointer;font-family:inherit;transition:background .1s}
.sidebar__ctx-item:hover{background:#f5f5f5}.sidebar__ctx-item.danger{color:#cc0000}.sidebar__ctx-item.danger:hover{background:#fef2f2}
.sidebar__l1-divider{height:1px;background:#e8e8e8;margin:4px 0 0}
.sidebar__l2-wrap{padding:2px 0 6px 4px}
.sidebar__empty-l2{font-size:12px;color:#a0a0a0;padding:6px 8px;font-style:normal}
.sidebar__l2-list{list-style:none;display:flex;flex-direction:column;gap:0}
.sidebar__l2-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:4px;font-size:12px;color:#555555;transition:background .1s}
.sidebar__l2-item:hover{background:#f0f4ff}
.sidebar__l2-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#444444}
.sidebar__l2-actions{display:flex;align-items:center;gap:1px;opacity:0;transition:opacity .12s;flex-shrink:0}
.sidebar__l2-item:hover .sidebar__l2-actions{opacity:1}
.sidebar__l2-action-btn{background:none;border:none;cursor:pointer;color:#8a9ab5;padding:3px;border-radius:3px;display:flex;align-items:center;transition:color .1s,background .1s}
.sidebar__l2-action-btn:hover{color:#003781;background:#dce8ff}
.sidebar__l2-action-btn--del:hover{color:#cc0000;background:#fff0f0}
.sidebar__add-input-wrap{display:flex;flex-direction:column;gap:5px;padding:4px 0}
.sidebar__add-input{border:1px solid #003781;border-radius:4px;padding:5px 8px;font-size:12px;outline:none;font-family:inherit;color:#333333;width:100%}
.sidebar__add-actions{display:flex;gap:5px}
.sidebar__add-confirm{background:#003781;color:#fff;border:none;border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;transition:background .1s}
.sidebar__add-confirm:hover{background:#002d6b}.sidebar__add-confirm:disabled{background:#8faad4;cursor:not-allowed}
.sidebar__add-cancel{background:none;border:1px solid #d4d4d4;border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;color:#767676;font-family:inherit;transition:all .1s}
.sidebar__add-cancel:hover{border-color:#a0a0a0;color:#444444}
.sidebar__add-btn{background:none;border:1px dashed #cccccc;border-radius:4px;padding:5px 8px;font-size:11px;color:#a0a0a0;cursor:pointer;width:100%;display:flex;align-items:center;gap:4px;font-family:inherit;transition:all .15s;margin-top:2px}
.sidebar__add-btn:hover{border-color:#003781;color:#003781;background:#eef2fb}
.sidebar__add-l1-bar{padding:8px;border-top:1px solid #f5f5f5;flex-shrink:0}
.sidebar__add-l1-input-wrap{display:flex;gap:5px}
.sidebar__add-l1-input{flex:1;border:1px solid #003781;border-radius:4px;padding:5px 8px;font-size:12px;outline:none;font-family:inherit;color:#333333}
.sidebar__add-l1-btn{background:none;border:1px dashed #cccccc;border-radius:4px;padding:7px 10px;font-size:12px;color:#767676;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;transition:all .15s}
.sidebar__add-l1-btn:hover{border-color:#003781;color:#003781;background:#eef2fb}

/* ── Workspace ── */
.workspace{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.workspace__header{padding:12px 20px 0;flex-shrink:0}
.workspace__title{font-size:13px;font-weight:700;color:#333333}
.workspace__tab-area{flex-shrink:0}
.workspace__tabs{display:flex;align-items:center;padding:0 16px;position:relative}
.workspace__tabs--l1{background:#fff;border-bottom:1px solid #d4d4d4;height:40px}
.workspace__tabs--l2{background:#f5f5f5;border-bottom:1px solid #d4d4d4;height:34px}
.workspace__tabs-inner{display:flex;align-items:center;flex:1;overflow:hidden;height:100%}
.workspace__tab{padding:0 14px;height:100%;background:none;border:none;font-size:12px;color:#767676;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0}
.workspace__tab:hover{color:#333333;background:#f5f5f5}
.workspace__tab.active{color:#003781;font-weight:500;border-bottom-color:#003781;background:#fafcff}
.workspace__tab--l2{font-size:11px}
.workspace__tab--hidden{visibility:hidden;pointer-events:none;position:absolute;top:0}
.workspace__more-wrap{position:relative;flex-shrink:0;padding:0 8px}
.workspace__more-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;background:#f5f5f5;border:1px solid #d4d4d4;border-radius:4px;font-size:11px;color:#767676;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s}
.workspace__more-btn:hover,.workspace__more-btn.active{background:#eef2fb;border-color:#c4d3ee;color:#003781}
.workspace__more-menu{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid #d4d4d4;border-radius:4px;box-shadow:0 10px 25px rgba(0,0,0,.1);z-index:50;min-width:180px;overflow:hidden;animation:slideDown .12s ease}
.workspace__more-search{width:100%;padding:8px 12px;border:none;border-bottom:1px solid #f5f5f5;font-size:12px;outline:none;font-family:inherit;color:#444444}
.workspace__more-item{display:block;width:100%;padding:8px 14px;font-size:12px;color:#444444;background:none;border:none;text-align:left;cursor:pointer;font-family:inherit;transition:background .1s}
.workspace__more-item:hover{background:#f5f5f5}.workspace__more-item.active{color:#003781;background:#eef2fb;font-weight:500}
.workspace__body{flex:1;overflow-y:auto;padding:24px 20px 16px;display:flex;flex-direction:column;gap:14px}
.workspace__body::-webkit-scrollbar{width:4px}.workspace__body::-webkit-scrollbar-thumb{background:#d4d4d4;border-radius:2px}
.workspace__lv-header{display:flex;align-items:center;justify-content:space-between}
.workspace__lv-title{font-size:14px;font-weight:600;color:#333333}
.workspace__manage-btn{background:none;border:1px solid #d4d4d4;border-radius:4px;padding:5px 12px;font-size:12px;color:#444444;cursor:pointer;font-family:inherit;transition:all .12s}
.workspace__manage-btn:hover{border-color:#a0a0a0;background:#f5f5f5}
.workspace__ver-card{display:flex;align-items:center;background:#f5f5f5;border:1px solid #f5f5f5;border-radius:4px;padding:10px 16px}
.workspace__ver-item{display:flex;flex-direction:column;gap:2px;flex:1}
.workspace__ver-lbl{font-size:10px;font-weight:600;color:#a0a0a0;text-transform:uppercase;letter-spacing:.04em}
.workspace__ver-val{font-size:13px;font-weight:600;color:#333333}
.workspace__ver-div{width:1px;background:#d4d4d4;height:32px;flex-shrink:0;margin:0 16px}
.workspace__status{font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px;display:inline-flex;align-items:center}
.workspace__status.active{background:#e6f4e6;color:#008a00}.workspace__status.draft{background:#f5f5f5;color:#767676}.workspace__status.failed{background:#fce8e8;color:#cc0000}.workspace__status.approved{background:#fff3e0;color:#b45309}.workspace__status.deploying{background:#f0f4ff;color:#3b5bdb;animation:status-pulse 1s ease-in-out infinite}
@keyframes status-pulse{0%,100%{opacity:1}50%{opacity:.45}}
.workspace__warn{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#fffbeb;border:1px solid #ffd580;border-radius:4px;font-size:12px;color:#6b3000}
.workspace__warn code{background:#fff3e0;border-radius:3px;padding:1px 5px;font-family:monospace;font-size:11px}
.workspace__prompt-sec{display:flex;flex-direction:column;gap:6px}
.workspace__prompt-hdr{display:flex;align-items:center;justify-content:space-between}
.workspace__prompt-lbl{font-size:12px;font-weight:600;color:#444444}
.workspace__prompt-hdr-right{display:flex;align-items:center;gap:10px}
.workspace__reset-btn{background:none;border:none;font-size:11px;color:#767676;cursor:pointer;font-family:inherit;padding:0;transition:color .1s}
.workspace__reset-btn:hover{color:#cc0000}
.workspace__textarea{min-height:220px;border:1px solid #d4d4d4;border-radius:4px;padding:12px;font-size:12px;font-family:'Fira Code',monospace,sans-serif;color:#333333;resize:vertical;outline:none;line-height:1.6;transition:border-color .15s,box-shadow .15s;background:#fff;width:100%}
.workspace__textarea:focus{border-color:#003781;box-shadow:0 0 0 2px rgba(0,55,129,.1)}
.prompt-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.placeholder-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.placeholder-row__lbl{font-size:11px;color:#a0a0a0}
.ph-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500}
.ph-badge.found{background:#e6f4e6;color:#008a00}.ph-badge.missing{background:#fff3e0;color:#6b3000}
.char-count{font-size:11px;color:#a0a0a0;flex-shrink:0}
.workspace__actions{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:4px}
.workspace__btn{padding:7px 18px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;border:none}
.workspace__btn.outline{background:#fff;border:1px solid #d4d4d4;color:#444444}.workspace__btn.outline:hover{border-color:#a0a0a0;background:#f5f5f5}
.workspace__btn.primary{background:#003781;color:#fff}.workspace__btn.primary:hover{background:#002d6b}
.save-indicator{font-size:11px;display:flex;align-items:center;gap:3px}
.save-indicator.unsaved{color:#e07000}.save-indicator.saved{color:#008a00}

/* ── Document Panel ── */
.doc-panel{width:260px;min-width:200px;max-width:420px;background:#fff;border-left:none;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.doc-panel__upload{padding:16px 14px 12px;border-bottom:1px solid #ebebeb;flex-shrink:0}
.doc-panel__sec-title{font-size:16px;font-weight:700;color:#003781;margin-bottom:4px}
.doc-panel__sec-desc{font-size:11px;color:#767676;margin-bottom:10px;line-height:1.4}
.doc-panel__dropzone{border:1.5px dashed #cccccc;border-radius:8px;padding:24px 12px 18px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .15s;background:#fff}
.doc-panel__dropzone:hover,.doc-panel__dropzone.drag-over{border-color:#003781;background:#eef2fb}
.doc-panel__dz-text{font-size:12px;color:#444444;text-align:center}
.doc-panel__browse{color:#003781;font-weight:600;cursor:pointer;text-decoration:underline}
.doc-panel__browse:hover{color:#002d6b}
.doc-panel__dz-hint{font-size:10px;color:#a0a0a0;text-align:center}
.doc-panel__docs{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px 14px 0}
.doc-panel__search-wrap{position:relative;display:flex;align-items:center;margin-bottom:8px}
.doc-panel__search-icon{position:absolute;left:8px;color:#a0a0a0;display:flex;align-items:center;pointer-events:none}
.doc-panel__search{width:100%;padding:6px 8px 6px 26px;border:1px solid #d4d4d4;border-radius:4px;font-size:12px;outline:none;font-family:inherit;transition:border-color .15s}
.doc-panel__search:focus{border-color:#003781}
.doc-panel__filters{display:flex;align-items:center;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.doc-panel__filter-btn{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;border:1px solid transparent;font-size:11px;font-weight:500;color:#767676;background:#f5f5f5;cursor:pointer;font-family:inherit;transition:all .12s}
.doc-panel__filter-btn:hover{background:#d4d4d4;color:#444444}
.doc-panel__filter-btn.active{background:#fff;border-color:#d4d4d4;color:#333333;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.doc-panel__cnt{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:15px;padding:0 4px;border-radius:4px;font-size:10px;font-weight:700;color:#fff}
.doc-panel__cnt.all{background:#003781}.doc-panel__cnt.processed{background:#008a00}.doc-panel__cnt.pending{background:#e07000}
.bulk-bar{display:flex;align-items:center;gap:6px;padding:6px 0;flex-shrink:0}
.bulk-bar__info{font-size:11px;color:#444444;font-weight:500;flex:1}
.bulk-bar__btn{background:none;border:1px solid #d4d4d4;border-radius:4px;padding:3px 8px;font-size:11px;color:#444444;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:3px;transition:all .1s}
.bulk-bar__btn:hover{background:#f5f5f5;border-color:#a0a0a0}
.bulk-bar__btn.danger{color:#cc0000;border-color:#f5b3b3}.bulk-bar__btn.danger:hover{background:#fef2f2}
.doc-panel__list-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;flex-shrink:0}
.doc-panel__sel-info{font-size:11px;color:#767676}
.doc-panel__sel-all{background:none;border:none;font-size:11px;color:#003781;cursor:pointer;font-family:inherit;font-weight:500;padding:0}
.doc-panel__sel-all:hover{text-decoration:underline}
.doc-panel__list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;margin:0 -2px;padding:0 2px}
.doc-panel__list::-webkit-scrollbar{width:3px}.doc-panel__list::-webkit-scrollbar-thumb{background:#d4d4d4;border-radius:2px}
.doc-panel__empty{text-align:center;padding:24px;font-size:12px;color:#a0a0a0}
.doc-panel__item{display:flex;align-items:center;gap:7px;padding:6px 7px;border-radius:4px;border:1px solid transparent;transition:all .1s}
.doc-panel__item:hover{background:#f5f5f5;border-color:#f5f5f5}
.doc-panel__item.selected{background:#eef2fb;border-color:#c4d3ee}
.doc-panel__cb{width:14px;height:14px;accent-color:#003781;cursor:pointer;flex-shrink:0}
.doc-panel__file-icon{color:#6366f1;flex-shrink:0;display:flex;align-items:center}
.doc-panel__file-name{flex:1;font-size:11px;color:#444444;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.doc-panel__status{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;flex-shrink:0}
.doc-panel__status.tested{background:#e6f4e6;color:#008a00}
.doc-panel__status.pending{background:#fff3e0;color:#6b3000}
.doc-panel__cnt.tested{background:#008a00}
.test-doc-section{margin-bottom:2px}
.test-doc-section h4,.test-result-section h4{font-size:12px;font-weight:600;color:#444444;margin-bottom:10px}
.test-doc-list{display:flex;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto;padding-right:2px}
.test-doc-list::-webkit-scrollbar{width:3px}.test-doc-list::-webkit-scrollbar-thumb{background:#d4d4d4;border-radius:2px}
.test-doc-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:4px;border:1.5px solid transparent;background:#f5f5f5;cursor:pointer;font-size:12px;color:#444444;transition:all .12s;user-select:none}
.test-doc-item:hover{border-color:#c4d3ee;background:#f0f7ff;color:#001f52}
.test-doc-item.selected{border-color:#003781;background:#eef2fb;color:#002d6b;font-weight:500;box-shadow:0 0 0 3px rgba(0,55,129,.07)}
.test-doc-item input[type=radio]{display:none}
.test-status-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;flex-shrink:0;white-space:nowrap;line-height:1.4}
.test-status-badge--tested{background:#e6f4e6;color:#006b00}
.test-status-badge--pending{background:#fff3e0;color:#6b3000}
.test-doc-none{font-size:12px;color:#a0a0a0;padding:14px;background:#f5f5f5;border-radius:4px;text-align:center;border:1px solid #f5f5f5}
.test-prompt-toggle{background:none;border:none;font-size:11px;color:#a0a0a0;cursor:pointer;padding:4px 0 8px;font-family:inherit;text-align:left;display:flex;align-items:center;gap:4px}
.test-prompt-toggle:hover{color:#767676}
.workspace__preview-link{background:none;border:none;font-size:11px;color:#a0a0a0;cursor:pointer;padding:0;font-family:inherit;text-decoration:underline;text-underline-offset:2px}
.workspace__preview-link:hover{color:#767676}
.doc-panel__del{background:none;border:none;cursor:pointer;color:#cccccc;padding:2px;border-radius:4px;display:flex;align-items:center;transition:all .1s;flex-shrink:0}
.doc-panel__del:hover{color:#cc0000;background:#fce8e8}
.doc-panel__footer{padding:8px 0;font-size:11px;color:#a0a0a0;border-top:1px solid #f5f5f5;flex-shrink:0}
.doc-panel__footer strong{color:#767676}

/* ── Data Sets panel ── */
.doc-panel__sets{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:0 10px 8px}
.doc-panel__sets-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 0 6px;flex-shrink:0}
.doc-panel__sets-title{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em}
.doc-panel__new-set{background:none;border:none;font-size:11px;color:var(--a);font-weight:500;cursor:pointer;padding:0;font-family:inherit}
.doc-panel__new-set:hover{text-decoration:underline}
.ds-group{border:1px solid var(--bdr);border-radius:var(--r-md);overflow:hidden;margin-bottom:6px;flex-shrink:0}
.ds-group__hdr{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--srf);cursor:pointer;user-select:none;transition:background var(--tf) var(--smooth)}
.ds-group__hdr:hover{background:var(--srf2)}
.ds-group__dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ds-group__name{font-size:12px;font-weight:600;color:var(--tx1);flex:1}
.ds-group__count{font-size:11px;color:var(--tx3);background:var(--srf2);border:1px solid var(--bdr);border-radius:20px;padding:1px 7px;font-weight:500}
.ds-group__chev{color:var(--tx3);transition:transform var(--tf) var(--smooth);display:flex;align-items:center;flex-shrink:0}
.ds-group__chev--open{transform:rotate(180deg)}
.ds-group__body{background:var(--bg);border-top:1px solid var(--bdr)}
.ds-group__sel-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;border-bottom:1px solid var(--bdr);background:var(--srf2)}
.ds-group__sel-all{background:none;border:none;font-size:10px;color:var(--a);font-weight:500;cursor:pointer;font-family:inherit}
.ds-group__sel-all:hover{text-decoration:underline}
.ds-doc-row{display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid var(--bdr);transition:background var(--tf) var(--smooth);cursor:pointer}
.ds-doc-row:last-child{border-bottom:none}
.ds-doc-row:hover{background:var(--srf)}
.ds-doc-row--selected{background:var(--a-lt)}
.ds-doc-row input[type=checkbox]{accent-color:var(--a);flex-shrink:0;width:13px;height:13px;cursor:pointer}
.ds-doc-sub-line{display:flex;align-items:center;gap:4px;flex-wrap:wrap;min-width:0}
.expect-chip{font-size:10px;font-weight:500;padding:1px 6px;border-radius:20px;background:var(--a-lt);color:var(--a);border:1px solid var(--a-mid);white-space:nowrap;flex-shrink:0}
.trace-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px;white-space:nowrap}
.trace-badge--match{background:#e6f4e6;color:#006b00;border:1px solid #b3ddb3}
.trace-badge--mismatch{background:#fce8e8;color:#aa0000;border:1px solid #f5b3b3}
.trace-badge--tested{background:var(--srf2);color:var(--tx3);border:1px solid var(--bdr)}
.ds-doc-del{background:none;border:none;cursor:pointer;color:var(--tx3);padding:2px;border-radius:3px;display:flex;align-items:center;flex-shrink:0;opacity:0;transition:all var(--tf)}
.ds-doc-row:hover .ds-doc-del,.ds-doc-row--selected .ds-doc-del,.dlib__group-hdr:hover .ds-doc-del,.dlib__doc:hover .ds-doc-del{opacity:1}
.ds-doc-del:hover{color:#cc0000;background:#fce8e8}
.ds-empty{text-align:center;padding:12px;font-size:11px;color:var(--tx3)}
/* Doc panel tabs */
.dp-tabs{display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0;background:var(--srf)}
.dp-tab{flex:1;padding:8px 4px;font-size:11px;font-weight:600;color:var(--tx3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all var(--tf) var(--smooth);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
.dp-tab:hover{color:var(--tx1)}
.dp-tab--active{color:var(--a);border-bottom-color:var(--a)}
.dp-tab__badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:20px;background:var(--a-lt);color:var(--a)}
/* Doc metadata */
.ds-doc-info{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.ds-doc-name{font-size:11px;color:var(--tx1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ds-doc-sub{font-size:10px;color:var(--tx3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Testing Results tab */
.tr-list{display:flex;flex-direction:column;gap:0;padding:0 10px 8px}
.tr-row{display:flex;flex-direction:column;gap:4px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.tr-row:last-child{border-bottom:none}
.tr-row--running{opacity:.55}
.tr-row__top{display:flex;align-items:center;gap:6px}
.tr-row__name{font-size:11px;font-weight:600;color:var(--tx1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tr-row__result{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tr-row__result--match{background:#e6f4e6;color:#006b00;border:1px solid #b3ddb3}
.tr-row__result--mismatch{background:#fce8e8;color:#aa0000;border:1px solid #f5b3b3}
.tr-row__meta{font-size:10px;color:var(--tx3)}
.tr-row__spinner{width:12px;height:12px;border:2px solid var(--bdr);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.tr-summary{display:flex;align-items:center;gap:10px;padding:6px 0 8px;border-bottom:1px solid var(--bdr);margin-bottom:2px;flex-shrink:0}
.tr-summary__stat{font-size:11px;font-weight:700}
.tr-summary__stat--total{color:var(--tx2)}
.tr-summary__stat--match{color:#006b00}
.tr-summary__stat--mismatch{color:#aa0000}
.run-bar{position:sticky;bottom:0;background:var(--a);padding:8px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;animation:fadeUp .15s ease}
.run-bar__count{font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
.run-bar__actions{display:flex;gap:6px}
.run-bar__btn{font-size:11px;font-weight:600;padding:4px 11px;border-radius:var(--r);border:none;cursor:pointer;font-family:inherit;transition:all var(--tf) var(--smooth)}
.run-bar__btn--primary{background:#fff;color:var(--a)}.run-bar__btn--primary:hover{background:var(--a-lt)}
.run-bar__btn--ghost{background:rgba(255,255,255,.15);color:#fff}.run-bar__btn--ghost:hover{background:rgba(255,255,255,.25)}
/* Save row at bottom of prompt */
.prompt-save-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0 4px;margin-top:4px;border-top:1px solid var(--bdr)}
.prompt-save-row__state{font-size:11px;color:var(--tx3)}
.prompt-save-row__state--unsaved{color:#e07000}
.prompt-save-row__state--saved{color:#008a00}
/* Upload pending form */
.upload-pending{border:1px solid var(--bdr);border-radius:var(--r);padding:8px 10px;background:var(--srf);margin-top:8px;display:flex;flex-direction:column;gap:6px}
.upload-pending__file{font-size:11px;font-weight:600;color:var(--tx1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upload-pending__row{display:flex;align-items:center;gap:6px}
.upload-pending__label{font-size:10px;color:var(--tx3);white-space:nowrap;width:52px;flex-shrink:0}
.upload-pending__sel{flex:1;font-size:11px;border:1px solid var(--bdr);border-radius:var(--r);padding:3px 6px;background:var(--srf);color:var(--tx1);font-family:inherit;cursor:pointer}
.upload-pending__sel:focus{outline:none;border-color:var(--a)}
.upload-pending__input{flex:1;font-size:11px;border:1px solid var(--bdr);border-radius:var(--r);padding:3px 6px;background:var(--srf);color:var(--tx1);font-family:inherit}
.upload-pending__input:focus{outline:none;border-color:var(--a)}
.upload-pending__chips{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.upload-pending__chip{font-size:10px;font-weight:500;padding:1px 6px;border-radius:20px;background:var(--a-lt);color:var(--a);border:1px solid var(--a-mid);display:flex;align-items:center;gap:3px}
.upload-pending__chip-rm{cursor:pointer;color:var(--a);font-weight:700;line-height:1}
.upload-pending__chip-rm:hover{color:#aa0000}
/* Upload Modal (upm) */
.upm{background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.18);width:560px;max-width:96vw;max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
.upm__hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.upm__title{font-size:16px;font-weight:700;color:var(--tx1)}
.upm__title span{font-weight:400;font-size:14px;color:var(--tx3)}
.upm__bulk{padding:14px 20px;background:#f8f9fb;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;flex-direction:column;gap:7px}
.upm__bulk-hdr{display:flex;align-items:center;justify-content:space-between}
.upm__bulk-title{font-size:11px;font-weight:700;color:var(--a);text-transform:uppercase;letter-spacing:.04em}
.upm__apply-btn{font-size:11px;font-weight:600;color:var(--a);background:none;border:1px solid var(--a-mid);border-radius:var(--r);padding:3px 10px;cursor:pointer;font-family:inherit}
.upm__apply-btn:hover{background:white}
.upm__body{flex:1;overflow-y:auto;padding:12px 20px;display:flex;flex-direction:column;gap:8px}
.upm__row{border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.upm__row-hdr{display:flex;align-items:center;gap:6px}
.upm__fname{font-size:12px;font-weight:600;color:var(--tx1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upm__fsize{font-size:10px;color:var(--tx3);flex-shrink:0}
.upm__remove{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:16px;padding:0 2px;line-height:1;flex-shrink:0}
.upm__remove:hover{color:#cc0000}
.upm__ftr{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--bdr);flex-shrink:0}
.upm__create-ds{display:flex;align-items:center;gap:6px;padding:8px 10px;background:#fff;border:1px dashed var(--a-mid);border-radius:var(--r);margin-top:4px}
.upm__create-ds input{flex:1;font-size:11px;border:1px solid var(--bdr);border-radius:var(--r);padding:3px 8px;font-family:inherit;outline:none}
.upm__create-ds input:focus{border-color:var(--a)}
.upm__create-ds-ok{font-size:11px;font-weight:600;background:var(--a);color:#fff;border:none;border-radius:var(--r);padding:3px 10px;cursor:pointer;font-family:inherit;white-space:nowrap}
.upm__create-ds-ok:disabled{opacity:.4;cursor:default}
.upm__create-ds-cancel{font-size:11px;color:var(--tx3);background:none;border:none;cursor:pointer;font-family:inherit}
.upm__create-ds-cancel:hover{color:var(--tx1)}
.upm__new-ds-link{font-size:11px;color:var(--a);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;text-decoration:underline;white-space:nowrap}
.upm__empty-ds{font-size:12px;color:var(--tx3);padding:6px 0}
/* Doc Library (simplified right panel) */
.dlib__hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 8px;flex-shrink:0}
.dlib__title{font-size:16px;font-weight:700;color:#003781;text-transform:none;letter-spacing:0}
.dlib__new-set{background:none;border:none;font-size:12px;color:#003781;font-weight:500;cursor:pointer;font-family:inherit;padding:0}
.dlib__new-set:hover{text-decoration:underline}
.dlib__sets{flex:1;overflow-y:auto;padding:0 10px 8px;display:flex;flex-direction:column}
.dlib__sets::-webkit-scrollbar{width:3px}.dlib__sets::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.dlib__group{border:1px solid var(--bdr);border-radius:var(--r-md);overflow:hidden;margin-bottom:6px;flex-shrink:0}
.dlib__group-hdr{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--srf);cursor:pointer;user-select:none}
.dlib__group-hdr:hover{background:var(--srf2)}
.dlib__group-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dlib__group-name{font-size:12px;font-weight:600;color:var(--tx1);flex:1}
.dlib__group-count{font-size:11px;color:var(--tx3);background:var(--srf2);border:1px solid var(--bdr);border-radius:20px;padding:1px 7px}
.dlib__group-chev{color:var(--tx3);transition:transform var(--tf) var(--smooth);display:flex;align-items:center}
.dlib__group-chev--open{transform:rotate(180deg)}
.dlib__group-body{background:var(--bg);border-top:1px solid var(--bdr)}
.dlib__doc{display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid var(--bdr)}
.dlib__doc:last-child{border-bottom:none}
.dlib__doc-name{flex:1;font-size:11px;color:var(--tx1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.dlib__doc-sub{font-size:10px;color:var(--tx3)}
.dlib__doc-status{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.dlib__doc-status--tested{background:#e6f4e6;color:#006b00}
.dlib__doc-status--failed{background:#fce8e8;color:#aa0000}
.dlib__doc-status--pending{background:var(--srf2);color:var(--tx3);border:1px solid var(--bdr)}
.dlib__doc-status--no-label{background:#e8f0fe;color:#1967d2}
/* Published badge in prompt editor header */
.lps-pub-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.lps-pub-badge--ok{background:#e6f4e6;color:#006b00;border:1px solid #b3ddb3}
.lps-pub-badge--draft{background:#fff3e0;color:#e07000;border:1px solid #ffd699}
/* Prompt bottom actions row */
.prompt-actions{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 16px;flex-shrink:0}
.prompt-actions__save{background:none;border:none;font-size:13px;color:#003781;font-weight:500;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:2px;padding:0}
.prompt-actions__save:hover{color:#002d6b}
.prompt-actions__save:disabled{color:#a0a0a0;cursor:not-allowed;text-decoration:none}
.dlib__doc-size{font-size:10px;color:var(--tx3);white-space:nowrap;flex-shrink:0}

/* ── Select File Modal ── */
/* ── Select File Modal (sfm) ── */
.sfm{background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.18);width:720px;max-width:96vw;max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
.sfm__hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.sfm__title{font-size:15px;font-weight:700;color:var(--tx1);margin:0}
.sfm__bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 0;flex-shrink:0;position:relative}
.sfm__tabs{display:flex;align-items:center;gap:6px}
.sfm__filter-wrap{position:relative;flex-shrink:0}
.sfm__filter-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;color:var(--tx2);background:var(--bg);cursor:pointer;font-family:inherit;transition:all .12s}
.sfm__filter-btn:hover{border-color:var(--a);color:var(--a)}
.sfm__filter-btn--active{border-color:var(--a);color:var(--a);background:var(--a-lt)}
.sfm__filter-pop{position:absolute;right:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--bdr);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:100;min-width:180px;padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.sfm__filter-pop-title{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.sfm__filter-opt{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--tx1);cursor:pointer;padding:2px 0}
.sfm__filter-opt input{accent-color:var(--a);cursor:pointer}
.sfm__actions{display:flex;gap:12px;padding:8px 20px 4px;flex-shrink:0}
.sfm__table-wrap{max-height:340px;overflow-y:auto;flex-shrink:0}
.sfm__table-wrap::-webkit-scrollbar{width:4px}.sfm__table-wrap::-webkit-scrollbar-thumb{background:#d4d4d4;border-radius:2px}
.sfm__ds-row{background:#f8f9fb}
.sfm__ds-row td{padding:6px 10px;border-bottom:1px solid var(--bdr);border-top:1px solid var(--bdr)}
.sfm__ds-row-inner{display:flex;align-items:center;gap:8px}
.sfm__ds-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.sfm__ds-name{font-size:12px;font-weight:700;color:var(--tx1)}
.sfm__ds-count{font-size:11px;color:var(--tx3)}
.sfm__ds-sel{font-size:11px}
.sfm__doc-row{cursor:pointer}
.sfm__doc-row:hover td{background:var(--srf2)}
.sfm__doc-row--sel td{background:#eef4ff}
.sfm__sel-bar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:#f0f4ff;border-top:1px solid #c7d9f7;flex-shrink:0;flex-wrap:wrap}
.sfm__sel-count{font-size:12px;font-weight:700;color:var(--a);white-space:nowrap;flex-shrink:0}
.sfm__chips{display:flex;gap:5px;flex:1;flex-wrap:wrap;min-width:0}
.sfm__chip{display:inline-flex;align-items:center;gap:4px;background:#fff;border:1px solid #c7d9f7;border-radius:20px;padding:2px 4px 2px 8px;font-size:11px;color:var(--tx1);max-width:160px}
.sfm__chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sfm__chip-x{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:13px;line-height:1;padding:0 2px;border-radius:50%;flex-shrink:0;font-family:inherit}
.sfm__chip-x:hover{color:#cc0000}
.sfm__chip--more{background:var(--srf2);border-color:var(--bdr);color:var(--tx3);cursor:default;padding:2px 10px}
.sfm__sel-clear{font-size:11px;white-space:nowrap;flex-shrink:0}
.sfm__footer{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--bdr);flex-shrink:0}
/* shared sf- classes */
.sf-tab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:var(--bg);color:var(--tx2);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:all .12s}
.sf-tab:hover{border-color:var(--a);color:var(--a)}
.sf-tab--active{background:var(--a);color:#fff;border-color:var(--a)}
.sf-tab__count{font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;background:rgba(255,255,255,.25)}
.sf-tab:not(.sf-tab--active) .sf-tab__count{background:var(--srf2);color:var(--tx3)}
.sf-actions{display:flex;gap:12px;margin-bottom:8px}
.sf-link{background:none;border:none;font-size:12px;color:var(--a);cursor:pointer;font-family:inherit;padding:0;text-decoration:underline;text-underline-offset:2px}
.sf-table{width:100%;border-collapse:collapse;font-size:12px}
.sf-table th{text-align:left;padding:8px 10px;font-size:11px;font-weight:700;color:var(--tx3);border-bottom:2px solid var(--bdr);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;position:sticky;top:0;background:#fff;z-index:1}
.sf-table td{padding:9px 10px;border-bottom:1px solid var(--bdr);color:var(--tx1);vertical-align:middle}
.sf-exp-cell{display:inline-block;padding:2px 7px;background:var(--srf2);border:1px solid var(--bdr);border-radius:var(--r);font-size:11px;color:var(--tx1)}
.sf-exp-extra{color:var(--tx3);background:transparent;border-color:transparent}
.sf-status--pending{font-size:11px;color:var(--tx3)}
.sf-status--tested{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:#e6f4e6;color:#006b00}
.sf-status--failed{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:#fce8e8;color:#cc0000}
.sf-status--no-label{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:#e8f0fe;color:#1967d2}
.sf-doc-name{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
/* File selected display */
.file-sel__selected-list{padding:6px 12px 8px;display:flex;flex-direction:column;gap:3px}
.file-sel__item{font-size:11px;color:var(--tx2);display:flex;align-items:center;gap:6px}
.file-sel__count{font-size:11px;font-weight:600;color:var(--a);padding:0 12px 6px}
/* ── Prompt label row (screenshot style) ── */
.prompt-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.prompt-label-text{font-size:13px;font-weight:600;color:var(--tx1)}
.save-link{background:none;border:none;font-size:13px;color:var(--a);font-weight:500;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:2px;padding:0}
.save-link:disabled{color:var(--tx3);cursor:not-allowed;text-decoration:none}
/* File selected section */
.file-sel{border:1px solid var(--bdr);border-radius:var(--r-md);overflow:hidden;margin-top:12px}
.file-sel__hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--srf)}
.file-sel__hdr-label{font-size:12px;font-weight:600;color:var(--tx1)}
.file-sel__select-link{background:none;border:none;font-size:12px;color:var(--a);font-weight:500;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:2px;padding:0}
.file-sel__empty{font-size:12px;color:var(--tx3);text-align:center;padding:16px 12px}
/* File selector guide card (empty state) */
.file-sel__guide{padding:14px 16px 16px;display:flex;align-items:flex-start;gap:0;position:relative}
.file-sel__guide-content{display:flex;gap:10px;align-items:flex-start;flex:1}
.file-sel__guide-icon{width:34px;height:34px;border-radius:8px;background:var(--a-lt);border:1px solid var(--a-mid);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--a);margin-top:1px}
.file-sel__guide-title{font-size:12px;font-weight:700;color:var(--tx1);margin-bottom:5px}
.file-sel__guide-story{font-size:11px;color:var(--tx2);line-height:1.6;margin-bottom:8px}
.file-sel__guide-steps{display:flex;flex-direction:column;gap:3px;list-style:none;padding:0;margin:0}
.file-sel__guide-step{font-size:11px;color:var(--tx2);display:flex;align-items:baseline;gap:6px}
.file-sel__guide-step-num{font-size:10px;font-weight:700;color:var(--a);background:var(--a-lt);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-sel__guide-arrow{flex-shrink:0;padding-top:2px;opacity:.55}
/* Run test bar */

.run-test-btn:enabled{background:#003781}.run-test-btn:enabled:hover{background:#002d6b}
