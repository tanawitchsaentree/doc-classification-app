                <td>{(()=>{const n=lob.categories.reduce((s,c)=>s+c.types.length,0);return n===0?<span className="badge-no-l2">No {LABELS.l2.plural}</span>:<span className="tbl-count-cell"><span className="tbl-count-num">{n}</span>{lob.classLv2Version&&<span className="tbl-ver-badge">{lob.classLv2Version}</span>}</span>;})()}</td>
                <td><span className={`status-chip status-chip--${lob.status.toLowerCase()}`}>{lob.status}</span></td>
                <td>{lob.confidence}%</td>
                <td>{lob.trainedBy}</td>
                <td><div className="tbl-actions" onClick={e=>e.stopPropagation()}>
                  <button className="tbl-icon-btn" title="Edit" onClick={()=>onSelectLob(lob)}><IC.Edit/></button>
                  <button className="tbl-icon-btn danger" title="Delete" onClick={()=>onConfirm({title:`Delete "${lob.name}"?`,message:`This will permanently remove this ${LABELS.l0.label} and all its ${LABELS.l1.plural.toLowerCase()}.`,confirmLabel:`Delete ${LABELS.l0.label}`,onConfirm:()=>onDeleteLob(lob.id)})}><IC.Trash/></button>
                </div></td>
              </tr>
            ))}
            {rows.length===0&&<tr><td colSpan={7} className="tbl-empty">{filtersActive?'No LOBs match your filters':'No LOBs found'}</td></tr>}
          </tbody>
        </table>
        <Pagination page={page} totalPages={totalPages} perPage={perPage} setPage={setPage} setPerPage={p=>{setPerPage(p);setPage(1);}}/>
      </div>
    </div>
  );
}

/* ── Category Overview (L1 page) ── */
function CategoryOverview({lob,onBack,onSelectCategory,onManagePrompt,addToast,onOpenOutputFormat,onConfirm,onAddCategory,onDeleteCategory}){
  const [search,setSearch]=useState('');
  const [statusFilter,setStatusFilter]=useState('All');
  const [showAddCat,setShowAddCat]=useState(false);
  const [newCatName,setNewCatName]=useState('');
  const submitAddCat=()=>{if(!newCatName.trim())return;onAddCategory(lob.id,newCatName.trim());setNewCatName('');setShowAddCat(false);};
  const [sortKey,setSortKey]=useState(null);
  const [sortDir,setSortDir]=useState('asc');
  const [page,setPage]=useState(1);
  const [perPage,setPerPage]=useState(10);

  const handleSort=key=>{
    if(sortKey===key)setSortDir(d=>d==='asc'?'desc':'asc');
    else{setSortKey(key);setSortDir('asc');}
  };
  const SortIco=({col})=><span className="sort-both">{sortKey===col?(sortDir==='asc'?'↑':'↓'):'⇅'}</span>;

  const filtered=lob.categories
    .filter(c=>statusFilter==='All'||c.status===statusFilter)
    .filter(c=>!search||c.name.toLowerCase().includes(search.toLowerCase()));
  const sorted=sortKey?[...filtered].sort((a,b)=>{
    let av=a[sortKey],bv=b[sortKey];
    if(typeof av==='string')av=av.toLowerCase();
    if(typeof bv==='string')bv=bv.toLowerCase();
    return sortDir==='asc'?(av>bv?1:-1):(av<bv?1:-1);
  }):filtered;
  const totalPages=Math.max(1,Math.ceil(sorted.length/perPage));
  const rows=sorted.slice((page-1)*perPage,page*perPage);

  const filtersActive = search || statusFilter !== 'All';
  return(<>
    <div className="ov-page">
      <div className="ov-breadcrumb">
        <button className="ov-bc-link" onClick={onBack}>Classification</button>
        <span className="ov-bc-sep">›</span>
        <span className="ov-bc-curr">{lob.name}</span>
      </div>
      <h1 className="ov-title">{LABELS.l1.plural}</h1>
      <div className="ov-filter-row">
        <div className="ov-search-wrap">
          <IC.Search/>
          <input className="ov-search" placeholder={`Search ${LABELS.l1.label}…`} value={search}
            onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
          {search&&<button className="search-clear-btn" onClick={()=>{setSearch('');setPage(1);}}>×</button>}
        </div>
        <select className="ov-select" value={statusFilter}
          onChange={e=>{setStatusFilter(e.target.value);setPage(1);}}>
          <option>All</option><option>Deployed</option><option>Failed</option>
        </select>
        {filtersActive&&<button className="btn btn-outline btn-sm btn-filter-active"
          onClick={()=>{setSearch('');setStatusFilter('All');setPage(1);}}>✕ Clear filters</button>}
        <div style={{flex:1}}/>
        {filtersActive&&<span style={{fontSize:'12px',color:'#6b7280'}}>{sorted.length} result{sorted.length!==1?'s':''}</span>}
        <button className="btn btn-outline btn-sm" onClick={onOpenOutputFormat}>Output format</button>
        <button className="btn btn-outline btn-sm" onClick={()=>onManagePrompt(lob,null,null)}>Edit {lob.name} prompt</button>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowAddCat(true)}><IC.Plus s={11}/> Add {LABELS.l1.label}</button>
      </div>
      <div className="ov-table-wrap">
        <table className="ov-table">
          <thead><tr>
            <th className="sortable" onClick={()=>handleSort('name')}>{LABELS.l1.short} · {LABELS.l1.label} <SortIco col="name"/></th>
            <th className="sortable" onClick={()=>handleSort('types')}>{LABELS.l2.short} · {LABELS.l2.label} <SortIco col="types"/></th>
            <th className="sortable" onClick={()=>handleSort('status')}>Status <SortIco col="status"/></th>
            <th className="sortable" onClick={()=>handleSort('confidence')}>Confidence <SortIco col="confidence"/></th>
            <th className="sortable" onClick={()=>handleSort('trainedBy')}>Trained by <SortIco col="trainedBy"/></th>
            <th>Action</th>
          </tr></thead>
          <tbody>
            {rows.map(cat=>(
              <tr key={cat.id} onClick={()=>onSelectCategory(lob,cat)}>
                <td><button className="tbl-name-link" onClick={e=>{e.stopPropagation();onSelectCategory(lob,cat);}}>{cat.name}</button></td>
                <td>{cat.types.length===0?<span className="badge-no-l2">No {LABELS.l2.plural}</span>:<span className="tbl-count-cell"><span className="tbl-count-num">{cat.types.length}</span>{cat.activeVersion&&<span className="tbl-ver-badge">{cat.activeVersion}</span>}</span>}</td>
                <td><span className={`status-chip status-chip--${cat.status.toLowerCase()}`}>{cat.status}</span></td>
                <td>{cat.confidence}%</td>
                <td>{cat.trainedBy}</td>
                <td><div className="tbl-actions" onClick={e=>e.stopPropagation()}>
                  <button className="tbl-icon-btn" title="Edit" onClick={()=>onManagePrompt(lob,cat,null)}><IC.Edit/></button>
                  <button className="tbl-icon-btn danger" title="Delete" onClick={()=>onConfirm({title:`Delete "${cat.name}"?`,message:`This will permanently remove this ${LABELS.l1.label} and all its ${LABELS.l2.plural.toLowerCase()}.`,confirmLabel:'Delete',onConfirm:()=>onDeleteCategory(lob.id,cat.id)})}><IC.Trash/></button>
                </div></td>
              </tr>
            ))}
            {rows.length===0&&<tr><td colSpan={6} className="tbl-empty">{filtersActive?`No ${LABELS.l1.plural.toLowerCase()} match your filters`:`No ${LABELS.l1.plural.toLowerCase()} found`}</td></tr>}
          </tbody>
        </table>
        <Pagination page={page} totalPages={totalPages} perPage={perPage} setPage={setPage} setPerPage={p=>{setPerPage(p);setPage(1);}}/>
      </div>
    </div>
    {showAddCat&&<div className="modal-overlay" onClick={()=>setShowAddCat(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal__header"><h3>Add {LABELS.l1.label}</h3><button className="modal__close" onClick={()=>setShowAddCat(false)}>×</button></div>
        <div className="modal__body">
          <label className="add-modal-label">{LABELS.l1.label} name</label>
          <input autoFocus className="add-modal-input" value={newCatName} onChange={e=>setNewCatName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')submitAddCat();if(e.key==='Escape')setShowAddCat(false);}}
            placeholder="e.g. Claim Notification"/>
          <p className="add-modal-hint">This will be added to {lob.name} as a new Draft {LABELS.l1.label.toLowerCase()}.</p>
        </div>
        <div className="modal__footer">
          <button className="btn btn-outline" onClick={()=>setShowAddCat(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={submitAddCat} disabled={!newCatName.trim()}>Add {LABELS.l1.label}</button>
        </div>
      </div>
    </div>}
  </>);
}

/* ── LOB Prompt Section (Stage 1 — L1-only scroll mode) ── */
/* targets = l1Items passed from App so classifier knows the category targets */
function LobPromptSection({lobName,prompt,defaultPrompt,meta,saveState,onEdit,onSave,
  docs,onAddDoc,onToggleSel,onDelDoc,onMarkTested,addToast,onVersion,targets=[]}){
  const [open,setOpen]=useState(true);
  const [showResetConfirm,setShowResetConfirm]=useState(false);
  const [showPreview,setShowPreview]=useState(false);
  const [showTest,setShowTest]=useState(false);
  const fileRef=useRef(null);
  const m=meta||{version:'V.1',score:'N/A',status:'Draft'};
  const ss=saveState;
  const missing=!prompt.includes('{{CLASSIFICATION_HIERARCHY}}');
  const found=[...new Set(prompt.match(/\{\{[^}]+\}\}/g)||[])];
  const allCount=docs.length;
  const testedCount=docs.filter(d=>d.status==='Tested').length;
  const pendingCount=docs.filter(d=>d.status==='Pending').length;
  const processFiles=files=>{
    const all=Array.from(files);
    const valid=all.filter(f=>['image/jpeg','image/png','application/pdf'].includes(f.type)&&f.size<=5*1024*1024);
    valid.forEach(f=>onAddDoc({id:Date.now()+Math.random(),name:f.name,status:'Pending',selected:false}));
    if(valid.length>0)addToast(`${valid.length} file(s) uploaded`,'success');
    if(all.filter(f=>!['image/jpeg','image/png','application/pdf'].includes(f.type)).length>0)addToast('Some files rejected — PDF/JPG/PNG only','error');
    if(all.filter(f=>f.type&&f.size>5*1024*1024).length>0)addToast('Some files rejected — max 5MB','error');
  };
  return(
    <div className="l1-prompt-sec" id="cat-sec-l1">
      <div className="l1-prompt-sec__hdr" onClick={()=>setOpen(o=>!o)} style={{cursor:'pointer'}}>
        <span className="cat-sec__chevron" style={{transform:open?'rotate(0deg)':'rotate(-90deg)',transition:'transform .15s'}}><IC.ChevDown s={13}/></span>
        <span className="l1-prompt-sec__badge">STAGE 1</span>
        <span className="l1-prompt-sec__title">LOB Classification Prompt — {lobName}</span>
        <div style={{display:'flex',alignItems:'center',gap:'6px',marginLeft:'auto'}}>
          {allCount>0&&<span className="test-chip test-chip--pending" style={{fontSize:'10px'}}>{allCount} doc{allCount!==1?'s':''}</span>}
          <span className={`workspace__status ${(meta||{status:'Draft'}).status.toLowerCase()}`} style={{fontSize:'11px'}}>{(meta||{status:'Draft'}).status}</span>
          <button className="workspace__manage-btn" onClick={e=>{e.stopPropagation();onVersion();}} style={{fontSize:'11px'}}>Version</button>
        </div>
      </div>
      {open&&<div className="l1-prompt-sec__body">
        {/* Left: Prompt editor */}
        <div className="l1-prompt-sec__prompt">
          <p className="l1-prompt-sec__desc">
            Stage 1 routes incoming documents into top-level categories.
            Stage 2 prompts below refine classification within each category.
          </p>
          <div className="sec-ver-card">
            <div className="sec-ver-item"><span className="sec-ver-lbl">Version</span><span className="sec-ver-val">{m.version}</span></div>
            <div className="sec-ver-div"/>
            <div className="sec-ver-item"><span className="sec-ver-lbl">Confidence</span><span className="sec-ver-val">{m.score}</span></div>
            <div className="sec-ver-div"/>
            <div className="sec-ver-item"><span className="sec-ver-lbl">Status</span><span className={`workspace__status ${m.status.toLowerCase()}`}>{m.status}</span></div>
          </div>
          <div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'6px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                <span className="prompt-ctx-chip prompt-ctx-chip--l1">L1</span>
                <span style={{fontSize:'12px',fontWeight:600,color:'#374151'}}>Classification Prompt Template</span>
                {!missing&&<span style={{fontSize:'11px',background:'#dcfce7',color:'#16a34a',padding:'1px 7px',borderRadius:'10px',fontWeight:500}}>✓ Placeholder detected</span>}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                {ss==='unsaved'&&<span className="save-indicator unsaved">● Unsaved</span>}
                {ss==='saved'&&<span className="save-indicator saved"><IC.Check/> Saved</span>}
                <button className="workspace__reset-btn" onClick={()=>setShowResetConfirm(s=>!s)}>Reset</button>
                <button className="workspace__preview-link" onClick={()=>setShowPreview(true)}>Preview</button>
              </div>
            </div>
            {missing&&<div style={{display:'flex',alignItems:'center',gap:'7px',padding:'7px 10px',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:'6px',marginBottom:'8px',fontSize:'11px',color:'#92400e'}}><IC.Warn/> The <code style={{fontFamily:'monospace',background:'#fef3c7',padding:'1px 4px',borderRadius:'3px'}}>{'{{CLASSIFICATION_HIERARCHY}}'}</code> placeholder is required</div>}
            <textarea className="workspace__textarea" style={{minHeight:'180px',width:'100%'}} value={prompt}
              onChange={e=>onEdit(e.target.value)} spellCheck={false}
              placeholder="Enter LOB-level classification prompt…"/>
            {showResetConfirm&&<div className="reset-confirm" style={{marginTop:'6px'}}>
              <span>Reset prompt to default?</span>
              <div className="reset-confirm__actions">
                <button className="btn-sm btn-outline" onClick={()=>setShowResetConfirm(false)}>Cancel</button>
                <button className="btn-sm btn-danger" onClick={()=>{onEdit(defaultPrompt);setShowResetConfirm(false);}}>Reset</button>
              </div>
            </div>}
            <div className="prompt-footer" style={{marginTop:'6px'}}>
              <div className="placeholder-row">
                {found.map(p=><span key={p} className="ph-badge found"><IC.Check/> {p}</span>)}
                {missing&&<span className="ph-badge missing">⚠ {'{{CLASSIFICATION_HIERARCHY}}'}</span>}
              </div>
              <span className="char-count">{prompt.length.toLocaleString()} chars</span>
            </div>
            <div className="prompt-save-row">
              <span className={`prompt-save-row__state${ss==='unsaved'?' prompt-save-row__state--unsaved':ss==='saved'?' prompt-save-row__state--saved':''}`}>
                {ss==='unsaved'?'● Unsaved changes':ss==='saved'?'✓ Saved':''}
              </span>
              <button className="btn btn-primary btn-sm" onClick={onSave} disabled={ss!=='unsaved'}>Save draft</button>
            </div>
          </div>
          <div className="test-action-zone">
            <input ref={fileRef} type="file" accept=".jpg,.jpeg,.png,.pdf" multiple style={{display:'none'}} onChange={e=>processFiles(e.target.files)}/>
            <div className="test-action-zone__top">
              <span className="test-action-zone__title">🧪 Test this prompt</span>
              <div className="test-action-zone__actions">
                <button className="test-action-zone__add" onClick={()=>fileRef.current?.click()}>+ Add doc</button>
                <button className="test-action-zone__btn" onClick={()=>{onSave();setShowTest(true);}}>Open test panel ↗</button>
              </div>
            </div>
            <div className="test-action-zone__bottom">
              {allCount===0
                ?<span className="test-chip test-chip--empty">No documents yet</span>
                :<>
                  {testedCount>0&&<span className="test-chip test-chip--tested">✓ {testedCount} tested</span>}
                  {pendingCount>0&&<span className="test-chip test-chip--pending">{pendingCount} pending</span>}
                  {testedCount===0&&pendingCount===0&&<span className="test-chip test-chip--empty">{allCount} uploaded</span>}
                </>
              }
              <span className="test-action-zone__hint">Pick a document → run → see output</span>
            </div>
          </div>
        </div>
      </div>}
      {showPreview&&<PreviewModal prompt={prompt} onClose={()=>setShowPreview(false)}/>}
      {showTest&&<TestModal
        prompt={prompt}
        docs={docs}
        onMarkTested={onMarkTested}
        onClose={()=>setShowTest(false)}
        targets={targets}
        testTitle={`Test Stage 1 — ${lobName} LOB`}
        expectedPlaceholder={targets.length>0?`e.g. ${targets.slice(0,3).map(t=>t.name).join(', ')}`:undefined}
        onAddDoc={onAddDoc}
        addToast={addToast}
      />}
    </div>
  );
}

function PipelineBar(){

  return(
    <div className="stage-bar">
      {STAGES.map((s,i)=>(
        <React.Fragment key={s}>
          {i>0&&<span className="stage-sep">›</span>}
          <span className={`stage-step${i===current?' stage-step--active':i<current?' stage-step--done':''}`}>

        </React.Fragment>
      ))}

/* ── Readiness Checklist ── */
function ReadinessChecklist({l1Items,ofSchemas,docs}){
  const typesOk=l1Items.some(i=>i.l2.length>0);
  const fieldsOk=Object.values(ofSchemas||{}).some(fields=>Array.isArray(fields)&&fields.length>0);
  const testOk=(docs||[]).some(d=>d.status==='Tested');
  const validationOk=false;
  const checks=[
    {label:'Doc types defined',ok:typesOk},
    {label:'Fields mapped',ok:fieldsOk},
    {label:'Validation rules',ok:validationOk},
    {label:'Test run',ok:testOk},
  ];
  const doneCount=checks.filter(c=>c.ok).length;
  return(
    <div className="readiness">
      <span className="readiness__title">Ready {doneCount}/{checks.length}</span>
      {checks.map((c,i)=>(
        <React.Fragment key={c.label}>
          {i>0&&<span className="readiness__sep"/>}
          <span className={`readiness__item readiness__item--${c.ok?'ok':'fail'}`}>
            {c.ok?'✓':'○'} {c.label}
          </span>
        </React.Fragment>
      ))}
    </div>
  );
}

  const commitL0=()=>{const v=l0Draft.trim();if(v&&v!==l0Name){setL0Name(v);addToast(`Root renamed to "${v}"`);}setEditingL0(false);};
  const toggleL1=id=>setL1Items(items=>items.map(i=>i.id===id?{...i,expanded:!i.expanded}:i));
  const addL2=id=>{if(!addL2Name.trim())return;setL1Items(items=>items.map(i=>i.id===id?{...i,l2:[...i.l2,{id:Date.now().toString(),name:addL2Name.trim()}]}:i));addToast(`"${addL2Name.trim()}" added`);setAddL2Name('');setShowAddL2(null);};
  const delL2=(l1id,l2id,n)=>{setL1Items(items=>items.map(i=>i.id===l1id?{...i,l2:i.l2.filter(x=>x.id!==l2id)}:i));addToast(`"${n}" removed`,'warning');};
  const startRenameL1=id=>{const item=l1Items.find(i=>i.id===id);setRenameDraft(item?.name||'');setRenamingId(id);setShowMenu(null);};
  const commitRename=()=>{if(renameDraft.trim()&&renamingId){const item=l1Items.find(i=>i.id===renamingId);if(renameDraft.trim()!==item?.name){setL1Items(items=>items.map(i=>i.id===renamingId?{...i,name:renameDraft.trim()}:i));addToast(`Renamed to "${renameDraft.trim()}"`);}setRenamingId(null);setRenameDraft('');}else{setRenamingId(null);}};
  const cancelRename=()=>{setRenamingId(null);setRenameDraft('');};
  const requestDelL1=id=>{const item=l1Items.find(i=>i.id===id);setShowMenu(null);onConfirm({title:'Delete Level 1 item',message:`Delete "${item?.name}"? This will remove its workspace tab.`,confirmLabel:'Delete',onConfirm:()=>{setL1Items(items=>items.filter(i=>i.id!==id));addToast(`"${item?.name}" deleted`,'warning');}});};
  const addL1=()=>{if(!addL1Name.trim())return;const id=addL1Name.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now();setL1Items(items=>[...items,{id,name:addL1Name.trim(),expanded:false,l2:[]}]);addToast(`"${addL1Name.trim()}" added`);setAddL1Name('');setShowAddL1(false);};

      <div className="sidebar__divider"/>
      <div className="sidebar__l1-header"><span className="sidebar__level-lbl">{LABELS.l1.short} · {LABELS.l1.label}</span></div>
      <div className="sidebar__list-controls">
        <div className="sidebar__search-wrap">
          <span className="sidebar__search-icon"><IC.Search/></span>
          <input className="sidebar__search" placeholder="Search…" value={sidebarSearch} onChange={e=>setSidebarSearch(e.target.value)}/>
        </div>
        {l1Items.length>0&&<button className="sidebar__collapse-btn" onClick={toggleAllExpand}>{allExpanded?'⊖ All':'⊕ All'}</button>}
      </div>
      <div className="sidebar__l1-list">
        {/* Stage 1 nav link — L1-only mode only */}
        {!cbLevels.l2&&(
          <div className="sidebar__l1-item">
            <div className="sidebar__l1-row">
              <button className={`sidebar__l1-nav${activeCatId==='l1'?' sidebar__l1-nav--active':''}`}

        {l1Items.length===0?<div className="sidebar__empty-l1"><IC.Layers/><p>No level 1 items yet.<br/>Add one below.</p></div>
        :filteredL1.map(item=>(

            {renamingId===item.id?(

                <button className="sidebar__menu-btn" onClick={e=>{e.stopPropagation();setShowMenu(showMenu===item.id?null:item.id);}}><IC.Dots/></button>

/* ── Workspace (Detail) ── */
const DEFAULT_TAB_META={version:'V.1',score:'N/A',status:'Draft'};

function WorkspaceTabs({l1Items,activeL1Tab,setActiveL1Tab,activeTab,setActiveTab,cbLevels}){
  const [showMore,setShowMore]=useState(false);
  const [moreSearch,setMoreSearch]=useState('');
  const [visibleCount,setVisibleCount]=useState(999);
  const outerRef=useRef(null);
  const tabRefs=useRef([]);
  const cachedW=useRef([]);
  const recalcRef=useRef(null);
  const MORE_W=100; // px reserved for "+N more" pill

  // L1 only  → one tab per category (each has its own prompt)
  // L1+L2    → single unified global prompt, no category tabs
  const allL1=cbLevels.l2
    ?[{id:'l1',label:'Global Classification',l2:[]}]
    :l1Items.map(i=>({id:i.id,label:i.name,l2:[]}));

  // Always keep recalcRef current so ResizeObserver closure doesn't go stale
  recalcRef.current=()=>{
    const outer=outerRef.current;
    if(!outer||cachedW.current.length===0)return;
    const avail=outer.offsetWidth-40; // 40px = 20px left + 20px right padding
    let used=0,count=0;
    for(let i=0;i<cachedW.current.length;i++){
      const w=cachedW.current[i]||80;
      const wouldHaveMore=count<cachedW.current.length-1;
      if(count>0&&used+w+(wouldHaveMore?MORE_W:0)>avail)break;
      used+=w;count++;
    }
    const n=Math.max(1,count);
    setVisibleCount(prev=>prev===n?prev:n);
  };

  // When tab count changes, reset so all tabs render visible for measurement
  useEffect(()=>{
    cachedW.current=[];
    setVisibleCount(999);
  },[allL1.length]);

  // After every render: cache widths of currently-visible tabs, then recalc
  useLayoutEffect(()=>{
    tabRefs.current.forEach((el,i)=>{
      if(el&&el.offsetWidth>0)cachedW.current[i]=el.offsetWidth;
    });
    recalcRef.current();
  });

  // Watch container resize
  useEffect(()=>{
    const outer=outerRef.current;
    if(!outer)return;
    const ro=new ResizeObserver(()=>recalcRef.current?.());
    ro.observe(outer);
    return()=>ro.disconnect();
  },[]);

  const hiddenAll=allL1.slice(visibleCount);
  const filtered=moreSearch?hiddenAll.filter(t=>t.label.toLowerCase().includes(moreSearch.toLowerCase())):hiddenAll;
  const hiddenCount=hiddenAll.length;
  const anyHiddenActive=hiddenAll.some(t=>t.id===activeL1Tab);
  const handleL1=id=>{setActiveL1Tab(id);setActiveTab(id);setShowMore(false);setMoreSearch('');};
  // No L2 sub-tabs in workspace bar — type-level prompts accessed through types modal
  const l2Tabs=[];

  return(
    <div className="workspace__tab-area">
      <div className="workspace__tabs workspace__tabs--l1" ref={outerRef}>
        {/* Inner div clips overflow; more-wrap sits outside so dropdown is never clipped */}
        <div className="workspace__tabs-inner">
          {allL1.map((t,i)=>(
            <button key={t.id} ref={el=>{tabRefs.current[i]=el;}}
              className={`workspace__tab${activeL1Tab===t.id?' active':''}${i>=visibleCount?' workspace__tab--hidden':''}`}
              onClick={()=>handleL1(t.id)}>{t.label}</button>
          ))}
        </div>
        {hiddenCount>0&&(
          <div className="workspace__more-wrap">
            <button className={`workspace__more-btn${anyHiddenActive?' active':''}`}
              onClick={e=>{e.stopPropagation();setShowMore(s=>!s);}}>
              +{hiddenCount} more <IC.ChevDown s={11}/>
            </button>
            {showMore&&(
              <div className="workspace__more-menu" onClick={e=>e.stopPropagation()}>
                <input className="workspace__more-search" placeholder="Search tabs…"
                  value={moreSearch} onChange={e=>setMoreSearch(e.target.value)} autoFocus/>
                <div style={{maxHeight:'220px',overflowY:'auto'}}>
                  {filtered.map(t=>(
                    <button key={t.id} className={`workspace__more-item${activeL1Tab===t.id?' active':''}`}
                      onClick={()=>handleL1(t.id)}>{t.label}</button>
                  ))}
                  {filtered.length===0&&<div style={{padding:'8px 14px',fontSize:'12px',color:'#9ca3af'}}>No results</div>}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
      {l2Tabs.length>0&&(
        <div className="workspace__tabs workspace__tabs--l2">
          {l2Tabs.map(l2=>(
            <button key={l2.id} className={`workspace__tab workspace__tab--l2${activeTab===l2.id?' active':''}`}
              onClick={()=>setActiveTab(l2.id)}>{l2.name}</button>
          ))}
        </div>
      )}
    </div>
  );
}

function Workspace({activeL1Tab,setActiveL1Tab,activeTab,setActiveTab,l1Items,prompts,defaultPrompts,tabMeta,saveStates,onEdit,onSave,onVersion,onPreview,onTest,cbLevels,ofSchemas,docs}){
  const getMeta=tabId=>{
    const base=tabMeta?.[tabId]||DEFAULT_TAB_META;
    // L1+L2 mode → single global prompt tab
    if(tabId==='l1')return{...base,title:cbLevels.l2?'Global Classification Prompt (L1 + L2)':'L1 Classification Prompt'};
    // L1 only mode → per-category tabs
    const item=l1Items.find(i=>i.id===tabId);
    if(item)return{...base,title:`${item.name} — Classification Prompt`};
    return{...base,title:tabId};
  };
  const getCtx=tabId=>{
    if(tabId==='l1')return cbLevels.l2
      ?{level:'l1l2',chip:'L1+L2',scope:'Unified prompt — classifies into categories and types'}
      :{level:'l1',chip:'L1',scope:'Classifies documents into top-level categories'};
    const item=l1Items.find(i=>i.id===tabId);
    if(item)return{level:'l1',chip:'L1',scope:`Category: ${item.name}`};
    return{level:'l1',chip:'',scope:''};
  };
  const [showResetConfirm,setShowResetConfirm]=useState(false);
  useEffect(()=>setShowResetConfirm(false),[activeTab]);
  const meta=getMeta(activeTab);
  const ctx=getCtx(activeTab);
  const prompt=prompts[activeTab]||'';
  const ss=saveStates[activeTab];
  const showWarn=activeTab==='l1'&&!prompt.includes('{{CLASSIFICATION_HIERARCHY}}');
  const found=[...new Set(prompt.match(/\{\{[^}]+\}\}/g)||[])];
  const missing=['{{CLASSIFICATION_HIERARCHY}}'].filter(p=>!prompt.includes(p));
  const doReset=()=>{onEdit(activeTab,defaultPrompts?.[activeTab]||'');setShowResetConfirm(false);};
  return(
    <main className="workspace">
      <div className="workspace__header"><span className="workspace__title">Classification Prompts</span></div>
      <WorkspaceTabs l1Items={l1Items} activeL1Tab={activeL1Tab} setActiveL1Tab={setActiveL1Tab} activeTab={activeTab} setActiveTab={setActiveTab} cbLevels={cbLevels}/>
      <div className="workspace__body">
        <div className="workspace__lv-header">
          <h3 className="workspace__lv-title">{meta.title}</h3>
          <button className="workspace__manage-btn" onClick={onVersion}>Manage version</button>
        </div>
        <div className="workspace__ver-card">
          <div className="workspace__ver-item"><span className="workspace__ver-lbl">Version</span><span className="workspace__ver-val">{meta.version}</span></div>
          <div className="workspace__ver-div"/>
          <div className="workspace__ver-item"><span className="workspace__ver-lbl">Confidence score</span><span className="workspace__ver-val">{meta.score}</span></div>
          <div className="workspace__ver-div"/>
          <div className="workspace__ver-item"><span className="workspace__ver-lbl">Status</span><span className={`workspace__status ${meta.status.toLowerCase()}`}>{meta.status}</span></div>
          {(()=>{
            const fields=ofSchemas?.[activeTab];
            const count=Array.isArray(fields)?fields.length:0;
            return(<><div className="workspace__ver-div"/>
              <div className="workspace__ver-item">
                <span className="workspace__ver-lbl">Output fields</span>
                <span className={`schema-badge${count===0?' schema-badge--empty':''}`}>{count===0?'Not mapped':`${count} field${count===1?'':'s'}`}</span>
              </div></>);
          })()}
        </div>
        <ReadinessChecklist l1Items={l1Items} ofSchemas={ofSchemas} docs={docs}/>
        {showWarn&&<div className="workspace__warn"><IC.Warn/><span>The <code>{'{{CLASSIFICATION_HIERARCHY}}'}</code> placeholder is required</span></div>}
        <div className="workspace__prompt-sec">
          <div className="workspace__prompt-hdr">
            <div style={{display:'flex',alignItems:'center',gap:'6px',minWidth:0,overflow:'hidden'}}>
              <span className={`prompt-ctx-chip prompt-ctx-chip--${ctx.level}`}>{ctx.chip}</span>
              <span className="workspace__prompt-lbl">Classification prompt</span>
              {ctx.scope&&<span className="prompt-ctx-scope">· {ctx.scope}</span>}
            </div>
            <div className="workspace__prompt-hdr-right">
              {ss==='unsaved'&&<span className="save-indicator unsaved">● Unsaved changes</span>}
              {ss==='saved'&&<span className="save-indicator saved"><IC.Check/> Saved</span>}
              <button className="workspace__reset-btn" onClick={()=>setShowResetConfirm(true)}>Reset</button>
            </div>
          </div>
          <textarea className="workspace__textarea" value={prompt} onChange={e=>onEdit(activeTab,e.target.value)} spellCheck={false}/>
          {showResetConfirm&&<div className="reset-confirm">
            <span>Reset prompt to default? This will discard all changes.</span>
            <div className="reset-confirm__actions">
              <button className="btn-sm btn-outline" onClick={()=>setShowResetConfirm(false)}>Cancel</button>
              <button className="btn-sm btn-danger" onClick={doReset}>Reset</button>
            </div>
          </div>}
          <div className="prompt-footer">
            <div className="placeholder-row">
              {(found.length>0||missing.length>0)&&<span className="placeholder-row__lbl">Placeholders:</span>}
              {found.map(p=><span key={p} className="ph-badge found"><IC.Check/> {p}</span>)}
              {missing.map(p=><span key={p} className="ph-badge missing">⚠ {p}</span>)}
            </div>
            <span className="char-count">{prompt.length.toLocaleString()} chars</span>
          </div>
        </div>
        <div className="workspace__actions">
          <button className="workspace__preview-link" onClick={onPreview}>View full prompt</button>
          <button className="workspace__btn primary" onClick={()=>{onSave(activeTab);onTest();}}>Test prompt</button>
        </div>
      </div>
    </main>
  );
}

/* ── Document Panel ── */
function DocumentPanel({docs,dataSets,onAddDocs,toggleSel,delDoc,addDataSet,style}){
  const [dragOver,setDragOver]=useState(false);
  const [openSets,setOpenSets]=useState(()=>Object.fromEntries((dataSets||[]).map(ds=>[ds.id,true])));
  const [pendingFiles,setPendingFiles]=useState([]);
  const [dpTab,setDpTab]=useState('datasets'); // 'datasets' | 'results'
  const testedDocs=docs.filter(d=>d.status==='Tested'); // [{file, dataSetId, expectedLabels[], newSetName}]
  const [addLabelInput,setAddLabelInput]=useState('');
  const fileRef=useRef(null);

  const processRawFiles=files=>{
    const valid=Array.from(files).filter(f=>['image/jpeg','image/png','application/pdf'].includes(f.type)&&f.size<=5*1024*1024);
    if(!valid.length)return;
    setPendingFiles(valid.map(f=>({file:f,dataSetId:dataSets[0]?.id||'',expectedLabels:[],newSetName:'',isNew:false})));
  };

  const updatePending=(i,patch)=>setPendingFiles(pf=>pf.map((p,j)=>j===i?{...p,...patch}:p));
  const addExpLabel=(i,label)=>{
    if(!label.trim())return;
    setPendingFiles(pf=>pf.map((p,j)=>j===i&&p.expectedLabels.length<2&&!p.expectedLabels.includes(label.trim())?{...p,expectedLabels:[...p.expectedLabels,label.trim()]}:p));
    setAddLabelInput('');
  };
  const rmExpLabel=(i,label)=>setPendingFiles(pf=>pf.map((p,j)=>j===i?{...p,expectedLabels:p.expectedLabels.filter(l=>l!==label)}:p));

  const confirmUpload=()=>{
    pendingFiles.forEach(p=>{
      let dsId=p.dataSetId;
      if(p.isNew&&p.newSetName.trim()){dsId=addDataSet(p.newSetName.trim());}
      onAddDocs([{id:Date.now()+Math.random(),name:p.file.name,dataSetId:dsId,expectedLabels:p.expectedLabels,status:'Pending',selected:false,lastTest:null}]);
    });
    setPendingFiles([]);
  };

  const toggleSet=id=>setOpenSets(o=>({...o,[id]:!o[id]}));
  const selAllInSet=(dsId)=>{
    const setDocs=docs.filter(d=>d.dataSetId===dsId);
    const allSel=setDocs.every(d=>d.selected);
    setDocs.forEach(d=>toggleSel(d.id,!allSel));
  };

  return(
    <aside className="doc-panel" style={style}>
      {/* Upload zone */}
      <div className="doc-panel__upload">
        <p className="doc-panel__sec-title">Upload test document</p>
        <div className={`doc-panel__dropzone${dragOver?' drag-over':''}`}
          onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
          onDrop={e=>{e.preventDefault();setDragOver(false);processRawFiles(e.dataTransfer.files);}}
          onClick={()=>fileRef.current?.click()}>
          <input ref={fileRef} type="file" accept=".jpg,.jpeg,.png,.pdf" multiple style={{display:'none'}} onChange={e=>processRawFiles(e.target.files)}/>
          <IC.Upload/>
          <p className="doc-panel__dz-text">Drag here or <span className="doc-panel__browse">browse</span></p>
          <p className="doc-panel__dz-hint">PDF · JPG · PNG · max 5MB</p>
        </div>
        {/* Inline assign form */}
        {pendingFiles.map((p,i)=>(
          <div key={i} className="upload-pending">
            <div className="upload-pending__file" title={p.file.name}>{p.file.name}</div>
            <div className="upload-pending__row">
              <span className="upload-pending__label">Data Set</span>
              <select className="upload-pending__sel" value={p.isNew?'__new__':p.dataSetId}
                onChange={e=>{const v=e.target.value;updatePending(i,v==='__new__'?{isNew:true,dataSetId:''}:{isNew:false,dataSetId:v});}}>
                {dataSets.map(ds=><option key={ds.id} value={ds.id}>{ds.name}</option>)}
                <option value="__new__">+ New Data Set…</option>
              </select>
            </div>
            {p.isNew&&<div className="upload-pending__row">
              <span className="upload-pending__label">Set name</span>
              <input className="upload-pending__input" placeholder="e.g. Invoice Batch Feb"
                value={p.newSetName} onChange={e=>updatePending(i,{newSetName:e.target.value})}/>
            </div>}
            <div className="upload-pending__row">
              <span className="upload-pending__label">Expect</span>
              <div className="upload-pending__chips">
                {p.expectedLabels.map(l=>(
                  <span key={l} className="upload-pending__chip">{l}
                    <span className="upload-pending__chip-rm" onClick={()=>rmExpLabel(i,l)}>×</span>
                  </span>
                ))}
                {p.expectedLabels.length<2&&<input className="upload-pending__input" style={{width:'90px'}}
                  placeholder="Add label…" value={addLabelInput}
                  onChange={e=>setAddLabelInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'||e.key===','){addExpLabel(i,addLabelInput);}}}/>}
              </div>
            </div>
            <div className="upload-pending__actions">
              <button className="btn btn-outline btn-sm" onClick={()=>setPendingFiles(pf=>pf.filter((_,j)=>j!==i))}>Cancel</button>
              <button className="btn btn-primary btn-sm"
                onClick={()=>{
                  let dsId=p.dataSetId;
                  if(p.isNew&&p.newSetName.trim()){dsId=addDataSet(p.newSetName.trim());}
                  if(!dsId)return;
                  onAddDocs([{id:Date.now()+Math.random(),name:p.file.name,dataSetId:dsId,expectedLabels:p.expectedLabels,status:'Pending',selected:false,lastTest:null}]);
                  setPendingFiles(pf=>pf.filter((_,j)=>j!==i));
                }}
                disabled={!p.dataSetId&&!(p.isNew&&p.newSetName.trim())}>Add</button>
            </div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div className="dp-tabs">
        <button className={`dp-tab${dpTab==='datasets'?' dp-tab--active':''}`} onClick={()=>setDpTab('datasets')}>
          Datasets <span className="dp-tab__badge">{dataSets.length}</span>
        </button>
        <button className={`dp-tab${dpTab==='results'?' dp-tab--active':''}`} onClick={()=>setDpTab('results')}>
          Testing Results <span className="dp-tab__badge">{testedDocs.length}</span>
        </button>
      </div>

      {/* Datasets tab */}
      {dpTab==='datasets'&&<div className="doc-panel__sets">
        <div className="doc-panel__sets-hdr">
          <span className="doc-panel__sets-title">Data Sets</span>
          <button className="doc-panel__new-set" onClick={()=>{const n=window.prompt('New Data Set name:');if(n?.trim())addDataSet(n.trim());}}>+ New set</button>
        </div>
        {dataSets.map(ds=>{
          const setDocs=docs.filter(d=>d.dataSetId===ds.id);
          const isOpen=openSets[ds.id]!==false;
          const selCount=setDocs.filter(d=>d.selected).length;
          return(
            <div key={ds.id} className="ds-group">
              <div className="ds-group__hdr" onClick={()=>toggleSet(ds.id)}>
                <span className="ds-group__dot" style={{background:ds.color}}/>
                <span className="ds-group__name">{ds.name}</span>
                <span className="ds-group__count">{setDocs.length}</span>
                <span className={`ds-group__chev${isOpen?' ds-group__chev--open':''}`}><IC.ChevDown s={12}/></span>
              </div>
              {isOpen&&<div className="ds-group__body">
                {setDocs.length===0?<div className="ds-empty">No documents yet</div>:(
                  <>
                    <div className="ds-group__sel-bar">
                      <span style={{fontSize:'10px',color:'var(--tx3)'}}>{selCount>0?`${selCount} selected`:'\u00a0'}</span>
                      <button className="ds-group__sel-all" onClick={()=>selAllInSet(ds.id)}>
                        {setDocs.every(d=>d.selected)?'Deselect all':'Select all'}
                      </button>
                    </div>
                    {setDocs.map(doc=>(
                      <div key={doc.id} className={`ds-doc-row${doc.selected?' ds-doc-row--selected':''}`}>
                        <input type="checkbox" checked={doc.selected} onChange={()=>toggleSel(doc.id)}/>
                        <div className="ds-doc-info">
                          <span className="ds-doc-name" title={doc.name}>{doc.name}</span>
                          <div className="ds-doc-sub-line">
                            <span className="ds-doc-sub">{doc.size} · {ds.name}</span>
                            {doc.expectedLabels.map(l=><span key={l} className="expect-chip">{l}</span>)}
                            {doc.lastTest&&(
                              <span className={`trace-badge trace-badge--${doc.lastTest.match?'match':'mismatch'}`}
                                title={`via ${doc.lastTest.ctx} · predicted: ${doc.lastTest.pred}`}>
                                {doc.lastTest.match?'✓':'✗'} {doc.lastTest.conf}%
                              </span>
                            )}
                          </div>
                        </div>
                        <button className="ds-doc-del" onClick={()=>delDoc(doc.id)} title="Remove"><IC.Trash/></button>
                      </div>
                    ))}
                  </>
                )}
              </div>}
            </div>
          );
        })}
      </div>}

      {/* Testing Results tab */}
      {dpTab==='results'&&<div className="doc-panel__sets">
        <div className="doc-panel__sets-hdr">
          <span className="doc-panel__sets-title">Testing Results</span>
          <span style={{fontSize:'10px',color:'var(--tx3)'}}>{testedDocs.length} tested</span>
        </div>
        {testedDocs.length===0
          ?<div className="ds-empty" style={{paddingTop:'32px'}}>No documents tested yet</div>
          :<div className="tr-list">
            {testedDocs.map(doc=>{
              const ds=dataSets.find(s=>s.id===doc.dataSetId);
              return(
                <div key={doc.id} className="tr-row">
                  <div className="tr-row__top">
                    <span className="tr-row__name" title={doc.name}>{doc.name}</span>
                    {doc.lastTest&&<span className={`tr-row__result tr-row__result--${doc.lastTest.match?'match':'mismatch'}`}>
                      {doc.lastTest.match?'✓ Match':'✗ Mismatch'} · {doc.lastTest.conf}%
                    </span>}
                  </div>
                  <div className="tr-row__meta">
                    {doc.size} · {ds?.name||'—'}
                    {doc.lastTest&&<> · via <strong>{doc.lastTest.ctx}</strong> · predicted: <strong>{doc.lastTest.pred}</strong></>}
                  </div>
                  {doc.expectedLabels.length>0&&<div style={{display:'flex',gap:'4px'}}>
                    {doc.expectedLabels.map(l=><span key={l} className="expect-chip">Expected: {l}</span>)}
                  </div>}
                </div>
              );
            })}
          </div>
        }
      </div>}
    </aside>
  );
}

/* ── Modals ── */
function VersionModal({lob,onClose}){
  const versions=lob?.versions||[];
  return(<div className="modal-overlay" onClick={onClose}><div className="modal xl" onClick={e=>e.stopPropagation()}>
    <div className="modal__header"><h3>Manage Versions — {lob?.name||''}</h3><button className="modal__close" onClick={onClose}>×</button></div>
    <div className="modal__body">
      {versions.length===0
        ?<p style={{padding:'16px',color:'#6b7280',fontSize:'13px'}}>No version history available.</p>
        :<table className="version-table"><thead><tr><th>Version</th><th>Date</th><th>Confidence</th><th>Status</th><th>Note</th><th>Created by</th><th>Action</th></tr></thead><tbody>
          {versions.map(v=><tr key={v.v}>
            <td><strong>{v.v}</strong></td>
            <td>{v.date}</td>
            <td>{v.score}</td>
            <td><span className={`badge badge-${v.status.toLowerCase()}`}>{v.status}</span></td>
            <td style={{fontSize:'11px',color:'#6b7280',maxWidth:'220px'}}>{v.note}</td>
            <td>{v.createdBy}</td>
            <td><button className="btn btn-outline btn-sm">{v.status==='Active'?'Current':'Restore'}</button></td>
          </tr>)}
        </tbody></table>

    <div className="modal__footer"><button className="btn btn-outline" onClick={onClose}>Close</button><button className="btn btn-primary">Create new version</button></div>
  </div></div>);
}
function PreviewModal({prompt,onClose}){return(<div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal__header"><h3>Prompt Preview</h3><button className="modal__close" onClick={onClose}>×</button></div><div className="modal__body"><div className="preview-box"><pre>{prompt}</pre></div></div><div className="modal__footer"><button className="btn btn-primary" onClick={onClose}>Close</button></div></div></div>);}
/* targets = [{id,name}]  — categories for Stage 1, types for Stage 2
   testTitle  = string shown in modal header
   expectedPlaceholder = hint text for the expected input */
function TestModal({prompt,docs,onMarkTested,onClose,targets=[],testTitle='Test Prompt',onAddDoc,addToast}){
  const allDocs=docs||[];
  const [docSearch,setDocSearch]=useState('');
  const [selDoc,setSelDoc]=useState(()=>allDocs.find(d=>d.status==='Pending')?.id||allDocs[0]?.id||null);
  const [expectedLabel,setExpectedLabel]=useState('');
  const [running,setRunning]=useState(false);
  const [result,setResult]=useState(null);
  const [showPrompt,setShowPrompt]=useState(false);
  const [docResults,setDocResults]=useState({});
  const fileRef=useRef(null);

  useEffect(()=>{setResult(null);setExpectedLabel('');},[selDoc]);

  const filteredDocs=allDocs.filter(d=>!docSearch||d.name.toLowerCase().includes(docSearch.toLowerCase()));

  const processFiles=files=>{
    const all=Array.from(files);
    const valid=all.filter(f=>['image/jpeg','image/png','application/pdf'].includes(f.type)&&f.size<=5*1024*1024);
    if(onAddDoc)valid.forEach(f=>onAddDoc({id:Date.now()+Math.random(),name:f.name,status:'Pending',selected:false}));
    if(valid.length>0&&addToast)addToast(`${valid.length} file(s) added`,'success');
    if(all.filter(f=>!['image/jpeg','image/png','application/pdf'].includes(f.type)).length>0&&addToast)addToast('Some files rejected — PDF/JPG/PNG only','error');
    if(all.filter(f=>f.type&&f.size>5*1024*1024).length>0&&addToast)addToast('Some files rejected — max 5MB','error');
  };

  const getDocBadge=doc=>{
    const dr=docResults[doc.id];
    if(!dr)return{label:'Untested',cls:'untested'};
    if(dr.matched===true)return{label:'✓ Match',cls:'matched'};
    if(dr.matched===false)return{label:'✗ Mismatch',cls:'mismatched'};
    return{label:'Tested',cls:'tested'};
  };

  const run=()=>{
    const doc=allDocs.find(d=>d.id===selDoc);
    if(!doc)return;
    setRunning(true);setResult(null);
    const effectiveTargets=targets.length>0
      ?targets
      :[{id:'doc',name:doc.name.replace(/\.(pdf|jpg|jpeg|png)$/i,'').replace(/[_-]/g,' ')||'Document'}];
    const r=mockClassify(doc.name,effectiveTargets);
    const delay=r?.processingMs||1400;
    setTimeout(()=>{
      const matched=expectedLabel
        ?r.classification.toLowerCase().trim()===expectedLabel.toLowerCase().trim()
        :null;
      const full={...r,expectedLabel,matched};
      setResult(full);
      setDocResults(prev=>({...prev,[selDoc]:full}));
      setRunning(false);
      if(selDoc&&onMarkTested)onMarkTested(selDoc);
    },delay);
  };

  const confNum=result?parseFloat(result.confidence)||0:0;
  const confColor=confNum>=85?'#15803d':confNum>=70?'#d97706':'#dc2626';

  return(<div className="modal-overlay" onClick={onClose}><div className="modal lg" onClick={e=>e.stopPropagation()}>
    <div className="modal__header">
      <div>
        <h3>{testTitle}</h3>
        {targets.length>0&&<div style={{fontSize:'11px',color:'#9ca3af',marginTop:'2px'}}>
          {targets.length} target{targets.length!==1?'s':''}: {targets.slice(0,4).map(t=>t.name).join(', ')}{targets.length>4?` +${targets.length-4} more`:''}
        </div>}
      </div>
      <button className="modal__close" onClick={onClose}>×</button>
    </div>
    <div className="modal__body"><div className="test-modal">

      {/* ── 1. Doc selector ── */}
      <div className="test-doc-section">
        <h4>Select document</h4>
        <input className="test-doc-search" placeholder="Search…" value={docSearch} onChange={e=>setDocSearch(e.target.value)}/>
        {onAddDoc&&<div className="test-doc-upload-row" onClick={()=>fileRef.current?.click()}>
          <input ref={fileRef} type="file" accept=".jpg,.jpeg,.png,.pdf" multiple style={{display:'none'}} onChange={e=>processFiles(e.target.files)}/>
          <span style={{fontSize:'13px'}}>↑</span> Upload document
        </div>}
        {filteredDocs.length===0
          ?<div className="test-doc-none">{allDocs.length===0?'No documents yet — upload one above.':'No documents match your search.'}</div>
          :<div className="test-doc-list">{filteredDocs.map(d=>{
            const badge=getDocBadge(d);
            return(
              <label key={d.id} className={`test-doc-item${selDoc===d.id?' selected':''}`} onClick={()=>setSelDoc(d.id)}>
                <input type="radio" name="testDoc" checked={selDoc===d.id} onChange={()=>setSelDoc(d.id)}/>
                <IC.File/>
                <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.name}</span>
                <span className={`test-status-badge test-status-badge--${badge.cls}`}>{badge.label}</span>
              </label>
            );
          })}</div>
        }
      </div>

      {/* ── 2. Expected label (appears after doc selected) ── */}
      {selDoc&&!running&&(
        <div className="test-expect-row">
          <span className="test-expect-lbl">I expect this to be</span>
          <select className="test-expect-sel" value={expectedLabel} onChange={e=>{setExpectedLabel(e.target.value);setResult(null);}}>
            <option value="">— No expectation (skip) —</option>
            {targets.map(t=><option key={t.id} value={t.name}>{t.name}</option>)}
          </select>
        </div>
      )}

      {/* ── Prompt toggle ── */}
      <button className="test-prompt-toggle" onClick={()=>setShowPrompt(s=>!s)}>
        {showPrompt?'▾':'▸'} {showPrompt?'Hide prompt':'View prompt'}
      </button>
      {showPrompt&&<div className="preview-box" style={{marginBottom:'8px'}}><pre>{prompt}</pre></div>}

      {/* ── Running ── */}
      {running&&<div className="test-running"><div className="test-spinner"/><span>Classifying document…</span></div>}

      {/* ── Result card ── */}
      {result&&(()=>{
        const {matched}=result;
        const hdr=matched===true?'match':matched===false?'mismatch':'neutral';
        return(
          <div className="tr-card">
            {/* Header */}
            <div className={`tr-card__header tr-card__header--${hdr}`}>
              <div>
                <div className="tr-card__label">Predicted classification</div>
                <div className="tr-card__predicted">{result.classification}</div>
              </div>
              <span className={`tr-card__verdict tr-card__verdict--${hdr}`}>
                {matched===true?'✓ Match':matched===false?'✗ Mismatch':'Result'}
              </span>
            </div>
            {/* Confidence bar */}
            <div className="tr-conf">
              <span className="tr-conf__title">Confidence</span>
              <div className="tr-conf__bar"><div className="tr-conf__fill" style={{width:result.confidence,background:confColor}}/></div>
              <span className="tr-conf__val" style={{color:confColor}}>{result.confidence}</span>
            </div>
            {/* Expected vs Predicted (only when expected was set) */}
            {matched!==null&&(
              <div className={`tr-compare tr-compare--${matched?'match':'mismatch'}`}>
                <div className="tr-compare__col">
                  <span className="tr-compare__lbl">Expected</span>
                  <span className="tr-compare__val">{result.expectedLabel}</span>
                </div>
                <span className="tr-compare__arrow">{matched?'✓':'✗'}</span>
                <div className="tr-compare__col">
                  <span className="tr-compare__lbl">Predicted</span>
                  <span className="tr-compare__val">{result.classification}</span>
                </div>
              </div>
            )}
            {/* Reasoning */}
            <div className="tr-reasoning">{result.reasoning}</div>
            {/* Mismatch: actionable hint */}
            {matched===false&&(
              <div className="tr-hint">
                <span>💡 Prompt may need adjustment to better distinguish these document types.</span>
                <button className="tr-hint__btn" onClick={onClose}>Open editor →</button>
              </div>
            )}
            {/* No expectation: offer to set */}
            {matched===null&&(
              <div className="tr-no-expect">
                <span>No expected label — result only</span>
                <button className="tr-no-expect__btn" onClick={()=>setResult(null)}>Set expected & retest →</button>
              </div>
            )}
          </div>
        );
      })()}

    </div></div>
    <div className="modal__footer">
      <button className="btn btn-outline" onClick={onClose}>Close</button>
      <button className="btn btn-primary" onClick={run} disabled={running||!selDoc}>
        {running?'Running…':result?'Run again':'Run Test'}
      </button>
    </div>
  </div></div>);
}

function OutputFormatModal({lobs,schemas:initSchemas,onSave,activeLobId,onClose}){
  // Auto-expand: use activeLobId if provided, else first LOB that has types
  const [expandedLobs,setExpandedLobs]=useState(()=>{
    const e={};
    const target=activeLobId
      ?lobs.find(l=>l.id===activeLobId)
      :lobs.find(l=>l.categories.some(c=>c.types.length>0));
    if(target)e[target.id]=true;
    return e;
  });
  const [expandedCats,setExpandedCats]=useState(()=>{
    // Auto-expand first category with types in the target LOB
    const e={};
    const target=activeLobId?lobs.find(l=>l.id===activeLobId):lobs.find(l=>l.categories.some(c=>c.types.length>0));
    if(target){const cat=target.categories.find(c=>c.types.length>0);if(cat)e[cat.id+target.id]=true;}
    return e;
  });
  const [sel,setSel]=useState(null); // {lobId,catId,typeId,lobName,catName,typeName}
  const [schemas,setSchemas]=useState(initSchemas||{});  // initialized from persisted state
  const [jsonMode,setJsonMode]=useState(false);
  const [showImport,setShowImport]=useState(false);

  const toggleLob=id=>setExpandedLobs(e=>({...e,[id]:!e[id]}));
  const toggleCat=id=>setExpandedCats(e=>({...e,[id]:!e[id]}));
  const getSchema=tid=>schemas[tid]||[];
  const setSchema=(tid,fields)=>setSchemas(s=>({...s,[tid]:fields}));

  const selectType=(lob,cat,type)=>{
    setSel({lobId:lob.id,catId:cat.id,typeId:type.id,lobName:lob.name,catName:cat.name,typeName:type.name});
    setJsonMode(false);setShowImport(false);
  };

  const addField=()=>{
    if(!sel)return;
    setSchema(sel.typeId,[...getSchema(sel.typeId),{id:Date.now().toString(),name:'',type:'string',required:false,description:''}]);
  };
  const updateField=(tid,fid,key,val)=>setSchema(tid,getSchema(tid).map(f=>f.id===fid?{...f,[key]:val}:f));
  const deleteField=(tid,fid)=>setSchema(tid,getSchema(tid).filter(f=>f.id!==fid));
  const importTemplate=name=>{
    if(!sel)return;
    setSchema(sel.typeId,OF_TEMPLATES[name].map(f=>({...f,id:Date.now().toString()+Math.random()})));
    setShowImport(false);
  };

  const toJson=()=>{
    if(!sel)return `// Select a ${LABELS.l2.label.toLowerCase()} from the tree`;
    const fields=getSchema(sel.typeId);
    if(!fields.length)return '// No fields defined yet\n// Click "+ Add field" or import a template';
    const schema=Object.fromEntries(fields.filter(f=>f.name).map(f=>[f.name,{
      type:f.type,...(f.required?{required:true}:{}),...(f.description?{description:f.description}:{})
    }]));
    return JSON.stringify({document_type:sel.typeName,schema},null,2);
  };

  const fields=sel?getSchema(sel.typeId):[];
  // Scope tree: if opened from a specific LOB, show only that LOB; otherwise show all
  const scopedLobs=activeLobId
    ?lobs.filter(l=>l.id===activeLobId)
    :lobs.filter(l=>l.categories.some(c=>c.types.length>0));

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal of-modal" onClick={e=>e.stopPropagation()}>
        <div className="modal__header">
          <h3>Output Format{activeLobId&&scopedLobs[0]?` — ${scopedLobs[0].name}`:''}</h3>
          <button className="modal__close" onClick={onClose}>×</button>
        </div>
        <div className="modal__body">
          {/* ── Left tree ── */}
          <div className="of-tree">
            {scopedLobs.length===0&&<div style={{padding:'12px',fontSize:'12px',color:'#9ca3af'}}>No {LABELS.l2.plural.toLowerCase()} defined</div>}
            {scopedLobs.map(lob=>(
              <div key={lob.id} className="of-tree__lob">
                <button className="of-tree__lob-btn" onClick={()=>toggleLob(lob.id)}
                  style={activeLobId?{cursor:'default',fontWeight:600}:{}}>
                  {!activeLobId&&<span style={{fontSize:'10px',opacity:.7}}>{expandedLobs[lob.id]?'▾':'▸'}</span>}
                  {lob.name}
                </button>
                {expandedLobs[lob.id]&&lob.categories.filter(c=>c.types.length>0).map(cat=>(
                  <div key={cat.id}>
                    <button className="of-tree__cat-btn" onClick={()=>toggleCat(cat.id+lob.id)}>
                      <span style={{fontSize:'10px',opacity:.7}}>{expandedCats[cat.id+lob.id]?'▾':'▸'}</span>
                      {cat.name}
                    </button>
                    {expandedCats[cat.id+lob.id]&&cat.types.map(type=>(
                      <button key={type.id}
                        className={`of-tree__type-btn${sel?.typeId===type.id?' active':''}`}
                        onClick={()=>selectType(lob,cat,type)}>
                        {type.name}
                        {schemas[type.id]?.length>0&&<span className="of-type-badge">{schemas[type.id].length}</span>}
                      </button>
                    ))}
                  </div>
                ))}
              </div>
            ))}
          </div>

          {/* ── Right schema panel ── */}
          <div className="of-schema" onClick={()=>setShowImport(false)}>
            {!sel?(
              <div className="of-no-sel">
                <span style={{fontSize:'32px'}}>🗂️</span>
                <span>Select a {LABELS.l2.label.toLowerCase()} from the tree<br/>to define its extraction schema</span>
              </div>
            ):(
              <>
                <div className="of-schema__hdr">
                  <div>
                    <div className="of-schema__title">{sel.typeName}</div>
                    <div className="of-schema__path">{sel.lobName} › {sel.catName} › {sel.typeName}</div>
                  </div>
                  <div className="of-schema__actions">
                    <button className={`btn btn-sm${jsonMode?' btn-primary':' btn-outline'}`}
                      onClick={()=>setJsonMode(m=>!m)}>
                      {jsonMode?'Field view':'JSON view'}
                    </button>
                    {!jsonMode&&<>
                      <div className="import-dd" onClick={e=>e.stopPropagation()}>
                        <button className="btn btn-outline btn-sm"
                          onClick={()=>setShowImport(s=>!s)}>
                          Import template ▾
                        </button>
                        {showImport&&(
                          <div className="import-dd__menu">
                            {Object.keys(OF_TEMPLATES).map(t=>(
                              <button key={t} className="import-dd__item" onClick={()=>importTemplate(t)}>{t}</button>
                            ))}
                          </div>
                        )}
                      </div>
                      <button className="btn btn-primary btn-sm" onClick={addField}><IC.Plus s={11}/> Add field</button>
                    </>}
                  </div>
                </div>
                {jsonMode?(
                  <pre className="of-json">{toJson()}</pre>
                ):(
                  <div className="of-table-wrap">
                    <table className="of-table">
                      <thead><tr>
                        <th style={{width:'22%'}}>Field name</th>
                        <th style={{width:'15%'}}>Data type</th>
                        <th style={{width:'9%',textAlign:'center'}}>Required</th>
                        <th>Description</th>
                        <th style={{width:'36px'}}></th>
                      </tr></thead>
                      <tbody>
                        {fields.length===0?(
                          <tr><td colSpan={5} className="of-empty-row">
                            No fields yet — click "+ Add field" or import a template
                          </td></tr>
                        ):fields.map(f=>(
                          <tr key={f.id}>
                            <td><input className="of-field-input" placeholder="field_name" value={f.name}
                              onChange={e=>updateField(sel.typeId,f.id,'name',e.target.value)}/></td>
                            <td>
                              <select className="of-type-sel" value={f.type}
                                onChange={e=>updateField(sel.typeId,f.id,'type',e.target.value)}>
                                {OF_FIELD_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                              </select>
                            </td>
                            <td style={{textAlign:'center'}}>
                              <input type="checkbox" className="of-req-cb" checked={f.required}
                                onChange={e=>updateField(sel.typeId,f.id,'required',e.target.checked)}/>
                            </td>
                            <td><input className="of-field-input" placeholder="Field description…" value={f.description}
                              onChange={e=>updateField(sel.typeId,f.id,'description',e.target.value)}/></td>
                            <td>
                              <button className="of-del-btn" title="Remove field"
                                onClick={()=>deleteField(sel.typeId,f.id)}><IC.Trash/></button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
        <div className="modal__footer">
          <button className="btn btn-outline" onClick={onClose}>Discard</button>
          <button className="btn btn-primary" onClick={()=>onSave(schemas)}>Save schema</button>
        </div>
      </div>
    </div>
  );
}

function ResizeHandle({onResize}){
  const activeRef=useRef(false);
  const [active,setActive]=useState(false);
  const onMouseDown=e=>{
    e.preventDefault();
    let lastX=e.clientX;
    activeRef.current=true;
    setActive(true);
    const onMove=e=>{if(!activeRef.current)return;const dx=e.clientX-lastX;lastX=e.clientX;onResize(dx);};
    const onUp=()=>{activeRef.current=false;setActive(false);document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  };
  return <div className={`resize-handle${active?' resize-handle--active':''}`} onMouseDown={onMouseDown}/>;
}

function App(){
  const {toasts,addToast,removeToast}=useToast();
  const [page,setPage]=useState('lob-overview');
  const [activeNav,setActiveNav]=useState('classification');
  const [selectedLob,setSelectedLob]=useState(null);

  /* Detail page state — initialized from selected LOB */
  const [selectedLobId,setSelectedLobId]=useState(null);
  // l1 is always true (Required); only l2 can be toggled
  const [cbLevels,setCbLevels]=useState({l1:true,l2:false});
  const [sidebarW,setSidebarW]=useState(220);
  const [docPanelW,setDocPanelW]=useState(260);
  const [l1Items,setL1Items]=useState([]);
  const [l0Name,setL0Name]=useState('');
  const [activeL1Tab,setActiveL1Tab]=useState('l1');
  const [activeTab,setActiveTab]=useState('l1');
  const [prompts,setPrompts]=useState({});
  const [defaultPrompts,setDefaultPrompts]=useState({});
  const [saveStates,setSaveStates]=useState({});
  const saveTimers=useRef({});
  const [showMenu,setShowMenu]=useState(null);
  const [modal,setModal]=useState(null);
  const [confirmState,setConfirmState]=useState(null);
  // Data Sets
  const [dataSets,setDataSets]=useState(INIT_DATASETS);
  const addDataSet=name=>{const id=`ds-${Date.now()}`;setDataSets(prev=>[...prev,{id,name,color:'#6b7280'}]);return id;};

  // Global docs pool
  const [docs,setDocs]=useState(makeDocs());
  const [filter,setFilter]=useState('pending');
  // Stage 1 LOB docs — keyed by LOB id so they persist if you navigate away and back
  const [lobDocs,setLobDocs]=useState({});
  const getLobDocs=()=>lobDocs[selectedLobId]||[];
  const setLobDocsFor=(updater)=>setLobDocs(prev=>({...prev,[selectedLobId]:typeof updater==='function'?updater(prev[selectedLobId]||[]):updater}));
  const addLobDoc=doc=>setLobDocsFor(prev=>[...prev,doc]);
  const toggleLobSel=docId=>setLobDocsFor(prev=>prev.map(d=>d.id===docId?{...d,selected:!d.selected}:d));
  const delLobDoc=docId=>{setLobDocsFor(prev=>prev.filter(d=>d.id!==docId));addToast('Document removed','warning');};
  const markLobTested=docId=>setLobDocsFor(prev=>prev.map(d=>d.id===docId?{...d,status:'Tested',selected:false}:d));

  // Sidebar active scroll target (L1-only mode)
  const [activeCatId,setActiveCatId]=useState(null);
  const scrollToCategory=id=>{
    setActiveCatId(id);
    setTimeout(()=>{
      document.getElementById(`cat-sec-${id}`)?.scrollIntoView({behavior:'smooth',block:'start'});
    },50);
  };
  // L1 only mode: per-category docs {[catId]: [{id,name,status,selected}]}
  const [catDocs,setCatDocs]=useState({});
  const getCatDocs=catId=>catDocs[catId]||[];
  const setCatDocsFor=(catId,updater)=>setCatDocs(prev=>({...prev,[catId]:typeof updater==='function'?updater(prev[catId]||[]):updater}));

  const deleteCategory=(lobId,catId)=>{
    setLobs(ls=>ls.map(l=>l.id===lobId?{...l,categories:l.categories.filter(c=>c.id!==catId)}:l));
    addToast('Category deleted','warning');
  };
  const addCategory=(lobId,name)=>{
    const c={id:`cat-${Date.now()}`,name,activeVersion:'V.1',status:'Draft',confidence:0,trainedBy:'',prompt:'',types:[]};
    setLobs(ls=>ls.map(l=>l.id===lobId?{...l,categories:[...l.categories,c]}:l));
    addToast(`Category "${name}" added`);
  };
  const addType=(lobId,catId,name)=>{
    const t={id:`type-${Date.now()}`,name,tags:[],prompt:''};
    setLobs(ls=>ls.map(l=>l.id===lobId?{...l,categories:l.categories.map(c=>c.id===catId?{...c,types:[...c.types,t]}:c)}:l));
    addToast(`Type "${name}" added`);
  };

  const onSelectCategory=(lob,cat)=>{
    setTypesModal({lob,category:cat});
  };

  const onManagePrompt=(lob,cat,type)=>{
    const newL1Items=lob.categories.map(c=>({
      id:c.id, name:c.name, expanded:false,
      l2:c.types.map(t=>({id:t.id, name:t.name}))
    }));
    const newPrompts={
      global:GLOBAL_PROMPT,
      l1:lob.lobPrompt||'',
      ...lob.categories.reduce((acc,c)=>{
        acc[c.id]=c.prompt||'';
        c.types.forEach(t=>{acc[t.id]=t.prompt||'';});
        return acc;
      },{})
    };
    // Build tab meta from live lob data
    const meta={
      global:{version:'1.0',score:'N/A',status:'Active'},
      l1:{version:lob.classLv1Version||'V.1',score:`${lob.confidence}%`,status:lob.status},
    };
    lob.categories.forEach(c=>{
      meta[c.id]={version:c.activeVersion||'V.1',score:`${c.confidence}%`,status:c.status};
      c.types.forEach(t=>{meta[t.id]={version:c.activeVersion||'V.1',score:`${c.confidence}%`,status:c.status};});
    });
    // L1+L2 mode: always land on global 'l1' tab
    // L1 only:   land on the clicked category, else first category
    const startTab=cbLevels.l2?'l1':(cat?cat.id:(newL1Items[0]?.id||'l1'));

    saveTimers.current[tabId]=setTimeout(()=>setSaveStates(s=>({...s,[tabId]:'saved'})),1500);
  },[]);
  const handleSave=useCallback(tabId=>{clearTimeout(saveTimers.current[tabId]);setSaveStates(s=>({...s,[tabId]:'saved'}));addToast('Prompt saved');},[addToast]);

  const toggleSel=(id,forceTo)=>setDocs(ds=>ds.map(d=>d.id===id?{...d,selected:forceTo!==undefined?forceTo:!d.selected}:d));
  const delDoc=id=>{setDocs(ds=>ds.filter(d=>d.id!==id));addToast('Document removed','warning');};
  const markTested=(id,testMeta)=>setDocs(ds=>ds.map(d=>d.id===id?{...d,status:'Tested',selected:false,lastTest:testMeta||d.lastTest}:d));
  const onAddDocs=newDocs=>{setDocs(prev=>[...prev,...newDocs]);addToast(`${newDocs.length} file(s) added`,'success');};

  useEffect(()=>{
    if(cbLevels.l2){
      // L1+L2 mode: only the global 'l1' tab exists
      if(activeTab!=='l1'){setActiveTab('l1');setActiveL1Tab('l1');}
    } else {
      // L1 only mode: one tab per category — fallback to first category
      const validIds=new Set(l1Items.map(i=>i.id));
      if(!validIds.has(activeTab)&&l1Items.length>0){
        const first=l1Items[0].id;
        setActiveTab(first);setActiveL1Tab(first);
      }
    }
  },[l1Items,cbLevels]);

  useEffect(()=>{

      if(e.key==='Escape'){setModal(null);setConfirmState(null);}
      if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();handleSave(activeTab);}

      {page==='category-overview'&&selectedLob&&<CategoryOverview

        onOpenOutputFormat={()=>{setOfActiveLobId(selectedLob.id);setShowOutputFormat(true);}}
        onConfirm={setConfirmState}
        onAddCategory={addCategory}
        onDeleteCategory={deleteCategory}
        addToast={addToast}/>}

      {page==='detail'&&<>
        <div className="app__sub-bar">
          <span className="app__breadcrumb">Classification › {selectedLob?.name||''} › Prompt management</span>
        </div>
        <div className="app__back-bar">
          <button className="app__back-btn" onClick={onBackToList}><IC.Back/> Back to Categories</button>
          <PipelineBar/>
        </div>
        {/* ── Unified layout: sidebar | main-panel | docpanel ── */}
        <div className="app__content">
          <Sidebar cbLevels={cbLevels} setCbLevels={setCbLevels} l0Name={l0Name} setL0Name={setL0Name}
            l1Items={l1Items} setL1Items={setL1Items} showMenu={showMenu} setShowMenu={setShowMenu}
            addToast={addToast} onConfirm={setConfirmState}
            onScrollTo={scrollToCategory} activeCatId={activeCatId}
            style={{width:sidebarW+'px',borderRight:'1px solid var(--bdr)'}}/>
          <ResizeHandle onResize={dx=>setSidebarW(w=>Math.min(400,Math.max(160,w+dx)))}/>
          <div className="main-panel">
            {/* cl-setup — always visible regardless of mode */}
            <div className="cl-setup-wrap">
              <div className="cl-setup">
                <span className="cl-setup__label">Classification Levels</span>
                <div className="cl-setup__row">
                  <label className="cl-setup__card cl-setup__card--required" onClick={e=>e.preventDefault()}>
                    <input type="checkbox" checked readOnly/>
                    <span className="cl-setup__card-name">L1 · Document Categories</span>
                    <span className="cl-setup__card-tag cl-setup__card-tag--req">Required</span>
                  </label>
                  <label className={`cl-setup__card${cbLevels.l2?' cl-setup__card--active':''}`}>
                    <input type="checkbox" checked={cbLevels.l2} onChange={e=>setCbLevels(p=>({...p,l2:e.target.checked}))}/>
                    <span className="cl-setup__card-name">{LABELS.l2.short} · {LABELS.l2.plural}</span>
                    <span className="cl-setup__card-tag cl-setup__card-tag--opt">Optional</span>
                  </label>
                  <div className={`cl-setup__mode${cbLevels.l2?' cl-setup__mode--on':''}`}>
                    <span className="cl-setup__mode-dot"/>
                    {cbLevels.l2?'L1 + L2 active':'L1 only'}
                  </div>
                </div>
              </div>
            </div>
            {/* Center content — only this part swaps on toggle */}
            {cbLevels.l2
              ?<Workspace activeL1Tab={activeL1Tab} setActiveL1Tab={setActiveL1Tab} activeTab={activeTab} setActiveTab={setActiveTab} l1Items={l1Items}
                prompts={prompts} defaultPrompts={defaultPrompts} tabMeta={tabMeta} saveStates={saveStates}
                onEdit={handleEdit} onSave={handleSave} cbLevels={cbLevels}
                ofSchemas={ofSchemas} docs={docs}
                onVersion={()=>setModal('version')} onPreview={()=>setModal('preview')} onTest={()=>setModal('test')}/>
              :<div className="detail-scroll__main">
                <div className="detail-scroll__toolbar">
                  <span className="detail-scroll__count">{l1Items.length} categor{l1Items.length!==1?'ies':'y'}</span>
                </div>
                <LobPromptSection
                  lobName={l0Name}
                  prompt={prompts['l1']||''}
                  defaultPrompt={defaultPrompts['l1']||''}
                  meta={tabMeta['l1']}
                  saveState={saveStates['l1']}
                  onEdit={val=>handleEdit('l1',val)}
                  onSave={()=>handleSave('l1')}
                  docs={getLobDocs()}
                  onAddDoc={addLobDoc}
                  onToggleSel={toggleLobSel}
                  onDelDoc={delLobDoc}
                  onMarkTested={markLobTested}
                  addToast={addToast}
                  onVersion={()=>setModal('version')}
                  targets={l1Items}/>
                {l1Items.length>0&&(
                  <div className="stage2-label">
                    <span className="stage2-label__badge">STAGE 2</span>
                    <span className="stage2-label__text">Per-category classification prompts ({l1Items.length} categor{l1Items.length!==1?'ies':'y'})</span>
                  </div>
                )}
                {l1Items.length===0
                  ?<div style={{textAlign:'center',padding:'48px',color:'#9ca3af',fontSize:'13px'}}>No categories yet — add one in the sidebar</div>
                  :l1Items.map(item=>(
                    <CategorySection key={item.id}
                      catItem={item}
                      prompt={prompts[item.id]||''}
                      defaultPrompt={defaultPrompts[item.id]||''}
                      meta={tabMeta[item.id]}
                      saveState={saveStates[item.id]}
                      onEdit={val=>handleEdit(item.id,val)}
                      onSave={()=>handleSave(item.id)}
                      docs={getCatDocs(item.id)}
                      onAddDoc={doc=>addCatDoc(item.id,doc)}
                      onToggleSel={docId=>toggleCatSel(item.id,docId)}
                      onDelDoc={docId=>delCatDoc(item.id,docId)}
                      onMarkTested={docId=>markCatTested(item.id,docId)}
                      addToast={addToast}
                      onVersion={()=>setModal('version')}/>
                  ))
                }
              </div>
            }
          </div>
          <ResizeHandle onResize={dx=>setDocPanelW(w=>Math.min(420,Math.max(200,w-dx)))}/>
          <DocumentPanel docs={docs} dataSets={dataSets} onAddDocs={onAddDocs}
            toggleSel={toggleSel} delDoc={delDoc} addDataSet={addDataSet}
            style={{width:docPanelW+'px',borderLeft:'1px solid var(--bdr)'}}/>
        </div>
        {modal==='version'&&<VersionModal lob={selectedLobFromState} onClose={()=>setModal(null)}/>}
        {modal==='preview'&&<PreviewModal prompt={prompts[activeTab]||''} onClose={()=>setModal(null)}/>}
        {modal==='test'&&cbLevels.l2&&(()=>{
          // In L1+L2 mode: if on 'l1' tab targets = categories; if on a category tab targets = its types
          const testTargets=activeTab==='l1'
            ?l1Items
            :(()=>{const cat=l1Items.find(i=>i.id===activeTab);return cat?.l2||[];})();
          return <TestModal
            prompt={prompts[activeTab]||''}
            docs={docs} onMarkTested={markTested}
            onClose={()=>setModal(null)}
            targets={testTargets}
            testTitle={activeTab==='l1'?`Test Global Classification — ${l0Name}`:
              `Test — ${l1Items.find(i=>i.id===activeTab)?.name||activeTab}`}
          />;
        })()}
      </>}

      {typesModal&&(()=>{
        const freshLob=lobs.find(l=>l.id===typesModal.lob.id)||typesModal.lob;
        const freshCat=freshLob.categories.find(c=>c.id===typesModal.category.id)||typesModal.category;
        return <TypesModal
          lob={freshLob} category={freshCat}
          onClose={()=>setTypesModal(null)}
          onManagePrompt={(lob,cat,type)=>{setTypesModal(null);onManagePrompt(lob,cat,type);}}
          onAddType={addType}
          addToast={addToast}/>;
      })()}

      {confirmState&&<div className="modal-overlay" onClick={()=>setConfirmState(null)}>
        <div className="confirm-dialog" onClick={e=>e.stopPropagation()}>
          <div className="confirm-dialog__icon">⚠️</div>
          <div className="confirm-dialog__title">{confirmState.title}</div>
          <p className="confirm-dialog__msg">{confirmState.message}</p>
          <div className="confirm-dialog__actions">
            <button className="btn btn-outline" onClick={()=>setConfirmState(null)}>Cancel</button>
            <button className="btn btn-danger" onClick={()=>{confirmState.onConfirm();setConfirmState(null);}}>{confirmState.confirmLabel}</button>
          </div>
        </div>
      </div>}

      {showOutputFormat&&<OutputFormatModal lobs={lobs} schemas={ofSchemas}
        onSave={saved=>{setOfSchemas(saved);addToast('Output format saved');setShowOutputFormat(false);}}
        activeLobId={ofActiveLobId} onClose={()=>setShowOutputFormat(false)}/>}

      <ToastContainer toasts={toasts} removeToast={removeToast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
